<header><h1>病床機能・地域医療構想実践問題</h1><p class="lead">病床ごとの利用率・平均在院日数・収益構造に、新たな地域医療構想、包括期機能、医療機関機能報告制度を加えた実践問題です。10カテゴリから各1問、合計10問をランダムに出題します。</p></header>
<div class="status"><div class="stat"><small>現在</small><strong id="progress">1 / 10</strong></div><div class="stat"><small>正答数</small><strong id="score">0</strong></div><div class="stat"><small>出題形式</small><strong>五者択一</strong></div></div>
<main class="card" id="quizCard"><div class="category" id="category"></div><div class="qno" id="qno"></div><p class="question" id="question"></p><div class="options" id="options"></div><div class="buttons"><button id="answerBtn" disabled>回答</button><button id="nextBtn" class="secondary" style="display:none;">次の問題へ</button><button id="restartBtn" class="secondary">最初からやり直す</button></div><div class="feedback" id="feedback"></div><p class="mini">夜間のスマホ利用を想定し、暗めで彩度を抑えた配色にしています。</p></main>

<script>
const questionPools = [
{category:"病床利用率・平均在院日数",questions:[
{question:"2024年の病床種類別にみた病床利用率と平均在院日数の組み合わせとして、最も適切なものはどれか。",options:[{text:"療養病床：85.0％・117.4日、精神病床：81.4％・255.0日、一般病床：73.3％・15.5日",correct:true},{text:"一般病床：85.0％・117.4日、精神病床：81.4％・255.0日、療養病床：73.3％・15.5日",correct:false},{text:"精神病床：85.0％・117.4日、療養病床：81.4％・255.0日、一般病床：73.3％・15.5日",correct:false},{text:"療養病床：85.0％・15.5日、精神病床：81.4％・117.4日、一般病床：73.3％・255.0日",correct:false},{text:"一般病床：73.3％・117.4日、療養病床：85.0％・15.5日、精神病床：81.4％・255.0日",correct:false}],explanation:"病床利用率は療養病床が最も高く、平均在院日数は精神病床が突出して長い点が重要です。一般病床は急性期医療が中心で、平均在院日数は15日前後です。",wrongHint:"病床利用率のトップと平均在院日数のトップは同じではありません。利用率は療養、在院日数は精神で整理します。"},
{question:"病床種類別の平均在院日数を長い順に並べたものとして、最も適切なものはどれか。",options:[{text:"精神病床 → 療養病床 → 結核病床 → 一般病床 → 感染症病床",correct:true},{text:"療養病床 → 精神病床 → 一般病床 → 結核病床 → 感染症病床",correct:false},{text:"精神病床 → 結核病床 → 療養病床 → 一般病床 → 感染症病床",correct:false},{text:"一般病床 → 療養病床 → 精神病床 → 結核病床 → 感染症病床",correct:false},{text:"感染症病床 → 一般病床 → 結核病床 → 療養病床 → 精神病床",correct:false}],explanation:"平均在院日数は、精神病床が最も長く、次いで療養病床、結核病床、一般病床、感染症病床の順です。",wrongHint:"療養病床は利用率が最も高い一方、平均在院日数では精神病床が最長です。"},
{question:"病床種類別の病床利用率に関する記述として、最も適切なものはどれか。",options:[{text:"療養病床は慢性期患者が中心であり、病床利用率が高くなりやすい。",correct:true},{text:"感染症病床は平時から高稼働であり、病床利用率は療養病床と同程度になりやすい。",correct:false},{text:"結核病床は一般病床より病床利用率が高く、平均在院日数は短くなりやすい。",correct:false},{text:"精神病床は平均在院日数が長いが、病床利用率は感染症病床より低くなりやすい。",correct:false},{text:"一般病床は急性期医療が中心であるため、病床利用率は病床種類別で最も高くなりやすい。",correct:false}],explanation:"療養病床は長期療養の患者が中心で、病床利用率が高くなりやすい病床です。感染症病床や結核病床は平時の利用率が低めです。",wrongHint:"高稼働になりやすい病床と、平時の備えとして確保される病床を区別します。"}]},
{category:"病床別の機能・患者像",questions:[
{question:"病床種類別の患者像に関する記述として、誤っているものはどれか。",options:[{text:"感染症病床は、平時から長期療養患者を中心に受け入れる病床であり、療養病床と同程度の平均在院日数となる。",correct:true},{text:"一般病床は、急性期疾患、手術、検査などに対応する患者が多い。",correct:false},{text:"療養病床は、急性期を脱した後も医療的管理が必要な慢性期患者を中心に受け入れる。",correct:false},{text:"精神病床は、長期入院患者を含むため、平均在院日数が長くなりやすい。",correct:false},{text:"結核病床では、排菌状況などに応じて入院管理が必要になることがある。",correct:false}],explanation:"感染症病床は、平時から療養病床と同じような長期療養患者を中心に受け入れる病床ではありません。感染症流行時には大きく変動しますが、通常は利用率・平均在院日数とも低めです。",wrongHint:"感染症病床は、慢性期の長期療養を主目的とする療養病床とは役割が異なります。"},
{question:"一般病床、療養病床、精神病床の特徴に関する記述として、最も適切なものはどれか。",options:[{text:"一般病床は平均在院日数が短く、療養病床は病床利用率が高く、精神病床は平均在院日数が長い。",correct:true},{text:"一般病床は平均在院日数が最も長く、精神病床は病床利用率が最も低い。",correct:false},{text:"療養病床は高度急性期手術を中心に収益を確保するため、平均在院日数は一般病床より短い。",correct:false},{text:"精神病床は薬剤・診療材料の使用量が多いため、医療材料費率が一般病床を上回りやすい。",correct:false},{text:"一般病床は慢性期療養を中心とするため、病床利用率と平均在院日数が精神病床を上回りやすい。",correct:false}],explanation:"一般病床は急性期中心で平均在院日数が短く、療養病床は高稼働になりやすく、精神病床は平均在院日数が長いという整理が基本です。",wrongHint:"病床の機能と患者像を対応させると、一般＝急性期、療養＝慢性期、精神＝長期入院の整理になります。"},
{question:"病床の機能分化に関する記述として、正しいものの組み合わせはどれか。\n\nア　一般病床では、急性期医療を担う病床ほど病床回転や新入院患者の受入れが重要になりやすい。\nイ　療養病床では、長期療養患者への医療的管理を行うため、安定した病床利用率が経営上重要になりやすい。\nウ　精神病床では、平均在院日数が短いことから、通常は病床利用率よりも高度手術件数が重視される。\nエ　感染症病床は、平時の利用率だけで評価するより、感染症発生時の対応機能も考慮する必要がある。\nオ　結核病床は、一般病床より平均在院日数が短くなることが標準的である。",options:[{text:"ア・イ・エ",correct:true},{text:"ア・ウ・エ",correct:false},{text:"イ・ウ・オ",correct:false},{text:"ア・イ・オ",correct:false},{text:"ウ・エ・オ",correct:false}],explanation:"ア・イ・エが正しい組み合わせです。精神病床は平均在院日数が長くなりやすく、高度手術件数が中心指標となる病床ではありません。結核病床は一般病床より平均在院日数が長い傾向があります。",wrongHint:"精神病床と結核病床の平均在院日数を、一般病床と比較して考えます。"}]},
{category:"病院類型別の収益構造",questions:[
{question:"一般病院・療養型病院・精神科病院の収益構造に関する記述として、最も適切なものはどれか。",options:[{text:"一般病院は、療養型病院や精神科病院に比べて1床あたり医業収益が高く、医療材料費率も高くなりやすい。",correct:true},{text:"精神科病院は、平均在院日数が長いため、1床あたり医業収益は一般病院を上回りやすい。",correct:false},{text:"療養型病院は、手術や高額材料の使用が中心となるため、医療材料費率が最も高くなりやすい。",correct:false},{text:"一般病院は、急性期医療が中心であるため、材料費率は精神科病院より低くなりやすい。",correct:false},{text:"精神科病院は、人によるケアの比重が小さいため、人件費率が一般病院より低くなりやすい。",correct:false}],explanation:"一般病院は手術、検査、画像診断、薬剤・診療材料の使用が多く、1床あたり医業収益が高くなりやすい一方、医療材料費率も高くなりやすい点が特徴です。",wrongHint:"平均在院日数が長いことと、1床あたり医業収益が高いことは同じ意味ではありません。"},
{question:"病院類型別の1床あたり医業収益について、一般的な大小関係として最も適切なものはどれか。",options:[{text:"一般病院 ＞ 療養型病院 ＞ 精神科病院",correct:true},{text:"精神科病院 ＞ 療養型病院 ＞ 一般病院",correct:false},{text:"療養型病院 ＞ 一般病院 ＞ 精神科病院",correct:false},{text:"一般病院 ＞ 精神科病院 ＞ 療養型病院",correct:false},{text:"精神科病院 ＞ 一般病院 ＞ 療養型病院",correct:false}],explanation:"一般病院は急性期医療や手術・検査が多く、1床あたり医業収益が高くなりやすいです。精神科病院は平均在院日数が長い一方、入院単価は高くなりにくく、1床あたり医業収益は低めになりやすいです。",wrongHint:"入院が長い病院ほど1床あたり収益が高い、とは限りません。単価と医療内容も影響します。"},
{question:"病院類型別の収益構造に関する記述として、誤っているものはどれか。",options:[{text:"精神科病院は、平均在院日数が長いため、手術・高額材料による収益が一般病院より大きくなりやすい。",correct:true},{text:"一般病院では、急性期医療に伴う手術、検査、画像診断などが収益に影響しやすい。",correct:false},{text:"療養型病院では、入院単価だけでなく、病床利用率の高さが収益の安定に関係しやすい。",correct:false},{text:"精神科病院では、平均在院日数が長い一方、1日あたりの入院単価は一般病院より低くなりやすい。",correct:false},{text:"一般病院は、医療材料費率が高くなりやすく、収益と費用の両面から管理が必要である。",correct:false}],explanation:"精神科病院は平均在院日数が長いものの、手術・高額材料による収益が一般病院より大きいという整理ではありません。医療材料費率は一般病院のほうが高くなりやすいです。",wrongHint:"精神科病院の特徴は、長期入院や人件費率の高さであり、高額材料収益の大きさではありません。"}]},
{category:"費用構造・人件費率・材料費率",questions:[
{question:"病院類型別の費用構造に関する記述として、正しいものの組み合わせはどれか。\n\nア　一般病院は、急性期医療を多く担うため、薬品費・診療材料費の比率が高くなりやすい。\nイ　療養型病院は、医療材料費率が一般病院より低い一方、人件費率は高くなりやすい。\nウ　精神科病院は、医療材料費率が高く、人件費率は一般病院より低くなりやすい。\nエ　一般病院は、1床あたり医業収益が高い一方、材料費や設備投資の負担も大きくなりやすい。\nオ　療養型病院では、高度手術件数が費用構造を左右する中心的な要素となる。",options:[{text:"ア・イ・エ",correct:true},{text:"ア・ウ・エ",correct:false},{text:"イ・ウ・オ",correct:false},{text:"ア・イ・オ",correct:false},{text:"ウ・エ・オ",correct:false}],explanation:"ア・イ・エが正しい組み合わせです。一般病院は材料費率が高くなりやすく、療養型病院は材料費率が低めで人件費率が高めになりやすいです。精神科病院も人件費率が高くなりやすい類型です。",wrongHint:"医療材料費率が高いのは、手術・検査・薬剤・診療材料を多く使う一般病院で整理します。"},
{question:"人件費率に関する記述として、最も適切なものはどれか。",options:[{text:"精神科病院や療養型病院は、人によるケアや生活支援の比重が大きく、人件費率が一般病院より高くなりやすい。",correct:true},{text:"一般病院は、急性期医療を担うため、精神科病院や療養型病院より人件費率が常に高くなる。",correct:false},{text:"精神科病院は、医療材料費率が高いため、人件費率は病院類型別で最も低くなりやすい。",correct:false},{text:"療養型病院は、長期入院患者が多いため、看護・介護・生活支援に関する人件費の影響は小さい。",correct:false},{text:"一般病院では、診療材料費が少ないため、人件費率以外の費用管理は重要性が低い。",correct:false}],explanation:"精神科病院や療養型病院では、人によるケア、見守り、看護・介護、生活支援の比重が大きく、人件費率が高くなりやすいです。一般病院は医療材料費率が高くなりやすい点も重要です。",wrongHint:"人件費率は、収益の高さだけではなく、ケアの人手依存度や材料費の大きさとの関係で考えます。"},
{question:"医療材料費率に関する記述として、誤っているものはどれか。",options:[{text:"精神科病院は、平均在院日数が長いため、一般病院より医療材料費率が高くなりやすい。",correct:true},{text:"一般病院は、手術、検査、薬剤、処置などにより医療材料費率が高くなりやすい。",correct:false},{text:"療養型病院は、一般病院と比較すると高額材料の使用が少なく、医療材料費率は低めになりやすい。",correct:false},{text:"精神科病院は、薬剤・診療材料の使用よりも、人によるケアや支援の比重が大きい。",correct:false},{text:"一般病院では、高収益であっても材料費管理を誤ると利益を圧迫する可能性がある。",correct:false}],explanation:"精神科病院は平均在院日数が長い一方、手術や高額材料の使用が一般病院より多いという整理ではありません。医療材料費率は一般病院で高くなりやすいです。",wrongHint:"在院日数の長さと医療材料費率の高さを直接結びつけないようにします。"}]},
{category:"経営指標・病床運営",questions:[
{question:"病床運営に関する記述として、誤っているものはどれか。",options:[{text:"療養病床では、急性期病床と同様に短期間で患者を入れ替えることが最も重視され、病床利用率は経営上あまり重視されない。",correct:true},{text:"平均在院日数が短縮すると、同じ病床数でも病床回転率は上昇しやすい。",correct:false},{text:"病床利用率は、病床の稼働状況を見る際に用いられる重要な指標である。",correct:false},{text:"一般病床では、平均在院日数の短縮により病床回転を高め、新入院患者の受入れを増やすことが収益上重要になる。",correct:false},{text:"精神病床では、長期入院患者の地域移行や退院支援が、医療提供体制や経営の両面で重要な課題となる。",correct:false}],explanation:"療養病床は、急性期病床のように短期入れ替えを主な収益構造とする病床ではありません。慢性期患者の長期療養を支える病床であり、病床利用率の高さや安定稼働が重要です。",wrongHint:"急性期病床の病床回転と、療養病床の安定稼働を分けて考えます。"},
{question:"病床回転率と平均在院日数に関する記述として、最も適切なものはどれか。",options:[{text:"平均在院日数が短いほど、同じ病床数でも一定期間に受け入れられる入院患者数は増えやすい。",correct:true},{text:"平均在院日数が長いほど、病床回転率は必ず上昇する。",correct:false},{text:"病床回転率は、医療材料費率を病床利用率で割って算出する。",correct:false},{text:"一般病床では、平均在院日数が長いほど新入院患者の受入れ余地が大きくなる。",correct:false},{text:"病床利用率が高ければ、病床回転率や平均在院日数を確認する必要はない。",correct:false}],explanation:"平均在院日数が短いほど、同じ病床数でも病床回転が高まりやすく、新入院患者の受入れ余地が大きくなります。特に一般病床では重要な視点です。",wrongHint:"病床回転率は平均在院日数と反対方向に動きやすい指標です。"},
{question:"病床利用率、平均在院日数、収益構造の関係に関する記述として、正しいものの組み合わせはどれか。\n\nア　一般病床では、短い平均在院日数と病床回転を通じて新入院患者を受け入れることが収益に関係しやすい。\nイ　療養病床では、長期療養患者を安定的に受け入れるため、病床利用率の維持が重要になりやすい。\nウ　精神病床では、平均在院日数が長いことから、1床あたり医業収益は一般病院より高くなるのが通常である。\nエ　一般病院では、入院単価が高くても材料費率が高いため、収益だけでなく費用管理も重要である。\nオ　感染症病床では、平時の病床利用率が高いほど感染症対応機能が十分であると単純に評価できる。",options:[{text:"ア・イ・エ",correct:true},{text:"ア・ウ・エ",correct:false},{text:"イ・ウ・オ",correct:false},{text:"ア・イ・オ",correct:false},{text:"ウ・エ・オ",correct:false}],explanation:"ア・イ・エが正しい組み合わせです。精神病床は平均在院日数が長くても1床あたり医業収益が一般病院を上回るとは限りません。感染症病床は、平時の利用率だけで単純評価しにくい病床です。",wrongHint:"収益は在院日数だけでなく、入院単価、病床利用率、費用構造の影響を受けます。"}]},
{category:"新たな地域医療構想の範囲",questions:[
{question:"新たな地域医療構想に関する記述として、誤っているものはどれか。",options:[{text:"高齢人口が減少する地域を主な対象とし、高齢人口が増加する大都市部は対象から外れる。",correct:true},{text:"2040年頃を見据え、地域の医療提供体制全体の課題を整理する考え方である。",correct:false},{text:"入院医療だけでなく、外来医療、在宅医療、介護との連携も含めて検討する。",correct:false},{text:"人口構造の変化や医療従事者確保の制約を踏まえて、地域ごとの課題を考える必要がある。",correct:false},{text:"病床機能だけでなく、医療機関の役割分担や連携も重要な論点となる。",correct:false}],explanation:"新たな地域医療構想は、高齢人口が減少する地域だけでなく、高齢人口が増加する大都市部も対象に含めて、地域ごとの課題を整理するものです。入院医療だけでなく、外来・在宅・介護連携・人材確保まで視野に入れます。",wrongHint:"対象地域を地方部に限定する記述は誤りです。大都市部も含め、地域ごとの人口変化に応じて考えます。"},
{question:"新たな地域医療構想で重視される内容として、正しいものの組み合わせはどれか。\n\nア　入院医療だけでなく、外来医療・在宅医療を含めた提供体制\nイ　介護との連携や地域包括ケアシステムとの関係\nウ　地域の医療従事者確保や人材制約への対応\nエ　病床数の削減だけを目的とした一律の全国計画\nオ　地域ごとの人口変化を踏まえた医療機関の役割分担",options:[{text:"ア・イ・ウ・オ",correct:true},{text:"ア・イ・エ",correct:false},{text:"イ・ウ・エ",correct:false},{text:"ア・エ・オ",correct:false},{text:"ウ・エ・オ",correct:false}],explanation:"ア・イ・ウ・オが正しい組み合わせです。新たな地域医療構想は、病床数の削減だけを目的とする一律計画ではなく、入院・外来・在宅・介護連携・人材確保を含めた地域の医療提供体制全体を扱います。",wrongHint:"病床数だけに限定する記述や、全国一律の削減計画とする記述は避けます。"},
{question:"地域医療構想の対象範囲の変化に関する記述として、最も適切なものはどれか。",options:[{text:"従来の病床機能の議論に加え、外来・在宅・介護連携・人材確保を含む地域の医療提供体制全体へ視野を広げる。",correct:true},{text:"病床機能報告を廃止し、医療機関の機能や地域連携に関する報告は不要とする。",correct:false},{text:"在宅医療や介護連携は市町村の業務であるため、地域医療構想では扱わない。",correct:false},{text:"大都市部では医療需要が安定しているため、新たな地域医療構想の検討対象から外す。",correct:false},{text:"急性期医療の確保のみを目的とし、慢性期や包括期の医療機能は対象外とする。",correct:false}],explanation:"新たな地域医療構想では、病床機能だけでなく、外来・在宅・介護連携・人材確保を含む地域の医療提供体制全体を検討する方向です。",wrongHint:"病床機能だけ、急性期だけ、大都市部を除外、という限定は新たな地域医療構想の整理と合いません。"}]},
{category:"病床機能区分と包括期機能",questions:[
{question:"新たな地域医療構想における病床機能の整理に関する記述として、最も適切なものはどれか。",options:[{text:"高度急性期機能、急性期機能などに加え、回復期機能を包括期機能として位置付ける方向が示されている。",correct:true},{text:"高度急性期機能と急性期機能を統合し、すべての病床を慢性期機能へ一本化する。",correct:false},{text:"地域医療構想では、病床機能区分を扱わず、外来医療だけを対象とする。",correct:false},{text:"包括期機能は、感染症病床だけを対象とする機能区分である。",correct:false},{text:"慢性期機能は廃止され、精神病床と結核病床だけが報告対象になる。",correct:false}],explanation:"新たな地域医療構想では、高度急性期・急性期等に加え、回復期機能を包括期機能として位置付ける整理が示されています。包括期は高齢者救急や在宅復帰支援など、急性期後を含む幅広い支援と関連します。",wrongHint:"包括期機能を感染症病床や慢性期への一本化と結びつける記述は誤りです。"},
{question:"包括期機能の理解として、最も適切なものはどれか。",options:[{text:"急性期後の患者や高齢者救急などを受け止め、リハビリテーション、栄養管理、退院支援等を通じて生活を支える機能と関連する。",correct:true},{text:"高度救命救急センターの手術・集中治療だけを評価する機能である。",correct:false},{text:"長期の精神科入院だけを対象とする機能であり、在宅復帰支援とは関係しない。",correct:false},{text:"病床利用率を下げるために、急性期病床への転換だけを促す機能である。",correct:false},{text:"外来医療と在宅医療を地域医療構想から切り離すための機能である。",correct:false}],explanation:"包括期機能は、急性期後や高齢者救急を受け止め、リハビリテーション、栄養管理、口腔管理、入退院支援、在宅復帰など、生活を支える医療と結びつけて理解すると整理しやすいです。",wrongHint:"包括期機能を高度急性期の集中治療だけ、精神科だけ、外来・在宅の切り離しとする説明は適切ではありません。"},
{question:"病床機能区分と地域医療構想に関する記述として、正しいものの組み合わせはどれか。\n\nア　地域医療構想では、病床の機能分化と連携が重要な論点となる。\nイ　新たな地域医療構想では、包括期機能が想定されている。\nウ　包括期機能は、高齢者救急や在宅復帰支援と関係する。\nエ　地域医療構想では、入院医療のみを扱い、在宅医療や介護連携は扱わない。\nオ　病床機能は、すべて高度急性期機能へ集約する方向で整理されている。",options:[{text:"ア・イ・ウ",correct:true},{text:"ア・エ・オ",correct:false},{text:"イ・ウ・エ",correct:false},{text:"ア・イ・オ",correct:false},{text:"ウ・エ・オ",correct:false}],explanation:"ア・イ・ウが正しい組み合わせです。地域医療構想では、病床機能の分化と連携が重要であり、新たな整理では包括期機能が想定されています。一方、在宅医療や介護連携を対象外とする記述や、高度急性期へ集約する記述は誤りです。",wrongHint:"包括期機能を押さえつつ、地域医療構想が入院医療だけに閉じない点を確認します。"}]},
{category:"医療機関機能報告制度",questions:[
{question:"新たな地域医療構想における医療機関機能報告制度の対象として示されている機能の組み合わせとして、最も適切なものはどれか。",options:[{text:"高齢者救急・地域急性期機能、在宅医療等連携機能、急性期拠点機能、専門等機能、医育及び広域診療機能",correct:true},{text:"高度急性期機能、急性期機能、包括期機能、慢性期機能、感染症機能",correct:false},{text:"一般病床機能、療養病床機能、精神病床機能、結核病床機能、感染症病床機能",correct:false},{text:"外来機能、薬局機能、介護保険施設機能、救急搬送機能、行政指導機能",correct:false},{text:"急性期一般入院料機能、地域包括ケア病棟機能、回復期リハビリテーション病棟機能、療養病棟機能、特定機能病院機能",correct:false}],explanation:"医療機関機能報告制度では、高齢者救急・地域急性期機能、在宅医療等連携機能、急性期拠点機能、専門等機能、医育及び広域診療機能が示されています。病床機能区分そのものや入院料区分の一覧とは区別します。",wrongHint:"病床機能区分や入院料の区分ではなく、医療機関が地域で担う役割を報告する制度として整理します。"},
{question:"医療機関機能報告制度に関する記述として、誤っているものはどれか。",options:[{text:"病床種類別の病床利用率だけを報告する制度であり、医療機関が地域で担う役割は対象としない。",correct:true},{text:"高齢者救急・地域急性期機能のように、高齢者救急を地域で受け止める役割が含まれる。",correct:false},{text:"在宅医療等連携機能のように、在宅医療や介護との接続を意識した機能が含まれる。",correct:false},{text:"急性期拠点機能や専門等機能のように、地域の中で専門的・拠点的役割を担う機能が含まれる。",correct:false},{text:"医育及び広域診療機能のように、教育・広域的診療の役割を持つ医療機関機能が含まれる。",correct:false}],explanation:"医療機関機能報告制度は、病床利用率だけを報告する制度ではありません。医療機関が地域でどのような機能を担うかを把握し、地域医療構想の議論につなげるための制度として理解します。",wrongHint:"病床種類別の統計報告と、医療機関の地域での役割を報告する制度を混同しないようにします。"},
{question:"医療機関機能と具体的な役割の対応として、最も適切なものはどれか。",options:[{text:"在宅医療等連携機能：在宅医療や介護との連携を含め、地域で患者を支える役割",correct:true},{text:"急性期拠点機能：慢性期入院患者のみを長期的に受け入れる役割",correct:false},{text:"医育及び広域診療機能：診療所の外来待ち時間だけを短縮する役割",correct:false},{text:"高齢者救急・地域急性期機能：高度急性期病院への患者集中を目的として、地域の救急受入れを縮小する役割",correct:false},{text:"専門等機能：在宅医療と介護連携を地域医療構想調整会議の議題から外す役割",correct:false}],explanation:"在宅医療等連携機能は、在宅医療や介護との連携を含め、地域で患者を支える役割と結びつけて理解します。医療機関機能は、地域での役割分担を把握するための整理です。",wrongHint:"各機能名の語感に沿って、地域で何を担うかを考えると選びやすくなります。"}]},
{category:"調整会議・市町村・介護連携",questions:[
{question:"新たな地域医療構想における地域医療構想調整会議に関する記述として、最も適切なものはどれか。",options:[{text:"市町村を構成員として明確化し、在宅医療や介護との連携等を議題とする場合の参画が求められる。",correct:true},{text:"調整会議は急性期病院だけで構成され、自治体や介護関係者の参画は想定されない。",correct:false},{text:"在宅医療や介護連携は地域医療構想の対象外であるため、調整会議の議題にはならない。",correct:false},{text:"調整会議は国が全国一律に病床配分を決定する場であり、地域ごとの事情は考慮しない。",correct:false},{text:"市町村は介護保険者であるため、医療提供体制の議論には参加できない。",correct:false}],explanation:"新たな地域医療構想では、市町村を地域医療構想調整会議の構成員として明確化し、在宅医療や介護との連携等を議題とする場合の参画が求められると整理されています。",wrongHint:"在宅医療・介護連携を扱う場合、市町村の参画を切り離す記述は誤りです。"},
{question:"地域医療構想と介護連携に関する記述として、正しいものの組み合わせはどれか。\n\nア　高齢者救急や在宅復帰を考えるうえで、介護保険施設や在宅サービスとの連携が重要となる。\nイ　市町村は介護保険者としての役割を持つため、在宅医療や介護連携の議題で関与が求められる。\nウ　地域医療構想は病床数の管理だけを扱うため、介護連携は検討対象にならない。\nエ　地域包括ケアシステムとの関係を踏まえた医療機能の分化・連携が重要となる。\nオ　大都市部では介護需要が発生しないため、地域医療構想の議論から除外される。",options:[{text:"ア・イ・エ",correct:true},{text:"ア・ウ・エ",correct:false},{text:"イ・ウ・オ",correct:false},{text:"ア・イ・オ",correct:false},{text:"ウ・エ・オ",correct:false}],explanation:"ア・イ・エが正しい組み合わせです。地域医療構想では、在宅医療・介護連携や地域包括ケアシステムとの関係が重要です。病床数だけを扱うものではなく、大都市部も対象に含まれます。",wrongHint:"介護連携を対象外とする記述、大都市部を除外する記述は誤りです。"},
{question:"地域医療構想調整会議の議論として、最も適切なものはどれか。",options:[{text:"地域の人口構造、在宅医療・介護との連携、病床機能、医療機関の役割分担を踏まえて協議する。",correct:true},{text:"病床利用率が高い病院から順に、地域の事情にかかわらず一律に病床を削減する。",correct:false},{text:"急性期病院の収益改善だけを目的とし、在宅復帰や介護施設との連携は扱わない。",correct:false},{text:"市町村や介護側の情報を除外し、都道府県と高度急性期病院だけで完結させる。",correct:false},{text:"医療機関機能報告制度とは関係なく、個別病院の広告内容だけを確認する。",correct:false}],explanation:"地域医療構想調整会議では、地域の人口構造、医療需要、在宅医療・介護連携、病床機能、医療機関の役割分担などを踏まえて協議することが重要です。",wrongHint:"地域医療構想は、一律削減や個別病院の収益改善だけの議論ではありません。"}]},
{category:"診療報酬改定との接続",questions:[

let quiz=[],current=0,score=0,selectedIndex=null,answered=false,history=[];const $=id=>document.getElementById(id);function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}function startQuiz(){quiz=shuffle(questionPools.map(pool=>{const picked=pool.questions[Math.floor(Math.random()*pool.questions.length)];return{category:pool.category,question:picked.question,options:shuffle(picked.options),explanation:picked.explanation,wrongHint:picked.wrongHint}}));current=0;score=0;selectedIndex=null;answered=false;history=[];$('quizCard').style.display='block';$('resultCard').style.display='none';renderQuestion()}function makeText(tag,text,className){const el=document.createElement(tag);if(className)el.className=className;el.textContent=text;return el}function renderQuestion(){const item=quiz[current];selectedIndex=null;answered=false;$('progress').textContent=`${current+1} / ${quiz.length}`;$('score').textContent=score;$('category').textContent=item.category;$('qno').textContent=`問${current+1}`;$('question').textContent=item.question;$('answerBtn').disabled=true;$('answerBtn').style.display='inline-block';$('nextBtn').style.display='none';$('feedback').style.display='none';$('feedback').className='feedback';$('feedback').innerHTML='';const optionsEl=$('options');optionsEl.innerHTML='';item.options.forEach((option,index)=>{const label=document.createElement('label');label.className='option';const input=document.createElement('input');input.type='radio';input.name='option';input.value=String(index);const span=document.createElement('span');span.textContent=option.text;label.appendChild(input);label.appendChild(span);label.addEventListener('click',()=>{if(answered)return;selectedIndex=index;document.querySelectorAll('.option').forEach(el=>el.classList.remove('selected'));label.classList.add('selected');$('answerBtn').disabled=false});optionsEl.appendChild(label)});location.hash='top'}function showAnswer(){if(selectedIndex===null||answered)return;answered=true;const item=quiz[current];const selected=item.options[selectedIndex];const correctOption=item.options.find(opt=>opt.correct);const isCorrect=selected.correct;if(isCorrect)score++;$('score').textContent=score;history.push({no:current+1,category:item.category,question:item.question,selected:selected.text,correct:correctOption.text,isCorrect,explanation:item.explanation});const fb=$('feedback');fb.style.display='block';fb.className=`feedback ${isCorrect?'correct':'wrong'}`;fb.innerHTML='';fb.appendChild(makeText('h3',isCorrect?'正解です':'不正解です'));fb.appendChild(makeText('p',`正答：${correctOption.text}`));if(!isCorrect)fb.appendChild(makeText('p',`誤答の理由：${item.wrongHint}`));fb.appendChild(makeText('p',`解説：${item.explanation}`));$('answerBtn').style.display='none';$('nextBtn').style.display='inline-block';$('nextBtn').textContent=current===quiz.length-1?'結果を見る':'次の問題へ'}function nextQuestion(){if(current<quiz.length-1){current++;renderQuestion()}else{showResult()}}function showResult(){$('quizCard').style.display='none';$('resultCard').style.display='block';$('resultText').textContent=`10問中 ${score} 問正解です。病床利用率は療養、平均在院日数は精神、収益・材料費は一般、人件費率は療養・精神、新たな地域医療構想は包括期機能と医療機関機能報告制度を軸に復習しましょう。`;const review=$('review');review.innerHTML='';history.forEach(item=>{const div=document.createElement('div');div.className='review-item';const title=document.createElement('div');const strong=document.createElement('strong');strong.className=item.isCorrect?'ok':'ng';strong.textContent=`問${item.no}：${item.isCorrect?'正解':'不正解'}`;title.appendChild(strong);title.appendChild(document.createTextNode(`　${item.category}`));div.appendChild(title);div.appendChild(makeText('div',`あなたの回答：${item.selected}`));div.appendChild(makeText('div',`正答：${item.correct}`));div.appendChild(makeText('div',item.explanation,'muted'));review.appendChild(div)});location.hash='top'}$('answerBtn').addEventListener('click',showAnswer);$('nextBtn').addEventListener('click',nextQuestion);$('restartBtn').addEventListener('click',startQuiz);$('restartBtn2').addEventListener('click',startQuiz);startQuiz();
