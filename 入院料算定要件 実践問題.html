  <style>
    :root {

      --card: #182334;
      --card2: #1f2d40;
      --text: #e8eef6;
      --muted: #aeb9c7;
      --line: #2b3b50;
      --accent: #87bfff;
      --accent2: #7dd3c7;
      --ok: #56d08a;
      --ng: #ff7b8a;
      --warn: #f2c572;
      --shadow: rgba(0, 0, 0, .35);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", Meiryo, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(45, 83, 122, .35), transparent 32rem),
        linear-gradient(180deg, #0b111b 0%, var(--bg) 46%, #0a111a 100%);
      min-height: 100svh;
      line-height: 1.75;
      letter-spacing: .01em;
    }
    button { font: inherit; }
    .wrap { width: min(1120px, 100%); margin: 0 auto; padding: 18px 14px 36px; }
    .hero {
      background: linear-gradient(135deg, rgba(31,45,64,.96), rgba(18,29,43,.96));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 18px 40px var(--shadow);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
    }
    .badge {
      display: inline-flex; gap: 8px; align-items: center;
      color: #c8d7e8;
      background: rgba(135,191,255,.12);
      border: 1px solid rgba(135,191,255,.24);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    h1 { margin: 10px 0 6px; font-size: clamp(24px, 6vw, 42px); line-height: 1.18; }
    .lead { margin: 0; color: var(--muted); font-size: 14px; }
    .layout { display: grid; grid-template-columns: 1fr 320px; gap: 18px; margin-top: 18px; }
    .card {
      background: rgba(24, 35, 52, .96);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 40px var(--shadow);
    }
    .question-card { padding: 18px; scroll-margin-top: 118px; }
    .topline { display: flex; justify-content: space-between; align-items: start; gap: 12px; margin-bottom: 14px; }
    .qnum { color: var(--muted); font-weight: 800; font-size: 13px; }
    .cat {
      display: inline-block;
      margin-top: 6px;
      border-radius: 999px;
      padding: 3px 9px;
      background: rgba(125, 211, 199, .12);
      color: #b7f3eb;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(125, 211, 199, .22);
    }
    h2 { margin: 0; font-size: clamp(20px, 5vw, 28px); line-height: 1.35; }
    .question { white-space: pre-line; font-size: 17px; margin: 18px 0; color: #f0f5fb; }
    .choices { display: grid; gap: 10px; }
    .choice {
      width: 100%; text-align: left;
      color: var(--text);
      background: rgba(255,255,255,.035);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 10px;
      align-items: start;
      cursor: pointer;
      transition: border-color .15s ease, background .15s ease, transform .05s ease;
    }
    .choice:active { transform: scale(.995); }
    .choice:hover { border-color: rgba(135,191,255,.55); }
    .choice.selected { background: rgba(135,191,255,.13); border-color: rgba(135,191,255,.85); }
    .choice.correct { background: rgba(86,208,138,.14); border-color: rgba(86,208,138,.85); }
    .choice.wrong { background: rgba(255,123,138,.14); border-color: rgba(255,123,138,.85); }
    .mark {
      width: 30px; height: 30px;
      display: inline-flex; justify-content: center; align-items: center;
      border-radius: 10px;
      background: rgba(255,255,255,.075);
      color: #d7e4f2;
      font-weight: 900;
      flex: 0 0 auto;
    }
    .result-mark { font-size: 20px; font-weight: 900; }
    .correct .result-mark { color: var(--ok); }
    .wrong .result-mark { color: var(--ng); }
    .actions { display: flex; gap: 10px; justify-content: space-between; margin-top: 16px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255,255,255,.06);
      padding: 12px 16px;
      border-radius: 16px;
      font-weight: 900;
      cursor: pointer;
      min-height: 48px;
    }
    .btn.primary { background: linear-gradient(135deg, #3f7fba, #2d6d87); border-color: rgba(135,191,255,.6); }
    .btn:disabled { opacity: .42; cursor: not-allowed; }
    .explain { margin-top: 16px; border-radius: 20px; padding: 16px; border: 1px solid var(--line); background: rgba(255,255,255,.04); }
    .explain.ok { border-color: rgba(86,208,138,.35); background: rgba(86,208,138,.08); }
    .explain.ng { border-color: rgba(255,123,138,.35); background: rgba(255,123,138,.08); }
    .explain h3 { margin: 0 0 8px; font-size: 19px; }
    .mini { color: var(--muted); font-size: 13px; }
    .reason-box { margin-top: 10px; padding: 12px; background: rgba(0,0,0,.18); border-radius: 14px; border: 1px solid rgba(255,255,255,.08); }
    .key { margin-top: 12px; color: #dbf7f3; background: rgba(125,211,199,.10); border: 1px solid rgba(125,211,199,.20); padding: 10px 12px; border-radius: 14px; font-weight: 800; }
    .side { display: grid; gap: 14px; align-self: start; position: sticky; top: 145px; }
    .panel { padding: 16px; }
    .panel h3 { margin: 0 0 10px; font-size: 17px; }
    .score { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .score div { border-radius: 14px; padding: 10px; text-align: center; font-weight: 900; background: rgba(255,255,255,.045); }
    .score .okc { color: var(--ok); }
    .score .ngc { color: var(--ng); }
    .progress { height: 9px; border-radius: 99px; background: rgba(255,255,255,.08); overflow: hidden; margin-top: 10px; }
    .bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .25s ease; }
    .navgrid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .navbtn {
      min-height: 42px; border-radius: 12px; border: 1px solid var(--line);
      background: rgba(255,255,255,.04); color: var(--text); font-weight: 900; cursor: pointer;
    }
    .navbtn.current { background: #dceeff; color: #0a1420; border-color: #dceeff; }
    .navbtn.ok { background: rgba(86,208,138,.16); border-color: rgba(86,208,138,.45); color: #a8f0c7; }
    .navbtn.ng { background: rgba(255,123,138,.16); border-color: rgba(255,123,138,.45); color: #ffc1c8; }
    .mistake {
      width: 100%; text-align: left; color: var(--text); cursor: pointer;
      border: 1px solid rgba(255,123,138,.25); background: rgba(255,123,138,.09);
      border-radius: 16px; padding: 12px; margin-top: 8px;
    }
    .mistake strong { color: #ffc1c8; }
    .finish { margin-top: 14px; padding: 14px; border-radius: 18px; border: 1px solid rgba(242,197,114,.35); background: rgba(242,197,114,.09); }
    footer { color: var(--muted); font-size: 12px; margin: 20px 6px 0; }
    @media (max-width: 860px) {
      .hero { position: relative; top: auto; padding: 16px; }
      .layout { grid-template-columns: 1fr; }
      .side { position: static; grid-row: auto; }
      .question-card { scroll-margin-top: 12px; }
      .choice { grid-template-columns: 30px 1fr auto; padding: 13px; }
      .actions .btn { flex: 1 1 100%; }
      .side { order: 2; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <span class="badge">医療経営士2級対策</span>
      <h1>入院料算定要件 実践問題</h1>
      <p class="lead">急性期・包括期・回復期・慢性期の入院料について、看護配置、平均在院日数、在宅復帰、重症度・医療・看護必要度、多職種協働の論点を確認します。</p>
      <p class="lead">問題プール27問から毎回10問をランダム出題。カテゴリの偏りと連続をできるだけ抑え、選択肢の順番も毎回変わります。</p>
    </header>

    <div class="layout">
      <main>
        <section id="questionCard" class="card question-card" aria-live="polite">
          <div class="topline">
            <div>
              <div id="qnum" class="qnum"></div>
              <h2 id="qtitle"></h2>
              <span id="qcat" class="cat"></span>
            </div>
            <span class="badge">五者択一</span>
          </div>
          <div id="qtext" class="question"></div>
          <div id="choices" class="choices"></div>
          <div id="feedback"></div>
          <div class="actions">
            <button id="resetBtn" class="btn" type="button">新しい10問でやり直す</button>
            <button id="answerBtn" class="btn primary" type="button">回答</button>
            <button id="nextBtn" class="btn primary" type="button">次の問題へ</button>
          </div>
        </section>
      </main>

      <aside class="side">
        <section class="card panel">
          <h3>今回の成績</h3>
          <div id="summary" class="mini">まだ解答していません</div>
          <div class="progress"><div id="bar" class="bar"></div></div>
          <div class="score">
            <div class="okc">正答 <span id="okCount">0</span></div>
            <div class="ngc">誤答 <span id="ngCount">0</span></div>
          </div>
        </section>
        <section class="card panel">
          <h3>解答状況</h3>
          <div id="nav" class="navgrid"></div>
        </section>
        <section class="card panel">
          <h3>間違えた問題</h3>
          <div id="mistakes" class="mini">まだ誤答はありません。</div>
        </section>
        <section id="finishBox" class="card panel" style="display:none;">
          <h3>今回の結果</h3>
          <div id="finishText" class="mini"></div>
          <button id="againBtn" class="btn primary" type="button" style="width:100%; margin-top:10px;">新しい10問に挑戦</button>
        </section>
      </aside>
    </div>

    <footer>
      参考：令和8年度診療報酬改定の概要、問題作成時のポイント。令和8年度改定資料は概要版であり、正式な告示・通知等で詳細確認が必要です。
    </footer>
  </div>

    "explanation": "急性期病院Aは7対1・16日以内、地域包括医療病棟は10対1・20日原則、地域包括ケア病棟は13対1・60日です。近い数値を入れ替えた選択肢に注意します。",
    "key": "A＝7/16、包括医療＝10/20、包括ケア＝13/60"
  }
];
    const QUESTIONS_PER_SESSION = 10;

    let sessionQuestions = [];
    let current = 0;
    let selected = null;
    let checked = false;
    let results = {};

    const el = (id) => document.getElementById(id);

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function groupByCategory(pool) {
      return pool.reduce((acc, q) => {
        if (!acc[q.category]) acc[q.category] = [];
        acc[q.category].push(q);
        return acc;
      }, {});
    }

    function pickBalancedQuestions() {
      const groups = groupByCategory(QUESTION_POOL);
      const categories = shuffle(Object.keys(groups));
      const picked = [];
      categories.forEach(cat => {
        if (picked.length >= QUESTIONS_PER_SESSION) return;
        picked.push(shuffle(groups[cat])[0]);
      });
      const rest = shuffle(QUESTION_POOL.filter(q => !picked.some(p => p.id === q.id)));
      rest.forEach(q => {
        if (picked.length < QUESTIONS_PER_SESSION) picked.push(q);
      });
      return picked;
    }

    function orderWithoutAdjacentCategories(questions) {
      const rest = shuffle(questions);
      const ordered = [];
      while (rest.length) {
        const prev = ordered.length ? ordered[ordered.length - 1].category : null;
        let idx = rest.findIndex(q => q.category !== prev);
        if (idx < 0) idx = 0;
        ordered.push(rest.splice(idx, 1)[0]);
      }
      return ordered;
    }

    function createSessionQuestions() {
      return orderWithoutAdjacentCategories(pickBalancedQuestions()).map(q => {
        return { ...q, choices: shuffle(q.choices) };
      });
    }

    function resultFor(q) { return results[q.id]; }
    function answeredCount() { return Object.keys(results).length; }
    function correctCount() { return Object.values(results).filter(r => r.isCorrect).length; }
    function wrongCount() { return answeredCount() - correctCount(); }

    function scrollToQuestion() {
      setTimeout(() => el('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' }), 20);
    }

    function render() {
      const q = sessionQuestions[current];
      const existing = resultFor(q);
      if (existing) {
        checked = true;
        selected = q.choices.findIndex(c => c.text === existing.selectedText);
      }
      el('qnum').textContent = `問題 ${current + 1} / ${sessionQuestions.length}`;
      el('qtitle').textContent = q.title;
      el('qcat').textContent = q.category;
      el('qtext').textContent = q.question;
      el('choices').innerHTML = '';

      q.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'choice';
        if (selected === index && !checked) btn.classList.add('selected');
        if (checked && choice.correct) btn.classList.add('correct');
        if (checked && selected === index && !choice.correct) btn.classList.add('wrong');
        btn.innerHTML = `<span class="mark">${index + 1}</span><span>${escapeHtml(choice.text)}</span><span class="result-mark">${checked && choice.correct ? '○' : checked && selected === index && !choice.correct ? '×' : ''}</span>`;
        btn.addEventListener('click', () => {
          if (checked) return;
          selected = index;
          render();
        });
        el('choices').appendChild(btn);
      });

      renderFeedback();
      renderSide();
      el('answerBtn').style.display = checked ? 'none' : 'inline-block';
      el('answerBtn').disabled = selected === null;
      el('nextBtn').style.display = checked ? 'inline-block' : 'none';
      el('nextBtn').disabled = current === sessionQuestions.length - 1;
    }

    function renderFeedback() {
      const q = sessionQuestions[current];
      const fb = el('feedback');
      fb.innerHTML = '';
      if (!checked) return;
      const selectedChoice = q.choices[selected];
      const correctChoice = q.choices.find(c => c.correct);
      const ok = Boolean(selectedChoice && selectedChoice.correct);
      const box = document.createElement('div');
      box.className = `explain ${ok ? 'ok' : 'ng'}`;
      let detail = '';
      if (ok) {
        detail = `<div class="reason-box"><strong>選んだ答え：</strong>${escapeHtml(selectedChoice.text)}</div>`;
      } else {
        detail = `<div class="reason-box">
          <div><strong>選んだ答え：</strong>${escapeHtml(selectedChoice ? selectedChoice.text : '')}</div>
          <div><strong>誤答の理由：</strong>${escapeHtml(selectedChoice ? selectedChoice.reason : '')}</div>
          <div><strong>正しい答え：</strong>${escapeHtml(correctChoice.text)}</div>
        </div>`;
      }
      box.innerHTML = `<h3>${ok ? '正解です' : '不正解です'}</h3>${detail}<p>${escapeHtml(q.explanation)}</p><div class="key">覚え方：${escapeHtml(q.key)}</div>`;
      fb.appendChild(box);
    }

    function renderSide() {
      const ac = answeredCount();
      const cc = correctCount();
      const wc = wrongCount();
      el('okCount').textContent = cc;
      el('ngCount').textContent = wc;
      el('summary').textContent = ac === 0 ? 'まだ解答していません' : `${ac}問中 正答${cc}問・誤答${wc}問`;
      el('bar').style.width = `${Math.round((ac / sessionQuestions.length) * 100)}%`;

      el('nav').innerHTML = '';
      sessionQuestions.forEach((q, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'navbtn';
        if (index === current) btn.classList.add('current');
        const r = resultFor(q);
        if (r && r.isCorrect) btn.classList.add('ok');
        if (r && !r.isCorrect) btn.classList.add('ng');
        btn.textContent = index + 1;
        btn.addEventListener('click', () => {
          current = index;
          const existing = resultFor(sessionQuestions[current]);
          checked = Boolean(existing);
          selected = existing ? sessionQuestions[current].choices.findIndex(c => c.text === existing.selectedText) : null;
          render();
          scrollToQuestion();
        });
        el('nav').appendChild(btn);
      });

      const mistakes = sessionQuestions.filter(q => resultFor(q) && !resultFor(q).isCorrect);
      if (mistakes.length === 0) {
        el('mistakes').innerHTML = 'まだ誤答はありません。';
      } else {
        el('mistakes').innerHTML = '';
        mistakes.forEach(q => {
          const r = resultFor(q);
          const index = sessionQuestions.findIndex(x => x.id === q.id);
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'mistake';
          btn.innerHTML = `<strong>問題${index + 1}：${escapeHtml(q.title)}</strong><br><span class="mini">${escapeHtml(q.category)}</span><br><span>選択：${escapeHtml(r.selectedText)}</span><br><span>正解：${escapeHtml(r.correctText)}</span>`;
          btn.addEventListener('click', () => {
            current = index;
            checked = true;
            selected = sessionQuestions[current].choices.findIndex(c => c.text === r.selectedText);
            render();
            scrollToQuestion();
          });
          el('mistakes').appendChild(btn);
        });
      }

      const done = ac === sessionQuestions.length;
      el('finishBox').style.display = done ? 'block' : 'none';
      if (done) el('finishText').textContent = `10問中、正答${cc}問・誤答${wc}問でした。新しい10問で再挑戦できます。`;
    }

    function checkAnswer() {
      const q = sessionQuestions[current];
      if (selected === null || checked) return;
      const picked = q.choices[selected];
      const correct = q.choices.find(c => c.correct);
      checked = true;
      results[q.id] = {
        isCorrect: picked.correct,
        selectedText: picked.text,
        correctText: correct.text,
        category: q.category,
        title: q.title
      };
      render();
    }

    function nextQuestion() {
      if (current >= sessionQuestions.length - 1) return;
      current += 1;
      const existing = resultFor(sessionQuestions[current]);
      checked = Boolean(existing);
      selected = existing ? sessionQuestions[current].choices.findIndex(c => c.text === existing.selectedText) : null;
      render();
      scrollToQuestion();
    }

    function resetQuiz() {
      sessionQuestions = createSessionQuestions();
      current = 0;
      selected = null;
      checked = false;
      results = {};
      render();
      scrollToQuestion();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    el('answerBtn').addEventListener('click', checkAnswer);
    el('nextBtn').addEventListener('click', nextQuestion);
    el('resetBtn').addEventListener('click', resetQuiz);
    el('againBtn').addEventListener('click', resetQuiz);

    resetQuiz();
  </script>
</body>
</html>
