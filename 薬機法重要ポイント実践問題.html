<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>薬機法重要ポイント実践問題</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #1e293b;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #334155;
      --accent: #93c5fd;
      --good: #86efac;
      --bad: #fca5a5;
      --goodBg: #052e1a;
      --badBg: #3b1115;
      --btn: #2563eb;
      --btn2: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 42%, #020617 100%);
      color: var(--text);
      line-height: 1.7;
    }
    .wrap {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 20px 14px 40px;
    }
    .card {
      background: rgba(17, 24, 39, 0.94);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
      padding: 18px;
      margin: 14px 0;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #0b1220;
      color: var(--accent);
      border: 1px solid #1d4ed8;
      font-size: 13px;
      font-weight: 700;
    }
    h1 {
      font-size: clamp(23px, 5.6vw, 34px);
      line-height: 1.25;
      margin: 12px 0 10px;
      letter-spacing: 0.01em;
    }
    .lead { color: var(--muted); font-size: 14px; margin: 0; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 16px;
    }
    .stat {
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      min-height: 64px;
    }
    .stat small { color: var(--muted); display: block; font-size: 11px; }
    .stat b { font-size: 20px; display: block; margin-top: 2px; }
    .question-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }
    .pill {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 999px;
      background: #172554;
      color: #bfdbfe;
      border: 1px solid #1d4ed8;
      font-size: 12px;
      font-weight: 700;
    }
    .pill.gray { background: #111827; color: #cbd5e1; border-color: #475569; }
    .pill.good { background: var(--goodBg); color: var(--good); border-color: #15803d; }
    .pill.bad { background: var(--badBg); color: var(--bad); border-color: #b91c1c; }
    .qtext {
      white-space: pre-line;
      font-size: 17px;
      font-weight: 800;
      margin: 8px 0 16px;
      color: #f8fafc;
    }
    .choices { display: grid; gap: 10px; }
    .choice {
      width: 100%;
      text-align: left;
      color: var(--text);
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 15px;
      line-height: 1.65;
      cursor: pointer;
      transition: 0.15s ease;
    }
    .choice:hover { border-color: #60a5fa; background: #0f1b33; }
    .choice.selected { border-color: #93c5fd; background: #172554; }
    .choice.correct { border-color: #22c55e; background: var(--goodBg); color: #dcfce7; }
    .choice.wrong { border-color: #ef4444; background: var(--badBg); color: #fee2e2; }
    .choice.dim { opacity: 0.55; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    button.action {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      color: white;
      font-weight: 800;
      cursor: pointer;
      background: var(--btn);
      min-width: 112px;
    }
    button.action.secondary { background: var(--btn2); }
    button.action:disabled { opacity: 0.45; cursor: not-allowed; }
    .explain {
      margin-top: 16px;
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      font-size: 14px;
    }
    .explain h3 { margin: 0 0 8px; font-size: 16px; }
    .feedback {
      margin-top: 10px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel2);
    }
    .feedback.ok { border-color: #16a34a; background: var(--goodBg); }
    .feedback.ng { border-color: #dc2626; background: var(--badBg); }
    .summary-item {
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px;
      margin-top: 10px;
    }
    .small { color: var(--muted); font-size: 13px; }
    @media (max-width: 560px) {
      .wrap { padding: 12px 10px 28px; }
      .card { padding: 15px; border-radius: 18px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .choice { font-size: 14px; padding: 12px; }
      .qtext { font-size: 16px; }
      button.action { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="card">
      <span class="tag">医療経営士2級対策</span>
      <h1>薬機法重要ポイント実践問題</h1>
      <p class="lead">薬機法、一般用医薬品、インターネット販売、添付文書電子化、課徴金制度、薬局機能、医療機器分類に加え、承認後に保険診療で使うための薬価収載・薬価算定を確認する実践問題です。各カテゴリの問題プールから、毎回12問を出題します。</p>
      <div class="stats">
        <div class="stat"><small>進捗</small><b id="progress">0 / 12</b></div>
        <div class="stat"><small>正答数</small><b id="right">0</b></div>
        <div class="stat"><small>誤答数</small><b id="wrong">0</b></div>
        <div class="stat"><small>正答率</small><b id="rate">0%</b></div>
      </div>
    </header>

    <main id="quiz" class="card"></main>
  </div>

<script>
const C = {

  device: "医療機器分類と審査方法",
  price: "薬価収載・薬価算定"

function ch(text, correct, feedback) {
  return { text, correct, feedback };
}

const POOL = [

      ch("第1類医薬品は、登録販売者が単独で販売できる。", false, "誤りです。登録販売者が販売できるのは第2類・第3類医薬品です。"),

      ch("アのみ", false, "誤りです。イも正しい説明です。"),
      ch("イのみ", false, "誤りです。アも正しい説明です。"),
      ch("ア・ウ", false, "誤りです。ウが誤りです。"),
      ch("ア・イ・ウ", false, "誤りです。ウが誤りです。")
    ],

  },

  {
    id: "insert-001", cat: C.insert,

      ch("医療用医薬品等では、PMDA等で最新の電子化された添付文書を確認する仕組みが導入されている。", true, "正しい説明です。"),
      ch("電子化により、医療従事者は添付文書を確認する必要がなくなった。", false, "誤りです。電子化後も確認は必要です。"),
      ch("電子化により、一般用医薬品を含め紙の添付文書はすべて廃止された。", false, "誤りです。一般用医薬品などでは紙の添付文書が同梱されます。"),
      ch("電子化された添付文書は、医療機器には関係しない。", false, "誤りです。医療機器等にも関係します。"),
      ch("添付文書電子化は、薬機法ではなく介護保険法の制度である。", false, "誤りです。薬機法改正に関する論点です。")
    ],
    exp: "医療用医薬品等では、PMDA等で最新の電子化された添付文書を確認する仕組みがあります。一般用医薬品などには紙の添付文書が同梱されます。"
  },
  {
    id: "insert-002", cat: C.insert,

      ch("従来の『添付文書等記載事項』は『診療報酬明細情報』とされた。", false, "誤りです。注意事項等情報です。"),
      ch("従来の『添付文書等記載事項』は『地域連携情報』とされた。", false, "誤りです。注意事項等情報です。"),
      ch("名称変更により、安全性情報の更新は不要となった。", false, "誤りです。安全性情報の更新が不要になるわけではありません。"),
      ch("名称変更により、PMDAは添付文書情報を扱わないことになった。", false, "誤りです。PMDAで確認できます。")
    ],

  },
  {
    id: "insert-003", cat: C.insert,
    q: ["電子化された添付文書に関する次の記述のうち、正しいものの組み合わせはどれか。", "ア PMDA等で最新情報を確認する仕組みである。", "イ 医療用医薬品等で導入されている。", "ウ 一般用医薬品を含め紙の添付文書はすべて不要となった。"],
    choices: [
      ch("ア・イ", true, "正しい組み合わせです。ウは誤りです。"),
      ch("アのみ", false, "誤りです。イも正しい説明です。"),
      ch("イのみ", false, "誤りです。アも正しい説明です。"),
      ch("ア・ウ", false, "誤りです。ウが誤りです。"),
      ch("ア・イ・ウ", false, "誤りです。ウが誤りです。")

    exp: "電子化された添付文書はPMDA等で最新情報を確認する仕組みです。ただし一般用医薬品等では紙の添付文書が同梱されます。"
  },

  {
    id: "surcharge-001", cat: C.surcharge,
    q: ["薬機法における課徴金制度の対象として、最も適切なものはどれか。"],
    choices: [

      ch("診療報酬請求における施設基準の届出漏れ", false, "誤りです。診療報酬上の届出漏れは薬機法の課徴金制度の対象ではありません。"),
      ch("病院の平均在院日数が長いこと", false, "誤りです。平均在院日数は対象ではありません。"),
      ch("介護報酬の加算要件を満たさないこと", false, "誤りです。介護報酬の論点とは異なります。"),

  {

const SEQ = [
  C.otc, C.net, C.insert, C.surcharge, C.pharmacy, C.device,
  C.price, C.otc, C.net, C.surcharge, C.device, C.price
];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function makeQuiz() {
  const used = new Set();
  return SEQ.map(cat => {
    const fresh = POOL.filter(q => q.cat === cat && !used.has(q.id));
    const fallback = POOL.filter(q => q.cat === cat);
    const picked = shuffle(fresh.length ? fresh : fallback)[0];
    used.add(picked.id);
    return { ...picked, choices: shuffle(picked.choices) };
  });
}

function validate() {
  const errors = [];
  const ids = new Set();
  for (const q of POOL) {
    if (ids.has(q.id)) errors.push("重複ID: " + q.id);
    ids.add(q.id);
    if (q.choices.length !== 5) errors.push(q.id + " の選択肢が5つではありません。");
    if (q.choices.filter(c => c.correct).length !== 1) errors.push(q.id + " の正答数が1つではありません。");
    if (!q.q.length) errors.push(q.id + " の問題文がありません。");
  }
  for (const cat of Object.values(C)) {
    const count = POOL.filter(q => q.cat === cat).length;
    if (count !== 3) errors.push(cat + " のプールが3問ではありません。現在 " + count + "問です。");
  }
  const quiz = makeQuiz();
  if (quiz.length !== 12) errors.push("出題数が12問ではありません。");
  return errors;
}

let quiz = makeQuiz();
let idx = 0;
let selected = null;
let answered = false;
let records = [];

const root = document.getElementById("quiz");
const progress = document.getElementById("progress");
const right = document.getElementById("right");
const wrong = document.getElementById("wrong");
const rate = document.getElementById("rate");

function updateStats() {
  const r = records.filter(x => x.ok).length;
  const w = records.length - r;
  progress.textContent = records.length + " / " + quiz.length;
  right.textContent = r;
  wrong.textContent = w;
  rate.textContent = records.length ? Math.round((r / records.length) * 100) + "%" : "0%";
}

function render() {
  updateStats();
  const errors = validate();
  if (errors.length) {
    root.innerHTML = '<div class="pill bad">検証エラー</div>' + errors.map(e => '<p>' + e + '</p>').join("");
    return;
  }
  if (records.length === quiz.length) {
    renderSummary();
    return;
  }

  const q = quiz[idx];
  const status = answered ? (selected.correct ? '<span class="pill good">正解</span>' : '<span class="pill bad">不正解</span>') : '';
  const qText = q.q.join("\n");
  let html = `
    <div class="question-head">
      <span class="pill gray">問${idx + 1}</span>
      <span class="pill">${q.cat}</span>
      ${status}
    </div>
    <div class="qtext">${escapeHtml(qText)}</div>
    <div class="choices">
  `;

  q.choices.forEach((choice, i) => {
    let cls = "choice";
    if (!answered && selected === choice) cls += " selected";
    if (answered && choice.correct) cls += " correct";
    if (answered && selected === choice && !choice.correct) cls += " wrong";
    if (answered && !choice.correct && selected !== choice) cls += " dim";
    html += `<button class="${cls}" data-i="${i}" ${answered ? "disabled" : ""}><b>${String.fromCharCode(65+i)}.</b> ${escapeHtml(choice.text)}</button>`;
  });

  html += `</div><div class="actions">`;
  if (!answered) {
    html += `<button class="action" id="answerBtn" ${selected ? "" : "disabled"}>回答</button>`;
  } else if (idx < quiz.length - 1) {
    html += `<button class="action" id="nextBtn">次の問題へ</button>`;
  } else {
    html += `<button class="action" id="finishBtn">結果を見る</button>`;
  }
  html += `<button class="action secondary" id="restartBtn">最初からやり直す</button></div>`;

  if (answered) {
    html += `
      <section class="explain">
        <h3>解説</h3>
        <p>${escapeHtml(q.exp)}</p>
        <div class="feedback ${selected.correct ? "ok" : "ng"}">
          <b>選択した回答へのコメント</b>
          <p>${escapeHtml(selected.feedback)}</p>
          ${selected.correct ? "" : "<p><b>正答：</b>" + escapeHtml(q.choices.find(x => x.correct).text) + "</p>"}
        </div>
      </section>
    `;
  }

  root.innerHTML = html;
  document.querySelectorAll(".choice").forEach(btn => {
    btn.addEventListener("click", () => {
      selected = q.choices[Number(btn.dataset.i)];
      render();
    });
  });
  const answerBtn = document.getElementById("answerBtn");
  if (answerBtn) answerBtn.addEventListener("click", submit);
  const nextBtn = document.getElementById("nextBtn");
  if (nextBtn) nextBtn.addEventListener("click", next);
  const finishBtn = document.getElementById("finishBtn");
  if (finishBtn) finishBtn.addEventListener("click", () => { records = records.slice(); render(); });
  const restartBtn = document.getElementById("restartBtn");
  if (restartBtn) restartBtn.addEventListener("click", restart);
}

function submit() {
  if (!selected || answered) return;
  const q = quiz[idx];
  const correct = q.choices.find(x => x.correct);
  records.push({
    question: q.q.join("\n"),
    cat: q.cat,
    selected: selected.text,
    correct: correct.text,
    ok: selected.correct,
    feedback: selected.feedback,
    exp: q.exp
  });
  answered = true;
  render();
}

function next() {
  idx++;
  selected = null;
  answered = false;
  window.scrollTo({ top: 0, behavior: "smooth" });
  render();
}

function restart() {
  quiz = makeQuiz();
  idx = 0;
  selected = null;
  answered = false;
  records = [];
  window.scrollTo({ top: 0, behavior: "smooth" });
  render();
}

function renderSummary() {
  updateStats();
  const r = records.filter(x => x.ok).length;
  const misses = records.filter(x => !x.ok);
  let html = `
    <div class="question-head"><span class="pill gray">結果まとめ</span></div>
    <div class="qtext">正答数 ${r} / ${quiz.length}　正答率 ${Math.round((r / quiz.length) * 100)}%</div>
  `;
  if (!misses.length) {
    html += `<div class="feedback ok"><b>全問正解です。</b><p>薬機法と薬価算定の重要ポイントはよく整理できています。</p></div>`;
  } else {
    html += `<p class="small">間違えた問題と理由です。</p>`;
    misses.forEach((m, i) => {
      html += `
        <div class="summary-item">
          <b>${i + 1}. ${escapeHtml(m.cat)}</b>
          <p style="white-space:pre-line">${escapeHtml(m.question)}</p>
          <p><span style="color:var(--bad)">あなたの選択：</span>${escapeHtml(m.selected)}</p>
          <p><span style="color:var(--good)">正答：</span>${escapeHtml(m.correct)}</p>
          <p>${escapeHtml(m.exp)}</p>
          <div class="feedback ng"><b>不正解理由：</b>${escapeHtml(m.feedback)}</div>
        </div>
      `;
    });
  }
  html += `<div class="actions"><button class="action" id="restartBtn">別の問題で再チャレンジ</button></div>`;
  root.innerHTML = html;
  document.getElementById("restartBtn").addEventListener("click", restart);
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[s]));
}

render();
