*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(180deg,var(--bg),#020617);color:var(--text);line-height:1.75}header{background:linear-gradient(135deg,#111827,#164e63);padding:30px 18px;border-bottom:1px solid #1f3b4a}.wrap{max-width:960px;margin:0 auto}h1{margin:0 0 10px;font-size:clamp(25px,4vw,38px);line-height:1.25}.lead{margin:0;color:#dbeafe;font-size:15px}main{padding:18px}.panel,.card,.result{background:rgba(23,32,51,.96);border:1px solid var(--line);border-radius:20px;box-shadow:0 14px 34px rgba(0,0,0,.35)}.panel{padding:18px;margin-bottom:18px}.small{color:var(--muted);font-size:13px}.status{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:16px}.stat{background:rgba(15,23,42,.76);border:1px solid var(--line);border-radius:15px;padding:11px 12px}.stat b{display:block;font-size:21px;color:#f8fafc}.stat span{color:var(--muted);font-size:12px}.bar{height:10px;background:#020617;border-radius:999px;overflow:hidden;margin-top:14px;border:1px solid #1e293b}.bar>div{height:100%;width:0;background:linear-gradient(90deg,#38bdf8,#86efac);transition:width .25s ease}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button{border:0;border-radius:999px;padding:11px 17px;font-weight:800;cursor:pointer;font-size:14px}button:disabled{opacity:.55;cursor:default}.primary{background:#0ea5e9;color:#04111f}.secondary{background:#334155;color:#e5e7eb;border:1px solid #475569}.card{padding:20px;margin:16px 0}.qhead{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:9px}.qnum{font-weight:900;color:var(--primary)}.tag,.diff{border-radius:999px;padding:2px 9px;font-size:12px;font-weight:800}.tag{background:#0b3b52;color:#bae6fd;border:1px solid #155e75}.diff{background:var(--warnbg);color:var(--warn);border:1px solid #854d0e}.question{font-size:18px;font-weight:900;margin:10px 0 13px;color:#f8fafc;white-space:pre-line}.options{display:grid;gap:10px}.option{border:1px solid var(--line);background:rgba(15,23,42,.78);border-radius:16px;padding:12px;cursor:pointer;display:flex;gap:10px;align-items:flex-start}.option:hover{background:#172033}.option.selected{border-color:#38bdf8;background:#082f49}.option.correct{background:var(--okbg);border-color:#22c55e;color:#dcfce7}.option.wrong{background:var(--badbg);border-color:#ef4444;color:#fee2e2}.option.missed{background:#143522;border-color:#16a34a;color:#dcfce7}.option input{margin-top:7px;accent-color:#38bdf8}.opttext{font-weight:750}.feedback{display:none;margin-top:14px;padding:13px 15px;border-radius:15px;border:1px solid var(--line);background:#0f172a}.feedback.show{display:block}.feedback.ok{background:var(--okbg);border-color:#22c55e}.feedback.bad{background:var(--badbg);border-color:#ef4444}.explain{margin-top:10px;padding:13px 15px;border-radius:15px;border:1px solid var(--line);background:rgba(15,23,42,.75)}.result{display:none;padding:20px;margin:18px 0}.result.show{display:block}.review{margin-top:12px;display:grid;gap:10px}.review div{border:1px solid var(--line);border-radius:14px;padding:11px 13px;background:rgba(15,23,42,.75)}footer{color:var(--muted);font-size:12px;padding:28px 18px;text-align:center}@media(max-width:720px){.status{grid-template-columns:repeat(2,minmax(0,1fr))}.card{padding:16px}body{font-size:15px}}

<body>
<header><div class="wrap"><h1>7つの参入障壁実践問題</h1><p class="lead">医療・介護の具体例を通じて、ポーターの7つの参入障壁を確認する問題です。</p></div></header>
<main class="wrap">
<section class="panel">
<strong>学習できる内容</strong>
<p class="small">基本知識1問、7項目の識別1問、医療・介護の具体例3問を出題します。各カテゴリ3問ずつのプールから毎回1問をランダム出題し、選択肢の順番も毎回変わります。</p>
<div class="status"><div class="stat"><b id="total">5</b><span>出題数</span></div><div class="stat"><b id="answered">0</b><span>解答済み</span></div><div class="stat"><b id="correct">0</b><span>正解数</span></div><div class="stat"><b id="rate">0%</b><span>正答率</span></div></div>
<div class="bar"><div id="fill"></div></div><div class="actions"><button class="primary" onclick="restart()">問題をランダム再出題</button><button class="secondary" onclick="showResult()">現在の結果を見る</button></div>
</section>
<section id="quiz"></section>
<section id="result" class="result"><h2>結果</h2><p id="resultText"></p><p class="small" id="hint"></p><div id="review" class="review"></div><div class="actions"><button class="primary" onclick="restart()">再チャレンジする</button><button class="secondary" onclick="scrollQ()">問題へ戻る</button></div></section>
</main>
<footer>医療経営士2級対策用の自習クイズです。迷ったら、7項目に入るか、別フレームワークの用語かを確認してください。</footer>
<script>
const BANK = {"基本知識": [{"q": "ポーターの参入障壁に関する説明として、最も適切なものはどれか。", "c": [["ファイブフォース分析における新規参入の脅威を検討する際、新規事業者が参入しにくくなる要因を整理する考え方である。", true, "参入障壁は、ファイブフォース分析のうち新規参入の脅威を深掘りする際に用いる考え方です。"], ["BSCの4つの視点を、財務・顧客・業務プロセス・学習と成長に分ける考え方である。", false, "これはBSCの説明です。参入障壁はBSCの4視点ではありません。"], ["既存市場・新規市場、既存サービス・新規サービスの2軸で成長戦略を整理する考え方である。", false, "これはアンゾフの成長マトリックスの説明です。"], ["内部環境と外部環境を、強み・弱み・機会・脅威に分ける考え方である。", false, "これはSWOT分析の説明です。"], ["業務改善を、排除・結合・交換・簡素化の順に検討する考え方である。", false, "これはECRSの説明です。"]], "e": "参入障壁は、新しい病院・診療所・介護事業者などが市場に入ってきやすいかを考えるときの視点です。医療・介護では、制度、設備投資、人材、地域連携、実績などが参入の難しさに関係します。"}, {"q": "ポーターの7つの参入障壁の組み合わせとして、最も適切なものはどれか。", "c": [["規模の経済、製品差別化、巨額の投資、仕入先を変更するコスト、流通チャネルの確保、規模とは無関係なコスト面の不利、政府の政策", true, "ポーターの7つの参入障壁として整理される基本項目です。"], ["財務の視点、顧客の視点、業務プロセスの視点、学習と成長の視点、地域連携の視点、職員満足度、患者満足度", false, "財務・顧客・業務プロセス・学習と成長はBSCの視点です。"], ["市場浸透、市場開拓、製品開発、多角化、集中戦略、差別化戦略、コストリーダーシップ戦略", false, "市場浸透などはアンゾフ、集中・差別化・コストリーダーシップはポーターの基本戦略です。参入障壁の7項目ではありません。"], ["強み、弱み、機会、脅威、政治、経済、社会", false, "強み・弱み・機会・脅威はSWOT、政治・経済・社会はPESTに関係します。"], ["買い手の交渉力、売り手の交渉力、代替品の脅威、業界内競合、新規参入の脅威、患者満足度、紹介率", false, "前半はファイブフォースそのものです。7つの参入障壁ではありません。"]], "e": "試験では、別のフレームワークの用語と混ざって出される可能性があります。BSC、SWOT、PEST、アンゾフ、ファイブフォース本体と混同しないことが大切です。"}, {"q": "医療・介護分野で参入障壁が重要になる理由として、最も適切なものはどれか。", "c": [["病床規制、医療計画、介護保険事業計画、指定基準、施設基準などにより、サービス提供が公的制度に強く左右されるからである。", true, "医療・介護は制度産業としての性格が強く、政府の政策や許認可が参入のしやすさに大きく影響します。"], ["医療・介護は原則として許認可や人員基準がなく、誰でも同じ条件で参入できるからである。", false, "医療・介護には各種の許認可、指定、人員・設備・運営基準などがあります。"], ["病院の参入障壁は、患者満足度と職員満足度だけで判断されるからである。", false, "満足度は重要ですが、参入障壁は制度、設備投資、人材、地域連携、実績などを含めて考えます。"], ["参入障壁は、医療機関の貸借対照表だけを分析するための指標だからである。", false, "貸借対照表の分析ではありません。業界構造や新規参入のしやすさを考える視点です。"], ["参入障壁は、既存患者に新しいサービスを提供する成長戦略を意味するからである。", false, "既存患者に新しいサービスを提供するのは、アンゾフの製品開発戦略に近い内容です。"]], "e": "医療・介護では、政府の政策や制度、設備投資、専門人材、紹介・連携ルートが参入障壁として働きます。"}], "7項目の識別": [{"q": "ポーターの7つの参入障壁に含まれないものはどれか。", "c": [["学習と成長の視点", true, "学習と成長の視点はBSCの4視点の1つであり、ポーターの7つの参入障壁には含まれません。"], ["規模の経済", false, "規模の経済は7つの参入障壁に含まれます。"], ["製品差別化", false, "製品差別化は7つの参入障壁に含まれます。"], ["巨額の投資", false, "巨額の投資は7つの参入障壁に含まれます。"], ["政府の政策", false, "政府の政策は7つの参入障壁に含まれます。"]], "e": "7つの参入障壁は、規模の経済、製品差別化、巨額の投資、仕入先を変更するコスト、流通チャネルの確保、規模とは無関係なコスト面の不利、政府の政策です。"}, {"q": "ポーターの7つの参入障壁に含まれないものはどれか。", "c": [["市場浸透戦略", true, "市場浸透戦略はアンゾフの成長マトリックスの戦略であり、参入障壁の7項目ではありません。"], ["仕入先を変更するコスト", false, "仕入先を変更するコストは7つの参入障壁に含まれます。"], ["流通チャネルの確保", false, "流通チャネルの確保は7つの参入障壁に含まれます。"], ["規模とは無関係なコスト面の不利", false, "規模とは無関係なコスト面の不利は7つの参入障壁に含まれます。"], ["政府の政策", false, "政府の政策は7つの参入障壁に含まれます。"]], "e": "市場浸透、市場開拓、製品開発、多角化はアンゾフの成長マトリックスです。参入障壁の問題では、別フレームワークの用語が紛れ込むことがあります。"}, {"q": "ポーターの7つの参入障壁に含まれないものはどれか。", "c": [["買い手の交渉力", true, "買い手の交渉力はファイブフォース分析の5つの力の1つであり、7つの参入障壁そのものではありません。"], ["規模の経済", false, "規模の経済は参入障壁に含まれます。"], ["製品差別化", false, "製品差別化は参入障壁に含まれます。"], ["流通チャネルの確保", false, "流通チャネルの確保は参入障壁に含まれます。"], ["巨額の投資", false, "巨額の投資は参入障壁に含まれます。"]], "e": "ファイブフォースの5つの力と、参入障壁の7項目は階層が異なります。参入障壁は、5つの力のうち新規参入の脅威をさらに見るための視点です。"}], "規模・投資": [{"q": "大規模病院はCT、MRI、手術室、医事システムなどを多くの患者で活用できるため、1件あたりの固定費負担を下げやすい。この内容は、参入障壁のどれに最も関係するか。", "c": [["規模の経済", true, "規模が大きいほど固定費を多数の患者で分散でき、1件あたりコストを下げやすいことから、規模の経済に該当します。"], ["製品差別化", false, "専門性やブランド力で差がつく話ではなく、規模によるコスト優位の話です。"], ["流通チャネルの確保", false, "紹介ルートや利用者紹介の経路の話ではありません。"], ["政府の政策", false, "制度や許認可による障壁ではなく、規模によるコスト構造の話です。"], ["仕入先を変更するコスト", false, "ベンダーや取引先を変更する手間・費用の話ではありません。"]], "e": "規模の経済は、大病院や大規模法人が固定費・購買・教育・システムなどを効率的に使えるため、新規小規模事業者が不利になりやすいという考え方です。"}, {"q": "特別養護老人ホームを新設するには、土地、建物、居室、浴室、厨房、介護記録システムなどに多額の初期費用が必要となる。この内容は、参入障壁のどれに最も関係するか。", "c": [["巨額の投資", true, "施設整備や設備導入に大きな初期投資が必要であるため、巨額の投資に該当します。"], ["規模とは無関係なコスト面の不利", false, "経験やノウハウ、立地、既存の人材・関係性による不利ではなく、初期投資の大きさが中心です。"], ["流通チャネルの確保", false, "ケアマネジャーや病院退院支援部門からの紹介ルートの話ではありません。"], ["製品差別化", false, "既存施設の評判や専門性の話ではありません。"], ["買い手の交渉力", false, "買い手の交渉力はファイブフォースの5つの力の1つであり、7つの参入障壁そのものではありません。"]], "e": "医療・介護では、病床、施設、医療機器、ICTシステム、感染対策設備などの初期投資が参入障壁になります。"}, {"q": "複数の介護施設を運営する法人は、食材、紙おむつ、介護用品、ICTシステムを一括契約し、小規模事業者より有利な条件で調達している。この内容は、参入障壁のどれに最も関係するか。", "c": [["規模の経済", true, "複数施設で一括購入・共同利用することでコストを下げやすくなるため、規模の経済に該当します。"], ["政府の政策", false, "行政の規制や指定基準による参入障壁ではありません。"], ["製品差別化", false, "専門性やブランド力による差別化ではなく、規模による調達上の優位です。"], ["仕入先を変更するコスト", false, "取引先を切り替えるコストではなく、大量購入による有利さが中心です。"], ["代替品の脅威", false, "代替品の脅威はファイブフォースの5つの力の1つであり、7つの参入障壁そのものではありません。"]], "e": "介護法人でも、複数施設運営による共同購入、共通研修、システム共通化などは規模の経済として整理できます。"}], "差別化・チャネル": [{"q": "地域で『心臓手術ならこの病院』という評価が定着し、紹介元診療所もその病院へ患者を紹介する傾向が強い。この内容は、参入障壁のどれに最も関係するか。", "c": [["製品差別化", true, "専門性・実績・地域からの信頼により、既存病院が選ばれやすくなっているため、製品差別化に該当します。"], ["巨額の投資", false, "設備投資も背景にはあり得ますが、設問の中心は専門性・実績・評判による差別化です。"], ["仕入先を変更するコスト", false, "医療機器やシステムの切替コストの話ではありません。"], ["政府の政策", false, "行政規制や施設基準による参入障壁ではありません。"], ["市場開拓戦略", false, "市場開拓戦略はアンゾフの成長マトリックスの用語で、参入障壁の7項目ではありません。"]], "e": "医療・介護における製品差別化は、ブランド名だけではなく、専門性、診療実績、看取り実績、認知症ケアの評判、地域からの信頼などで生じます。"}, {"q": "新しい介護事業所が開設されたが、既存事業所が地域のケアマネジャーや病院退院支援部門から強い信頼を得ており、利用者紹介を得るまでに時間がかかっている。この内容は、参入障壁のどれに最も関係するか。", "c": [["流通チャネルの確保", true, "医療・介護では、利用者や患者が流れてくる経路として、ケアマネジャー、退院支援部門、紹介元診療所などが重要です。"], ["規模の経済", false, "一括購入や固定費分散の話ではありません。"], ["巨額の投資", false, "建物や設備への初期投資の大きさではなく、紹介ルートの確保が中心です。"], ["仕入先を変更するコスト", false, "取引先やシステムを切り替えるコストではありません。"], ["学習と成長の視点", false, "学習と成長の視点はBSCの用語であり、参入障壁の7項目ではありません。"]], "e": "医療・介護では、流通チャネルを商品流通ではなく、紹介・連携・利用者獲得の経路として考えると理解しやすいです。"}, {"q": "ある地域の認知症グループホームは、長年の家族対応や看取り支援の評判が高く、新規事業者が同じ地域で利用者を集めにくい状況にある。この内容は、参入障壁のどれに最も関係するか。", "c": [["製品差別化", true, "認知症ケアや看取り支援の評判・信頼が既存事業者の差別化要因となり、新規参入者が選ばれにくくなっています。"], ["仕入先を変更するコスト", false, "介護記録ソフトや委託業者の切替コストの話ではありません。"], ["政府の政策", false, "指定基準や介護保険事業計画の話ではなく、評判・信頼による差別化です。"], ["規模の経済", false, "大規模運営によるコスト優位の話ではありません。"], ["業界内競合", false, "業界内競合はファイブフォースの5つの力の1つです。設問では新規参入を妨げる既存事業者の差別化を見ています。"]], "e": "介護でも、認知症ケア、看取り、リハビリ、家族対応などの評判は、既存事業者の差別化となり、新規参入者にとって障壁になります。"}], "制度・切替・ノウハウ": [{"q": "病院が電子カルテを別メーカーに変更しようとすると、データ移行、職員研修、運用手順の変更、保守契約の見直しが必要になる。この内容は、参入障壁のどれに最も関係するか。", "c": [["仕入先を変更するコスト", true, "既存ベンダーから別メーカーへ切り替える際の手間・費用・リスクが大きいため、仕入先を変更するコストに該当します。"], ["規模の経済", false, "規模が大きいほど1件あたりコストが下がる話ではありません。"], ["製品差別化", false, "専門性や評判による差別化ではなく、切替コストの話です。"], ["流通チャネルの確保", false, "患者紹介や利用者紹介のルートではありません。"], ["患者満足度", false, "患者満足度は重要な指標ですが、参入障壁の7項目そのものではありません。"]], "e": "医療・介護では、電子カルテ、介護記録ソフト、見守り機器、医療機器、給食委託などの切替コストが、新規業者の参入を妨げることがあります。"}, {"q": "病床を新たに設けるには、医療計画や地域医療構想、病床規制との関係を踏まえる必要がある。この内容は、参入障壁のどれに最も関係するか。", "c": [["政府の政策", true, "医療計画、地域医療構想、病床規制など、行政制度による制約であるため、政府の政策に該当します。"], ["規模とは無関係なコスト面の不利", false, "経験やノウハウによる不利ではなく、制度・規制による参入障壁です。"], ["仕入先を変更するコスト", false, "取引先やシステムの切替コストではありません。"], ["製品差別化", false, "専門性や評判による差別化ではありません。"], ["買い手の交渉力", false, "買い手の交渉力はファイブフォースの5つの力の1つであり、7つの参入障壁そのものではありません。"]], "e": "医療・介護は公的制度の影響が強く、病床規制、医療計画、施設基準、指定基準、介護保険事業計画などが参入障壁になります。"}, {"q": "既存病院は長年の手術実績、専門医チーム、大学医局との関係、地域連携のノウハウを持っており、新規病院が同じ設備を整えても短期間では同じ水準に到達しにくい。この内容は、参入障壁のどれに最も関係するか。", "c": [["規模とは無関係なコスト面の不利", true, "規模の大小とは別に、経験、ノウハウ、人材、関係性、実績によって新規参入者が不利になるため、この項目に該当します。"], ["規模の経済", false, "大規模であることによるコスト優位ではなく、経験や関係性による不利が中心です。"], ["巨額の投資", false, "設備投資の大きさではなく、設備だけでは得られない実績・ノウハウの話です。"], ["流通チャネルの確保", false, "紹介ルートも一部関係しますが、設問全体は経験・専門医チーム・医局関係・ノウハウによる不利を問う内容です。"], ["SWOT分析", false, "SWOT分析は強み・弱み・機会・脅威の整理であり、参入障壁の7項目ではありません。"]], "e": "規模とは無関係なコスト面の不利は、既存事業者が持つ経験、ノウハウ、立地、人材、関係性などによって、新規参入者が不利になることを指します。"}]};
const PER_ROUND=5;let qs=[],idx=0,answered=0,correct=0,records=[];
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function sh(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function make(raw,cat){let cs=sh(raw.c).map(x=>({text:x[0],correct:x[1],reason:x[2]}));return {cat,q:raw.q,exp:raw.e,choices:cs,answered:false,selected:null,correctIndex:cs.findIndex(c=>c.correct)}}
function sample(){let out=[];for(const cat of sh(Object.keys(BANK))){out.push(make(sh(BANK[cat])[0],cat));if(out.length>=PER_ROUND)break}return sh(out)}
function restart(){qs=sample();idx=0;answered=0;correct=0;records=[];document.getElementById("result").classList.remove("show");render();window.scrollTo({top:0,behavior:"smooth"})}
function render(){let q=qs[idx];let opts=q.choices.map((c,i)=>{let cls="option";if(q.selected===i&&!q.answered)cls+=" selected";if(q.answered&&c.correct)cls+=q.selected===i?" correct":" missed";if(q.answered&&q.selected===i&&!c.correct)cls+=" wrong";return `<label class="${cls}" onclick="selectChoice(${i})"><input type="radio" name="choice" ${q.selected===i?"checked":""} ${q.answered?"disabled":""}><span class="opttext">${i+1}. ${esc(c.text)}</span></label>`}).join("");let fb=q.answered?feedback(q):"";let kind=(q.cat==="基本知識"?"基本":q.cat==="7項目の識別"?"識別":"具体例");document.getElementById("quiz").innerHTML=`<article class="card" id="qtop"><div class="qhead"><span class="qnum">問${idx+1} / ${qs.length}</span><span class="tag">${esc(q.cat)}</span><span class="diff">${kind}</span></div><div class="question">${esc(q.q)}</div><div class="options">${opts}</div><div class="actions"><button class="primary" onclick="submit()" ${q.answered?"disabled":""}>回答</button><button class="secondary" onclick="prev()" ${idx===0?"disabled":""}>前の問題へ</button><button class="secondary" onclick="next()" ${idx===qs.length-1?"disabled":""}>次の問題へ</button></div>${fb}</article>`;status()}
function feedback(q){let s=q.choices[q.selected],good=s.correct,ans=q.choices[q.correctIndex];return `<div class="feedback show ${good?"ok":"bad"}"><strong>${good?"正解です。":"不正解です。"} 正解：${q.correctIndex+1}. ${esc(ans.text)}</strong><br>${good?esc(s.reason):"選択した答えが誤りである理由："+esc(s.reason)}<div class="explain"><strong>解説：</strong>${esc(q.exp)}</div></div>`}
function selectChoice(i){let q=qs[idx];if(q.answered)return;q.selected=i;render()}
function submit(){let q=qs[idx];if(q.answered)return;if(q.selected===null){alert("選択肢を1つ選んでから「回答」を押してください。");return}q.answered=true;answered++;if(q.choices[q.selected].correct)correct++;records[idx]={correct:q.choices[q.selected].correct,cat:q.cat,selected:q.choices[q.selected].text,answer:q.choices[q.correctIndex].text};render();if(answered===qs.length)showResult()}
function prev(){if(idx>0){idx--;render();scrollQ()}}
function next(){if(idx<qs.length-1){idx++;render();scrollQ()}}
function status(){document.getElementById("total").textContent=qs.length;document.getElementById("answered").textContent=answered;document.getElementById("correct").textContent=correct;let r=answered?Math.round(correct/answered*100):0;document.getElementById("rate").textContent=r+"%";document.getElementById("fill").style.width=(answered/qs.length*100)+"%"}
function showResult(){let r=answered?Math.round(correct/answered*100):0;document.getElementById("resultText").innerHTML=`<strong>${answered}問解答 / ${qs.length}問中 ${correct}問正解（正答率 ${r}%）</strong>`;document.getElementById("hint").textContent=r>=90?"かなり定着しています。":r>=70?"良いペースです。7項目と別フレームワーク用語を区別しましょう。":"まずは7項目の名称を確認し、具体例がどれに当たるか整理しましょう。";let wrong=records.map((x,i)=>x&&!x.correct?`<div><strong>問${i+1}（${esc(x.cat)}）</strong><br>選択：${esc(x.selected)}<br>正解：${esc(x.answer)}</div>`:"").join("");document.getElementById("review").innerHTML=wrong||(answered?'<div>誤答はありません。</div>':'');document.getElementById("result").classList.add("show");document.getElementById("result").scrollIntoView({behavior:"smooth",block:"start"})}
function scrollQ(){let e=document.getElementById("qtop");if(e)e.scrollIntoView({behavior:"smooth",block:"start"})}
restart();
</script>
