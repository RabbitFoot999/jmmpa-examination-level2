<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>通所リハビリテーション実践問題</title>
  <style>
    :root{
      --bg:#10151d;
      --panel:#17202b;
      --panel2:#1d2937;
      --text:#eef3f8;
      --muted:#a9b6c6;
      --line:#2c3a4b;
      --accent:#8fb8ff;
      --accent2:#b7d0ff;
      --good:#8ee3b0;
      --bad:#ff9d9d;
      --warn:#ffd58a;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:
        radial-gradient(circle at 20% 0%, rgba(88,132,199,.18), transparent 32rem),
        radial-gradient(circle at 100% 20%, rgba(108,93,170,.13), transparent 28rem),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
      line-height:1.75;
      letter-spacing:.02em;
    }
    .wrap{width:min(940px,100%); margin:0 auto; padding:24px 14px 88px}
    header{
      padding:22px 18px 18px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(29,41,55,.94), rgba(23,32,43,.94));
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    h1{font-size:clamp(1.45rem,5.6vw,2.2rem); line-height:1.3; margin:0 0 10px}
    .lead{color:var(--muted); margin:0; font-size:.98rem}
    .chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px}
    .chip{border:1px solid var(--line); background:#121a24; color:var(--accent2); padding:5px 10px; border-radius:999px; font-size:.82rem}
    main{margin-top:16px}
    .card{
      border:1px solid var(--line);
      background:rgba(23,32,43,.96);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }
    .status{display:flex; justify-content:space-between; gap:10px; align-items:center; color:var(--muted); font-size:.92rem; margin-bottom:12px}
    .bar{height:9px; background:#0d131b; border:1px solid var(--line); border-radius:999px; overflow:hidden; margin:8px 0 16px}
    .bar > div{height:100%; width:0; background:linear-gradient(90deg, #6f9de8, #a9c6ff); transition:width .25s ease}
    .category{color:var(--accent2); font-weight:700; font-size:.92rem; margin-bottom:8px}
    .qtext{font-size:1.08rem; font-weight:700; margin:0 0 14px; line-height:1.65}
    .options{display:grid; gap:10px; margin:16px 0}
    label.option{
      display:block;
      border:1px solid var(--line);
      background:linear-gradient(180deg, #1b2633, #151e29);
      border-radius:14px;
      padding:13px 13px 13px 46px;
      position:relative;
      min-height:54px;
      cursor:pointer;
      touch-action:manipulation;
    }
    label.option:has(input:checked){border-color:#7ca8ef; box-shadow:0 0 0 2px rgba(124,168,239,.18) inset; background:#1e2d40}
    label.option.correct{border-color:rgba(142,227,176,.85); background:rgba(51,104,77,.35)}
    label.option.wrong{border-color:rgba(255,157,157,.85); background:rgba(116,57,57,.38)}
    input[type="radio"]{position:absolute; left:15px; top:18px; width:20px; height:20px; accent-color:#8fb8ff}
    .btns{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
    button{
      appearance:none;
      border:1px solid var(--line);
      background:#243247;
      color:var(--text);
      border-radius:14px;
      padding:12px 16px;
      min-height:48px;
      font-weight:700;
      cursor:pointer;
      touch-action:manipulation;
    }
    button.primary{background:linear-gradient(180deg, #4c78bd, #3a5f9a); border-color:#6e98d7}
    button.ghost{background:#121a24}
    button:disabled{opacity:.45; cursor:not-allowed}
    .result{margin-top:14px; padding:14px; border-radius:14px; border:1px solid var(--line); background:#101821; display:none}
    .result.good{border-color:rgba(142,227,176,.6)}
    .result.bad{border-color:rgba(255,157,157,.6)}
    .result h2{font-size:1.05rem; margin:0 0 8px}
    .result.good h2{color:var(--good)}
    .result.bad h2{color:var(--bad)}
    .explain{color:#d8e1ed; margin:.5rem 0 0; white-space:pre-wrap}
    .note{color:var(--muted); font-size:.88rem; margin-top:10px}
    .summary{display:none; margin-top:16px}
    .score{font-size:1.4rem; font-weight:800; margin:8px 0 14px}
    .review{display:grid; gap:10px; margin-top:14px}
    details{border:1px solid var(--line); border-radius:14px; background:#121a24; padding:10px 12px}
    summary{cursor:pointer; font-weight:700}
    .footer-note{margin-top:14px; color:var(--muted); font-size:.84rem}
    @media (max-width:520px){
      .wrap{padding:12px 10px 72px}
      header,.card{border-radius:16px; padding:14px}
      .status{font-size:.86rem}
      .qtext{font-size:1.02rem}
      label.option{padding:12px 12px 12px 42px; font-size:.95rem}
      input[type="radio"]{left:13px}
      button{width:100%}
      .btns{gap:8px}
    }
  </style>
</head>
<body>
  <div class="wrap" id="top">
    <header>
      <h1>通所リハビリテーション実践問題</h1>
      <p class="lead">通所リハビリテーション、退院時連携、リハビリテーションマネジメント加算、LIFE、口腔・栄養との一体的取組を確認します。各カテゴリ3問のプールから毎回1問ずつ、合計5問をランダム出題します。</p>
      <div class="chips">
        <span class="chip">五者択一</span><span class="chip">1問ずつ表示</span><span class="chip">選択肢もランダム</span><span class="chip">夜間スマホ対応</span>
      </div>
    </header>

    <main>
      <section class="card" id="quiz">
        <div class="status"><span id="count"></span><span id="scoreNow"></span></div>
        <div class="bar"><div id="bar"></div></div>
        <div class="category" id="category"></div>
        <p class="qtext" id="qtext"></p>
        <div class="options" id="options"></div>
        <div class="btns">
          <button class="primary" id="answerBtn">回答</button>
          <button id="nextBtn" disabled>次の問題へ</button>
        </div>
        <div class="result" id="result"></div>
        <p class="note">選択後に「回答」を押すと判定と解説が表示されます。次の問題では問題文の冒頭へ自動で戻ります。</p>
      </section>

      <section class="card summary" id="summary">
        <h2>結果</h2>
        <div class="score" id="finalScore"></div>
        <div id="advice"></div>
        <div class="review" id="review"></div>
        <div class="btns"><button class="primary" id="retryBtn">もう一度解く</button></div>
        <p class="footer-note">注：制度改定により細部の要件が変わることがあります。試験直前は最新の通知・告示も確認してください。</p>
      </section>
    </main>
  </div>

let quiz = [];
let current = 0;
let score = 0;
let answered = false;
let history = [];

const $ = (id)=>document.getElementById(id);
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildQuiz(){
  const cats = shuffle(pools);
  quiz = cats.map(cat=>{
    const item = cat.items[Math.floor(Math.random()*cat.items.length)];
    const choiceObjs = item.choices.map((text,idx)=>({text, correct:idx===item.answer}));
    return {category:cat.category, q:item.q, choices:shuffle(choiceObjs), explain:item.explain};
  });
  current=0; score=0; answered=false; history=[];
  $('quiz').style.display='block'; $('summary').style.display='none';
  render();
}
function render(){
  const item=quiz[current];
  $('count').textContent=`第 ${current+1} 問 / ${quiz.length} 問`;
  $('scoreNow').textContent=`現在 ${score} 点`;
  $('bar').style.width=`${(current/quiz.length)*100}%`;
  $('category').textContent=item.category;
  $('qtext').textContent=item.q;
  const opts=$('options'); opts.innerHTML='';
  item.choices.forEach((c,i)=>{
    const lab=document.createElement('label'); lab.className='option';
    const input=document.createElement('input'); input.type='radio'; input.name='choice'; input.value=i;
    const span=document.createElement('span'); span.textContent=c.text;
    lab.appendChild(input); lab.appendChild(span); opts.appendChild(lab);
  });
  $('result').style.display='none'; $('result').className='result'; $('result').innerHTML='';
  $('answerBtn').disabled=false; $('nextBtn').disabled=true; answered=false;
  $('nextBtn').textContent = current === quiz.length-1 ? '結果を見る' : '次の問題へ';
  window.scrollTo({top:0, behavior:'smooth'});
}
function answer(){
  if(answered) return;
  const selected=document.querySelector('input[name="choice"]:checked');
  if(!selected){
    $('result').style.display='block'; $('result').innerHTML='<h2 style="color:var(--warn)">選択してください</h2><p class="explain">選択肢を1つ選んでから「回答」を押してください。</p>';
    return;
  }
  answered=true;
  const idx=Number(selected.value);
  const item=quiz[current];
  const ok=item.choices[idx].correct;
  if(ok) score++;
  document.querySelectorAll('label.option').forEach((lab,i)=>{
    if(item.choices[i].correct) lab.classList.add('correct');
    if(i===idx && !ok) lab.classList.add('wrong');
    lab.querySelector('input').disabled=true;
  });
  const correctText=item.choices.find(c=>c.correct).text;
  const res=$('result');
  res.className='result '+(ok?'good':'bad');
  res.style.display='block';
  res.innerHTML=`<h2>${ok?'正解です':'不正解です'}</h2><p><strong>正答：</strong>${escapeHtml(correctText)}</p><p class="explain">${escapeHtml(item.explain)}</p>`;
  history.push({q:item.q, category:item.category, selected:item.choices[idx].text, correct:correctText, ok, explain:item.explain});
  $('answerBtn').disabled=true; $('nextBtn').disabled=false;
  $('bar').style.width=`${((current+1)/quiz.length)*100}%`;
}
function next(){
  if(current < quiz.length-1){ current++; render(); }
  else showSummary();
}
function showSummary(){
  $('quiz').style.display='none'; $('summary').style.display='block';
  $('finalScore').textContent=`${score} / ${quiz.length} 点`;
  const msg = score===quiz.length ? 'よく整理できています。通所リハと通所介護、退院時連携、リハマネ加算の関係まで押さえられています。' : score>=3 ? '基本は押さえられています。誤答したカテゴリの解説を読み直すと安定します。' : '通所リハ＝デイケア、退院時共同指導、リハ・口腔・栄養の一体的取組を優先して復習しましょう。';
  $('advice').textContent=msg;
  const rev=$('review'); rev.innerHTML='';
  history.forEach((h,i)=>{
    const d=document.createElement('details');
    d.innerHTML=`<summary>${i+1}. ${h.ok?'○':'×'} ${escapeHtml(h.category)}</summary><p>${escapeHtml(h.q)}</p><p><strong>選択：</strong>${escapeHtml(h.selected)}</p><p><strong>正答：</strong>${escapeHtml(h.correct)}</p><p>${escapeHtml(h.explain)}</p>`;
    rev.appendChild(d);
  });
  window.scrollTo({top:0, behavior:'smooth'});
}
function escapeHtml(str){return String(str).replace(/[&<>"]/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));}
$('answerBtn').addEventListener('click', answer);
$('nextBtn').addEventListener('click', next);
$('retryBtn').addEventListener('click', buildQuiz);
buildQuiz();
</script>
