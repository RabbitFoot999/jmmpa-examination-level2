<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>病床ごとの特徴実践問題</title>
  <style>
    :root {
      --bg: #182026;
      --panel: #222c34;
      --panel2: #2a3540;
      --text: #eef3f6;
      --muted: #b8c4cc;
      --line: #3d4b56;
      --accent: #8cc7b5;
      --accent2: #d9b66f;
      --danger: #e49a9a;
      --ok: #9fd3a8;
      --shadow: rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    header {
      background: linear-gradient(135deg, #24313a, #1c252c);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 24px var(--shadow);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.45rem, 4vw, 2rem);
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 0 18px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
    }

    .stat small {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .stat strong {
      font-size: 1.25rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .category {
      display: inline-block;
      color: #122018;
      background: var(--accent);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .qno {
      color: var(--accent2);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .question {
      font-size: 1.08rem;
      font-weight: 700;
      margin: 0 0 16px;
    }

    .options {
      display: grid;
      gap: 10px;
      margin: 0 0 16px;
    }

    label.option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.12s ease, background 0.12s ease;
    }

    label.option:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    label.option input {
      margin-top: 6px;
      accent-color: var(--accent);
    }

    label.option.selected {
      border-color: var(--accent);
      background: #293b40;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #122018;
    }

    button.secondary {
      background: #3a4650;
      color: var(--text);
      border: 1px solid var(--line);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .feedback {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #1d2830;
      display: none;
    }

    .feedback.correct { border-color: var(--ok); }
    .feedback.wrong { border-color: var(--danger); }

    .feedback h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .feedback p {
      margin: 6px 0;
      color: var(--text);
    }

    .muted { color: var(--muted); }

    .result {
      display: none;
      text-align: left;
    }

    .result h2 {
      margin-top: 0;
      font-size: 1.45rem;
    }

    .review {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .review-item {
      border: 1px solid var(--line);
      background: var(--panel2);
      border-radius: 14px;
      padding: 12px;
    }

    .review-item strong.ok { color: var(--ok); }
    .review-item strong.ng { color: var(--danger); }

    @media (max-width: 640px) {
      .status { grid-template-columns: 1fr; }
      .card { padding: 16px; }
      .buttons { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="top">
    <header>
      <h1>病床ごとの特徴実践問題</h1>
      <p class="lead">
        病床種類別の病床利用率・平均在院日数、一般病院・療養型病院・精神科病院の収益構造、費用構造を整理するための問題です。各カテゴリから1問ずつ、計5問をランダムに出題します。
      </p>
    </header>

    <div class="status">
      <div class="stat"><small>現在</small><strong id="progress">1 / 5</strong></div>
      <div class="stat"><small>正答数</small><strong id="score">0</strong></div>
      <div class="stat"><small>出題形式</small><strong>五者択一</strong></div>
    </div>

    <main class="card" id="quizCard">
      <div class="category" id="category"></div>
      <div class="qno" id="qno"></div>
      <p class="question" id="question"></p>
      <div class="options" id="options"></div>

      <div class="buttons">
        <button id="answerBtn" disabled>回答</button>
        <button id="nextBtn" class="secondary" style="display:none;">次の問題へ</button>
        <button id="restartBtn" class="secondary">最初からやり直す</button>
      </div>

      <div class="feedback" id="feedback"></div>
    </main>

    <section class="card result" id="resultCard">
      <h2>結果</h2>
      <p id="resultText"></p>
      <div class="review" id="review"></div>
      <div class="buttons">
        <button id="restartBtn2">もう一度解く</button>
      </div>
    </section>
  </div>

    let quiz = [];
    let current = 0;
    let score = 0;
    let selectedIndex = null;
    let answered = false;
    let history = [];

    const $ = (id) => document.getElementById(id);

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function startQuiz() {
      quiz = questionPools.map(pool => {
        const picked = pool.questions[Math.floor(Math.random() * pool.questions.length)];
        return {
          category: pool.category,
          question: picked.question,
          options: shuffle(picked.options),
          explanation: picked.explanation,
          wrongHint: picked.wrongHint
        };
      });
      current = 0;
      score = 0;
      selectedIndex = null;
      answered = false;
      history = [];
      $("quizCard").style.display = "block";
      $("resultCard").style.display = "none";
      renderQuestion();
    }

    function renderQuestion() {
      const item = quiz[current];
      selectedIndex = null;
      answered = false;

      $("progress").textContent = `${current + 1} / ${quiz.length}`;
      $("score").textContent = score;
      $("category").textContent = item.category;
      $("qno").textContent = `問${current + 1}`;
      $("question").textContent = item.question;
      $("answerBtn").disabled = true;
      $("answerBtn").style.display = "inline-block";
      $("nextBtn").style.display = "none";
      $("feedback").style.display = "none";
      $("feedback").className = "feedback";
      $("feedback").innerHTML = "";

      const optionsEl = $("options");
      optionsEl.innerHTML = "";
      item.options.forEach((option, index) => {
        const label = document.createElement("label");
        label.className = "option";
        label.innerHTML = `
          <input type="radio" name="option" value="${index}" />
          <span>${option.text}</span>
        `;
        label.addEventListener("click", () => {
          if (answered) return;
          selectedIndex = index;
          document.querySelectorAll(".option").forEach(el => el.classList.remove("selected"));
          label.classList.add("selected");
          $("answerBtn").disabled = false;
        });
        optionsEl.appendChild(label);
      });

      window.location.hash = "top";
    }

    function showAnswer() {
      if (selectedIndex === null || answered) return;
      answered = true;

      const item = quiz[current];
      const selected = item.options[selectedIndex];
      const correctOption = item.options.find(opt => opt.correct);
      const isCorrect = selected.correct;

      if (isCorrect) score++;
      $("score").textContent = score;

      history.push({
        no: current + 1,
        category: item.category,
        question: item.question,
        selected: selected.text,
        correct: correctOption.text,
        isCorrect,
        explanation: item.explanation
      });

      const fb = $("feedback");
      fb.style.display = "block";
      fb.className = `feedback ${isCorrect ? "correct" : "wrong"}`;
      fb.innerHTML = `
        <h3>${isCorrect ? "正解です" : "不正解です"}</h3>
        <p><strong>正答：</strong>${correctOption.text}</p>
        ${isCorrect ? "" : `<p><strong>誤答の理由：</strong>${item.wrongHint}</p>`}
        <p><strong>解説：</strong>${item.explanation}</p>
      `;

      $("answerBtn").style.display = "none";
      $("nextBtn").style.display = "inline-block";
      $("nextBtn").textContent = current === quiz.length - 1 ? "結果を見る" : "次の問題へ";
    }

    function nextQuestion() {
      if (current < quiz.length - 1) {
        current++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      $("quizCard").style.display = "none";
      $("resultCard").style.display = "block";
      $("resultText").innerHTML = `5問中 <strong>${score}</strong> 問正解です。<span class="muted"> 利用率は療養、在院日数は精神、収益・材料費は一般、人件費率は療養・精神で整理しましょう。</span>`;

      const review = $("review");
      review.innerHTML = "";
      history.forEach(item => {
        const div = document.createElement("div");
        div.className = "review-item";
        div.innerHTML = `
          <div><strong class="${item.isCorrect ? "ok" : "ng"}">問${item.no}：${item.isCorrect ? "正解" : "不正解"}</strong> <span class="muted">${item.category}</span></div>
          <div><strong>あなたの回答：</strong>${item.selected}</div>
          <div><strong>正答：</strong>${item.correct}</div>
          <div class="muted">${item.explanation}</div>
        `;
        review.appendChild(div);
      });
      window.location.hash = "top";
    }

    $("answerBtn").addEventListener("click", showAnswer);
    $("nextBtn").addEventListener("click", nextQuestion);
    $("restartBtn").addEventListener("click", startQuiz);
    $("restartBtn2").addEventListener("click", startQuiz);

    startQuiz();
  </script>
