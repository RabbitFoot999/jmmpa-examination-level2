<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">

  <style>
    :root{

      --text:#e5e7eb;

      --line:#334155;
      --accent:#38bdf8;
      --accent2:#2dd4bf;
      --warn:#facc15;
      --ok:#34d399;
      --bad:#fb7185;
      --shadow:0 18px 50px rgba(0,0,0,.32);

    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      background:

      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
      line-height:1.7;
    }
    a{color:#7dd3fc}
    .wrap{width:min(960px, 100%); margin:0 auto; padding:22px 14px 92px}
    header{
      padding:22px 4px 18px;
    }
    .topline{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:14px}
    .badge{
      display:inline-flex; align-items:center; gap:6px;
      padding:7px 10px; border:1px solid rgba(125,211,252,.26);
      border-radius:999px; color:#bae6fd; background:rgba(15,23,42,.72);
      font-size:13px; font-weight:700;
    }
    h1{font-size:clamp(25px, 5.5vw, 42px); line-height:1.22; margin:0 0 10px; letter-spacing:.02em}
    .lead{margin:0; color:#cbd5e1; font-size:15px}
    .panel{
      background:linear-gradient(180deg, rgba(30,41,59,.96), rgba(15,23,42,.96));
      border:1px solid rgba(148,163,184,.22);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
      overflow:hidden;

    .status{
      padding:14px 16px;

    }

    .meta{display:flex; justify-content:space-between; gap:10px; color:#cbd5e1; font-size:14px; flex-wrap:wrap}
    .questionArea{padding:18px 16px 20px}
    .cat{display:inline-block; margin:0 0 10px; padding:5px 9px; border-radius:9px; color:#99f6e4; background:rgba(45,212,191,.10); border:1px solid rgba(45,212,191,.22); font-size:13px; font-weight:800}
    .stem{font-size:18px; font-weight:800; line-height:1.65; margin:0 0 8px}
    .ask{margin:0 0 15px; color:#cbd5e1; font-weight:700}
    .choices{display:grid; gap:10px; margin:16px 0}
    .choice{
      width:100%; text-align:left; color:var(--text);
      border:1px solid rgba(148,163,184,.25);
      background:linear-gradient(180deg, rgba(30,41,59,.98), rgba(17,24,39,.96));
      border-radius:15px; padding:14px 14px;
      font-size:16px; line-height:1.62;
      display:grid; grid-template-columns:auto 1fr; gap:10px;
      touch-action:manipulation; cursor:pointer;
    }
    .choice:active{transform:scale(.995)}
    .choice .num{
      min-width:30px; height:30px; border-radius:999px;
      display:inline-grid; place-items:center;
      background:#0f172a; border:1px solid rgba(148,163,184,.30); color:#bae6fd; font-weight:900;
    }
    .choice.selected{border-color:rgba(56,189,248,.75); background:linear-gradient(180deg, rgba(8,47,73,.76), rgba(17,24,39,.96)); box-shadow:0 0 0 3px rgba(56,189,248,.10)}

    .choice.incorrect{border-color:rgba(251,113,133,.92); background:linear-gradient(180deg, rgba(127,29,29,.46), rgba(17,24,39,.95))}

      touch-action:manipulation; cursor:pointer;

    button.secondary{background:#1f2937; color:#e5e7eb; border:1px solid rgba(148,163,184,.28)}

      margin-top:16px; padding:15px 14px; border-radius:16px; border:1px solid rgba(148,163,184,.20);

    }

    .feedback h2{font-size:18px; margin:0 0 8px}
    .feedback.ok h2{color:var(--ok)}
    .feedback.bad h2{color:var(--bad)}
    .feedback p{margin:8px 0}
    .feedback .small{font-size:14px; color:#cbd5e1}
    .final{display:none; padding:22px 16px}
    .final.show{display:block}
    .scoreBox{
      background:rgba(15,23,42,.78); border:1px solid rgba(148,163,184,.2); border-radius:16px; padding:16px;
    }
    .scoreNum{font-size:38px; font-weight:1000; letter-spacing:.02em; margin:0 0 4px}
    .review{display:grid; gap:10px; margin-top:16px}
    .reviewItem{background:rgba(17,24,39,.78); border:1px solid rgba(148,163,184,.18); border-radius:14px; padding:12px}
    .reviewItem strong{color:#e0f2fe}
    footer{margin:18px 4px 0; color:#94a3b8; font-size:12px}
    .toast{display:none; margin-top:10px; color:#fde68a; font-size:14px; font-weight:700}
    .toast.show{display:block}
    @media (max-width: 520px){
      .wrap{padding-left:10px; padding-right:10px}
      .questionArea{padding:16px 12px 18px}
      .status{padding:12px}
      .stem{font-size:17px}
      .choice{font-size:15px; padding:13px 11px; gap:9px}
      button.primary, button.secondary{width:100%}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header id="top">
      <div class="topline">
        <span class="badge">医療経営士2級</span>
        <span class="badge">専門分野対策</span>
        <span class="badge">5問ランダム</span>
      </div>
      <h1>感染症対策・感染性廃棄物実践問題</h1>
      <p class="lead">感染性廃棄物、感染対策向上加算、抗菌薬適正使用、感染症サーベイランス、院内感染対策を横断して確認します。各カテゴリの問題プールから毎回1問ずつ出題します。</p>
    </header>

    <main class="panel" id="app">
      <section class="status" id="status">
        <div class="meta">
          <span id="counter">問題 1 / 5</span>
          <span id="scoreNow">正答 0</span>
        </div>
        <div class="bar" aria-hidden="true"><span id="barFill"></span></div>
      </section>

      <section class="questionArea" id="questionArea">
        <div class="cat" id="category"></div>
        <p class="stem" id="stem"></p>
        <p class="ask" id="ask"></p>
        <div class="choices" id="choices"></div>
        <div class="toast" id="toast">選択肢を選んでから回答してください。</div>
        <div class="actions">
          <button type="button" class="primary" id="answerBtn">回答</button>
          <button type="button" class="secondary" id="nextBtn" style="display:none">次の問題へ</button>
        </div>
        <div class="feedback" id="feedback" aria-live="polite"></div>
      </section>

      <section class="final" id="finalArea">
        <div class="scoreBox">
          <p class="scoreNum" id="finalScore"></p>
          <p id="finalMessage"></p>
        </div>
        <div class="review" id="review"></div>
        <div class="actions">
          <button type="button" class="primary" id="retryBtn">もう一度解く</button>
          <a class="secondary" href="index.html" style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center; border-radius:14px; padding:13px 16px; font-weight:900; font-size:16px; background:#1f2937; color:#e5e7eb; border:1px solid rgba(148,163,184,.28)">一覧に戻る</a>
        </div>
      </section>
    </main>

    <footer>
      <p>出典・作成根拠：過去受験者メモ、医療経営士2級予想問題集、令和8年度診療報酬改定概要をもとに作成。実際の試験では、正式な告示・通知・疑義解釈も確認してください。</p>
    </footer>
  </div>

    let quiz = [];

    function shuffle(array){
      const a = array.slice();
      for(let i=a.length-1; i>0; i--){
        const j = Math.floor(Math.random() * (i+1));
        const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    function makeQuiz(){
      const picked = bank.map(cat => {
        const q = cat.questions[Math.floor(Math.random() * cat.questions.length)];
        return Object.assign({}, q, {
          category: cat.category,
          options: shuffle(q.options)
        });
      });
      quiz = shuffle(picked);
    }

    function $(id){ return document.getElementById(id); }

    function render(){
      answered = false;
      selected = null;
      const q = quiz[current];
      $("questionArea").style.display = "block";
      $("finalArea").classList.remove("show");
      $("category").textContent = q.category;
      $("stem").innerHTML = q.stem;
      $("ask").textContent = q.ask;
      $("counter").textContent = "問題 " + (current + 1) + " / " + quiz.length;
      $("scoreNow").textContent = "正答 " + score;
      $("barFill").style.width = Math.round((current / quiz.length) * 100) + "%";
      $("answerBtn").style.display = "inline-block";
      $("answerBtn").disabled = false;
      $("nextBtn").style.display = "none";
      $("feedback").className = "feedback";
      $("feedback").innerHTML = "";
      $("toast").classList.remove("show");

      const choices = $("choices");
      choices.innerHTML = "";
      q.options.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice";
        btn.dataset.id = opt.id;
        btn.innerHTML = '<span class="num">' + (idx + 1) + '</span><span>' + opt.text + '</span>';
        btn.addEventListener("click", () => choose(opt.id));
        choices.appendChild(btn);
      });
      setTimeout(() => window.scrollTo({top:0, behavior:"smooth"}), 20);
    }

    function choose(id){
      if(answered) return;
      selected = id;
      $("toast").classList.remove("show");
      document.querySelectorAll(".choice").forEach(btn => {
        btn.classList.toggle("selected", btn.dataset.id === id);
      });
    }

      const q = quiz[current];
      const selectedOpt = q.options.find(o => o.id === selected);
      const correctOpt = q.options.find(o => o.correct);
      const isCorrect = selectedOpt && selectedOpt.correct;
      if(isCorrect) score++;

      document.querySelectorAll(".choice").forEach(btn => {
        const opt = q.options.find(o => o.id === btn.dataset.id);
        btn.disabled = true;
        if(opt.correct) btn.classList.add("correct");
        if(btn.dataset.id === selected && !opt.correct) btn.classList.add("incorrect");
      });

      const fb = $("feedback");
      fb.className = "feedback show " + (isCorrect ? "ok" : "bad");
      fb.innerHTML = `
        <h2>${isCorrect ? "正解です" : "不正解です"}</h2>
        <p><strong>正答：</strong>${correctOpt.text}</p>
        <p><strong>${isCorrect ? "理由" : "選んだ選択肢の確認"}：</strong>${selectedOpt.reason}</p>
        <p class="small"><strong>解説：</strong>${q.explanation}</p>
      `;
      history.push({
        category:q.category,
        stem:q.stem.replace(/<br>/g, " ").replace(/<[^>]+>/g, ""),
        correct:isCorrect,
        selected:selectedOpt.text,
        answer:correctOpt.text
      });
      $("scoreNow").textContent = "正答 " + score;
      $("answerBtn").disabled = true;
      $("nextBtn").style.display = "inline-block";
      $("barFill").style.width = Math.round(((current + 1) / quiz.length) * 100) + "%";
    }

    function next(){
      if(current < quiz.length - 1){
        current++;
        render();
      }else{
        showFinal();
      }
    }

    function showFinal(){
      $("questionArea").style.display = "none";
      $("finalArea").classList.add("show");
      $("counter").textContent = "完了";
      $("barFill").style.width = "100%";
      $("finalScore").textContent = score + " / " + quiz.length + " 問正解";
      const msg = score === quiz.length ? "満点です。感染性廃棄物と令和8年度改定の接点までよく押さえられています。" :
        score >= 4 ? "かなり良い仕上がりです。色分け・サーベイランス入力・体制評価の細部を確認しましょう。" :
        "復習ポイントは、感染性廃棄物の色分け、感染対策向上加算の体制評価、医師事務作業補助者の業務範囲です。";
      $("finalMessage").textContent = msg;
      const review = $("review");
      review.innerHTML = "";
      history.forEach((h, idx) => {
        const item = document.createElement("div");
        item.className = "reviewItem";
        item.innerHTML = `<strong>問${idx+1}｜${h.category}</strong><br>${h.correct ? "○" : "×"}　${h.stem}<br><span style="color:#cbd5e1">正答：${h.answer}</span>`;
        review.appendChild(item);
      });
      setTimeout(() => window.scrollTo({top:0, behavior:"smooth"}), 20);
    }

    function reset(){
      current = 0; selected = null; answered = false; score = 0; history = [];
      makeQuiz();
      render();
    }

    $("answerBtn").addEventListener("click", showAnswer);
    $("nextBtn").addEventListener("click", next);
    $("retryBtn").addEventListener("click", reset);
    reset();
  </script>
</body>
</html>
