<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>医療安全管理実践問題</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:#162033;
      --panel2:#1f2a44;
      --text:#e8edf7;
      --muted:#aab6ca;
      --accent:#8fb5ff;
      --accent2:#9bd4c0;
      --danger:#ff9b9b;
      --border:#33415f;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(143,181,255,.13), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(155,212,192,.10), transparent 30rem),
        var(--bg);
      color:var(--text);
      line-height:1.75;
      min-height:100vh;
    }
    .wrap{
      width:min(920px,100%);
      margin:0 auto;
      padding:18px 14px calc(32px + env(safe-area-inset-bottom));
    }
    header{
      padding:18px 4px 14px;
    }
    .badge{
      display:inline-flex;
      gap:.45rem;
      align-items:center;
      color:var(--accent2);
      background:rgba(155,212,192,.10);
      border:1px solid rgba(155,212,192,.25);
      border-radius:999px;
      padding:5px 10px;
      font-size:.82rem;
      letter-spacing:.02em;
    }
    h1{
      font-size:clamp(1.55rem,6vw,2.25rem);
      line-height:1.25;
      margin:14px 0 8px;
      letter-spacing:.02em;
    }
    .lead{
      color:var(--muted);
      margin:0;
      font-size:.96rem;
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.04), transparent 18rem), var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin:14px 0;
    }
    .status{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      color:var(--muted);
      font-size:.9rem;
      margin-bottom:12px;
    }
    .progressbar{
      height:9px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
      margin:8px 0 18px;
      border:1px solid rgba(255,255,255,.06);
    }
    .progressbar span{
      display:block;
      height:100%;
      width:0;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:999px;
      transition:width .25s ease;
    }
    .question{
      font-size:1.05rem;
      font-weight:700;
      margin:0 0 14px;
      line-height:1.7;
    }
    .options{
      display:grid;
      gap:10px;
      margin:14px 0;
    }
    .option{
      width:100%;
      text-align:left;
      color:var(--text);
      background:rgba(31,42,68,.78);
      border:1px solid var(--border);
      border-radius:14px;
      padding:13px 13px;
      font-size:1rem;
      line-height:1.55;
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-height:52px;
      -webkit-tap-highlight-color:transparent;
    }
    .option .mark{
      flex:0 0 1.8rem;
      height:1.8rem;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.25);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:.82rem;
      margin-top:.1rem;
    }
    .option.selected{
      border-color:var(--accent);
      background:rgba(143,181,255,.13);
    }
    .option.selected .mark{
      border-color:var(--accent);
      color:var(--accent);
    }
    .option.correct{
      border-color:rgba(155,212,192,.9);
      background:rgba(155,212,192,.13);
    }
    .option.wrong{
      border-color:rgba(255,155,155,.85);
      background:rgba(255,155,155,.11);
    }
    .controls{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:16px;
    }
    button.main{
      appearance:none;
      border:0;
      border-radius:14px;
      min-height:52px;
      font-weight:800;
      font-size:1rem;
      color:#0c1220;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 10px 24px rgba(143,181,255,.2);
    }
    button.sub{
      appearance:none;
      border:1px solid var(--border);
      border-radius:14px;
      min-height:48px;
      font-weight:700;
      font-size:.95rem;
      color:var(--text);
      background:rgba(255,255,255,.06);
    }
    button:disabled{opacity:.45}
    .feedback{
      margin-top:14px;
      padding:14px;
      border-radius:14px;
      background:rgba(0,0,0,.18);
      border:1px solid var(--border);
    }
    .feedback h2{
      font-size:1.05rem;
      margin:0 0 8px;
    }
    .feedback.ok h2{color:var(--accent2)}
    .feedback.ng h2{color:var(--danger)}
    .feedback p{margin:8px 0;color:var(--text)}
    .feedback .subtle{color:var(--muted);font-size:.92rem}
    .resultBox{
      text-align:center;
      padding:22px 14px;
    }
    .score{
      font-size:2.4rem;
      font-weight:900;
      margin:10px 0;
      color:var(--accent2);
    }
    details{
      margin-top:12px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 12px;
    }
    summary{cursor:pointer;color:var(--accent);font-weight:700}
    .reviewItem{border-top:1px solid var(--border);padding:12px 0;text-align:left}
    .reviewItem:first-of-type{border-top:0}
    footer{
      color:var(--muted);
      font-size:.8rem;
      padding:12px 4px 4px;
    }
    @media (min-width:720px){
      .wrap{padding-top:28px}
      .card{padding:24px}
      .controls{grid-template-columns:1fr 1fr}
      .controls .full{grid-column:1/-1}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="badge">医療経営士2級対策・夜間スマホ向け</div>
      <h1>医療安全管理実践問題</h1>
      <p class="lead">医療安全管理体制、医薬品・医療機器の安全管理責任者、医療事故調査制度、異状死届出義務などを、6問で確認します。各カテゴリ3問のプールから毎回ランダムに出題します。</p>
    </header>

    <main id="app" class="card" aria-live="polite"></main>

    <footer>
      ※学習用の実践問題です。制度改正や通知の詳細は、試験直前に最新資料で再確認してください。
    </footer>
  </div>

<script>
const pools = [
  {
    category: "安全管理体制",
    questions: [
      {
        q: "医療機関における医療安全管理体制について、最も適切なものはどれか。",
        options: [
          {t:"医療事故やインシデントは、関係職員の注意不足を確認する手続であり、組織的な改善活動とは区別される。", ok:false, fb:"医療安全管理では、個人の注意不足に限定せず、業務手順・情報共有・教育体制など組織的要因を分析します。"},
          {t:"医療安全管理体制は、指針、委員会、研修、事故報告・分析、改善策の実施などを組織として整備するものである。", ok:true, fb:"正しい理解です。安全管理は、報告・分析・改善・教育を組織で回す仕組みとして押さえます。"},
          {t:"医療安全管理委員会は、事故が発生した月だけ開催し、平時のヒヤリハット事例は各部門で保管すれば足りる。", ok:false, fb:"重大事故時だけでなく、平時から安全管理上の課題を検討し、改善につなげる体制が重要です。"},
          {t:"職員研修は、医師と看護師を対象にすれば足り、薬剤師や事務職員を含める必要はない。", ok:false, fb:"医療安全は多職種に関わるため、職種横断的に実施することが重要です。"},
          {t:"医療安全管理は、患者満足度向上を目的とする広報活動であり、事故報告体制とは直接関係しない。", ok:false, fb:"患者に安全な医療を提供するための体制であり、事故報告・分析・再発防止と密接に関係します。"}
        ],
        exp:"医療安全管理は、事故やヒヤリハットを個人責任で終わらせず、組織として原因分析と再発防止を行う仕組みです。試験では、責任追及中心の記述や、研修・報告体制を軽視する記述が誤りになりやすいです。"
      },
      {
        q: "医療安全管理体制に関する記述として、適切なものの組み合わせはどれか。\n\nア 医療安全管理のための指針を整備する。\nイ 職員研修を実施し、内容等を記録する。\nウ 事故やヒヤリハットを報告・分析し、改善策につなげる。\nエ 医療事故の原因分析は、処分対象者の特定を主目的とする。\nオ 医療安全管理は、診療報酬請求の点検業務に限定される。",
        options: [
          {t:"ア・イ・ウ", ok:true, fb:"正しい組み合わせです。指針、研修、報告・分析、改善策が安全管理体制の中心です。"},
          {t:"ア・イ・エ", ok:false, fb:"エが不適切です。原因分析は処分対象者の特定ではなく、再発防止のための構造的分析が中心です。"},
          {t:"ア・ウ・オ", ok:false, fb:"オが不適切です。医療安全管理は診療報酬請求の点検に限定されません。"},
          {t:"イ・エ・オ", ok:false, fb:"エとオが不適切です。安全管理は責任追及や請求点検に限定されるものではありません。"},
          {t:"ウ・エ・オ", ok:false, fb:"エとオが不適切です。事故報告・分析は重要ですが、責任追及中心ではありません。"}
        ],
        exp:"医療安全管理体制では、指針の整備、委員会、職員研修、事故報告・分析、改善策の実施を一連の仕組みとして理解します。"
      },
      {
        q: "医療安全管理における事故報告・分析の考え方として、最も適切なものはどれか。",
        options: [
          {t:"事故報告は、院外への説明責任を果たすための手続であり、院内の改善策には原則として反映しない。", ok:false, fb:"報告された事例は、原因分析を行い、改善策に反映することが重要です。"},
          {t:"ヒヤリハットは結果として患者被害が生じていないため、医療安全管理上の検討対象から外す。", ok:false, fb:"ヒヤリハットも事故防止に有用な情報であり、分析・共有の対象になります。"},
          {t:"事故分析では、背景要因や業務プロセスを検討し、再発防止策を組織として実施する。", ok:true, fb:"正しいです。医療安全では、個人の失敗だけでなく、背景要因やシステムを分析します。"},
          {t:"医療事故が発生した場合は、医療安全管理委員会での検討よりも、当該職員への注意喚起を優先して完結させる。", ok:false, fb:"注意喚起だけで完結させず、組織的な原因分析と改善が必要です。"},
          {t:"同種事例が複数発生しても、各職員が異なる場合には共通要因の分析は行わない。", ok:false, fb:"複数事例に共通する手順・環境・情報伝達などを分析することが重要です。"}
        ],
        exp:"事故報告・分析は、再発防止に向けた組織学習の仕組みです。ヒヤリハットも含めて情報を集め、背景要因を検討します。"
      }
    ]
  },
  {
    category: "医療安全管理者",
    questions: [
      {
        q: "医療安全管理者について、最も適切なものはどれか。",
        options: [
          {t:"医療安全管理者は、医師免許を有する者に限られ、他職種が担当することはできない。", ok:false, fb:"医療安全管理者は医療安全に関する十分な知識を有する常勤職員であり、医師に限定されるものではありません。"},
          {t:"医療安全管理者は、医療安全管理委員会の支援、職員研修の実施支援、改善方策の実施支援などを担う。", ok:true, fb:"正しいです。医療安全管理者は、安全管理体制の運用を支援する役割を担います。"},
          {t:"医療安全管理者は、医薬品の購入価格を決定する責任者として配置される。", ok:false, fb:"医療安全管理者の中心業務は安全管理体制の支援であり、医薬品購入価格の決定ではありません。"},
          {t:"医療安全管理者は、医療事故調査・支援センターに所属し、各病院へ派遣される外部職員である。", ok:false, fb:"医療安全管理者は当該医療機関内で安全管理業務を担う職員として整理されます。"},
          {t:"医療安全管理者は、医療機器の保守点検計画だけを担当し、研修や改善策には関与しない。", ok:false, fb:"医療機器の保守点検計画は医療機器安全管理責任者の論点です。医療安全管理者はより広く安全管理体制を支援します。"}
        ],
        exp:"医療安全管理者は、医療安全管理委員会、研修、事故報告・分析、改善策の実施を支える役割です。医薬品安全管理責任者や医療機器安全管理責任者と混同しないようにします。"
      },
      {
        q: "医療安全管理者の業務として適切なものの組み合わせはどれか。\n\nア 医療安全管理委員会の活動を支援する。\nイ 職員研修の実施を支援する。\nウ 改善方策が円滑に実施されるよう支援する。\nエ 医薬品の製造販売承認を行う。\nオ 医療事故調査・支援センターの設置を認可する。",
        options: [
          {t:"ア・イ・ウ", ok:true, fb:"正しい組み合わせです。医療安全管理者は院内の安全管理体制を支援します。"},
          {t:"ア・エ・オ", ok:false, fb:"エとオが不適切です。製造販売承認やセンター設置認可は医療安全管理者の業務ではありません。"},
          {t:"イ・ウ・エ", ok:false, fb:"エが不適切です。医薬品の製造販売承認は医療機関内の医療安全管理者の業務ではありません。"},
          {t:"イ・エ・オ", ok:false, fb:"エとオが不適切です。院内の安全管理支援とは異なる行政・薬事の論点です。"},
          {t:"ウ・エ・オ", ok:false, fb:"ウは適切ですが、エとオは不適切です。"}
        ],
        exp:"医療安全管理者は、医療安全管理委員会、職員研修、改善策の実施など、院内の安全管理活動を実務面で支援します。"
      },
      {
        q: "医療安全管理者と関連責任者の整理として、最も適切なものはどれか。",
        options: [
          {t:"医療安全管理者、医薬品安全管理責任者、医療機器安全管理責任者は、名称が異なるだけで業務範囲は同一である。", ok:false, fb:"三者は関連しますが、業務範囲は異なります。医薬品、医療機器はそれぞれ安全使用のための責任者です。"},
          {t:"医療安全管理者は、院内の医療安全管理活動を支援する役割であり、医薬品・医療機器の安全管理責任者と役割を区別して理解する。", ok:true, fb:"正しいです。試験では名称の混同が狙われやすいため、役割の違いを押さえます。"},
          {t:"医薬品安全管理責任者が配置されていれば、医療安全管理体制として職員研修や事故報告体制は不要となる。", ok:false, fb:"医薬品安全管理責任者は医薬品の安全使用に関する責任者であり、医療安全管理体制全体を代替するものではありません。"},
          {t:"医療機器安全管理責任者は、医療安全管理委員会と連携することは想定されていない。", ok:false, fb:"医療機器の安全使用も医療安全に関わるため、院内の安全管理体制との連携が重要です。"},
          {t:"医療安全管理者は、診療録の保存期間を短縮する権限を持つ職員である。", ok:false, fb:"診療録の保存期間を任意に短縮する権限はありません。医療安全管理者の論点とは異なります。"}
        ],
        exp:"医療安全管理者は安全管理体制全体の実務支援、医薬品安全管理責任者は医薬品、医療機器安全管理責任者は医療機器の安全使用を担う、と分けて押さえます。"
      }
    ]
  },
  {
    category: "医薬品安全管理責任者",
    questions: [
      {
        q: "病院における医薬品安全管理責任者について、最も適切なものはどれか。",
        options: [
          {t:"医薬品安全管理責任者は、医薬品に関する十分な知識を有する常勤職員であり、病院では管理者との兼務は認められない。", ok:true, fb:"正しいです。過去メモの『薬剤の安全管理者と管理者の兼務』に直結する論点です。"},
          {t:"医薬品安全管理責任者は、医薬品の採用品目を増やすための営業担当者であり、医療安全管理体制とは関係しない。", ok:false, fb:"医薬品安全管理責任者は医薬品の安全使用を目的とする院内責任者です。"},
          {t:"医薬品安全管理責任者は、非常勤職員から選任することが原則である。", ok:false, fb:"医薬品安全管理責任者は、医薬品に関する十分な知識を有する常勤職員として整理されます。"},
          {t:"病院の医薬品安全管理責任者は、管理者と兼務することで迅速な意思決定を行うことが求められる。", ok:false, fb:"病院では管理者との兼務は不可とされる点が重要です。"},
          {t:"医薬品安全管理責任者の業務は、医薬品の在庫金額の集計に限られる。", ok:false, fb:"業務手順書、研修、情報収集、改善策など、安全使用のための業務が中心です。"}
        ],
        exp:"医薬品安全管理責任者は、医薬品の安全使用のための責任者です。病院では管理者との兼務不可という条件が特に出題されやすいです。"
      },
      {
        q: "医薬品安全管理責任者の業務として適切なものの組み合わせはどれか。\n\nア 医薬品の安全使用のための業務手順書の作成\nイ 職員に対する医薬品の安全使用のための研修\nウ 医薬品の安全使用に必要な情報の収集と改善方策の実施\nエ 医療機器の全機種について保守点検周期を法定する\nオ 支払基金に対する診療報酬債権の譲渡",
        options: [
          {t:"ア・イ・ウ", ok:true, fb:"正しい組み合わせです。医薬品安全管理責任者の中心業務です。"},
          {t:"ア・イ・エ", ok:false, fb:"エが不適切です。医療機器の保守点検は医療機器安全管理責任者の論点です。"},
          {t:"ア・ウ・オ", ok:false, fb:"オが不適切です。診療報酬債権の譲渡は資金調達の論点であり、医薬品安全管理責任者の業務ではありません。"},
          {t:"イ・エ・オ", ok:false, fb:"エとオが不適切です。医薬品の安全使用と医療機器保守・債権流動化は区別します。"},
          {t:"ウ・エ・オ", ok:false, fb:"ウは適切ですが、エとオは不適切です。"}
        ],
        exp:"医薬品安全管理責任者は、手順書、研修、情報収集、改善策の実施が中心です。医療機器や資金調達の論点と混同しないようにします。"

const app = document.getElementById('app');
let quiz = [];
let current = 0;
let selected = null;
let answered = false;
let score = 0;
let history = [];

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildQuiz(){
  quiz = pools.map(pool => {
    const q = shuffle(pool.questions)[0];
    return {...q, category: pool.category, options: shuffle(q.options)};
  });
  quiz = shuffle(quiz);
  current = 0;
  selected = null;
  answered = false;
  score = 0;
  history = [];
  renderQuestion();
}

function optionLabel(i){ return String.fromCharCode(65+i); }

function renderQuestion(){
  const item = quiz[current];
  const pct = Math.round((current/quiz.length)*100);
  selected = null;
  answered = false;
  app.innerHTML = `
    <div class="status">
      <span>問題 ${current+1} / ${quiz.length}</span>
      <span>正答 ${score} 問</span>
    </div>
    <div class="progressbar"><span style="width:${pct}%"></span></div>
    <p class="question">${escapeHtml(item.q).replace(/\n/g,'<br>')}</p>
    <div class="options" id="options"></div>
    <div id="feedback"></div>
    <div class="controls">
      <button class="main full" id="answerBtn" disabled>回答</button>
      <button class="sub" id="restartBtn">最初からやり直す</button>
    </div>
  `;
  const optionsEl = document.getElementById('options');
  item.options.forEach((opt, i)=>{
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.type = 'button';
    btn.innerHTML = `<span class="mark">${optionLabel(i)}</span><span>${escapeHtml(opt.t)}</span>`;
    btn.addEventListener('click',()=>selectOption(i));
    optionsEl.appendChild(btn);
  });
  document.getElementById('answerBtn').addEventListener('click',showAnswer);
  document.getElementById('restartBtn').addEventListener('click',buildQuiz);
  app.scrollIntoView({block:'start'});
}

function selectOption(i){
  if(answered) return;
  selected = i;
  [...document.querySelectorAll('.option')].forEach((el, idx)=>{
    el.classList.toggle('selected', idx===i);
  });
  document.getElementById('answerBtn').disabled = false;
}

function showAnswer(){
  if(selected === null || answered) return;
  answered = true;
  const item = quiz[current];
  const opt = item.options[selected];
  const correctIndex = item.options.findIndex(o=>o.ok);
  const isOk = !!opt.ok;
  if(isOk) score++;
  history.push({q:item.q, category:item.category, selected:opt.t, correct:item.options[correctIndex].t, ok:isOk, fb:opt.fb, exp:item.exp});
  [...document.querySelectorAll('.option')].forEach((el, idx)=>{
    el.disabled = true;
    if(item.options[idx].ok) el.classList.add('correct');
    if(idx===selected && !item.options[idx].ok) el.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.innerHTML = `
    <div class="feedback ${isOk?'ok':'ng'}">
      <h2>${isOk?'正解です':'不正解です'}</h2>
      <p><strong>選択肢の確認：</strong>${escapeHtml(opt.fb)}</p>
      <p><strong>解説：</strong>${escapeHtml(item.exp)}</p>
      <p class="subtle">確認論点：${escapeHtml(item.category)}</p>
    </div>
  `;
  const controls = document.querySelector('.controls');
  document.getElementById('answerBtn').remove();
  const next = document.createElement('button');
  next.className = 'main full';
  next.textContent = current < quiz.length-1 ? '次の問題へ' : '結果を見る';
  next.addEventListener('click',()=>{
    if(current < quiz.length-1){ current++; renderQuestion(); }
    else renderResult();
  });
  controls.prepend(next);
}

function renderResult(){
  const pct = Math.round((score/quiz.length)*100);
  const message = pct >= 85 ? 'かなり仕上がっています。兼務可否と報告先の区別も安定しています。' : pct >= 65 ? '重要論点は押さえられています。誤答したカテゴリを再確認しましょう。' : '安全管理は似た名称が多い分野です。管理者、医薬品、医療機器、事故調査制度を分けて復習しましょう。';
  app.innerHTML = `
    <div class="resultBox">
      <div class="badge">結果</div>
      <div class="score">${score} / ${quiz.length}</div>
      <p>${message}</p>
      <button class="main" id="retryBtn">もう一度ランダム出題</button>
    </div>
    <details open>
      <summary>解答レビューを開く / 閉じる</summary>
      ${history.map((h,i)=>`
        <div class="reviewItem">
          <p><strong>Q${i+1} ${escapeHtml(h.category)}</strong><br>${escapeHtml(h.q).replace(/\n/g,'<br>')}</p>
          <p>${h.ok ? '○' : '×'} あなたの選択：${escapeHtml(h.selected)}</p>
          ${h.ok ? '' : `<p>正答：${escapeHtml(h.correct)}</p>`}
          <p>${escapeHtml(h.exp)}</p>
        </div>
      `).join('')}
    </details>
  `;
  document.getElementById('retryBtn').addEventListener('click', buildQuiz);
  app.scrollIntoView({block:'start'});
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

buildQuiz();
</script>
</body>
</html>
