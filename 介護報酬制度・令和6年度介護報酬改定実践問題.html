<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>介護報酬制度・令和6年度介護報酬改定実践問題</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #172033;
      --panel2: #111827;
      --text: #e5e7eb;
      --muted: #a9b4c7;
      --line: #2b3651;
      --accent: #93c5fd;
      --accent2: #c4b5fd;
      --ok: #34d399;
      --ng: #fb7185;
      --warn: #fbbf24;
      --shadow: 0 18px 50px rgba(0,0,0,.28);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.16), transparent 35%),
        radial-gradient(circle at bottom right, rgba(124,58,237,.14), transparent 38%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
      line-height: 1.75;
      letter-spacing: .02em;
    }
    a { color: var(--accent); }
    .wrap { width: min(940px, 100%); margin: 0 auto; padding: 18px 14px 42px; }
    header {
      padding: 22px 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(23,32,51,.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .eyebrow { margin: 0 0 7px; color: var(--accent); font-size: .88rem; font-weight: 700; }
    h1 { margin: 0; font-size: clamp(1.35rem, 4.8vw, 2.25rem); line-height: 1.35; }
    .lead { margin: 12px 0 0; color: var(--muted); font-size: .96rem; }
    .meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: .9rem;
    }
    .meta span {
      border: 1px solid var(--line);
      background: rgba(15,23,42,.58);
      border-radius: 999px;
      padding: 7px 11px;
    }
    @media (min-width: 720px) { .meta { grid-template-columns: repeat(3, 1fr); } }
    .status {
      margin: 14px 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(17,24,39,.78);
    }
    .statusTop { display:flex; justify-content:space-between; gap:10px; color: var(--muted); font-size: .92rem; flex-wrap: wrap; }
    .bar { height: 9px; border-radius: 999px; background: #0b1020; overflow: hidden; margin-top: 10px; border: 1px solid #273149; }
    .bar > div { height:100%; width:0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .25s ease; }
    main {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(23,32,51,.92);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .badges { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom: 12px; }
    .badge { border-radius:999px; padding:5px 10px; font-size:.82rem; font-weight:700; }
    .badge.primary { background: rgba(147,197,253,.18); color:#bfdbfe; border:1px solid rgba(147,197,253,.38); }
    .badge.category { background: rgba(196,181,253,.12); color:#ddd6fe; border:1px solid rgba(196,181,253,.30); }
    .question { font-size: clamp(1.08rem, 4vw, 1.45rem); font-weight: 800; line-height: 1.6; margin: 0 0 16px; }
    .choices { display: grid; gap: 11px; }
    .choice {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(15,23,42,.66);
      color: var(--text);
      text-align: left;
      padding: 13px 12px;
      display:flex;
      gap: 10px;
      cursor:pointer;
      font: inherit;
      line-height: 1.65;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .choice:hover { border-color: rgba(147,197,253,.60); background: rgba(30,41,59,.78); }
    .choice:disabled { cursor: default; }
    .choice.selected { border-color: var(--accent); background: rgba(37,99,235,.18); }
    .choice.correct { border-color: rgba(52,211,153,.85); background: rgba(6,95,70,.36); }
    .choice.wrong { border-color: rgba(251,113,133,.9); background: rgba(127,29,29,.34); }
    .num {
      flex: 0 0 auto;
      width: 30px; height: 30px;
      display:grid; place-items:center;
      border-radius: 999px;
      background: rgba(148,163,184,.16);
      color: #dbeafe;
      font-weight: 900;
      margin-top: 2px;
    }
    .correct .num { background: rgba(52,211,153,.88); color:#052e1c; }
    .wrong .num { background: rgba(251,113,133,.9); color:#3b0810; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top: 18px; }
    button.action {
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 12px 16px;
      min-height: 46px;
      font-weight: 800;
      color: #07111f;
      background: linear-gradient(135deg, #bfdbfe, #ddd6fe);
      cursor:pointer;
      touch-action: manipulation;
    }
    button.action.secondary { color: var(--text); background: rgba(15,23,42,.65); border-color: var(--line); }
    button.action:disabled { opacity:.45; cursor:not-allowed; }
    .explain {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(15,23,42,.64);
    }
    .explain.ok { border-color: rgba(52,211,153,.55); }
    .explain.ng { border-color: rgba(251,113,133,.6); }
    .explain h3 { margin: 0 0 8px; font-size: 1.05rem; }
    .explain.ok h3 { color: var(--ok); }
    .explain.ng h3 { color: var(--ng); }
    .answerText { color:#dbeafe; font-weight: 800; }
    .final {
      margin-top: 14px;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(17,24,39,.78);
      display: none;
    }
    .final.show { display:block; }
    .review { margin-top: 12px; display:grid; gap:8px; }
    .reviewRow { padding: 10px; border-radius: 14px; border: 1px solid var(--line); background: rgba(15,23,42,.52); color: var(--muted); font-size:.92rem; }
    .reviewRow strong { color: var(--text); }
    .small { font-size: .88rem; color: var(--muted); }
    @media (max-width: 520px) {
      .wrap { padding: 12px 10px 32px; }
      header, main { border-radius: 20px; padding: 15px; }
      .choice { padding: 12px 10px; border-radius: 15px; }
      .num { width: 28px; height: 28px; }
      button.action { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="top">
    <header>
      <p class="eyebrow">医療経営士2級対策</p>

      <p class="lead">介護報酬制度の基本、介護保険給付と医療保険給付の優先関係、居宅・地域密着型・施設サービスの分類、令和6年度介護報酬改定の主要論点を確認します。</p>
      <div class="meta">
        <span>五者択一・解説つき</span>
        <span>15カテゴリ×各3問プール</span>
        <span>問題順・選択肢順ランダム</span>
      </div>
    </header>

    <section class="status" aria-label="進捗">
      <div class="statusTop">
        <span id="progressText">進捗：0 / 15</span>
        <span id="scoreText">正答：0 / 0</span>
      </div>
      <div class="bar"><div id="barFill"></div></div>
    </section>

    <main id="quiz" aria-live="polite">
      <div class="badges">
        <span class="badge primary" id="qNo">第1問</span>
        <span class="badge category" id="category">カテゴリ</span>
      </div>
      <p class="question" id="question"></p>
      <div class="choices" id="choices"></div>
      <div class="actions">
        <button class="action" id="answerBtn" disabled>回答</button>
        <button class="action secondary" id="nextBtn" style="display:none;">次の問題へ</button>
        <button class="action secondary" id="restartBtn" style="display:none;">再チャレンジ</button>
      </div>
      <section class="explain" id="explain" style="display:none;"></section>
    </main>

    <section class="final" id="finalBox">
      <h2>結果</h2>
      <p id="finalScore"></p>
      <p class="small">再チャレンジすると、各カテゴリの問題が再抽選され、問題順・選択肢順も変わります。</p>
      <div class="review" id="review"></div>
    </section>
  </div>

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function buildQuiz() {
  const picked = categories.map(cat => {
    const q = cat.questions[Math.floor(Math.random() * cat.questions.length)];
    const choices = shuffle(q.choices.map((text, originalIndex) => ({ text, originalIndex })));
    return {
      ...q,
      category: cat.label,
      choices,
      correctChoiceIndex: choices.findIndex(c => c.originalIndex === q.answer)
    };
  });
  return shuffle(picked);
}

let questions = buildQuiz();
let currentIndex = 0;
let selected = null;
let answered = false;
let results = [];

const qNo = document.getElementById('qNo');
const categoryEl = document.getElementById('category');
const questionEl = document.getElementById('question');
const choicesEl = document.getElementById('choices');
const answerBtn = document.getElementById('answerBtn');
const nextBtn = document.getElementById('nextBtn');
const restartBtn = document.getElementById('restartBtn');
const explainEl = document.getElementById('explain');
const progressText = document.getElementById('progressText');
const scoreText = document.getElementById('scoreText');
const barFill = document.getElementById('barFill');
const finalBox = document.getElementById('finalBox');
const finalScore = document.getElementById('finalScore');
const review = document.getElementById('review');

function updateStatus() {
  const answeredCount = results.filter(x => x !== undefined).length;
  const correctCount = results.filter(Boolean).length;
  progressText.textContent = `進捗：${answeredCount} / ${questions.length}`;
  scoreText.textContent = `正答：${correctCount} / ${answeredCount || 0}`;
  barFill.style.width = `${Math.round(answeredCount / questions.length * 100)}%`;
}

function render() {
  const q = questions[currentIndex];
  qNo.textContent = `第${currentIndex + 1}問`;
  categoryEl.textContent = q.category;
  questionEl.textContent = q.question;
  choicesEl.innerHTML = '';
  q.choices.forEach((choice, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    if (selected === idx) btn.classList.add('selected');
    if (answered && idx === q.correctChoiceIndex) btn.classList.add('correct');
    if (answered && selected === idx && idx !== q.correctChoiceIndex) btn.classList.add('wrong');
    btn.disabled = answered;
    btn.innerHTML = `<span class="num">${idx + 1}</span><span>${choice.text}</span>`;
    btn.addEventListener('click', () => {
      if (answered) return;
      selected = idx;
      answerBtn.disabled = false;
      render();
    });
    choicesEl.appendChild(btn);
  });
  explainEl.style.display = answered ? 'block' : 'none';
  nextBtn.style.display = answered && currentIndex < questions.length - 1 ? 'inline-block' : 'none';
  restartBtn.style.display = answered && currentIndex === questions.length - 1 ? 'inline-block' : 'none';
  answerBtn.disabled = selected === null || answered;
  answerBtn.style.display = answered ? 'none' : 'inline-block';
  updateStatus();
}

answerBtn.addEventListener('click', () => {
  if (selected === null || answered) return;
  const q = questions[currentIndex];
  answered = true;
  const ok = selected === q.correctChoiceIndex;
  results[currentIndex] = ok;
  explainEl.className = `explain ${ok ? 'ok' : 'ng'}`;
  explainEl.innerHTML = `
    <h3>${ok ? '正解です' : '不正解です'}</h3>
    ${ok ? '' : `<p class="answerText">正答：${q.choices[q.correctChoiceIndex].text}</p>`}
    <p>${q.explanation}</p>
  `;
  render();
  explainEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

nextBtn.addEventListener('click', () => {
  currentIndex += 1;
  selected = null;
  answered = false;
  explainEl.innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
});

restartBtn.addEventListener('click', () => {
  questions = buildQuiz();
  currentIndex = 0;
  selected = null;
  answered = false;
  results = [];
  explainEl.innerHTML = '';
  finalBox.classList.remove('show');
  review.innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
});

function showFinalIfNeeded() {
  if (!(answered && currentIndex === questions.length - 1)) return;
  const correctCount = results.filter(Boolean).length;
  finalScore.textContent = `${questions.length}問中 ${correctCount}問 正解です。`;
  review.innerHTML = questions.map((q, i) => {
    return `<div class="reviewRow"><strong>第${i + 1}問：</strong>${q.category}　${results[i] ? '○' : '×'}</div>`;
  }).join('');
  finalBox.classList.add('show');
}

const observer = new MutationObserver(showFinalIfNeeded);
observer.observe(explainEl, { childList: true, subtree: true });

render();
