<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>高齢社会白書・2040年問題実践問題</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg2: #111827;
      --card: #182235;
      --card2: #1f2a3d;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: rgba(148, 163, 184, .22);
      --accent: #7dd3fc;
      --accent2: #38bdf8;
      --accent-soft: rgba(56, 189, 248, .14);
      --good: #86efac;
      --good-bg: rgba(22, 101, 52, .38);
      --bad: #fca5a5;
      --bad-bg: rgba(127, 29, 29, .38);
      --warn: #fde68a;
      --warn-bg: rgba(120, 53, 15, .32);
      --shadow: 0 18px 40px rgba(0,0,0,.28);
      --radius: 22px;
      --tap: 52px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56,189,248,.13), transparent 36rem),
        radial-gradient(circle at bottom right, rgba(125,211,252,.08), transparent 32rem),
        linear-gradient(180deg, #0b1120 0%, var(--bg) 48%, #0b1120 100%);
      line-height: 1.75;
    }

    .wrap {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 18px 14px calc(88px + env(safe-area-inset-bottom));
    }

    header {
      border: 1px solid var(--line);
      background: rgba(24,34,53,.78);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin: 8px 0 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.45rem, 5.5vw, 2.15rem);
      line-height: 1.3;
      letter-spacing: .02em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: .96rem;
    }

    .panel {
      border: 1px solid var(--line);
      background: rgba(24,34,53,.86);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .status {
      color: var(--accent);
      font-weight: 800;
      letter-spacing: .02em;
    }

    .subnote {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: .88rem;
    }

    .progress {
      width: 100%;
      height: 9px;
      background: rgba(148,163,184,.16);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), #a5f3fc);
      border-radius: inherit;
      transition: width .25s ease;
    }

    button {
      min-height: var(--tap);
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: linear-gradient(135deg, #0284c7, #0ea5e9);
      color: #f8fafc;
      font-weight: 800;
      font-size: .98rem;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(14,165,233,.18);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { transform: translateY(1px); }
    button:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }
    .ghost {
      background: rgba(148,163,184,.14);
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .question-card {
      padding: 18px;
    }

    .qmeta {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    .num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 38px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 900;
      border: 1px solid rgba(125,211,252,.24);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(148,163,184,.13);
      color: #cbd5e1;
      font-size: .82rem;
      font-weight: 800;
      border: 1px solid var(--line);
    }

    .question {
      font-weight: 900;
      font-size: clamp(1.04rem, 4vw, 1.2rem);
      line-height: 1.72;
      margin: 0 0 16px;
    }

    .statements {
      margin: 10px 0 0;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(15,23,42,.5);
      border: 1px solid var(--line);
      color: #d1d5db;
      font-weight: 650;
    }

    .choices {
      display: grid;
      gap: 11px;
      margin: 16px 0;
    }

    .choice {
      position: relative;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 11px;
      align-items: start;
      min-height: var(--tap);
      padding: 13px 14px;
      border-radius: 17px;
      background: rgba(31,42,61,.9);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .choice input {
      appearance: none;
      width: 22px;
      height: 22px;
      margin: 3px 0 0;
      border: 2px solid rgba(203,213,225,.55);
      border-radius: 999px;
      background: rgba(15,23,42,.48);
    }

    .choice.selected {
      border-color: rgba(125,211,252,.76);
      background: rgba(14,116,144,.28);
    }

    .choice.selected input {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 5px #1f2a3d;
      background: var(--accent);
    }

    .choice.correct {
      border-color: rgba(134,239,172,.7);
      background: var(--good-bg);
      color: #dcfce7;
    }

    .choice.wrong {
      border-color: rgba(252,165,165,.72);
      background: var(--bad-bg);
      color: #fee2e2;
    }

    .message {
      min-height: 1.5em;
      color: var(--muted);
      font-weight: 800;
      margin: 4px 0 0;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .explanation {
      display: none;
      margin-top: 16px;
      padding: 15px;
      border-radius: 18px;
      background: rgba(15,23,42,.62);
      border: 1px solid var(--line);
      border-left: 6px solid var(--accent2);
    }

    .explanation.show { display: block; }
    .explanation h3 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: #f8fafc;
    }
    .explanation p { margin: 8px 0; }

    .wrong-reason {
      margin-top: 12px;
      padding: 12px;
      border-radius: 15px;
      background: var(--warn-bg);
      border: 1px solid rgba(253,230,138,.3);
      color: #fef3c7;
    }

    .result {
      display: none;
      padding: 20px;
    }
    .result.show { display: block; }
    .result h2 { margin: 0 0 10px; font-size: 1.45rem; }
    .result p { color: #cbd5e1; }
    .review {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(15,23,42,.62);
      border: 1px solid var(--line);
    }
    .review ul { margin: 8px 0 0; padding-left: 1.25em; }
    .review li { margin: 9px 0; }

    .fixed-bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: rgba(11,17,32,.86);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--line);
      z-index: 10;
    }
    .fixed-inner {
      width: min(980px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (min-width: 720px) {
      .wrap { padding-top: 28px; }
      header { padding: 26px; }
      .topbar { grid-template-columns: 1fr auto; align-items: center; padding: 16px 18px; }
      .question-card { padding: 24px; }
      .actions { grid-template-columns: 1fr auto auto; align-items: center; }
      .message { margin: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>高齢社会白書・2040年問題実践問題</h1>
      <p class="lead">高齢社会白書の人口構造、2040年頃を見据えた医療・介護需要、地域包括ケアシステム、令和8年度診療報酬改定における包括期医療・在宅医療・地域医療体制の評価を確認します。</p>
    </header>

    <section class="panel topbar">
      <div>
        <div class="status" id="status">準備中</div>
        <p class="subnote">5カテゴリから各1問をランダム出題。各カテゴリには3問ずつ登録しています。</p>
        <div class="progress" aria-hidden="true"><div class="bar" id="bar"></div></div>
      </div>
      <button class="ghost" type="button" id="restartTop">別問題で再挑戦</button>
    </section>

    <main id="quiz" class="panel question-card"></main>
    <section id="result" class="panel result"></section>
  </div>

  <div class="fixed-bottom" id="fixedBottom">
    <div class="fixed-inner">
      <button class="ghost" type="button" id="restartBottom">最初から</button>
      <button type="button" id="mainAction" disabled>回答</button>
    </div>
  </div>

<script>
const categories = [

          { text: "日本の高齢化率は欧米主要国より低く、今後の医療需要への影響は限定的と整理される。", correct: false, reason: "日本の高齢化率は世界的にも高い水準であり、医療・介護需要への影響は重要な論点です。" },

const quizEl = document.getElementById('quiz');
const resultEl = document.getElementById('result');
const statusEl = document.getElementById('status');
const barEl = document.getElementById('bar');
const mainAction = document.getElementById('mainAction');
const restartTop = document.getElementById('restartTop');
const restartBottom = document.getElementById('restartBottom');
const fixedBottom = document.getElementById('fixedBottom');

let quiz = [];
let current = 0;
let selected = null;
let answered = false;
let results = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function start() {
  quiz = categories.map(cat => {
    const q = shuffle(cat.questions)[0];
    return { category: cat.name, q: q.q, stmts: q.stmts || [], exp: q.exp, choices: shuffle(q.choices) };
  });
  current = 0;
  results = [];
  resultEl.classList.remove('show');
  resultEl.innerHTML = '';
  quizEl.style.display = 'block';
  fixedBottom.style.display = 'block';
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuestion() {
  selected = null;
  answered = false;
  const item = quiz[current];
  const stmtHtml = item.stmts.length ? `<div class="statements">${item.stmts.map(s => `<div>${s}</div>`).join('')}</div>` : '';
  quizEl.innerHTML = `
    <div class="qmeta">
      <span class="num">${current + 1}</span>
      <span class="tag">${item.category}</span>
    </div>
    <div class="question">${item.q}</div>
    ${stmtHtml}
    <div class="choices" id="choices">
      ${item.choices.map((c, i) => `
        <label class="choice" data-index="${i}">
          <input type="radio" name="choice" value="${i}" aria-label="選択肢${i + 1}">
          <span>${c.text}</span>
        </label>
      `).join('')}
    </div>
    <div class="actions">
      <div class="message" id="message">選択肢を1つ選んでください。</div>
      <button type="button" id="answerBtn" disabled>回答</button>
      <button type="button" class="ghost" id="nextBtn" style="display:none;">次の問題へ</button>
    </div>
    <div class="explanation" id="explanation"></div>
  `;
  document.querySelectorAll('.choice').forEach(label => {
    label.addEventListener('click', () => selectChoice(Number(label.dataset.index)));
  });
  document.getElementById('answerBtn').addEventListener('click', submit);
  document.getElementById('nextBtn').addEventListener('click', next);
  mainAction.textContent = '回答';
  mainAction.disabled = true;
  mainAction.onclick = submit;
  updateStatus();
}

function selectChoice(i) {
  if (answered) return;
  selected = i;
  document.querySelectorAll('.choice').forEach(el => el.classList.remove('selected'));
  const chosen = document.querySelector(`.choice[data-index="${i}"]`);
  chosen.classList.add('selected');
  chosen.querySelector('input').checked = true;
  document.getElementById('answerBtn').disabled = false;
  document.getElementById('message').textContent = '選択しました。回答ボタンを押してください。';
  mainAction.disabled = false;
}

function submit() {
  if (selected === null || answered) return;
  answered = true;
  const item = quiz[current];
  const chosen = item.choices[selected];
  const correctIndex = item.choices.findIndex(c => c.correct);
  const isCorrect = chosen.correct;

  document.querySelectorAll('.choice').forEach(label => {
    const idx = Number(label.dataset.index);
    label.querySelector('input').disabled = true;
    if (idx === correctIndex) label.classList.add('correct');
    if (idx === selected && !isCorrect) label.classList.add('wrong');
  });

  const msg = document.getElementById('message');
  msg.textContent = isCorrect ? '正解です。' : '不正解です。';
  msg.style.color = isCorrect ? 'var(--good)' : 'var(--bad)';

  const explanation = document.getElementById('explanation');
  explanation.classList.add('show');
  explanation.innerHTML = `
    <h3>${isCorrect ? '正答の解説' : '正答の解説と誤答理由'}</h3>
    <p>${item.exp}</p>
    ${isCorrect ? '' : `<div class="wrong-reason"><strong>選んだ選択肢が誤りである理由</strong><br>${chosen.reason}</div>`}
  `;

  document.getElementById('answerBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-block';
  mainAction.textContent = current === quiz.length - 1 ? '結果を見る' : '次の問題へ';
  mainAction.disabled = false;
  mainAction.onclick = next;

  results.push({ category: item.category, correct: isCorrect, selected: chosen.text, correctText: item.choices[correctIndex].text });
  updateStatus();
}

function next() {
  if (current < quiz.length - 1) {
    current++;
    renderQuestion();
    quizEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    showResult();
  }
}

function updateStatus() {
  const correct = results.filter(r => r.correct).length;
  statusEl.textContent = `${current + 1} / ${quiz.length} 問目　｜　回答済 ${results.length} 問　｜　正解 ${correct} 問`;
  barEl.style.width = `${(results.length / quiz.length) * 100}%`;
}

function showResult() {
  quizEl.style.display = 'none';
  fixedBottom.style.display = 'none';
  const correct = results.filter(r => r.correct).length;
  let msg;
  if (correct === 5) msg = '全問正解です。高齢社会白書の基礎と2040年問題、令和8年度改定の関連評価が整理できています。';
  else if (correct >= 4) msg = 'かなり良いです。間違えたカテゴリを確認すれば得点源になります。';
  else if (correct >= 3) msg = '基礎はつかめています。2040年問題と診療報酬改定のつながりを中心に復習しましょう。';
  else msg = 'まずは「高齢者増加＋支え手不足 → 地域で支える医療・介護 → 診療報酬で後押し」という流れを押さえましょう。';

  const misses = results.filter(r => !r.correct);
  resultEl.innerHTML = `
    <h2>結果：${correct} / ${quiz.length} 問正解</h2>
    <p>${msg}</p>
    <div class="review">
      <strong>復習ポイント</strong>
      ${misses.length ? `<ul>${misses.map(m => `<li>${m.category}<br>正答：${m.correctText}</li>`).join('')}</ul>` : '<p>特になし。別問題で定着確認しましょう。</p>'}
    </div>
    <div class="actions" style="margin-top:16px;">
      <span></span>
      <button type="button" id="retryResult">別問題で再挑戦</button>
    </div>
  `;
  resultEl.classList.add('show');
  document.getElementById('retryResult').addEventListener('click', start);
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

restartTop.addEventListener('click', start);
restartBottom.addEventListener('click', start);
start();
</script>
</body>
</html>
