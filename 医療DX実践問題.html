function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function pickQuestions() {
  const selected = QUESTION_CATEGORIES.map(cat => {
    const q = cat.pool[Math.floor(Math.random() * cat.pool.length)];
    return {
      category: cat.category,
      stem: q.stem,
      explanation: q.explanation,
      choices: shuffle(q.choices.map((choice, idx) => ({ ...choice, originalIndex: idx })))
    };
  });
  return shuffle(selected);
}

const state = {
  questions: pickQuestions(),
  index: 0,
  score: 0,
  answered: false,
  records: []
};

const el = {
  quiz: document.getElementById('quiz'),
  category: document.getElementById('category'),
  qno: document.getElementById('qno'),
  stem: document.getElementById('stem'),
  choices: document.getElementById('choices'),
  answerBtn: document.getElementById('answerBtn'),
  nextBtn: document.getElementById('nextBtn'),
  feedback: document.getElementById('feedback'),
  progress: document.getElementById('progress'),
  count: document.getElementById('count'),
  result: document.getElementById('result')
};

function renderQuestion() {
  const q = state.questions[state.index];
  state.answered = false;
  el.category.textContent = q.category;
  el.qno.textContent = `第${state.index + 1}問 / ${state.questions.length}`;
  el.stem.textContent = q.stem;
  el.choices.innerHTML = '';
  q.choices.forEach((choice, i) => {
    const id = `choice-${state.index}-${i}`;
    const label = document.createElement('label');
    label.className = 'choice';
    label.innerHTML = `
      <input type="radio" name="answer" id="${id}" value="${i}">
      <span>${choice.text}</span>
    `;
    el.choices.appendChild(label);
  });
  el.feedback.className = 'feedback';
  el.feedback.innerHTML = '';
  el.answerBtn.disabled = false;
  el.nextBtn.disabled = true;
  el.nextBtn.textContent = state.index === state.questions.length - 1 ? '結果を見る' : '次の問題へ';
  updateProgress();
  setTimeout(() => el.quiz.scrollIntoView({ behavior: 'smooth', block: 'start' }), 0);
}

function updateProgress() {
  const answeredCount = state.records.length;
  const pct = (answeredCount / state.questions.length) * 100;
  el.progress.style.width = `${pct}%`;
  el.count.textContent = `${answeredCount} / ${state.questions.length}`;
}

function getSelectedIndex() {
  const selected = document.querySelector('input[name="answer"]:checked');
  return selected ? Number(selected.value) : null;
}

function markAnswer() {
  if (state.answered) return;
  const selectedIndex = getSelectedIndex();
  if (selectedIndex === null) {
    el.feedback.className = 'feedback show';
    el.feedback.innerHTML = `<span class="ng">選択肢を1つ選んでください。</span>`;
    return;
  }
  const q = state.questions[state.index];
  const selected = q.choices[selectedIndex];
  const correct = q.choices.find(c => c.correct);
  const isCorrect = Boolean(selected.correct);
  state.answered = true;
  if (isCorrect) state.score += 1;

  document.querySelectorAll('input[name="answer"]').forEach(input => input.disabled = true);
  el.answerBtn.disabled = true;
  el.nextBtn.disabled = false;

  state.records.push({
    no: state.index + 1,
    category: q.category,
    stem: q.stem,
    selected: selected.text,
    correct: correct.text,
    ok: isCorrect,
    explanation: q.explanation
  });

  el.feedback.className = 'feedback show';
  el.feedback.innerHTML = `
    <div class="${isCorrect ? 'ok' : 'ng'}">${isCorrect ? '正解です。' : '不正解です。'}</div>
    <div class="correctBox"><strong>正答：</strong>${correct.text}</div>
    <p class="explain">${q.explanation}</p>
  `;
  updateProgress();
}

function nextQuestion() {
  if (!state.answered) return;
  if (state.index < state.questions.length - 1) {
    state.index += 1;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  el.quiz.style.display = 'none';
  el.progress.style.width = '100%';
  el.count.textContent = `${state.questions.length} / ${state.questions.length}`;
  const percent = Math.round((state.score / state.questions.length) * 100);
  const message = percent >= 80 ? '仕上がり良好です。誤答カテゴリだけ見直しましょう。' :
                  percent >= 60 ? 'あと少しです。電子処方箋・診療情報連携・三原則を重点復習しましょう。' :
                  '基礎用語から再確認しましょう。医療DX＝マイナ保険証だけではない点が軸です。';
  const review = state.records.map(r => `
    <details>
      <summary>${r.no}問目｜${r.category}｜${r.ok ? '○' : '×'}</summary>
      <p><strong>問題：</strong>${r.stem.replace(/\n/g, '<br>')}</p>
      <p><strong>あなたの回答：</strong>${r.selected}</p>
      <p><strong>正答：</strong>${r.correct}</p>
      <p><strong>解説：</strong>${r.explanation}</p>
    </details>
  `).join('');
  el.result.className = 'result show';
  el.result.innerHTML = `
    <p class="score">結果：${state.score} / ${state.questions.length}問正解（${percent}%）</p>
    <p>${message}</p>
    <div class="actions">
      <button class="primary" onclick="location.reload()">もう一度ランダム出題</button>
      <button onclick="window.scrollTo({top:0, behavior:'smooth'})">ページ上部へ</button>
    </div>
    <div class="review">${review}</div>
  `;
  el.result.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

el.answerBtn.addEventListener('click', markAnswer);
el.nextBtn.addEventListener('click', nextQuestion);

renderQuestion();
</script>
