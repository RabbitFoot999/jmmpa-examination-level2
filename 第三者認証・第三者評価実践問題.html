<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>第三者認証・第三者評価実践問題</title>
  <style>
    :root {
      --bg: #1f2428;
      --panel: #2b3137;
      --panel2: #343b43;
      --text: #f1f3f5;
      --muted: #c2c8cf;
      --line: #59636e;
      --accent: #8fb7ff;
      --good: #7bd88f;
      --bad: #ff9b9b;
      --warn: #ffd37a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .wrap {
      width: min(920px, 94vw);
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    header {
      background: linear-gradient(135deg, #2b3137, #23282d);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.45rem, 3vw, 2rem);
      line-height: 1.3;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: .98rem;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: .92rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 26px rgba(0,0,0,.22);
    }

    .category {
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .question {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 18px;
      white-space: pre-line;
    }

    .choices {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .choice {
      display: block;
      border: 1px solid var(--line);
      background: var(--panel2);
      border-radius: 13px;
      padding: 13px 14px;
      cursor: pointer;
      transition: border-color .15s, transform .08s, background .15s;
    }

    .choice:hover {
      border-color: var(--accent);
    }

    .choice input {
      margin-right: 9px;
      transform: scale(1.1);
    }

    .choice.selected {
      border-color: var(--accent);
      background: #27364a;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      color: #102033;
      background: var(--accent);
      transition: filter .15s, transform .08s;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button:active {
      transform: translateY(1px);
    }

    button.secondary {
      color: var(--text);
      background: #4b5560;
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .result {
      display: none;
      margin-top: 18px;
      border-radius: 15px;
      border: 1px solid var(--line);
      background: #20262c;
      padding: 16px;
    }

    .result.show {
      display: block;
    }

    .judge {
      font-size: 1.12rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .judge.good {
      color: var(--good);
    }

    .judge.bad {
      color: var(--bad);
    }

    .answer {
      color: var(--warn);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .explain {
      color: var(--text);
      white-space: pre-line;
    }

    .done {
      display: none;
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
    }

    .done.show {
      display: block;
    }

    .score {
      font-size: 1.8rem;
      font-weight: 900;
      margin: 10px 0;
      color: var(--accent);
    }

    .small {
      font-size: .9rem;
      color: var(--muted);
    }

    footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: .86rem;
    }

    @media (max-width: 600px) {
      .wrap {
        padding-top: 14px;
      }

      header,
      .card,
      .done {
        border-radius: 14px;
        padding: 18px;
      }

      .question {
        font-size: 1rem;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header id="top">
      <h1>第三者認証・第三者評価実践問題</h1>
      <p class="lead">
        医療機関に関係するISO、JIS Q 15001、プライバシーマーク、病院機能評価、JCI、ISMSについて、
        認証名と内容の対応、診療報酬との関係を確認します。5カテゴリから各1問、合計5問をランダム出題します。
      </p>
    </header>

    <div class="status">
      <div class="chip" id="progress">1 / 5</div>
      <div class="chip" id="score">正解 0問</div>
      <div class="chip">五者択一</div>
    </div>

    <main class="card" id="quizCard">
      <div class="category" id="category"></div>
      <div class="question" id="question"></div>
      <div class="choices" id="choices"></div>

      <div class="btns">
        <button id="answerBtn" type="button">回答</button>
        <button id="nextBtn" type="button" class="secondary" disabled>次の問題へ</button>
      </div>

      <div class="result" id="result">
        <div class="judge" id="judge"></div>
        <div class="answer" id="answerText"></div>
        <div class="explain" id="explain"></div>
      </div>
    </main>

    <section class="done" id="done">
      <h2>結果</h2>
      <div class="score" id="finalScore"></div>
      <p id="finalComment"></p>
      <button type="button" onclick="restartQuiz()">もう一度解く</button>
    </section>

    <footer>
      <p>
        補足：本問題は医療経営士2級対策用です。ISO等の認証取得そのものが直ちに診療報酬の算定要件になるとは限らないため、
        「認証制度の目的」と「施設基準等との関係」を分けて確認してください。
      </p>
    </footer>
  </div>

  <script>
    const pools = [
      {

              { text: "ア・イ・ウ・エ", correct: false }
            ],
            explanation: "ア・イ・ウが適切である。エは誤りで、病院機能評価は病院の組織的な医療提供機能を評価する仕組みであり、財務格付けを主目的とする制度ではない。"
          },
          {
            text: "次の記述のうち、適切でないものの組み合わせはどれか。\n\nア　プライバシーマークは個人情報保護体制に関する制度である。\nイ　JCIは国際的な医療機関認証として整理できる。\nウ　ISO14001は品質マネジメントシステムに関する国際規格である。\nエ　ISO9001は環境マネジメントシステムに関する国際規格である。",
            choices: [
              { text: "ウ・エ", correct: true },
              { text: "ア・イ", correct: false },
              { text: "ア・ウ", correct: false },
              { text: "イ・エ", correct: false },
              { text: "ア・イ・ウ", correct: false }
            ],
            explanation: "適切でないものはウ・エである。ISO14001は環境、ISO9001は品質であり、両者を入れ替えた記述が誤りである。アとイは適切である。"
          },
          {
            text: "次の記述のうち、最も適切なものはどれか。",
            choices: [
              { text: "ISO9001、ISO14001、JIS Q 15001、プライバシーマーク、病院機能評価は、それぞれ対象領域が異なるため、名称と目的を対応させて整理する必要がある。", correct: true },
              { text: "ISO9001とISO14001は、いずれも個人情報保護体制を対象とする国内マーク制度である。", correct: false },
              { text: "JIS Q 15001と病院機能評価は、いずれも医療機関の救急搬送実績を評価する制度である。", correct: false },
              { text: "プライバシーマークとJCIは、いずれも環境マネジメントシステムを評価する制度である。", correct: false },
              { text: "病院機能評価は、診療報酬請求の審査支払を行うための制度である。", correct: false }
            ],
            explanation: "第三者認証・第三者評価では、名称と目的の対応が問われやすい。ISO9001＝品質、ISO14001＝環境、JIS Q 15001・プライバシーマーク＝個人情報保護、JCI・病院機能評価＝医療機関の機能や質・安全の評価として整理する。"
          }
        ]
      }
    ];

    let quiz = [];
    let current = 0;
    let correctCount = 0;
    let answered = false;

    const categoryEl = document.getElementById("category");
    const questionEl = document.getElementById("question");
    const choicesEl = document.getElementById("choices");
    const resultEl = document.getElementById("result");
    const judgeEl = document.getElementById("judge");
    const answerTextEl = document.getElementById("answerText");
    const explainEl = document.getElementById("explain");
    const answerBtn = document.getElementById("answerBtn");
    const nextBtn = document.getElementById("nextBtn");
    const progressEl = document.getElementById("progress");
    const scoreEl = document.getElementById("score");
    const quizCard = document.getElementById("quizCard");
    const doneEl = document.getElementById("done");
    const finalScoreEl = document.getElementById("finalScore");
    const finalCommentEl = document.getElementById("finalComment");

    function shuffle(array) {
      const arr = array.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildQuiz() {
      quiz = pools.map(pool => {
        const picked = pool.questions[Math.floor(Math.random() * pool.questions.length)];
        return {
          category: pool.category,
          text: picked.text,
          explanation: picked.explanation,
          choices: shuffle(picked.choices)
        };
      });
      current = 0;
      correctCount = 0;
      answered = false;
    }

    function renderQuestion() {
      const q = quiz[current];
      categoryEl.textContent = "カテゴリ：" + q.category;
      questionEl.textContent = "第" + (current + 1) + "問　" + q.text;
      choicesEl.innerHTML = "";
      resultEl.classList.remove("show");
      judgeEl.textContent = "";
      answerTextEl.textContent = "";
      explainEl.textContent = "";
      answerBtn.disabled = false;
      nextBtn.disabled = true;
      answered = false;

      q.choices.forEach((choice, index) => {
        const label = document.createElement("label");
        label.className = "choice";

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "choice";
        input.value = index;

        input.addEventListener("change", () => {
          document.querySelectorAll(".choice").forEach(el => el.classList.remove("selected"));
          label.classList.add("selected");
        });

        label.appendChild(input);
        label.appendChild(document.createTextNode(choice.text));
        choicesEl.appendChild(label);
      });

      progressEl.textContent = (current + 1) + " / " + quiz.length;
      scoreEl.textContent = "正解 " + correctCount + "問";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function answerQuestion() {
      if (answered) return;

      const selected = document.querySelector("input[name='choice']:checked");
      if (!selected) {
        resultEl.classList.add("show");
        judgeEl.className = "judge bad";
        judgeEl.textContent = "選択肢を選んでください";
        answerTextEl.textContent = "";
        explainEl.textContent = "";
        return;
      }

      answered = true;
      const q = quiz[current];
      const selectedChoice = q.choices[Number(selected.value)];
      const correctChoice = q.choices.find(choice => choice.correct);

      if (selectedChoice.correct) {
        correctCount++;
        judgeEl.className = "judge good";
        judgeEl.textContent = "正解";
      } else {
        judgeEl.className = "judge bad";
        judgeEl.textContent = "不正解";
      }

      answerTextEl.textContent = "正答： " + correctChoice.text;
      explainEl.textContent = q.explanation;
      resultEl.classList.add("show");
      answerBtn.disabled = true;
      nextBtn.disabled = false;
      scoreEl.textContent = "正解 " + correctCount + "問";
    }

    function nextQuestion() {
      if (current < quiz.length - 1) {
        current++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      quizCard.style.display = "none";
      doneEl.classList.add("show");
      progressEl.textContent = "終了";
      scoreEl.textContent = "正解 " + correctCount + "問";
      finalScoreEl.textContent = correctCount + " / " + quiz.length + "問 正解";

      let comment = "";
      if (correctCount === quiz.length) {
        comment = "よく整理できています。次は診療報酬との関係を施設基準ベースで確認すると得点源になります。";
      } else if (correctCount >= 3) {
        comment = "基本は押さえられています。ISO9001・ISO14001・JIS Q 15001・Pマークの対応をもう一度確認しましょう。";
      } else {
        comment = "まずは ISO9001＝品質、ISO14001＝環境、JIS Q 15001・Pマーク＝個人情報保護、病院機能評価・JCI＝医療機関評価 の対応を固めましょう。";
      }
      finalCommentEl.textContent = comment;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function restartQuiz() {
      doneEl.classList.remove("show");
      quizCard.style.display = "block";
      buildQuiz();
      renderQuestion();
    }

    answerBtn.addEventListener("click", answerQuestion);
    nextBtn.addEventListener("click", nextQuestion);

    buildQuiz();
    renderQuestion();
  </script>
</body>
</html>
