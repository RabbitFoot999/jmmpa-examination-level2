<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>重症度・医療・看護必要度実践問題</title>
<style>
  :root{
    --bg:#0f1419;
    --panel:#151c24;
    --panel2:#1b2530;
    --text:#e8edf2;
    --muted:#a9b4bf;
    --line:#2b3846;
    --accent:#7fb3c8;
    --accent2:#b8a16a;
    --ok:#86c28b;
    --ng:#d8837b;
    --shadow:0 18px 48px rgba(0,0,0,.32);
    --radius:18px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;
    background:radial-gradient(circle at top left,#1a2730 0,#0f1419 42%,#0b0f13 100%);
    color:var(--text);
    line-height:1.7;
  }
  .wrap{width:min(920px,100%);margin:0 auto;padding:22px 14px 84px}
  header{
    padding:24px 18px 18px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:linear-gradient(135deg,rgba(27,37,48,.96),rgba(17,24,32,.94));
    box-shadow:var(--shadow);
  }
  h1{font-size:clamp(24px,6vw,38px);line-height:1.25;margin:0 0 10px;letter-spacing:.02em}
  .lead{color:var(--muted);margin:0;font-size:15px}
  .badgeRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
  .badge{font-size:12px;color:#dce7ed;border:1px solid #405063;background:#18222d;border-radius:999px;padding:5px 10px}
  .toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin:16px 0;flex-wrap:wrap}
  .progressText{color:var(--muted);font-size:14px}
  .bar{height:9px;background:#111820;border:1px solid var(--line);border-radius:999px;overflow:hidden;flex:1;min-width:160px}
  .bar > div{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.25s}
  .card{
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:rgba(21,28,36,.96);
    box-shadow:var(--shadow);
    padding:18px;
  }
  .category{display:inline-block;color:#111820;background:var(--accent2);font-weight:700;font-size:12px;border-radius:999px;padding:4px 10px;margin-bottom:10px}
  .qno{color:var(--muted);font-size:14px;margin-bottom:8px}
  .question{font-size:18px;font-weight:700;margin:4px 0 16px;line-height:1.65}
  .choices{display:grid;gap:10px;margin:0 0 16px;padding:0;list-style:none}
  .choice{
    border:1px solid var(--line);
    border-radius:14px;
    background:var(--panel2);
    padding:13px 13px;
    cursor:pointer;
    min-height:52px;
    display:flex;
    gap:10px;
    align-items:flex-start;
    transition:.12s;
    -webkit-tap-highlight-color:transparent;
  }
  .choice:hover{border-color:#53687a}
  .choice.selected{outline:2px solid var(--accent);border-color:var(--accent);background:#1e303a}
  .choice.correct{border-color:var(--ok);background:rgba(55,100,65,.28)}
  .choice.wrong{border-color:var(--ng);background:rgba(118,56,52,.25)}
  .letter{font-weight:800;color:var(--accent);min-width:1.4em}
  button{
    appearance:none;border:0;border-radius:999px;padding:13px 18px;font-weight:800;color:#0d1318;background:var(--accent);cursor:pointer;
    min-height:48px;font-size:15px;box-shadow:0 8px 18px rgba(0,0,0,.22)
  }
  button.secondary{background:#273544;color:var(--text);border:1px solid var(--line);box-shadow:none}
  button:disabled{opacity:.45;cursor:not-allowed}
  .buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .result{display:none;margin-top:16px;border-radius:14px;padding:14px;border:1px solid var(--line);background:#111820}
  .result.show{display:block}
  .result.ok{border-color:var(--ok)}
  .result.ng{border-color:var(--ng)}
  .resultTitle{font-weight:900;font-size:18px;margin:0 0 8px}
  .explain{color:#d8e0e6;margin:0;white-space:pre-line}
  .mini{color:var(--muted);font-size:13px;margin-top:12px}
  .summary{display:none;margin-top:16px}
  .summary.show{display:block}
  .score{font-size:28px;font-weight:900;margin:0 0 10px}
  .review{display:grid;gap:10px;margin-top:12px}
  .reviewItem{border:1px solid var(--line);border-radius:14px;background:#121a22;padding:12px}
  footer{color:var(--muted);font-size:12px;margin-top:18px;padding:0 4px}
  a{color:#9fd0e1}
  @media (max-width:560px){
    .wrap{padding:12px 10px 72px}
    header{padding:20px 14px 16px}
    .card{padding:15px}
    .question{font-size:17px}
    .choice{padding:12px;min-height:56px}
    button{width:100%}
    .buttons{gap:8px}
  }
</style>
</head>
<body>
<div class="wrap" id="top">
<header>
  <h1>重症度・医療・看護必要度実践問題</h1>
  <p class="lead">急性期入院医療の評価で問われやすい、A項目・B項目・C項目、対象となる入院料・加算、2026年度診療報酬改定での見直しを確認します。10カテゴリから1問ずつ、合計10問をランダム出題します。選択肢の順番も毎回変わります。</p>
  <div class="badgeRow">
    <span class="badge">五者択一</span><span class="badge">1問ずつ表示</span><span class="badge">解説あり</span><span class="badge">夜間スマホ対応</span>
  </div>
</header>

<div class="toolbar">
  <div class="progressText" id="progressText">準備中</div>
  <div class="bar"><div id="barFill"></div></div>
</div>

<main class="card" id="quizCard">
  <div class="category" id="category"></div>
  <div class="qno" id="qno"></div>
  <div class="question" id="question"></div>
  <ul class="choices" id="choices"></ul>
  <div class="buttons">
    <button id="answerBtn" disabled>回答</button>
    <button class="secondary" id="nextBtn" style="display:none">次の問題へ</button>
  </div>
  <div class="result" id="resultBox">
    <p class="resultTitle" id="resultTitle"></p>
    <p class="explain" id="explain"></p>
  </div>
  <p class="mini">選択肢をタップしてから「回答」を押してください。誤答時は、選んだ選択肢のどこが違うかを表示します。</p>
</main>

<section class="card summary" id="summary">
  <p class="score" id="score"></p>
  <p id="scoreMsg"></p>
  <div class="buttons"><button id="retryBtn">もう一度ランダム出題</button></div>
  <div class="review" id="review"></div>
</section>

<footer>
  <p>学習用の簡易HTMLです。制度内容は告示・通知等で変更される場合があります。試験直前には公式資料・講義資料等も確認してください。</p>
</footer>
</div>

let quiz = [];
let idx = 0;
let selected = null;
let answered = false;
let results = [];

const el = id => document.getElementById(id);
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function start(){
  quiz = pools.map(p=>({category:p.category, ...shuffle(p.items)[0]}));
  quiz = shuffle(quiz);
  quiz.forEach(q=>q.choices = shuffle(q.choices));
  idx = 0; selected = null; answered = false; results=[];
  el('summary').classList.remove('show');
  el('quizCard').style.display='block';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function render(){
  const q = quiz[idx];
  selected = null; answered = false;
  el('category').textContent = q.category;
  el('qno').textContent = `問題 ${idx+1} / ${quiz.length}`;
  el('question').textContent = q.q;
  el('progressText').textContent = `進捗：${idx+1} / ${quiz.length}`;
  el('barFill').style.width = `${(idx)/quiz.length*100}%`;
  el('answerBtn').disabled = true;
  el('answerBtn').style.display = 'inline-block';
  el('nextBtn').style.display = 'none';
  const rb = el('resultBox');
  rb.className = 'result';
  el('resultTitle').textContent='';
  el('explain').textContent='';
  const ul = el('choices');
  ul.innerHTML='';
  q.choices.forEach((c,i)=>{
    const li=document.createElement('li');
    li.className='choice';
    li.innerHTML=`<span class="letter">${String.fromCharCode(65+i)}</span><span>${c.t}</span>`;
    li.addEventListener('click',()=>{
      if(answered) return;
      selected=i;
      [...ul.children].forEach(x=>x.classList.remove('selected'));
      li.classList.add('selected');
      el('answerBtn').disabled=false;
    });
    ul.appendChild(li);
  });
}
function answer(){
  if(selected===null || answered) return;
  answered=true;
  const q = quiz[idx];
  const c = q.choices[selected];
  const correctIndex = q.choices.findIndex(x=>x.ok);
  const lis=[...el('choices').children];
  lis[correctIndex].classList.add('correct');
  if(!c.ok) lis[selected].classList.add('wrong');
  const rb=el('resultBox');
  rb.className = 'result show ' + (c.ok?'ok':'ng');
  el('resultTitle').textContent = c.ok ? '正解です' : '不正解です';
  const correctText = q.choices[correctIndex].t;
  el('explain').textContent = c.ok ? `正答：${correctText}\n\n${c.why}` : `正答：${correctText}\n\nあなたの選択肢が誤りである理由：${c.why}\n\n補足：${q.choices[correctIndex].why}`;
  results.push({q:q.q, category:q.category, correct:c.ok, selected:c.t, answer:correctText});
  el('answerBtn').style.display='none';
  el('nextBtn').style.display='inline-block';
  el('barFill').style.width = `${(idx+1)/quiz.length*100}%`;
}
function next(){
  if(idx < quiz.length-1){
    idx++;
    render();
    document.getElementById('top').scrollIntoView({behavior:'smooth'});
  }else{
    showSummary();
  }
}
function showSummary(){
  el('quizCard').style.display='none';
  const ok = results.filter(r=>r.correct).length;
  el('progressText').textContent = `完了：${quiz.length}問`;
  el('barFill').style.width = '100%';
  el('score').textContent = `${ok} / ${quiz.length} 問正解`;
  el('scoreMsg').textContent = ok === quiz.length ? '満点です。必要度の基本構造と2026改定の論点がよく整理できています。' : '誤答した問題は、A・B・C項目、対象入院料、急性期病院A/Bの数値を中心に見直しましょう。';
  const review=el('review');
  review.innerHTML='';
  results.forEach((r,i)=>{
    const div=document.createElement('div');
    div.className='reviewItem';
    div.innerHTML=`<strong>${i+1}. ${r.category}</strong><br>${r.correct?'○':'×'} ${r.q}<br><span style="color:var(--muted)">あなたの回答：</span>${r.selected}<br><span style="color:var(--muted)">正答：</span>${r.answer}`;
    review.appendChild(div);
  });
  el('summary').classList.add('show');
  document.getElementById('top').scrollIntoView({behavior:'smooth'});
}
el('answerBtn').addEventListener('click',answer);
el('nextBtn').addEventListener('click',next);
el('retryBtn').addEventListener('click',start);
start();
