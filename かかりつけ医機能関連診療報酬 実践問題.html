<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>かかりつけ医機能関連診療報酬 実践問題</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg2: #111827;
      --card: #182235;
      --card2: #202b40;
      --text: #e5e7eb;
      --muted: #a7b0c0;
      --line: #334155;
      --line2: #475569;
      --accent: #38bdf8;
      --accent2: #0ea5e9;
      --good: #86efac;
      --good-bg: rgba(22, 101, 52, .24);
      --bad: #fca5a5;
      --bad-bg: rgba(127, 29, 29, .28);
      --warn: #fde68a;
      --shadow: rgba(0, 0, 0, .36);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, .18), transparent 32rem),
        linear-gradient(180deg, #0b1120 0%, var(--bg) 45%, #0b1120 100%);
      color: var(--text);
      line-height: 1.75;
      -webkit-text-size-adjust: 100%;
    }
    header {
      padding: 28px 18px 20px;
      border-bottom: 1px solid rgba(148, 163, 184, .2);
    }
    .header-inner, main, footer {
      width: min(920px, 100%);
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.35rem, 5.2vw, 2.05rem);
      line-height: 1.35;
      letter-spacing: .03em;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: .96rem;
    }
    main {
      padding: 16px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }
    .panel, .question-card, .result-card {
      background: color-mix(in srgb, var(--card) 92%, black);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 16px 34px var(--shadow);
    }
    .panel {
      padding: 16px;
      margin: 0 0 14px;
    }
    .status {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(56, 189, 248, .12);
      border: 1px solid rgba(56, 189, 248, .28);
      color: #bae6fd;
      font-weight: 800;
      font-size: .88rem;
    }
    .lead {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: .94rem;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: transform .08s ease, background .2s ease, opacity .2s ease, border-color .2s ease;
      touch-action: manipulation;
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .primary-btn, .secondary-btn {
      min-height: 46px;
      padding: 11px 18px;
    }
    .primary-btn {
      color: #082f49;
      background: linear-gradient(135deg, #7dd3fc, #38bdf8);
    }
    .secondary-btn {
      color: var(--text);
      background: rgba(148, 163, 184, .13);
      border: 1px solid var(--line2);
    }
    .question-card {
      padding: 17px;
      margin: 14px 0;
    }
    .q-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .q-num {
      flex: 0 0 auto;
      min-width: 54px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(56, 189, 248, .16);
      border: 1px solid rgba(56, 189, 248, .35);
      color: #bae6fd;
      font-weight: 900;
      font-size: .9rem;
    }
    .q-title {
      font-weight: 900;
      font-size: clamp(1.02rem, 4vw, 1.18rem);
      line-height: 1.65;
    }
    .statements {
      margin: 12px 0;
      padding: 12px 13px;
      border-radius: 14px;
      background: rgba(15, 23, 42, .58);
      border: 1px solid var(--line);
      color: #dbeafe;
      font-size: .95rem;
    }
    .statements div { margin: 4px 0; }
    .choices {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .choice {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      width: 100%;
      min-height: 54px;
      text-align: left;
      align-items: flex-start;
      color: var(--text);
      background: rgba(30, 41, 59, .72);
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 13px 14px;
      line-height: 1.65;
    }
    .choice.selected {
      background: rgba(14, 165, 233, .16);
      border-color: rgba(125, 211, 252, .75);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, .10);
    }
    .choice.correct {
      background: var(--good-bg);
      border-color: rgba(134, 239, 172, .72);
      color: #dcfce7;
    }
    .choice.wrong {
      background: var(--bad-bg);
      border-color: rgba(252, 165, 165, .72);
      color: #fee2e2;
    }
    .choice.disabled { cursor: default; }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 15px;
    }
    .actions button { flex: 0 1 auto; }
    .explanation {
      display: none;
      margin-top: 15px;
      padding: 14px;
      border-radius: 15px;
      background: rgba(15, 23, 42, .7);
      border: 1px solid var(--line);
      color: #dbeafe;
    }
    .explanation .ok { color: var(--good); font-weight: 900; }
    .explanation .ng { color: var(--bad); font-weight: 900; }
    .why-wrong {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(127, 29, 29, .23);
      border: 1px solid rgba(252, 165, 165, .34);
      color: #fecaca;
    }
    .point {
      margin-top: 10px;
      padding-top: 9px;
      border-top: 1px dashed var(--line2);
      color: var(--muted);
      font-size: .92rem;
    }
    .result-card {
      display: none;
      padding: 18px;
      margin: 14px 0;
      text-align: center;
    }
    .result-card h2 { margin: 0 0 8px; }
    .review {
      text-align: left;
      display: grid;
      gap: 8px;
      margin: 14px 0;
    }
    .review-item {
      padding: 11px 12px;
      border-radius: 13px;
      background: rgba(15, 23, 42, .56);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: .92rem;
    }
    footer {
      padding: 0 16px 30px;
      color: #7c8799;
      font-size: .84rem;
    }
    @media (max-width: 640px) {
      header { padding-top: 22px; }
      main { padding-inline: 12px; }
      .panel, .question-card, .result-card { border-radius: 16px; }
      .status { align-items: stretch; }
      .status .secondary-btn { width: 100%; }
      .actions { display: grid; grid-template-columns: 1fr; }
      .actions button { width: 100%; }
      .choice { font-size: .98rem; padding: 13px 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>かかりつけ医機能関連診療報酬 実践問題</h1>
      <p class="subtitle">機能強化加算、地域包括診療料・地域包括診療加算、生活習慣病管理料、特定疾患療養管理料を中心に、2026年度診療報酬改定における外来医療の機能分化・強化を確認します。</p>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="status">
        <div class="badges">
          <span class="badge" id="progressBadge">1 / 10 問</span>
          <span class="badge" id="scoreBadge">正答 0 問</span>
        </div>
        <button class="secondary-btn" type="button" onclick="startQuiz()">最初からランダム出題</button>
      </div>
      <p class="lead">問題は1問ずつ表示されます。選択肢を1つ選び、「回答」ボタンを押すと正誤判定と解説が表示されます。各カテゴリ3問のプールから毎回ランダムに出題します。</p>
    </section>

    <section id="quiz"></section>

    <section class="result-card" id="resultBox">
      <h2 id="resultTitle">結果</h2>
      <p id="resultMessage"></p>
      <div class="review" id="reviewBox"></div>
      <button class="primary-btn" type="button" onclick="startQuiz()">もう一度ランダム出題する</button>
    </section>
  </main>

  <footer>
    ※ 学習用の実践問題です。令和8年度診療報酬改定の概要資料等に基づいて作成していますが、正式な算定要件・施設基準は告示・通知等で確認してください。
  </footer>

const QUESTIONS_PER_ROUND = 10;
let currentQuestions = [];
let currentIndex = 0;
let selectedIndex = null;
let answeredCurrent = false;
let correctCount = 0;
let history = [];

function shuffle(array) {
  const copied = array.slice();
  for (let i = copied.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = copied[i];
    copied[i] = copied[j];
    copied[j] = temp;
  }
  return copied;
}

function startQuiz() {
  currentQuestions = shuffle(categories).slice(0, QUESTIONS_PER_ROUND).map(function(category) {
    const picked = shuffle(category.items)[0];
    const shuffledChoices = shuffle(picked.choices);
    return Object.assign({}, picked, {
      choices: shuffledChoices,
      answer: shuffledChoices.findIndex(function(choice) { return choice.correct; })
    });
  });
  currentIndex = 0;
  selectedIndex = null;
  answeredCurrent = false;
  correctCount = 0;
  history = [];
  document.getElementById("resultBox").style.display = "none";
  renderQuestion();
  updateBadges();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderQuestion() {
  const quiz = document.getElementById("quiz");
  const q = currentQuestions[currentIndex];
  selectedIndex = null;
  answeredCurrent = false;
  const statementsHtml = q.statements ? '<div class="statements">' + q.statements.map(function(s) {
    return '<div>' + escapeHtml(s) + '</div>';
  }).join("") + '</div>' : "";

  quiz.innerHTML = '' +
    '<article class="question-card" id="questionTop">' +
      '<div class="q-head">' +
        '<div class="q-num">Q' + (currentIndex + 1) + '</div>' +
        '<div class="q-title">' + escapeHtml(q.question) + '</div>' +
      '</div>' +
      statementsHtml +
      '<div class="choices">' +
        q.choices.map(function(choice, index) {
          return '<button type="button" class="choice" id="choice-' + index + '" onclick="selectChoice(' + index + ')">' +
            '<span>' + (index + 1) + '.</span><span>' + escapeHtml(choice.text) + '</span>' +
          '</button>';
        }).join("") +
      '</div>' +
      '<div class="actions">' +
        '<button type="button" class="primary-btn" id="answerBtn" onclick="checkAnswer()" disabled>回答</button>' +
        '<button type="button" class="secondary-btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">' + (currentIndex + 1 === currentQuestions.length ? "結果を見る" : "次の問題へ") + '</button>' +
      '</div>' +
      '<div class="explanation" id="explanation"></div>' +
    '</article>';
  updateBadges();
}

function selectChoice(index) {
  if (answeredCurrent) return;
  selectedIndex = index;
  document.querySelectorAll(".choice").forEach(function(btn) { btn.classList.remove("selected"); });
  document.getElementById("choice-" + index).classList.add("selected");
  document.getElementById("answerBtn").disabled = false;
}

function checkAnswer() {
  if (selectedIndex === null || answeredCurrent) return;
  answeredCurrent = true;
  const q = currentQuestions[currentIndex];
  const selected = q.choices[selectedIndex];
  const isCorrect = selected.correct;
  if (isCorrect) correctCount++;

  document.querySelectorAll(".choice").forEach(function(btn, index) {
    btn.classList.add("disabled");
    if (q.choices[index].correct) btn.classList.add("correct");
  });
  if (!isCorrect) document.getElementById("choice-" + selectedIndex).classList.add("wrong");

  const explanation = document.getElementById("explanation");
  explanation.style.display = "block";
  explanation.innerHTML =
    '<div>' + (isCorrect ? '<span class="ok">正解です。</span>' : '<span class="ng">不正解です。</span>') + '</div>' +
    (!isCorrect ? '<div class="why-wrong">選んだ選択肢が誤りである理由：' + escapeHtml(selected.reason) + '</div>' : '') +
    '<div style="margin-top:10px;">' + escapeHtml(q.explanation) + '</div>' +
    '<div class="point">ポイント：' + escapeHtml(q.point) + '</div>';

  history.push({
    number: currentIndex + 1,
    question: q.question,
    correct: isCorrect,
    selected: selected.text,
    answer: q.choices[q.answer].text
  });

  document.getElementById("answerBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "inline-flex";
  updateBadges();
}

function nextQuestion() {
  if (currentIndex + 1 >= currentQuestions.length) {
    showResult();
    return;
  }
  currentIndex++;
  renderQuestion();
  const top = document.getElementById("questionTop").getBoundingClientRect().top + window.scrollY - 8;
  window.scrollTo({ top: top, behavior: "smooth" });
}

function updateBadges() {
  const total = currentQuestions.length || QUESTIONS_PER_ROUND;
  document.getElementById("progressBadge").textContent = Math.min(currentIndex + 1, total) + " / " + total + " 問";
  document.getElementById("scoreBadge").textContent = "正答 " + correctCount + " 問";
}

function showResult() {
  document.getElementById("quiz").innerHTML = "";
  const resultBox = document.getElementById("resultBox");
  const rate = Math.round((correctCount / currentQuestions.length) * 100);
  document.getElementById("resultTitle").textContent = "結果：" + correctCount + " / " + currentQuestions.length + " 問正解（" + rate + "%）";
  document.getElementById("resultMessage").textContent = rate >= 80
    ? "かなり良い仕上がりです。別の組み合わせで、制度間の違いまで確認しましょう。"
    : "要復習です。機能強化加算＝初診料、地域包括診療料＝継続的・全人的管理、2026年度改定＝BCP・対象患者拡大・包括範囲見直し・特定疾患の見直しを押さえましょう。";
  document.getElementById("reviewBox").innerHTML = history.map(function(item) {
    return '<div class="review-item">' +
      '<strong>Q' + item.number + '：</strong>' + (item.correct ? "○" : "×") + ' ' + escapeHtml(item.question) + '<br>' +
      '<span>選択：' + escapeHtml(item.selected) + '</span><br>' +
      (item.correct ? "" : '<span>正答：' + escapeHtml(item.answer) + '</span>') +
    '</div>';
  }).join("");
  resultBox.style.display = "block";
  window.scrollTo({ top: resultBox.getBoundingClientRect().top + window.scrollY - 12, behavior: "smooth" });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

startQuiz();
</script>
