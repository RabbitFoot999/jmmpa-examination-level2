let quiz=[],current=0,score=0,answered=false;
function shuffle(arr){return arr.map(v=>({v,r:Math.random()})).sort((a,b)=>a.r-b.r).map(x=>x.v)}
function buildQuiz(){quiz=questionPools.map(pool=>{const q=shuffle(pool.questions)[0];return{category:pool.category,q:q.q,exp:q.exp,options:shuffle(q.options)}});quiz=shuffle(quiz)}
function renderQuestion(){
  answered=false;const item=quiz[current];
  document.getElementById("progress").textContent="問題 "+(current+1)+" / "+quiz.length;
  document.getElementById("score").textContent="正答 "+score;
  document.getElementById("category").textContent=item.category;
  document.getElementById("question").textContent=item.q;
  document.getElementById("result").style.display="none";
  document.getElementById("result").className="result";
  document.getElementById("answerBtn").disabled=false;document.getElementById("nextBtn").disabled=true;
  const optionsEl=document.getElementById("options");optionsEl.innerHTML="";
  item.options.forEach((op,i)=>{const label=document.createElement("label");label.className="option";label.innerHTML='<input type="radio" name="answer" value="'+i+'"> '+op.t;optionsEl.appendChild(label)});
  document.getElementById("quizArea").style.display="block";document.getElementById("final").style.display="none";
  window.scrollTo({top:0,behavior:"smooth"});
}
function checkAnswer(){
  if(answered)return;const selected=document.querySelector('input[name="answer"]:checked');
  if(!selected){alert("選択肢を選んでください。");return}
  answered=true;const item=quiz[current];const chosen=item.options[Number(selected.value)];const result=document.getElementById("result");
  if(chosen.c){score++;result.className="result correct";result.innerHTML="<strong>正解です。</strong><div class='explain'>"+item.exp+"</div>"}
  else{const correct=item.options.find(op=>op.c);result.className="result wrong";result.innerHTML="<strong>不正解です。</strong><div class='explain'>正答： "+correct.t+"<br>"+item.exp+"</div>"}
  result.style.display="block";document.getElementById("score").textContent="正答 "+score;
  document.getElementById("answerBtn").disabled=true;document.getElementById("nextBtn").disabled=false;
}
function nextQuestion(){current++;if(current>=quiz.length)showFinal();else renderQuestion()}
function showFinal(){
  document.getElementById("quizArea").style.display="none";const final=document.getElementById("final");
  final.style.display="block";final.innerHTML="<strong>終了です。</strong><br>正答数： "+score+" / "+quiz.length+"<div class='buttons'><button onclick='restart()'>再チャレンジ</button></div>";
  window.scrollTo({top:0,behavior:"smooth"});
}
function restart(){current=0;score=0;buildQuiz();renderQuestion()}
document.getElementById("answerBtn").addEventListener("click",checkAnswer);
document.getElementById("nextBtn").addEventListener("click",nextQuestion);
document.getElementById("restartBtn").addEventListener("click",restart);
restart();
</script>
