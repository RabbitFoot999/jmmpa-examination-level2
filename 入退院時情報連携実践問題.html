<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>入退院時情報連携実践問題</title>
<style>
:root {
  --bg: #0f1720;
  --panel: #16212c;
  --panel2: #1c2a36;
  --text: #edf2f7;
  --muted: #aebdcc;
  --line: #2d3e4f;
  --accent: #8fd3c7;
  --accent2: #d8b46a;
  --good: #80d7a4;
  --bad: #ef9a9a;
  --shadow: rgba(0,0,0,.28);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #172839 0, var(--bg) 42%, #0b1118 100%);
  color: var(--text);
  line-height: 1.75;
}
.container {
  width: min(900px, 100%);
  margin: 0 auto;
  padding: 18px 14px 44px;
}
header {
  padding: 18px 0 12px;
}
h1 {
  font-size: clamp(1.45rem, 5vw, 2.2rem);
  line-height: 1.25;
  margin: 0 0 8px;
  letter-spacing: .02em;
}
.lead {
  color: var(--muted);
  font-size: .96rem;
  margin: 0;
}
.card {
  background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015)), var(--panel);
  border: 1px solid var(--line);
  border-radius: 18px;
  box-shadow: 0 14px 36px var(--shadow);
  padding: 18px;
}
.meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 14px;
}
.badge {
  display: inline-flex;
  align-items: center;
  border: 1px solid var(--line);
  background: var(--panel2);
  color: var(--muted);
  border-radius: 999px;
  padding: 5px 10px;
  font-size: .82rem;
}
.badge strong { color: var(--accent); font-weight: 700; }
.progress {
  height: 10px;
  border-radius: 999px;
  background: #0b121a;
  border: 1px solid var(--line);
  overflow: hidden;
  margin: 14px 0 18px;
}
.progress > div {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width .25s ease;
}
.question {
  white-space: pre-wrap;
  font-weight: 700;
  font-size: clamp(1.03rem, 4.5vw, 1.22rem);
  margin: 4px 0 16px;
}
.options { display: grid; gap: 10px; }
.option {
  width: 100%;
  text-align: left;
  color: var(--text);
  background: #111b25;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px 14px;
  min-height: 56px;
  font-size: 1rem;
  line-height: 1.6;
  cursor: pointer;
}
.option:hover { border-color: #49677f; }
.option.selected {
  outline: 2px solid var(--accent);
  background: #132630;
}
.option.correct { border-color: var(--good); background: rgba(128,215,164,.12); }
.option.wrong { border-color: var(--bad); background: rgba(239,154,154,.12); }
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 18px;
}
button.action {
  border: 0;
  border-radius: 14px;
  padding: 14px 12px;
  font-weight: 800;
  font-size: 1rem;
  color: #071018;
  background: var(--accent);
  cursor: pointer;
}
button.action.secondary {
  color: var(--text);
  background: var(--panel2);
  border: 1px solid var(--line);
}
button.action:disabled {
  opacity: .45;
  cursor: not-allowed;
}
.feedback {
  margin-top: 18px;
  border-radius: 16px;
  padding: 14px;
  border: 1px solid var(--line);
  background: #101923;
  display: none;
}
.feedback.show { display: block; }
.feedback .result { font-weight: 900; margin-bottom: 8px; }
.feedback.good .result { color: var(--good); }
.feedback.bad .result { color: var(--bad); }
.explain { color: var(--muted); }
.summary { display: none; }
.summary.show { display: block; }
.score {
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--accent);
}
.review { margin-top: 14px; display: grid; gap: 10px; }
.review-item {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px;
  background: #101923;
}
.small { color: var(--muted); font-size: .88rem; }
footer {
  color: var(--muted);
  font-size: .82rem;
  padding: 18px 2px 0;
}
@media (max-width: 560px) {
  .container { padding: 12px 10px 32px; }
  .card { padding: 14px; border-radius: 16px; }
  .actions { grid-template-columns: 1fr; }
  .option { padding: 13px 12px; }
}
</style>
</head>
<body>
<div class="container">
<header>
<h1>入退院時情報連携実践問題</h1>
<p class="lead">入院時情報連携加算、退院・退所加算、退院時共同指導加算、施設入所者の入退院連携について、医療経営士2級向けに混同しやすい算定主体と連携場面を確認します。</p>
</header>

<main class="card" id="quizCard">
  <div class="meta">
    <span class="badge">全 <strong id="totalCount">0</strong> 問</span>
    <span class="badge">各カテゴリ3問プールからランダム</span>
    <span class="badge">選択肢も毎回シャッフル</span>
  </div>
  <div class="progress" aria-label="進捗"><div id="bar"></div></div>
  <section id="quizArea">
    <div class="meta"><span class="badge" id="countBadge"></span><span class="badge" id="categoryBadge"></span></div>
    <div class="question" id="questionText"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"><div class="result" id="resultText"></div><div class="explain" id="explainText"></div></div>
    <div class="actions">
      <button class="action" id="answerBtn">回答</button>
      <button class="action secondary" id="nextBtn" disabled>次の問題へ</button>
    </div>
  </section>
  <section class="summary" id="summaryArea">
    <p class="score" id="scoreText"></p>
    <p class="small">間違えた問題は、算定主体（誰が算定するか）と情報の向き（誰から誰へ）を中心に復習してください。</p>
    <div class="review" id="review"></div>
    <div class="actions"><button class="action" id="restartBtn">もう一度ランダム出題</button></div>
  </section>
</main>
<footer>
  <p>GitHub Pages用の単一HTMLです。ファイル名を変更して同じリポジトリにアップロードできます。</p>
</footer>

<script>

の退所時情報提供等が論点となる場面です。居宅介護支援の退院・退所加算ではありません。"}]}]}, {"category": "退院時共同指導加算", "pool": [{"q": "退院時共同指導加算（介護報酬）の理解として、最も適切なものはどれか。", "options": [{"t": "退院前に医療機関の職員と在宅・介護側の職員が共同して、本人・家族等へ退院後の療養・リハビリ等に必要な指導を行う場面で論点となる。", "c": true, "fb": "正解です。単なる書類提供ではなく、退院前カンファレンス等で共同して指導する点が重要です。"}, {"t": "利用者が入院した当日に、ケアマネジャーが病院へ在宅情報を送る評価である。", "c": false, "fb": "これは入院時情報連携加算の場面です。"}, {"t": "病院から退院する際に、介護保険施設が空床情報をウェブサイトに掲載したことだけを評価する。", "c": false, "fb": "空床情報の共有は老健の初期加算等で論点となりますが、退院時共同指導加算の中心ではありません。"}, {"t": "居宅介護支援事業所が病院職員と面談してケアプランを作成する評価であり、共同指導は不要である。", "c": false, "fb": "これは退院・退所加算に近い説明です。退院時共同指導加算では共同指導が中心です。"}, {"t": "入院先病院が介護サービス事業所から情報提供を受けた場合に、介護サービス事業所を介さず診療報酬のみで評価する。", "c": false, "fb": "介護報酬側にも、訪問看護やリハビリテーション事業所等で退院時共同指導の評価があります。"}]}, {"q": "2024年度介護報酬改定で新たに評価された、リハビリテーション事業所における退院時共同指導加算の説明として、最も適切なものはどれか。", "options": [{"t": "訪問・通所リハビリテーション事業所の理学療法士等が、医療機関の退院前カンファレンスに参加し、共同指導を行うことを評価する。", "c": true, "fb": "正解です。退院後早期に連続的で質の高いリハビリテーションへつなげるための評価です。"}, {"t": "介護支援専門員が外来受診に同席し、歯科医師と情報共有した場合に評価する。", "c": false, "fb": "これは通院時情報連携加算の論点です。"}, {"t": "訪問介護員が退院前カンファレンスに参加した場合、訪問介護の退院時共同指導加算として評価する。", "c": false, "fb": "2024年度改定で新たに評価された中心は訪問・通所リハビリテーション事業所の医師・理学療法士等です。訪問介護と混同しないようにします。"}, {"t": "居宅介護支援事業所が入院当日に病院へ情報提供した場合に、退院後のリハビリ計画作成を不要とする評価である。", "c": false, "fb": "入院時情報連携加算とリハビリ計画の情報連携が混ざっています。"}, {"t": "退院後にリハビリを行わない利用者について、退院前カンファレンスの議事録を受け取ることを評価する。", "c": false, "fb": "退院後に介護保険のリハビリテーションを行う際の連携・共同指導が中心です。"}]}, {"q": "次の記述のうち、退院時共同指導加算に関する適切なものの組み合わせはどれか。\n\na　訪問看護では、退院・退所時に主治医等と共同して在宅療養上必要な指導を行う場面がある。\nb　リハビリテーション事業所では、退院前カンファレンスに参加して共同指導を行う評価が設けられた。\nc　居宅介護支援の入院時情報連携加算と同じく、入院当日の情報提供のみを評価する。\nd　共同指導は、退院後の在宅療養・リハビリを切れ目なく進めるための連携として理解できる。\ne　退院時共同指導加算は、老健入所中の利用者が病院へ入院する際に施設側が病院へ情報提供する評価である。", "options": [{"t": "a・b・d", "c": true, "fb": "正解です。共同指導は、退院前に医療機関と在宅・介護側が共同して指導する点が中心です。"}, {"t": "a・c・d", "c": false, "fb": "cが誤りです。入院当日の情報提供は入院時情報連携加算の論点です。"}, {"t": "b・c・e", "c": false, "fb": "c・eが誤りです。施設入所者の入院時情報提供や入院時情報連携とは異なります。"}, {"t": "a・d・e", "c": false, "fb": "eが誤りです。施設側から病 医療機関が介護支援専門員等と連携しても、診療報酬上の評価は設けられていない。", "c": false, "fb": "入退院支援加算、介護支援等連携指導料、退院時共同指導料などが論点となります。"}, {"t": "老健に入所した後の介護保険施設サービスと、退院元病院の診療報酬は、同じ請求単位として国保連へまとめて請求する。", "c": false, "fb": "医療保険の診療報酬と介護保険の介護報酬は請求・算定主体が異なります。"}]}]}];

function shuffle(array) {
  const a = array.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let quiz = [];
let index = 0;
let selected = null;
let answered = false;
let score = 0;
let history = [];

const el = (id) => document.getElementById(id);

function buildQuiz() {
  quiz = QUESTION_POOL.map(cat => {
    const picked = shuffle(cat.pool)[0];
    return { category: cat.category, q: picked.q, options: shuffle(picked.options) };
  });
  quiz = shuffle(quiz);
  index = 0;
  selected = null;
  answered = false;
  score = 0;
  history = [];
  el('totalCount').textContent = quiz.length;
  el('summaryArea').classList.remove('show');
  el('quizArea').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const item = quiz[index];
  selected = null;
  answered = false;
  el('bar').style.width = `${(index / quiz.length) * 100}%`;
  el('countBadge').textContent = `第${index + 1}問 / ${quiz.length}問`;
  el('categoryBadge').textContent = item.category;
  el('questionText').textContent = item.q;
  el('feedback').className = 'feedback';
  el('resultText').textContent = '';
  el('explainText').textContent = '';
  el('answerBtn').disabled = false;
  el('nextBtn').disabled = true;
  el('nextBtn').textContent = index === quiz.length - 1 ? '結果を見る' : '次の問題へ';
  const options = el('options');
  options.innerHTML = '';
  item.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.type = 'button';
    btn.textContent = `${i + 1}．${opt.t}`;
    btn.addEventListener('click', () => {
      if (answered) return;
      selected = i;
      document.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
    options.appendChild(btn);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function checkAnswer() {
  if (selected === null || answered) return;
  answered = true;
  const item = quiz[index];
  const opt = item.options[selected];
  const correctIndex = item.options.findIndex(o => o.c);
  const buttons = document.querySelectorAll('.option');
  buttons.forEach((b, i) => {
    if (item.options[i].c) b.classList.add('correct');
  });
  if (!opt.c) buttons[selected].classList.add('wrong');
  const isCorrect = !!opt.c;
  if (isCorrect) score++;
  const correctText = item.options[correctIndex].t;
  const fb = el('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'good' : 'bad');
  el('resultText').textContent = isCorrect ? '正解です' : '不正解です';
  el('explainText').textContent = isCorrect ? opt.fb : `${opt.fb}

正答：${correctText}`;
  el('answerBtn').disabled = true;
  el('nextBtn').disabled = false;
  history.push({
    category: item.category,
    question: item.q,
    selected: opt.t,
    correct: correctText,
    ok: isCorrect
  });
}

function nextQuestion() {
  if (index < quiz.length - 1) {
    index++;
    renderQuestion();
  } else {
    showSummary();
  }
}

function showSummary() {
  el('bar').style.width = '100%';
  el('quizArea').style.display = 'none';
  el('summaryArea').classList.add('show');
  el('scoreText').textContent = `${quiz.length}問中 ${score}問 正解`;
  const review = el('review');
  review.innerHTML = '';
  history.forEach((h, i) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `<strong>${i + 1}．${h.category}：${h.ok ? '○' : '×'}</strong><br><span class="small">${escapeHtml(h.question).replace(/\n/g, '<br>')}</span><br><br>あなたの回答：${escapeHtml(h.selected)}<br>正答：${escapeHtml(h.correct)}`;
    review.appendChild(div);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escapeHtml(str) {
  return String(str).replace(/[&<>'"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]));
}

el('answerBtn').addEventListener('click', checkAnswer);
el('nextBtn').addEventListener('click', nextQuestion);
el('restartBtn').addEventListener('click', buildQuiz);
buildQuiz();
</script>
