*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(180deg,var(--bg),#020617);color:var(--text);line-height:1.75}header{background:linear-gradient(135deg,#111827,#164e63);padding:30px 18px;border-bottom:1px solid #1f3b4a}.wrap{max-width:960px;margin:0 auto}h1{margin:0 0 10px;font-size:clamp(25px,4vw,38px);line-height:1.25}.lead{margin:0;color:#dbeafe;font-size:15px}main{padding:18px}.panel,.card,.result{background:rgba(23,32,51,.96);border:1px solid var(--line);border-radius:20px;box-shadow:0 14px 34px rgba(0,0,0,.35)}.panel{padding:18px;margin-bottom:18px}.small{color:var(--muted);font-size:13px}.status{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:16px}.stat{background:rgba(15,23,42,.76);border:1px solid var(--line);border-radius:15px;padding:11px 12px}.stat b{display:block;font-size:21px;color:#f8fafc}.stat span{color:var(--muted);font-size:12px}.bar{height:10px;background:#020617;border-radius:999px;overflow:hidden;margin-top:14px;border:1px solid #1e293b}.bar>div{height:100%;width:0;background:linear-gradient(90deg,#38bdf8,#86efac);transition:width .25s ease}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button{border:0;border-radius:999px;padding:11px 17px;font-weight:800;cursor:pointer;font-size:14px}button:disabled{opacity:.55;cursor:default}.primary{background:#0ea5e9;color:#04111f}.secondary{background:#334155;color:#e5e7eb;border:1px solid #475569}.card{padding:20px;margin:16px 0}.qhead{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:9px}.qnum{font-weight:900;color:var(--primary)}.tag,.diff{border-radius:999px;padding:2px 9px;font-size:12px;font-weight:800}.tag{background:#0b3b52;color:#bae6fd;border:1px solid #155e75}.diff{background:var(--warnbg);color:var(--warn);border:1px solid #854d0e}.question{font-size:18px;font-weight:900;margin:10px 0 13px;color:#f8fafc;white-space:pre-line}.options{display:grid;gap:10px}.option{border:1px solid var(--line);background:rgba(15,23,42,.78);border-radius:16px;padding:12px;cursor:pointer;display:flex;gap:10px;align-items:flex-start}.option:hover{background:#172033}.option.selected{border-color:#38bdf8;background:#082f49}.option.correct{background:var(--okbg);border-color:#22c55e;color:#dcfce7}.option.wrong{background:var(--badbg);border-color:#ef4444;color:#fee2e2}.option.missed{background:#143522;border-color:#16a34a;color:#dcfce7}.option input{margin-top:7px;accent-color:#38bdf8}.opttext{font-weight:750}.feedback{display:none;margin-top:14px;padding:13px 15px;border-radius:15px;border:1px solid var(--line);background:#0f172a}.feedback.show{display:block}.feedback.ok{background:var(--okbg);border-color:#22c55e}.feedback.bad{background:var(--badbg);border-color:#ef4444}.explain{margin-top:10px;padding:13px 15px;border-radius:15px;border:1px solid var(--line);background:rgba(15,23,42,.75)}.result{display:none;padding:20px;margin:18px 0}.result.show{display:block}.review{margin-top:12px;display:grid;gap:10px}.review div{border:1px solid var(--line);border-radius:14px;padding:11px 13px;background:rgba(15,23,42,.75)}footer{color:var(--muted);font-size:12px;padding:28px 18px;text-align:center}@media(max-width:720px){.status{grid-template-columns:repeat(2,minmax(0,1fr))}.card{padding:16px}body{font-size:15px}}
</style>

<body>
<header><div class="wrap"><h1>ファイブフォース分析実践問題</h1><p class="lead">病院の具体例を通じて、新規参入、代替品、買い手、売り手、業界内競合の区別を確認する問題です。</p></div></header>
<main class="wrap">
<section class="panel">
<strong>学習できる内容</strong>
<p class="small">基本知識1問と、病院の具体例を交えた4問を出題します。各カテゴリ3問ずつのプールから毎回1問をランダム出題し、選択肢の順番も毎回変わります。</p>
<div class="status"><div class="stat"><b id="total">5</b><span>出題数</span></div><div class="stat"><b id="answered">0</b><span>解答済み</span></div><div class="stat"><b id="correct">0</b><span>正解数</span></div><div class="stat"><b id="rate">0%</b><span>正答率</span></div></div>
<div class="bar"><div id="fill"></div></div><div class="actions"><button class="primary" onclick="restart()">問題をランダム再出題</button><button class="secondary" onclick="showResult()">現在の結果を見る</button></div>
</section>
<section id="quiz"></section>
<section id="result" class="result"><h2>結果</h2><p id="resultText"></p><p class="small" id="hint"></p><div id="review" class="review"></div><div class="actions"><button class="primary" onclick="restart()">再チャレンジする</button><button class="secondary" onclick="scrollQ()">問題へ戻る</button></div></section>
</main>
<footer>医療経営士2級対策用の自習クイズです。迷ったら「誰が圧力をかけているか」を確認してください。</footer>
<script>
const BANK = {"基本知識": [{"q": "ポーターのファイブフォース分析に含まれる5つの力として、最も適切な組み合わせはどれか。", "c": [["新規参入の脅威、代替品の脅威、買い手の交渉力、売り手の交渉力、業界内競合", true, "ファイブフォース分析は、業界の競争構造を5つの力から整理するフレームワークです。"], ["財務の視点、顧客の視点、業務プロセスの視点、学習と成長の視点、地域連携の視点", false, "これはBSCに近い整理です。ファイブフォース分析の5つの力ではありません。"], ["市場浸透、市場開拓、製品開発、多角化、集中戦略", false, "市場浸透・市場開拓・製品開発・多角化はアンゾフの成長マトリックスです。集中戦略はポーターの基本戦略です。"], ["強み、弱み、機会、脅威、課題", false, "強み・弱み・機会・脅威はSWOT分析です。ファイブフォース分析ではありません。"], ["政治、経済、社会、技術、法律", false, "これはPEST分析や外部環境分析に近い整理です。ファイブフォース分析の5つの力ではありません。"]], "e": "ファイブフォース分析では、業界の収益性や競争の厳しさを、新規参入、代替品、買い手、売り手、業界内競合の5つから把握します。"}, {"q": "病院経営にファイブフォース分析を当てはめた場合の説明として、最も適切なものはどれか。", "c": [["同じ医療圏の競合病院、患者・紹介元、医薬品卸・医療機器メーカー、代替サービス、新規参入の可能性を整理する。", true, "病院でも、競合、買い手、売り手、代替品、新規参入の5つの力で整理できます。"], ["病院の財務、顧客、業務プロセス、学習と成長を4視点で整理する。", false, "これはBSCの説明です。"], ["既存市場・新規市場、既存サービス・新規サービスの2軸で成長戦略を整理する。", false, "これはアンゾフの成長マトリックスの説明です。"], ["内部環境と外部環境を、強み・弱み・機会・脅威に分けて整理する。", false, "これはSWOT分析の説明です。"], ["業務を排除、結合、交換・順序変更、簡素化の順に改善する。", false, "これはECRSの説明です。"]], "e": "ファイブフォース分析は、病院がどの相手から競争圧力を受けているか、どこに依存しているかを整理するために使えます。"}, {"q": "ファイブフォース分析における「買い手」と「売り手」の説明として、最も適切なものはどれか。", "c": [["買い手は患者・家族・紹介元など、売り手は医薬品卸・医療機器メーカー・大学医局などである。", true, "病院サービスを利用・選択する側が買い手で、病院に資源を供給する側が売り手です。"], ["買い手は医薬品卸、売り手は患者・家族である。", false, "逆です。医薬品卸は病院に薬を供給する側なので売り手、患者・家族は病院サービスを利用する側なので買い手です。"], ["買い手は行政、売り手は地域住民だけを指す。", false, "行政や地域住民が関係する場合もありますが、ファイブフォースの買い手・売り手をそれだけに限定するのは不適切です。"], ["買い手は病院の理事長、売り手は院長を指す。", false, "理事長や院長は通常、ファイブフォースにおける買い手・売り手として整理しません。"], ["買い手と売り手はいずれも同じ二次医療圏の競合病院を指す。", false, "競合病院は主に業界内競合として整理します。"]], "e": "試験では、買い手と売り手の区別が問われやすいです。患者・家族・紹介元は買い手、薬品・機器・人材・医師派遣元などは売り手として整理します。"}], "新規参入の脅威": [{"q": "急性期病院の新規参入の脅威に関する記述として、最も適切なものはどれか。", "c": [["病床規制、医療計画、高額な設備投資、医師・看護師確保などにより、新規参入は一般に容易ではない。", true, "病院では制度・設備・人材が参入障壁となるため、新しい急性期病院の参入は簡単ではありません。"], ["病院は自由に病床を増やせるため、新規参入の脅威は常に極めて大きい。", false, "病床規制や医療計画があり、病床を自由に増やせるわけではありません。"], ["新規参入の脅威は、患者満足度調査の結果だけで判断する。", false, "患者満足度は重要ですが、新規参入の脅威は制度、投資、人材、地域の競争環境などを含めて判断します。"], ["新規参入の脅威は、医薬品卸の価格交渉力を意味する。", false, "医薬品卸の価格交渉力は売り手の交渉力に該当します。"], ["新規参入の脅威は、既存患者に新しいサービスを提供する戦略である。", false, "既存患者に新しいサービスを提供するのは、アンゾフの製品開発戦略に近い内容です。"]], "e": "新規参入の脅威では、新しい病院・診療所・介護事業者が地域に入りやすいかを見ます。病院では、病床規制、医療計画、施設基準、設備投資、人材確保が重要です。"}, {"q": "ある地域で新たに回復期リハビリテーション病棟を開設しようとする法人がある。しかし、リハビリ専門職の確保が難しく、病床再編にも地域医療構想との調整が必要である。この状況をファイブフォース分析で見る場合、最も近いものはどれか。", "c": [["新規参入の脅威", true, "新たな病棟・機能が地域に参入しやすいかを見ているため、新規参入の脅威です。人材確保や制度調整は参入障壁になります。"], ["代替品の脅威", false, "設問は病院サービスが別サービスに置き換わる話ではなく、新たな参入のしやすさを扱っています。"], ["買い手の交渉力", false, "患者や紹介元が病院を選ぶ力の話ではありません。"], ["売り手の交渉力", false, "人材確保の要素は売り手にも関係しますが、設問全体は新規参入のしやすさを問う内容です。"], ["業界内競合", false, "既存病院同士の競争というより、新たな病棟機能の参入可能性を見ています。"]], "e": "新規参入の脅威を考える際には、制度上の制約、設備投資、人材確保、地域内の既存事業者の強さを確認します。"}, {"q": "医療圏内で新しい有床診療所を開設しようとしても、病床の確保、医師・看護師の採用、医療機器投資が大きな負担となる。この内容はファイブフォース分析のどれに最も関係するか。", "c": [["新規参入の脅威", true, "新しい医療機関が参入する際の障壁を説明しているため、新規参入の脅威に関係します。"], ["買い手の交渉力", false, "患者や紹介元が病院を選ぶ力ではありません。"], ["売り手の交渉力", false, "医療機器投資や人材確保は売り手にも関連しますが、設問では新しい医療機関が参入しにくい理由を述べています。"], ["代替品の脅威", false, "病院サービスが他サービスに置き換えられる話ではありません。"], ["業界内競合", false, "既存事業者同士の競争より、新規開設のしにくさが中心です。"]], "e": "参入障壁が高いほど、新規参入の脅威は小さくなります。医療では制度、人材、設備、地域連携が参入障壁になりやすいです。"}], "代替品の脅威": [{"q": "慢性疾患の軽症外来について、患者の一部がオンライン診療や近隣診療所での管理に移る可能性がある。この状況をファイブフォース分析で見る場合、最も適切なものはどれか。", "c": [["代替品の脅威", true, "病院外来の一部がオンライン診療や診療所に置き換わる可能性を見ているため、代替品の脅威です。"], ["新規参入の脅威", false, "新しい医療機関が参入する話ではなく、既存サービスが別の提供形態に置き換わる可能性を扱っています。"], ["買い手の交渉力", false, "患者の選択行動も関係しますが、設問の中心は病院外来が代替サービスに置き換わる可能性です。"], ["売り手の交渉力", false, "医薬品卸や医療機器メーカーなど供給側の交渉力ではありません。"], ["業界内競合", false, "競合病院同士の競争ではなく、別サービスへの置き換え可能性です。"]], "e": "代替品の脅威では、病院のサービスが診療所、在宅医療、オンライン診療、介護サービス、民間ヘルスケアなどに置き換わる可能性を考えます。"}, {"q": "入院リハビリの一部について、退院後に介護保険の通所リハビリや訪問リハビリへ移行するケースが増えている。この状況をファイブフォース分析で見る場合、最も近いものはどれか。", "c": [["代替品の脅威", true, "病院で提供していたリハビリの一部が、介護保険サービスに置き換わる可能性を示しているため、代替品の脅威です。"], ["新規参入の脅威", false, "新しい病院や事業者が参入しやすいかではなく、病院機能の一部が別サービスに移る話です。"], ["売り手の交渉力", false, "リハビリ専門職などの供給側交渉力ではありません。"], ["買い手の交渉力", false, "利用者の選択も関係しますが、設問の中心は病院サービスが介護サービスに置き換わる可能性です。"], ["業界内競合", false, "同じ病院同士の競争ではなく、医療サービスと介護サービスの代替関係です。"]], "e": "医療と介護の境界領域では、病院サービスの一部が介護保険サービスに移ることがあり、代替品の脅威として整理できます。"}, {"q": "地域住民の健康相談について、病院外来ではなく、薬局の健康サポート機能や民間のヘルスケアアプリを利用する人が増えている。この内容はどれに該当するか。", "c": [["代替品の脅威", true, "病院外来や相談機能が、薬局や民間アプリなど別サービスに置き換わる可能性を示しているため、代替品の脅威です。"], ["新規参入の脅威", false, "新しい病院が参入する話ではありません。"], ["売り手の交渉力", false, "医薬品卸やベンダーなど供給側の力ではありません。"], ["業界内競合", false, "同じ病院同士の競争ではなく、別サービスへの置き換えです。"], ["責任会計", false, "責任会計は管理会計の制度であり、ファイブフォース分析の項目ではありません。"]], "e": "高度急性期医療や救急医療は代替されにくい一方、軽症外来、慢性疾患管理、健康相談、予防領域では代替品の脅威が相対的に高くなります。"}], "買い手・売り手の交渉力": [{"q": "地域の診療所が、紹介先として複数の急性期病院を比較し、返書の速さや受入体制を見て紹介先を選んでいる。この状況をファイブフォース分析で見る場合、最も適切なものはどれか。", "c": [["買い手の交渉力", true, "紹介元診療所が複数の病院を比較して紹介先を選ぶ力を持っているため、買い手の交渉力です。"], ["売り手の交渉力", false, "紹介元診療所は病院に資源を供給する売り手というより、患者紹介先を選ぶ買い手側として整理できます。"], ["新規参入の脅威", false, "新しい病院が参入する話ではありません。"], ["代替品の脅威", false, "病院機能が別サービスに置き換わる話ではありません。"], ["業界内競合", false, "競合病院の存在も背景にありますが、設問の中心は紹介元が選択権を持っている点です。"]], "e": "買い手には患者・家族だけでなく、紹介元診療所、ケアマネジャー、介護施設、企業健診の契約先なども含めて考えられます。"}, {"q": "病院が特定メーカーの手術支援機器を導入しており、保守契約や消耗品購入を他社に切り替えにくい。この状況をファイブフォース分析で見る場合、最も適切なものはどれか。", "c": [["売り手の交渉力", true, "医療機器メーカーが病院に必要な機器・保守・消耗品を供給しており、切り替えにくいため、売り手の交渉力が強い状況です。"], ["買い手の交渉力", false, "患者や紹介元が病院を選ぶ力ではありません。"], ["新規参入の脅威", false, "新しい医療機関が参入する話ではありません。"], ["代替品の脅威", false, "病院サービスが別サービスに置き換わる話ではありません。"], ["業界内競合", false, "競合病院との競争ではなく、病院と供給業者の関係です。"]], "e": "売り手には、医薬品卸、医療材料卸、医療機器メーカー、電子カルテベンダー、人材紹介会社、大学医局などが含まれます。"}, {"q": "看護師不足が続き、病院が人材紹介会社に依存して採用しているため、紹介手数料の負担が大きくなっている。この状況をファイブフォース分析で見る場合、最も近いものはどれか。", "c": [["売り手の交渉力", true, "人材紹介会社は病院に人材確保の手段を提供する側であり、依存度が高いと売り手の交渉力が強くなります。"], ["買い手の交渉力", false, "患者や紹介元が病院を選ぶ力ではありません。"], ["代替品の脅威", false, "病院サービスが別サービスに置き換わる話ではありません。"], ["新規参入の脅威", false, "新しい病院が参入しやすいかを扱う内容ではありません。"], ["業界内競合", false, "人材採用競争という背景はありますが、設問の中心は人材紹介会社への依存と手数料負担です。"]], "e": "医療経営では、医薬品・医療材料だけでなく、人材や医師派遣元も売り手として整理できます。"}], "業界内競合": [{"q": "同じ二次医療圏内に急性期病院が複数あり、救急搬送患者や紹介入院患者の受入をめぐって競争している。この状況をファイブフォース分析で見る場合、最も適切なものはどれか。", "c": [["業界内競合", true, "同じ医療圏の病院同士が患者受入や紹介をめぐって競争しているため、業界内競合です。"], ["新規参入の脅威", false, "新しい病院が参入する話ではなく、既存病院同士の競争です。"], ["代替品の脅威", false, "病院サービスが別サービスに置き換わる話ではありません。"], ["買い手の交渉力", false, "患者や紹介元の選択権も背景にありますが、設問の中心は病院同士の競争です。"], ["売り手の交渉力", false, "医薬品卸や医療機器メーカーなど供給側の力ではありません。"]], "e": "業界内競合では、同じ医療圏や近接医療圏の病院、診療所、介護事業者との競争を見ます。"}, {"q": "近隣に整形外科クリニックが増え、同じ外来患者やリハビリ患者をめぐって競争が強くなっている。この状況をファイブフォース分析で見る場合、最も適切なものはどれか。", "c": [["業界内競合", true, "同じ地域で同種の患者をめぐって医療機関同士が競争しているため、業界内競合です。"], ["新規参入の脅威", false, "新しいクリニックが増えた背景は新規参入にも関係しますが、設問の中心は現在の競争が強くなっている点です。"], ["代替品の脅威", false, "整形外科クリニックは同じ医療サービスの競合であり、別サービスへの置き換えとは限りません。"], ["買い手の交渉力", false, "患者の選択肢が増える点は関係しますが、設問の中心は医療機関同士の競争です。"], ["売り手の交渉力", false, "供給業者の交渉力ではありません。"]], "e": "業界内競合は、病院同士だけでなく、診療所、回復期病院、健診センター、介護事業者などとの競争として現れます。"}, {"q": "企業健診を行う複数の医療機関が、価格、予約の取りやすさ、結果報告の速さで競争している。この状況をファイブフォース分析で見る場合、最も近いものはどれか。", "c": [["業界内競合", true, "同じ健診サービスを提供する医療機関同士の競争であるため、業界内競合です。"], ["買い手の交渉力", false, "契約先企業の選択力も関係しますが、設問の中心は医療機関同士の競争です。"], ["売り手の交渉力", false, "健診機器メーカーや検査会社など供給側の交渉力ではありません。"], ["代替品の脅威", false, "病院サービスが別サービスに置き換わるというより、同種サービス間の競争です。"], ["市場浸透戦略", false, "市場浸透戦略はアンゾフの成長戦略であり、ファイブフォース分析の項目ではありません。"]], "e": "同じサービスを提供する医療機関が、価格・品質・利便性・スピードなどで競争する場合は、業界内競合として整理します。"}]};
const PER_ROUND=5;let qs=[],idx=0,answered=0,correct=0,records=[];
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function sh(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function make(raw,cat){let cs=sh(raw.c).map(x=>({text:x[0],correct:x[1],reason:x[2]}));return {cat,q:raw.q,exp:raw.e,choices:cs,answered:false,selected:null,correctIndex:cs.findIndex(c=>c.correct)}}
function sample(){let out=[];for(const cat of sh(Object.keys(BANK))){out.push(make(sh(BANK[cat])[0],cat));if(out.length>=PER_ROUND)break}return sh(out)}
function restart(){qs=sample();idx=0;answered=0;correct=0;records=[];document.getElementById("result").classList.remove("show");render();window.scrollTo({top:0,behavior:"smooth"})}
function render(){let q=qs[idx];let opts=q.choices.map((c,i)=>{let cls="option";if(q.selected===i&&!q.answered)cls+=" selected";if(q.answered&&c.correct)cls+=q.selected===i?" correct":" missed";if(q.answered&&q.selected===i&&!c.correct)cls+=" wrong";return `<label class="${cls}" onclick="selectChoice(${i})"><input type="radio" name="choice" ${q.selected===i?"checked":""} ${q.answered?"disabled":""}><span class="opttext">${i+1}. ${esc(c.text)}</span></label>`}).join("");let fb=q.answered?feedback(q):"";document.getElementById("quiz").innerHTML=`<article class="card" id="qtop"><div class="qhead"><span class="qnum">問${idx+1} / ${qs.length}</span><span class="tag">${esc(q.cat)}</span><span class="diff">${q.cat==="基本知識"?"基本":"具体例"}</span></div><div class="question">${esc(q.q)}</div><div class="options">${opts}</div><div class="actions"><button class="primary" onclick="submit()" ${q.answered?"disabled":""}>回答</button><button class="secondary" onclick="prev()" ${idx===0?"disabled":""}>前の問題へ</button><button class="secondary" onclick="next()" ${idx===qs.length-1?"disabled":""}>次の問題へ</button></div>${fb}</article>`;status()}
function feedback(q){let s=q.choices[q.selected],good=s.correct,ans=q.choices[q.correctIndex];return `<div class="feedback show ${good?"ok":"bad"}"><strong>${good?"正解です。":"不正解です。"} 正解：${q.correctIndex+1}. ${esc(ans.text)}</strong><br>${good?esc(s.reason):"選択した答えが誤りである理由："+esc(s.reason)}<div class="explain"><strong>解説：</strong>${esc(q.exp)}</div></div>`}
function selectChoice(i){let q=qs[idx];if(q.answered)return;q.selected=i;render()}
function submit(){let q=qs[idx];if(q.answered)return;if(q.selected===null){alert("選択肢を1つ選んでから「回答」を押してください。");return}q.answered=true;answered++;if(q.choices[q.selected].correct)correct++;records[idx]={correct:q.choices[q.selected].correct,cat:q.cat,selected:q.choices[q.selected].text,answer:q.choices[q.correctIndex].text};render();if(answered===qs.length)showResult()}
function prev(){if(idx>0){idx--;render();scrollQ()}}
function next(){if(idx<qs.length-1){idx++;render();scrollQ()}}
function status(){document.getElementById("total").textContent=qs.length;document.getElementById("answered").textContent=answered;document.getElementById("correct").textContent=correct;let r=answered?Math.round(correct/answered*100):0;document.getElementById("rate").textContent=r+"%";document.getElementById("fill").style.width=(answered/qs.length*100)+"%"}
function showResult(){let r=answered?Math.round(correct/answered*100):0;document.getElementById("resultText").innerHTML=`<strong>${answered}問解答 / ${qs.length}問中 ${correct}問正解（正答率 ${r}%）</strong>`;document.getElementById("hint").textContent=r>=90?"かなり定着しています。":r>=70?"良いペースです。買い手と売り手の区別を確認しましょう。":"まずは、新規参入・代替品・買い手・売り手・業界内競合の5つを整理しましょう。";let wrong=records.map((x,i)=>x&&!x.correct?`<div><strong>問${i+1}（${esc(x.cat)}）</strong><br>選択：${esc(x.selected)}<br>正解：${esc(x.answer)}</div>`:"").join("");document.getElementById("review").innerHTML=wrong||(answered?'<div>誤答はありません。</div>':'');document.getElementById("result").classList.add("show");document.getElementById("result").scrollIntoView({behavior:"smooth",block:"start"})}
function scrollQ(){let e=document.getElementById("qtop");if(e)e.scrollIntoView({behavior:"smooth",block:"start"})}
restart();
</script>
