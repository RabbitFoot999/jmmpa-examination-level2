<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>在宅・訪問に関する医療介護実践問題</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #182235;
      --panel2: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #334155;
      --accent: #38bdf8;
      --accent2: #a78bfa;
      --ok: #34d399;
      --bad: #fb7185;
      --warn: #fbbf24;
      --btn: #1f2937;
      --btn2: #273449;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", Meiryo, sans-serif;
      background: radial-gradient(circle at top left, rgba(56,189,248,.16), transparent 34rem), var(--bg);
      color: var(--text);
      line-height: 1.75;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: 18px 14px 44px; }
    header {
      background: linear-gradient(135deg, rgba(24,34,53,.96), rgba(17,24,39,.96));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid rgba(56,189,248,.35);
      background: rgba(56,189,248,.08);
      color: #bae6fd;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 10px;
    }
    h1 { margin: 0; font-size: clamp(24px, 6vw, 38px); line-height: 1.25; letter-spacing: .02em; }
    .lead { margin: 12px 0 0; color: var(--muted); font-size: 14px; }
    .meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
    .meta div { border: 1px solid var(--line); border-radius: 14px; padding: 10px; background: rgba(15,23,42,.55); }
    .meta strong { display: block; font-size: 18px; color: #f8fafc; }
    .meta span { color: var(--muted); font-size: 12px; }
    main { margin-top: 16px; }
    .card {
      background: rgba(24,34,53,.96);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 16px 44px rgba(0,0,0,.23);
    }
    .question-head { padding: 18px; border-bottom: 1px solid var(--line); background: rgba(17,24,39,.72); }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
    .chip { display: inline-flex; align-items: center; border-radius: 999px; background: rgba(148,163,184,.12); border: 1px solid rgba(148,163,184,.2); padding: 4px 10px; color: #cbd5e1; font-size: 12px; }
    .result-chip { font-weight: 700; }
    .result-ok { color: var(--ok); border-color: rgba(52,211,153,.4); background: rgba(52,211,153,.09); }
    .result-bad { color: var(--bad); border-color: rgba(251,113,133,.4); background: rgba(251,113,133,.09); }
    .qtext { margin: 14px 0 0; font-size: 18px; font-weight: 760; line-height: 1.75; }
    .choices { padding: 16px; display: grid; gap: 10px; }
    .choice {
      width: 100%; text-align: left; color: var(--text);
      background: rgba(15,23,42,.72);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 13px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.7;
      display: flex; gap: 10px; align-items: flex-start;
      transition: transform .08s ease, border-color .12s ease, background .12s ease;
    }
    .choice:active { transform: scale(.995); }
    .choice:hover { border-color: rgba(56,189,248,.5); background: rgba(30,41,59,.92); }
    .choice.selected { border-color: rgba(56,189,248,.9); background: rgba(14,116,144,.20); }
    .choice.correct { border-color: rgba(52,211,153,.8); background: rgba(6,78,59,.35); }
    .choice.wrong { border-color: rgba(251,113,133,.8); background: rgba(127,29,29,.32); }
    .num {
      flex: 0 0 28px; height: 28px; display: grid; place-items: center;
      border-radius: 999px; background: rgba(148,163,184,.12); color: #cbd5e1; font-weight: 700;
    }
    .mark { margin-left: auto; font-weight: 800; }
    .controls { display: flex; gap: 10px; justify-content: space-between; align-items: center; padding: 16px; border-top: 1px solid var(--line); background: rgba(17,24,39,.7); }
    .navBtns { display: flex; gap: 8px; }
    button.action {
      appearance: none; border: 1px solid rgba(148,163,184,.25); border-radius: 14px;
      background: var(--btn); color: var(--text); font-weight: 700;
      padding: 11px 14px; min-height: 44px; cursor: pointer;
    }
    button.action.primary { background: linear-gradient(135deg, #0ea5e9, #7c3aed); border: none; color: white; min-width: 112px; }
    button.action:disabled { opacity: .45; cursor: not-allowed; }
    .explain { padding: 16px 18px; border-top: 1px solid var(--line); background: rgba(15,23,42,.55); }
    .explain h3 { margin: 0 0 8px; font-size: 16px; }
    .explain p { margin: 0; color: #d1d5db; }
    .wrongReason { margin-top: 12px; padding: 12px; border: 1px solid rgba(251,113,133,.25); border-radius: 14px; background: rgba(127,29,29,.18); }
    .progress { margin-top: 16px; display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
    .dot { height: 8px; border-radius: 999px; background: rgba(148,163,184,.25); }
    .dot.done { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    footer { margin-top: 16px; background: rgba(24,34,53,.92); border: 1px solid var(--line); border-radius: 20px; padding: 16px; display: flex; gap: 12px; justify-content: space-between; align-items: center; }
    .small { color: var(--muted); font-size: 13px; }
    @media (max-width: 640px) {
      .wrap { padding: 12px 10px 36px; }
      header { padding: 18px 14px; border-radius: 18px; }
      .meta { grid-template-columns: 1fr; }
      .qtext { font-size: 16px; }
      .choice { font-size: 14px; padding: 12px; }
      .controls { flex-direction: column; align-items: stretch; }
      .navBtns { display: grid; grid-template-columns: 1fr 1fr; }
      button.action.primary { width: 100%; }
      footer { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="badge">医療経営士2級 専門分野</div>
      <h1>在宅・訪問に関する医療介護実践問題</h1>
      <p class="lead">訪問診療、往診、在宅時医学総合管理料、訪問看護、訪問リハビリテーション、在宅患者訪問薬剤管理指導料、居宅療養管理指導、2026年度診療報酬改定の在宅・訪問系論点を確認します。各カテゴリ3問のプールから1問ずつ、合計10問をランダム出題します。</p>
      <div class="meta">
        <div><strong id="scoreBox">0 / 0</strong><span>正答数 / 回答済み</span></div>
        <div><strong>10問</strong><span>毎回ランダム出題</span></div>
        <div><strong>5択</strong><span>選択後に回答ボタン</span></div>
      </div>
      <div class="progress" id="progress"></div>
    </header>

    <main class="card" id="quizCard">
      <div class="question-head">
        <div class="row">
          <span class="chip" id="qMeta">問1 / 10</span>
          <span class="chip result-chip" id="resultChip" style="display:none"></span>
        </div>
        <div class="qtext" id="questionText"></div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="controls">
        <button class="action primary" id="answerBtn">回答</button>
        <div class="navBtns">
          <button class="action" id="prevBtn">前へ</button>
          <button class="action" id="nextBtn">次へ</button>
        </div>
      </div>
      <div class="explain" id="explain" style="display:none"></div>
    </main>

    <footer>
      <div>
        <strong id="footerScore">結果：0 / 0</strong>
        <div class="small" id="footerMsg">1問ずつ回答し、解説を確認しながら進めてください。</div>
      </div>
      <button class="action" id="resetBtn">再チャレンジ</button>
    </footer>
  </div>

はない。"], "answer": 0, "explanation": "在医総管は、在宅患者への計画的・継続的な医学管理を月単位で評価する診療報酬です。訪問そのものを評価する訪問診療料とは役割が異なります。", "wrong": ["正解です。在医総管は月単位の医学管理を評価します。", "1回ごとの訪問行為は訪問診療料の考え方です。", "訪問看護を評価するものではありません。", "在医総管は診療報酬です。居宅療養管理指導は介護報酬です。", "訪問診療料と在医総管は評価対象が異なるため、関係を整理して併せて考えます。"]}, {"id": "zaikan_2", "question": "訪問診療料と在宅時医学総合管理料の関係として、最も適切なものはどれか。", "choices": ["訪問診療料は訪問診療の実施を評価し、在医総管は計画的・継続的な医学管理を評価する。", "訪問診療料は月単位の管理、在医総管は1回ごとの訪問行為を評価する。", "両者はいずれも訪問看護ステーションが算定する。", "両者はいずれも介護報酬として請求される。", "両者は同じ内容を評価するため、在宅医療では区別しない。"], "answer": 0, "explanation": "訪問診療料は医師が実際に訪問して診療した行為の評価、在医総管は在宅患者を計画的・継続的に医学管理する評価です。", "wrong": ["正解です。訪問診療料は行為、在医総管は管理の評価です。", "説明が逆です。", "訪問看護ステーションが算定する評価ではありません。", "いずれも診療報酬です。", "評価対象が異なるため、区別して整理します。"]}, {"id": "zaikan_3", "question": "施設入居時等医学総合管理料に関する説明として、最も適切なものはどれか。", "choices": ["有料老人ホームやサービス付き高齢者向け住宅等の入居者への医学管理で関係する。", "入院中の患者に対する退院支援を評価する入院料である。", "介護老人保健施設の入所料として介護報酬で算定される。", "訪問看護ステーションが同一建物の利用者へ訪問した場合に算定する。", "在宅時医学総合管理料とは異なり、訪問診療との関係を考えない点数である。"], "answer": 0, "explanation": "施設入居時等医学総合管理料は、有料老人ホーム、サービス付き高齢者向け住宅等の入居者に対する医学管理で関係します。在医総管との対象の違いを押さえます。", "wrong": ["正解です。施設等の入居者に対する医学管理で関係します。", "退院支援を評価する入院料ではありません。", "施設総管は診療報酬であり、老健の入所料ではありません。", "訪問看護ステーションが算定する訪問看護の評価ではありません。", "施設総管も訪問診療を前提とする医学管理の評価として理解します。"]}]}, {"id": "insurance_mix", "label": "診療報酬・介護報酬の区別", "pool": [{"id": "insurance_mix_1", "question": "医師が行う居宅療養管理指導について、最も適切なものはどれか。", "choices": ["介護報酬により請求される介護保険サービスである。", "診療報酬により請求される医療保険サービスである。", "訪問診療料と同一の診療報酬である。", "訪問看護ステーションのみが算定できる。", "医師が行う場合は医療保険、薬剤師が行う場合は介護保険である。"], "answer": 0, "explanation": "居宅療養管理指導は介護保険サービスであり、医師が行う場合も介護報酬により請求されます。医師が訪問するから医療保険、と考えないことが重要です。", "wrong": ["正解です。居宅療養管理指導は介護報酬です。", "医師が行う場合でも居宅療養管理指導は介護報酬です。", "訪問診療料とは別の制度です。", "医師、歯科医師、薬剤師、管理栄養士等が関係します。", "職種だけで医療保険・介護保険が決まるわけではありません。"]}, {"id": "insurance_mix_2", "question": "診療報酬と介護報酬の区別として、最も適切なものはどれか。", "choices": ["訪問診療料と往診料は診療報酬、居宅療養管理指導は介護報酬である。", "訪問診療料、往診料、居宅療養管理指導はいずれも診療報酬である。", "在宅時医学総合管理料と施設入居時等医学総合管理料はいずれも介護報酬である。", "訪問看護は、要介護認定者であれば常に医           console.assert(q.choices.length === 5, q.id + " は5択であること");
          console.assert(q.wrong.length === 5, q.id + " は誤答解説が5つあること");
          console.assert(Number.isInteger(q.answer) && q.answer >= 0 && q.answer < 5, q.id + " の正答番号が有効であること");
        });
      });
    }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    function buildQuiz() {
      return categories.map(function(cat) {
        const q = shuffle(cat.pool)[0];
        const choices = shuffle(q.choices.map(function(text, originalIndex) {
          return { text: text, originalIndex: originalIndex };
        }));
        return Object.assign({}, q, { category: cat.label, displayChoices: choices });
      });
    }

    function score() {
      let answered = Object.keys(submitted).length;
      let correct = 0;
      quiz.forEach(function(q) {
        if (submitted[q.id] && selected[q.id] === q.answer) correct++;
      });
      return { answered: answered, correct: correct };
    }

    function renderProgress() {
      const box = document.getElementById("progress");
      box.innerHTML = "";
      quiz.forEach(function(q) {
        const d = document.createElement("div");
        d.className = "dot" + (submitted[q.id] ? " done" : "");
        box.appendChild(d);
      });
    }

    function render() {
      const q = quiz[current];
      const isSubmitted = !!submitted[q.id];
      const picked = selected[q.id];
      const isCorrect = isSubmitted && picked === q.answer;
      const sc = score();

      document.getElementById("scoreBox").textContent = sc.correct + " / " + sc.answered;
      document.getElementById("footerScore").textContent = "結果：" + sc.correct + " / " + sc.answered;
      document.getElementById("footerMsg").textContent = sc.answered < 10 ? "1問ずつ回答し、解説を確認しながら進めてください。" : (sc.correct >= 8 ? "よく定着しています。再チャレンジで別問題に入れ替わります。" : "解説を確認してから再チャレンジしましょう。");
      document.getElementById("qMeta").textContent = "問" + (current + 1) + " / 10　" + q.category;
      document.getElementById("questionText").textContent = q.question;

      const chip = document.getElementById("resultChip");
      if (isSubmitted) {
        chip.style.display = "inline-flex";
        chip.textContent = isCorrect ? "正解" : "不正解";
        chip.className = "chip result-chip " + (isCorrect ? "result-ok" : "result-bad");
      } else {
        chip.style.display = "none";
      }

      const choicesBox = document.getElementById("choices");
      choicesBox.innerHTML = "";
      q.displayChoices.forEach(function(choice, idx) {
        const btn = document.createElement("button");
        const isPicked = picked === choice.originalIndex;
        const isAnswer = q.answer === choice.originalIndex;
        let cls = "choice";
        if (!isSubmitted && isPicked) cls += " selected";
        if (isSubmitted && isAnswer) cls += " correct";
        if (isSubmitted && isPicked && !isAnswer) cls += " wrong";
        btn.className = cls;
        btn.type = "button";
        btn.disabled = isSubmitted;
        btn.onclick = function() {
          selected[q.id] = choice.originalIndex;
          render();
        };

        const num = document.createElement("span");
        num.className = "num";
        num.textContent = String(idx + 1);
        const txt = document.createElement("span");
        txt.textContent = choice.text;
        btn.appendChild(num);
        btn.appendChild(txt);
        if (isSubmitted && isAnswer) {
          const mark = document.createElement("span"); mark.className = "mark"; mark.textContent = "○"; btn.appendChild(mark);
        }
        if (isSubmitted && isPicked && !isAnswer) {
          const mark = document.createElement("span"); mark.className = "mark"; mark.textContent = "×"; btn.appendChild(mark);
        }
        choicesBox.appendChild(btn);
      });

      const explain = document.getElementById("explain");
      if (isSubmitted) {
        const wrongBlock = !isCorrect ? '<div class="wrongReason"><strong>選んだ回答が誤りである理由</strong><p>' + escapeHtml(q.wrong[picked]) + '</p></div>' : '';
        explain.innerHTML = '<h3>解説</h3><p>' + escapeHtml(q.explanation) + '</p>' + wrongBlock;
        explain.style.display = "block";
      } else {
        explain.style.display = "none";
        explain.innerHTML = "";
      }

      document.getElementById("answerBtn").disabled = picked === undefined || isSubmitted;
      document.getElementById("prevBtn").disabled = current === 0;
      document.getElementById("nextBtn").disabled = current === quiz.length - 1;
      renderProgress();
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function(ch) {
        return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch] || ch;
      });
    }

    function init() {
      assertPool();
      quiz = buildQuiz();
      current = 0;
      selected = Object.create(null);
      submitted = Object.create(null);
      console.assert(quiz.length === 10, "1回の出題は10問であること");
      console.assert(quiz.every(function(q) { return q.displayChoices.length === 5; }), "表示選択肢は5つであること");
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.getElementById("answerBtn").onclick = function() {
      const q = quiz[current];
      if (selected[q.id] === undefined) return;
      submitted[q.id] = true;
      render();
    };
    document.getElementById("prevBtn").onclick = function() { current = Math.max(0, current - 1); render(); document.getElementById("quizCard").scrollIntoView({ behavior: "smooth", block: "start" }); };
    document.getElementById("nextBtn").onclick = function() { current = Math.min(quiz.length - 1, current + 1); render(); document.getElementById("quizCard").scrollIntoView({ behavior: "smooth", block: "start" }); };
    document.getElementById("resetBtn").onclick = init;

    init();
  </script>
</body>
</html>
