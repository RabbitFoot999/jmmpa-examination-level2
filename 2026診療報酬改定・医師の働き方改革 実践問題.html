let quiz=[],current=0,score=0,answered=false;

function nextQuestion(){current++;if(current>=quiz.length)showFinal();else renderQuestion()}
function showFinal(){document.getElementById("quizArea").style.display="none";const final=document.getElementById("final");final.style.display="block";const pct=Math.round(score/quiz.length*100);let msg="復習しましょう。";if(pct>=80)msg="よく定着しています。";if(pct===100)msg="満点です。";final.innerHTML='<strong>終了です。</strong><br>正答数：'+score+' / '+quiz.length+'（'+pct+'%）<br>'+msg+'<div class="buttons"><button onclick="restart()">再チャレンジ</button></div><p class="small">再チャレンジすると、各カテゴリの問題と選択肢の順番が変わります。</p>';document.getElementById("top").scrollIntoView({behavior:"smooth",block:"start"})}
