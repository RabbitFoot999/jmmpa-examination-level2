<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保険外併用療養費実践問題</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg2: #101827;
      --card: #172131;
      --card2: #1f2a3d;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #334155;
      --primary: #60a5fa;
      --primary2: #1d4ed8;
      --primary-soft: #102a49;
      --ok: #4ade80;
      --ok-bg: #12291f;
      --ng: #f87171;
      --ng-bg: #32191f;
      --warn: #fbbf24;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.14), transparent 35%),
        linear-gradient(180deg, #070b16 0%, var(--bg) 260px, #080d18 100%);
      color: var(--text);
      line-height: 1.75;
    }

    .wrap {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 20px 14px 42px;
    }

    header {
      background: rgba(23, 33, 49, 0.94);
      border: 1px solid rgba(96, 165, 250, 0.16);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 6vw, 38px);
      line-height: 1.25;
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      background: #111c2f;
      border: 1px solid var(--line);
      color: #cbd5e1;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 700;
    }

    .toolbar {
      position: sticky;
      top: 8px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(23, 33, 49, 0.96);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 14px;
      margin-bottom: 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .status {
      font-weight: 900;
      line-height: 1.25;
    }

    .status small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 850;
      border-radius: 999px;
      min-height: 44px;
      padding: 10px 16px;
      transition: transform .08s ease, background .12s ease, border-color .12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { transform: translateY(1px); }
    button:disabled { cursor: not-allowed; opacity: .55; }

    .primary {
      background: #2563eb;
      color: #eff6ff;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.25);
    }

    .primary:hover:not(:disabled) { background: #1d4ed8; }

    .secondary {
      background: #253246;
      border: 1px solid #40516a;
      color: #f8fafc;
    }

    .secondary:hover:not(:disabled) { background: #334155; }

    .card {
      background: rgba(23, 33, 49, 0.98);
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .q-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .badge, .category {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 4px 11px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge {
      background: var(--primary-soft);
      color: #bfdbfe;
      border: 1px solid rgba(96, 165, 250, 0.25);
    }

    .category {
      background: #263449;
      color: #d1d5db;
      border: 1px solid var(--line);
    }

    .q-text {
      margin: 0 0 16px;
      font-size: clamp(17px, 4.5vw, 21px);
      font-weight: 900;
      line-height: 1.65;
    }

    .choices {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .choice {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #111827;
      color: var(--text);
      border-radius: 15px;
      padding: 13px 14px;
      font-weight: 750;
      box-shadow: none;
      line-height: 1.65;
    }

    .choice:hover:not(:disabled) {
      border-color: rgba(96, 165, 250, 0.65);
      background: #172338;
    }

    .choice.selected {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: #dbeafe;
    }

    .choice.correct {
      border-color: rgba(74, 222, 128, .55);
      background: var(--ok-bg);
      color: #bbf7d0;
    }

    .choice.wrong {
      border-color: rgba(248, 113, 113, .55);
      background: var(--ng-bg);
      color: #fecaca;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .result {
      display: none;
      margin-top: 16px;
      padding: 15px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #111a2a;
    }

    .result.show { display: block; }
    .result.ok { border-color: rgba(74, 222, 128, .45); background: var(--ok-bg); }
    .result.ng { border-color: rgba(248, 113, 113, .4); background: var(--ng-bg); }

    .result-title {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 900;
    }

    .result.ok .result-title { color: var(--ok); }
    .result.ng .result-title { color: var(--ng); }

    .explain {
      margin: 0;
      color: #cbd5e1;
      font-size: 14px;
    }

    .explain b { color: #f8fafc; }

    .finish {
      display: none;
      background: #111a2a;
      border: 1px solid rgba(96, 165, 250, .2);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .finish.show { display: block; }
    .finish h2 { margin: 0 0 8px; font-size: 24px; }
    .finish p { margin: 0 0 16px; color: var(--muted); }

    .note {
      margin: 14px 2px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .hidden { display: none !important; }

    @media (max-width: 640px) {
      .wrap { padding: 14px 10px 34px; }
      header { padding: 18px; border-radius: 20px; }
      .toolbar { top: 6px; padding: 10px 12px; }
      .card { padding: 15px; }
      .q-top { flex-direction: column; align-items: flex-start; }
      .actions { justify-content: stretch; }
      .actions button { width: 100%; }
      .secondary { padding-left: 12px; padding-right: 12px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>保険外併用療養費実践問題</h1>
      <p class="lead">評価療養・患者申出療養・選定療養の区分、費用負担、患者申出療養の流れ、紹介状なし受診、令和8年度改定における夜間休日調剤の選定療養化を確認する問題です。</p>
      <div class="chips" aria-label="学習範囲">
        <span class="chip">1問ずつ表示</span>
        <span class="chip">五者択一</span>
        <span class="chip">各カテゴリ3問プール</span>
        <span class="chip">誤答理由つき</span>
        <span class="chip">夜間スマホ向け</span>
      </div>
    </header>

    <div class="toolbar" id="topBar">
      <div class="status" id="status">第1問 / 5<small id="score">0問正解</small></div>
      <button class="secondary" type="button" id="restartTop">やり直す</button>
    </div>

    <main id="quiz" aria-live="polite"></main>

    <section class="finish" id="finish" aria-live="polite">
      <h2 id="finishTitle">結果</h2>
      <p id="finishText"></p>
      <button class="secondary" type="button" id="restartBottom">別の問題で再チャレンジ</button>
    </section>

    <p class="note">GitHub Pages用の単体HTMLです。外部ライブラリは使用していません。</p>
  </div>

            choices: [

              { text: "夜間休日に薬局で調剤を受けた場合、開店時間内かどうかにかかわらず、一律に特別料金の徴収対象となる。", correct: false, reason: "一律に対象となるわけではない。薬局の表示する開店時間外の対応がポイントである。" },

          },
          {

              { text: "令和4年10月から、紹介状なし初診の基準額は医科7,000円以上、歯科5,000円以上に引き上げられた。", correct: true, reason: "大病院の紹介状なし初診等に係る定額負担は令和4年10月から引き上げられ、紹介状なし初診は医科7,000円以上、歯科5,000円以上である。" },
              { text: "令和6年度診療報酬改定で、医科初診が5,000円以上から7,000円以上に引き上げられた。", correct: false, reason: "医科初診7,000円以上への引き上げは令和4年10月からであり、令和6年度改定ではない。" },
              { text: "令和8年度診療報酬改定で、医科初診が7,000円以上から10,000円以上に引き上げられた。", correct: false, reason: "令和8年度改定では、紹介状なし受診等の患者定額負担の基準額自体が10,000円以上に引き上げられたわけではない。" },

              { text: "紹介状なし初診に係る選定療養費は、令和8年度改定で廃止された。", correct: false, reason: "廃止されていない。外来機能分化の観点から引き続き重要な論点である。" }
            ]
          },
          {
            q: "大病院において、他の医療機関への紹介後も再診を希望する場合の選定療養費について、基準額の組み合わせとして最も適切なものはどれか。",
            choices: [
              { text: "医科3,000円以上、歯科1,900円以上", correct: true, reason: "逆紹介後の再診等に係る定額負担は、医科3,000円以上、歯科1,900円以上である。紹介状なし初診の医科7,000円以上、歯科5,000円以上と混同しない。" },
              { text: "医科1,000円以上、歯科500円以上", correct: false, reason: "この金額ではない。再診の基準額は医科3,000円以上、歯科1,900円以上である。" },
              { text: "医科2,000円以上、歯科1,000円以上", correct: false, reason: "この金額ではない。令和4年10月以降の再診の基準額は医科3,000円以上、歯科1,900円以上である。" },
              { text: "医科5,000円以上、歯科3,000円以上", correct: false, reason: "この金額は逆紹介後の再診等の基準額ではない。" },
              { text: "医科7,000円以上、歯科5,000円以上", correct: false, reason: "これは紹介状なし初診の基準額であり、逆紹介後の再診等の基準額ではない。" }
            ]
          }
        ]
      }
    ];

    let quizSet = [];
    let currentIndex = 0;
    let selectedIndex = null;
    let answered = false;
    let correctCount = 0;

    function shuffle(array) {
      const copied = array.slice();
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = copied[i];
        copied[i] = copied[j];
        copied[j] = tmp;
      }
      return copied;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function startQuiz() {
      quizSet = categories.map(category => {
        const picked = shuffle(category.questions)[0];
        return {
          category: category.name,
          q: picked.q,
          choices: shuffle(picked.choices)
        };
      });
      currentIndex = 0;
      selectedIndex = null;
      answered = false;
      correctCount = 0;
      document.getElementById('finish').classList.remove('show');
      document.getElementById('quiz').classList.remove('hidden');
      renderQuestion();
      jumpToQuiz();
    }

    function renderQuestion() {
      const item = quizSet[currentIndex];
      selectedIndex = null;
      answered = false;
      updateStatus();

      const choicesHtml = item.choices.map((choice, index) => {
        return '<button type="button" class="choice" id="choice' + index + '" data-index="' + index + '">' +
          (index + 1) + '. ' + escapeHtml(choice.text) +
          '</button>';
      }).join('');

      document.getElementById('quiz').innerHTML =
        '<section class="card" id="questionCard">' +
          '<div class="q-top">' +
            '<span class="badge">第' + (currentIndex + 1) + '問</span>' +
            '<span class="category">' + escapeHtml(item.category) + '</span>' +
          '</div>' +
          '<p class="q-text">' + escapeHtml(item.q) + '</p>' +
          '<div class="choices">' + choicesHtml + '</div>' +
          '<div class="actions">' +
            '<button class="primary" id="answerBtn" type="button" disabled>回答</button>' +
            '<button class="secondary hidden" id="nextBtn" type="button">' + (currentIndex === quizSet.length - 1 ? '結果を見る' : '次の問題へ') + '</button>' +
          '</div>' +
          '<div class="result" id="resultBox">' +
            '<p class="result-title" id="resultTitle"></p>' +
            '<p class="explain" id="explainText"></p>' +
          '</div>' +
        '</section>';

      item.choices.forEach((_, index) => {
        document.getElementById('choice' + index).addEventListener('click', () => selectChoice(index));
      });
      document.getElementById('answerBtn').addEventListener('click', submitAnswer);
      document.getElementById('nextBtn').addEventListener('click', nextQuestion);
    }

    function updateStatus() {
      document.getElementById('status').innerHTML = '第' + (currentIndex + 1) + '問 / ' + quizSet.length + '<small id="score">' + correctCount + '問正解</small>';
    }

    function selectChoice(index) {
      if (answered) return;
      selectedIndex = index;
      document.querySelectorAll('.choice').forEach(button => button.classList.remove('selected'));
      document.getElementById('choice' + index).classList.add('selected');
      document.getElementById('answerBtn').disabled = false;
    }

    function submitAnswer() {
      if (selectedIndex === null || answered) return;
      answered = true;
      const item = quizSet[currentIndex];
      const selected = item.choices[selectedIndex];
      const correct = item.choices.find(choice => choice.correct);
      const isCorrect = selected.correct;

      if (isCorrect) correctCount++;

      item.choices.forEach((choice, index) => {
        const button = document.getElementById('choice' + index);
        button.disabled = true;
        button.classList.remove('selected');
        if (choice.correct) button.classList.add('correct');
        if (index === selectedIndex && !choice.correct) button.classList.add('wrong');
      });

      const resultBox = document.getElementById('resultBox');
      resultBox.className = 'result show ' + (isCorrect ? 'ok' : 'ng');
      document.getElementById('resultTitle').textContent = isCorrect ? '正解です' : '不正解です';
      document.getElementById('explainText').innerHTML = isCorrect
        ? '<b>解説：</b>' + escapeHtml(correct.reason)
        : '<b>選んだ選択肢が誤りである理由：</b>' + escapeHtml(selected.reason) + '<br><b>正答：</b>' + escapeHtml(correct.text) + '<br><b>解説：</b>' + escapeHtml(correct.reason);

      document.getElementById('answerBtn').classList.add('hidden');
      document.getElementById('nextBtn').classList.remove('hidden');
      updateStatus();
    }

    function nextQuestion() {
      if (currentIndex < quizSet.length - 1) {
        currentIndex++;
        renderQuestion();
        jumpToQuiz();
      } else {
        showFinish();
      }
    }

    function showFinish() {
      document.getElementById('quiz').classList.add('hidden');
      document.getElementById('status').innerHTML = '終了 / ' + quizSet.length + '問<small id="score">' + correctCount + '問正解</small>';

      const rate = correctCount / quizSet.length;
      document.getElementById('finishTitle').textContent = '結果：' + correctCount + ' / ' + quizSet.length + ' 正解';
      document.getElementById('finishText').textContent = rate === 1
        ? '満点です。評価療養・患者申出療養・選定療養の区分と改定論点まで整理できています。'
        : rate >= 0.6
          ? 'よい仕上がりです。間違えたカテゴリを中心に、具体例と制度区分の対応を確認しましょう。'
          : 'まずは「評価療養＝将来保険導入を評価」「患者申出療養＝患者申出が起点」「選定療養＝患者の選択」を整理しましょう。';
      document.getElementById('finish').classList.add('show');
      document.getElementById('finish').scrollIntoView({ block: 'start' });
    }

    function jumpToQuiz() {
      const quiz = document.getElementById('quiz');
      if (!quiz) return;
      quiz.scrollIntoView({ block: 'start' });
    }

    document.getElementById('restartTop').addEventListener('click', startQuiz);
    document.getElementById('restartBottom').addEventListener('click', startQuiz);

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startQuiz);
    } else {
      startQuiz();
    }
  </script>
