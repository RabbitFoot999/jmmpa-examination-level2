              { text: "ア・イ・エ", ok: false, why: "イが誤りで、ウが正しいため不足しています。" },
              { text: "ア・イ・ウ・エ", ok: false, why: "イが誤りです。" }
            ],
            exp: "算定場面、令和8年度改定後の点数、中央病歴管理室等を横断的に確認する問題です。"
          },
          {
            q: "診療録管理体制加算について、適切でないものを1つ選べ。",
            choices: [
              { text: "入院基本料等加算である。", ok: false, why: "これは適切です。" },
              { text: "診療録管理体制加算1では、専従の診療記録管理者の配置が重要である。", ok: false, why: "これは適切です。" },
              { text: "診療録は過去5年間の保管・管理が必要である。", ok: false, why: "これは適切です。" },
              { text: "令和8年度改定後も、旧加算3相当の30点区分が加算3として存続している。", ok: true, why: "令和8年度改定後、加算3は廃止され、2区分に再編されています。" },
              { text: "診療記録の保管・管理の規程が明文化されていることが求められる。", ok: false, why: "これは適切です。" }
            ],
            exp: "『適切でないもの』を選ぶ問題では、旧制度の加算3存続など、年度改定前の情報に注意します。"
          },
          {
            q: "診療録管理体制加算と関連論点について、正しいものの組み合わせを1つ選べ。\nア 診療録管理体制加算は外来初診時15点である。\nイ 電子的診療情報連携体制整備加算は初診時・再診時・入院時に評価がある。\nウ 診療録管理体制加算1では電子的な一覧表による検索・抽出体制が重要である。\nエ 診療録管理体制加算は、入院患者について入院初日に算定する。",
            choices: [
              { text: "ア・イ", ok: false, why: "アが誤りです。初診時15点は電子的診療情報連携体制整備加算と混同しやすい数値です。" },
              { text: "イ・ウ・エ", ok: true, why: "イ・ウ・エが正しい組み合わせです。" },
              { text: "ア・ウ・エ", ok: false, why: "アが誤りです。" },
              { text: "イ・エ", ok: false, why: "イ・エは正しいですが、ウも正しいため不足しています。" },
              { text: "ア・イ・ウ・エ", ok: false, why: "アが誤りです。" }
            ],
            exp: "診療録管理体制加算と電子的診療情報連携体制整備加算は、点数・算定場面を混同しないようにします。"
          }
        ]
      }
    ];

    let currentSet = [];
    let currentIndex = 0;
    let selected = null;
    let correctCount = 0;
    let answeredCount = 0;
    let review = [];
    let answeredThis = false;

    function shuffle(array) {
      const a = [...array];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function makeQuestionSet() {
      const picked = questionPools.map(pool => {
        const item = pool.items[Math.floor(Math.random() * pool.items.length)];
        return { ...item, category: pool.category, choices: shuffle(item.choices) };
      });
      return shuffle(picked);
    }

    function updateStatus() {
      document.getElementById('now').textContent = `${Math.min(currentIndex + 1, currentSet.length)} / ${currentSet.length}`;
      document.getElementById('answered').textContent = String(answeredCount);
      document.getElementById('correct').textContent = String(correctCount);
      document.getElementById('rate').textContent = answeredCount ? `${Math.round(correctCount / answeredCount * 100)}%` : '0%';
    }

    function renderQuestion() {
      const quiz = document.getElementById('quiz');
      const result = document.getElementById('result');
      result.classList.remove('show');
      result.innerHTML = '';
      selected = null;
      answeredThis = false;
      const item = currentSet[currentIndex];
      quiz.innerHTML = `
        <div class="q-top">
          <span class="badge">問${currentIndex + 1}</span>
          <span class="category">${item.category}</span>
        </div>
        <div class="q-title">${item.q.replace(/\n/g, '<br>')}</div>
        <div class="choices" id="choices"></div>
        <div class="actions">
          <button id="answerBtn" disabled>回答</button>
          <button id="nextBtn" class="secondary" disabled>${currentIndex === currentSet.length - 1 ? '結果を見る' : '次の問題へ'}</button>
          <button id="restartBtn" class="secondary">最初からやり直す</button>
        </div>
        <div id="feedback" class="feedback"></div>
      `;
      const choices = document.getElementById('choices');
      item.choices.forEach((choice, idx) => {
        const id = `choice-${idx}`;
        const label = document.createElement('label');
        label.className = 'choice';
        label.htmlFor = id;
        label.innerHTML = `<input type="radio" name="choice" id="${id}" value="${idx}"><span class="choice-text">${idx + 1}. ${choice.text}</span>`;
        label.addEventListener('click', () => {
          if (answeredThis) return;
          selected = idx;
          document.querySelectorAll('label.choice').forEach(el => el.classList.remove('selected'));
          label.classList.add('selected');
          document.getElementById('answerBtn').disabled = false;
        });
        choices.appendChild(label);
      });
      document.getElementById('answerBtn').addEventListener('click', checkAnswer);
      document.getElementById('nextBtn').addEventListener('click', nextStep);
      document.getElementById('restartBtn').addEventListener('click', resetQuiz);
      updateStatus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function checkAnswer() {
      if (selected === null || answeredThis) return;
      answeredThis = true;
      const item = currentSet[currentIndex];
      const selectedChoice = item.choices[selected];
      const correctIndex = item.choices.findIndex(c => c.ok);
      const correctChoice = item.choices[correctIndex];
      const labels = document.querySelectorAll('label.choice');
      labels.forEach((label, idx) => {
        label.style.cursor = 'default';
        label.classList.remove('selected');
        if (idx === correctIndex) label.classList.add('correct');
        if (idx === selected && idx !== correctIndex) label.classList.add('wrong');
        label.querySelector('input').disabled = true;
      });
      const ok = selectedChoice.ok;
      if (ok) correctCount++;
      answeredCount++;
      review.push({
        q: item.q,
        category: item.category,
        selected: selectedChoice.text,
        correct: correctChoice.text,
        ok,
        reason: selectedChoice.why,
        exp: item.exp
      });
      const fb = document.getElementById('feedback');
      fb.className = ok ? 'feedback ok' : 'feedback ng';
      fb.innerHTML = ok
        ? `<strong>正解！</strong><div class="explain">${item.exp}</div>`
        : `<strong>不正解。</strong><div class="explain"><b>選んだ選択肢が誤りの理由：</b>${selectedChoice.why}<br><b>正解：</b>${correctIndex + 1}. ${correctChoice.text}<br>${item.exp}</div>`;
      document.getElementById('answerBtn').disabled = true;
      document.getElementById('nextBtn').disabled = false;
      updateStatus();
    }

    function nextStep() {
      if (currentIndex < currentSet.length - 1) {
        currentIndex++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById('quiz').innerHTML = '';
      const result = document.getElementById('result');
      result.classList.add('show');
      const rate = Math.round(correctCount / currentSet.length * 100);
      result.innerHTML = `
        <h2>結果</h2>
        <p><strong>${currentSet.length}問中 ${correctCount}問正解</strong>（正答率 ${rate}%）</p>
        <div class="actions">
          <button id="retryBtn">再チャレンジ（問題と選択肢をランダム変更）</button>
        </div>
        <h3>解答レビュー</h3>
        ${review.map((r, i) => `
          <div class="review-item">
            <div class="mini">問${i + 1}｜${r.category}｜${r.ok ? '正解' : '不正解'}</div>
            <strong>${r.q.replace(/\n/g, '<br>')}</strong><br>
            あなたの選択：${r.selected}<br>
            正解：${r.correct}<br>
            ${r.ok ? '' : `<span class="mini">誤答理由：${r.reason}</span><br>`}
            <span class="mini">解説：${r.exp}</span>
          </div>
        `).join('')}
      `;
      document.getElementById('retryBtn').addEventListener('click', resetQuiz);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuiz() {
      currentSet = makeQuestionSet();
      currentIndex = 0;
      selected = null;
      correctCount = 0;
      answeredCount = 0;
      review = [];
      answeredThis = false;
      renderQuestion();
    }

    resetQuiz();
  </script>
</body>
</html>
