<header><div class="wrap"><h1>経営・分析理論実践問題</h1><p class="lead">医療経営士2級の専門分野で問われやすい分析方法・理論・フレームワークを学ぶ問題です。</p></div></header>
<main class="wrap">
<section class="panel"><strong>学習できる内容</strong><p class="small">BSC、ECRS、原価計算、損益分岐点、診療圏分析、NPS、PM理論、イノベーション理論、ファイブフォース、参入障壁、PEST・SWOT、アンゾフ、責任会計、ABC分析・パレート分析、差額原価収益分析、非市場戦略を扱います。各カテゴリ3問ずつのプールから、毎回16問をランダムに出題します。</p><div class="status-row"><div class="stat"><b id="totalCount">16</b><span>出題数</span></div><div class="stat"><b id="answeredCount">0</b><span>解答済み</span></div><div class="stat"><b id="correctCount">0</b><span>正解数</span></div><div class="stat"><b id="scoreRate">0%</b><span>正答率</span></div></div><div class="progressbar"><div id="progressFill"></div></div><div class="actions"><button class="primary" onclick="restartQuiz()">問題をランダム再出題</button><button class="secondary" onclick="showResult()">現在の結果を見る</button></div></section>
<section id="quiz"></section><section id="result" class="result"><h2>結果</h2><p id="resultText"></p><p class="small" id="resultHint"></p><div id="reviewList"></div><div class="actions"><button class="primary" onclick="restartQuiz()">再チャレンジする</button><button class="secondary" onclick="scrollToQuestion()">問題へ戻る</button></div></section>
</main><footer>夜間スマホ利用を想定した暗めの配色です。組み合わせ問題は各記述の正誤を一つずつ確認してください。</footer>
<script>
const BANK = {"BSC": [["BSCの4つの視点として正しいものはどれか。", [["財務、患者・顧客、業務プロセス、学習と成長", 1, "BSCの基本4視点です。"], ["財務、法務、税務、監査", 0, "BSCの4視点ではありません。"], ["救急、外来、入院、在宅", 0, "医療提供場面の分類です。"], ["医師、看護師、薬剤師、事務", 0, "職種分類です。"], ["安全性、有効性、効率性、収益性", 0, "医療の質や経営評価の観点ですがBSCの4視点ではありません。"]], "BSCは、戦略を財務・患者顧客・業務プロセス・学習と成長の4視点に落とし込む枠組みです。"], ["BSCの患者・顧客の視点に最も該当する指標はどれか。", [["患者満足度、紹介率、逆紹介率", 1, "患者や紹介元からの評価に関わる指標です。"], ["医業収益、人件費率、材料費率", 0, "財務の視点です。"], ["資格取得率、研修参加率", 0, "学習と成長の視点です。"], ["医療事故件数、手術室稼働率", 0, "業務プロセスの視点です。"], ["固定長期適合率、流動比率", 0, "財務安全性の指標です。"]], "患者・顧客には患者だけでなく、紹介元診療所など地域連携先も含めて考えます。"], ["BSCの視点と指標の組み合わせについて、正しいものだけを含む選択肢はどれか。\nア 財務：医業収益\nイ 患者・顧客：紹介率\nウ 学習と成長：研修参加率\nエ 財務：院内研修参加率", [["ア・イ・ウ", 1, "エは誤りです。院内研修参加率は学習と成長の視点です。"], ["ア・イ・エ", 0, "エが誤りです。"], ["ア・ウ・エ", 0, "イも正しく、エが誤りです。"], ["イ・ウ・エ", 0, "アも正しく、エが誤りです。"], ["ア・イ・ウ・エ", 0, "エが誤りです。"]], "財務、患者・顧客、業務プロセス、学習と成長の分類を混同しないことが重要です。"]], "ECRS": [["ECRSの日本語での意味として最も適切なものはどれか。", [["排除、結合、交換・順序変更、簡素化", 1, "ECRSの基本です。"], ["評価、統制、記録、標準化", 0, "ECRSの4項目ではありません。"], ["教育、連携、研究、安全", 0, "医療機関の重要課題ですがECRSではありません。"], ["収益、費用、利益、投資", 0, "会計の用語です。"], ["効率、顧客、リスク、戦略", 0, "経営一般の観点です。"]], "ECRSは、なくす、まとめる、順番や担当を変える、簡単にする、という業務改善の視点です。"], ["診察後に採血していた予約患者について、診察前に採血を済ませる運用に変更した。ECRSではどれに最も近いか。", [["交換・順序変更", 1, "採血自体は残し、実施順序を変えているためです。"], ["排除", 0, "採血業務をなくしていません。"], ["結合", 0, "複数業務をまとめた例ではありません。"], ["簡素化", 0, "手順を簡単にするよりも順序変更が中心です。"], ["重点管理", 0, "ABC分析やパレート分析に近い考え方です。"]], "順番・場所・担当を変える改善は、交換・順序変更に分類します。"], ["ECRSの医療現場での適用例について、正しい組み合わせはどれか。\nア 排除：重複する紙帳票を廃止する\nイ 結合：複数のカンファレンスを合同開催する\nウ 交換・順序変更：受付と検査の順番を変更する\nエ 簡素化：チェックリスト化して確認を容易にする", [["ア・イ・ウ・エ", 1, "4つとも正しい組み合わせです。"], ["ア・イのみ", 0, "ウとエも正しいです。"], ["ウ・エのみ", 0, "アとイも正しいです。"], ["ア・ウ・エのみ", 0, "イも正しいです。合同開催は結合です。"], ["イ・ウ・エのみ", 0, "アも正しいです。廃止は排除です。"]], "ECRSは英字よりも、日本語の意味と医療現場での例を結びつけて覚えると実践的です。"]], "原価計算": [["病院における原価計算の目的として最も適切なものはどれか。", [["医療サービス提供に要する費用を把握し、部門別・診療科別の採算や改善に活用する。", 1, "原価の見える化と経営管理に用います。"], ["診療録の保存期間を決める。", 0, "医療情報管理の論点です。"], ["医療事故の法的責任を確定する。", 0, "法務・医療安全の論点です。"], ["赤字診療科を自動的に廃止する。", 0, "地域医療上の必要性も考慮します。"], ["診療報酬点数を自由に設定する。", 0, "保険診療の点数は制度で定められます。"]], "原価計算は、病院全体だけでなく診療科・部門・患者単位などで費用を把握するために使います。"], ["原価計算における直課の説明として最も適切なものはどれか。", [["直接どの部門で発生したか分かる費用を、その部門に直接計上すること。", 1, "直課の説明です。"], ["直接ひもづけにくい費用を一定基準で割り振ること。", 0, "配賦の説明です。"], ["収益だけを診療科に割り振ること。", 0, "直課は費用にも用います。"], ["固定費を変動費に置き換えること。", 0, "費用構造の変更です。"], ["病院全体の費用を分類しないこと。", 0, "原価計算では費用分類を行います。"]], "直課＝直接わかるものをそのまま乗せる、配賦＝直接わからないものを基準で配る、です。"], ["原価計算における配賦について最も適切なものはどれか。", [["配賦基準によって診療科別損益が変わるため、結果は経営判断の材料として扱う。", 1, "配賦は按分なので基準により結果が変わります。"], ["配賦後に赤字なら地域需要にかかわらず廃止する。", 0, "医療の公益性も考慮します。"], ["中央診療部門の費用は常に無視する。", 0, "利用実績などで配賦することがあります。"], ["光熱水費は必ず患者満足度で配賦する。", 0, "面積などが自然です。"], ["配賦は直接費だけに行う。", 0, "主に間接費を割り振るために行います。"]], "配賦基準には面積、患者数、件数、点数、時間、収益比などがあります。"]], "損益分岐点": [["医業収益1,200万円、変動費360万円、固定費630万円の場合、損益分岐点売上高はいくらか。", [["900万円", 1, "変動費率は0.3。630÷(1-0.3)=900万円です。"], ["700万円", 0, "固定費をそのまま売上高にしており誤りです。"], ["800万円", 0, "限界利益率0.7で割る必要があります。"], ["1,000万円", 0, "計算上は900万円です。"], ["1,200万円", 0, "現在の医業収益であり損益分岐点ではありません。"]], "損益分岐点売上高＝固定費÷(1−変動費率)です。"], ["1件当たり収入100,000円、1件当たり変動費60,000円、固定費1,000,000円の場合、損益分岐点件数はいくらか。", [["25件", 1, "1件当たり限界利益は40,000円。1,000,000÷40,000=25件です。"], ["10件", 0, "収入単価で割っただけで変動費を考慮していません。"], ["15件", 0, "限界利益で割る必要があります。"], ["20件", 0, "正しくは25件です。"], ["40件", 0, "40,000円は限界利益です。"]], "損益分岐点件数＝固定費÷1件当たり限界利益です。"], ["損益分岐点分析の説明として最も適切なものはどれか。", [["収益と費用が一致し、利益も損失も発生しない売上高や患者数を把握する分析である。", 1, "損益分岐点は黒字と赤字の境目です。"], ["患者満足度から批判者割合を差し引く分析である。", 0, "NPSの説明です。"], ["診療圏人口に受療率を乗じる分析である。", 0, "診療圏分析です。"], ["医療安全マニュアルの遵守だけを評価する。", 0, "損益分岐点分析ではありません。"], ["外部環境を政治・経済・社会・技術に分ける。", 0, "PEST分析です。"]], "固定費・変動費・収益の関係から、黒字化に必要な水準を把握します。"]], "診療圏分析": [["診療圏分析の説明として最も適切なものはどれか。", [["診療圏人口、受療率、シェア率などから潜在患者数や自院患者数を推計する分析である。", 1, "地域需要や患者獲得可能性を把握します。"], ["部署間コミュニケーションだけを分析する。", 0, "地域需要を扱います。"], ["研修参加率を4視点で分類する。", 0, "BSCです。"], ["固定費と変動費から売上を求める。", 0, "損益分岐点分析です。"], ["診療材料を購入金額順に分類する。", 0, "ABC分析です。"]], "診療圏分析は、病院開設、診療科強化、地域連携戦略などに使われます。"], ["診療圏人口80,000人、受療率0.4%、自院シェア率25%の場合、自院の理論上患者数はいくらか。", [["80人", 1, "80,000×0.004=320人。320×0.25=80人です。"], ["160人", 0, "自院シェア率を正しく反映すると80人です。"], ["240人", 0, "320人に25%を乗じます。"], ["320人", 0, "診療圏全体の理論上患者数です。"], ["800人", 0, "0.4%は0.004です。"]], "理論上の患者数＝診療圏人口×受療率、自院患者数＝理論上患者数×自院シェア率です。"], ["診療圏分析について最も適切なものはどれか。", [["診療圏の範囲は、診療科、交通事情、地域特性、競合状況などにより変わり得る。", 1, "診療圏は一律ではありません。"], ["全診療科で常に半径5kmと決まる。", 0, "地域や機能で異なります。"], ["受療率を用いることはない。", 0, "受療率は代表的要素です。"], ["DPCデータは一切利用できない。", 0, "分析に用いられることがあります。"], ["自院シェア率は常に100%とする。", 0, "競合を踏まえて設定します。"]], "診療圏分析では人口、受療率、患者流入、交通、競合などを総合的に見ます。"]], "NPS": [["NPSの説明として最も適切なものはどれか。", [["推奨者割合から批判者割合を差し引いて算出する顧客ロイヤルティ指標である。", 1, "NPS＝推奨者割合−批判者割合です。"], ["診療圏人口に受療率を乗じる指標である。", 0, "診療圏分析です。"], ["固定費と変動費から患者数を求める指標である。", 0, "損益分岐点分析です。"], ["医療事故件数を100床当たりで示す指標である。", 0, "NPSではありません。"], ["自己資本比率を示す財務指標である。", 0, "財務指標です。"]], "NPSは「この病院を他者に勧めたいか」などの推奨意向を測る指標です。"], ["NPS調査で、推奨者45%、中立者35%、批判者20%であった。NPSはいくらか。", [["25", 1, "45−20=25です。中立者は引きません。"], ["10", 0, "中立者を引く計算ではありません。"], ["20", 0, "批判者割合そのものです。"], ["45", 0, "推奨者割合そのものです。"], ["80", 0, "推奨者と中立者を足す計算ではありません。"]], "NPSは推奨者割合−批判者割合で算出します。"], ["NPSにおける区分として最も適切なものはどれか。", [["9〜10点：推奨者、7〜8点：中立者、0〜6点：批判者", 1, "一般的なNPSの区分です。"], ["9〜10点：批判者、7〜8点：推奨者、0〜6点：中立者", 0, "区分が逆です。"], ["10点のみ推奨者、9点以下批判者", 0, "9〜10点を推奨者とします。"], ["8〜10点推奨者、4〜7点中立者、0〜3点批判者", 0, "一般的区分ではありません。"], ["0〜10点すべて推奨者", 0, "点数に応じて分類します。"]], "推奨者を増やし批判者を減らすことが、ロイヤルティ向上の目標になります。"]], "イノベーション理論": [["シュンペーターの新結合に含まれるものとして最も適切なものはどれか。", [["新しい財貨・サービスの導入", 1, "新結合の代表例です。"], ["既存業務を一切変えずに維持すること", 0, "変化を生み出す考え方です。"], ["患者の選択肢をなくすこと", 0, "新結合ではありません。"], ["財務諸表を作成しないこと", 0, "会計処理の放棄です。"], ["すべての競争を行政が禁止すること", 0, "新結合ではありません。"]], "新結合には、新しい財貨、生産方法、販路、仕入先、組織などがあります。"], ["病院が新たな医療材料の供給ルートを開拓した。新結合のうち最も近いものはどれか。", [["新しい仕入先・供給源", 1, "供給ルートの開拓です。"], ["新しい財貨", 0, "新製品導入ではありません。"], ["新しい生産方法", 0, "調達先の変化です。"], ["新しい販路", 0, "販売先の開拓ではありません。"], ["新しい価格統制", 0, "新結合の代表分類ではありません。"]], "共同購入や新たな調達方法も広い意味でイノベーションに関係します。"], ["シュンペーターの新結合に含まれるものだけを含む選択肢はどれか。\nア 新しい財貨・サービス\nイ 新しい生産方法\nウ 新しい市場・販路\nエ 新しい仕入先・供給源", [["ア・イ・ウ・エ", 1, "すべ function make(raw,cat){let ch=sh(raw[1]).map(x=>({t:x[0],good:x[1]===1,r:x[2]}));return {cat:cat,d:raw[0].includes("組み合わせ")?"組み合わせ":"基本",q:raw[0],c:ch,e:raw[2],done:false,sel:null,ci:ch.findIndex(x=>x.good)}}
function sample(){return sh(Object.keys(BANK).map(cat=>make(sh(BANK[cat])[0],cat))).slice(0,N)}
function render(){let q=qs[idx];sel=q.sel;let opts="";q.c.forEach((c,i)=>{let cls="option";if(sel===i&&!q.done)cls+=" selected";if(q.done&&c.good)cls+=sel===i?" correct":" missed";if(q.done&&sel===i&&!c.good)cls+=" wrong";opts+=`<label class="${cls}" onclick="selectChoice(${i})"><input type="radio" name="choice" ${sel===i?"checked":""} ${q.done?"disabled":""}><span>${i+1}. ${esc(c.t)}</span></label>`;});document.getElementById("quiz").innerHTML=`<article class="question-card" id="questionTop"><div class="q-head"><span class="q-num">問${idx+1} / ${qs.length}</span><span class="tag">${esc(q.cat)}</span><span class="difficulty">${esc(q.d)}</span></div><div class="question">${esc(q.q)}</div><div class="options">${opts}</div><div class="actions"><button class="primary" onclick="submitAnswer()" ${q.done?"disabled":""}>回答</button><button class="secondary" onclick="prevQuestion()" ${idx===0?"disabled":""}>前の問題へ</button><button class="secondary" onclick="nextQuestion()" ${idx===qs.length-1?"disabled":""}>次の問題へ</button></div>${q.done?feedback(q):""}</article>`;status();}
function feedback(q){let c=q.c[q.sel], yes=c.good;return `<div class="feedback show ${yes?"ok":"bad"}"><strong>${yes?"正解です。":"不正解です。"} 正解：${q.ci+1}</strong><br>${yes?esc(c.r):"選択した答えが誤りである理由："+esc(c.r)}<div class="explain"><strong>解説：</strong>${esc(q.e)}</div></div>`}
function selectChoice(i){if(qs[idx].done)return;qs[idx].sel=i;render();}
function submitAnswer(){let q=qs[idx];if(q.done)return;if(q.sel===null){alert("選択肢を1つ選んでから「回答」を押してください。");return;}q.done=true;ans++;if(q.c[q.sel].good)ok++;results[idx]={cat:q.cat,good:q.c[q.sel].good,sel:q.c[q.sel].t,ans:q.c[q.ci].t};render();if(ans===qs.length)showResult();}
function prevQuestion(){if(idx>0){idx--;render();scrollToQuestion();}}
function nextQuestion(){if(idx<qs.length-1){idx++;render();scrollToQuestion();}}
function status(){document.getElementById("totalCount").textContent=qs.length;document.getElementById("answeredCount").textContent=ans;document.getElementById("correctCount").textContent=ok;let rate=ans?Math.round(ok/ans*100):0;document.getElementById("scoreRate").textContent=rate+"%";document.getElementById("progressFill").style.width=(qs.length?ans/qs.length*100:0)+"%";}
function showResult(){let rate=ans?Math.round(ok/ans*100):0;document.getElementById("resultText").innerHTML=`<strong>${ans}問解答 / ${qs.length}問中 ${ok}問正解（正答率 ${rate}%）</strong>`;document.getElementById("resultHint").textContent=!ans?"まだ解答がありません。":rate>=90?"かなり定着しています。":rate>=70?"良いペースです。間違えたカテゴリを復習しましょう。":"各フレームワークの「何を見る分析か」を整理しましょう。";let wrongs=results.map((r,i)=>r&&!r.good?`<div class="review-item"><strong>問${i+1}（${esc(r.cat)}）</strong><br>選択：${esc(r.sel)}<br>正解：${esc(r.ans)}</div>`:"").join("");document.getElementById("reviewList").innerHTML=wrongs|| (ans?'<div class="review-item">誤答はありません。</div>':'');document.getElementById("result").classList.add("show");document.getElementById("result").scrollIntoView({behavior:"smooth",block:"start"});}
function restartQuiz(){qs=sample();idx=0;ans=0;ok=0;sel=null;results=[];document.getElementById("result").classList.remove("show");render();window.scrollTo({top:0,behavior:"smooth"})}
function scrollToQuestion(){let e=document.getElementById("questionTop");if(e)e.scrollIntoView({behavior:"smooth",block:"start"})}
restartQuiz();
</script>
</body></html>
