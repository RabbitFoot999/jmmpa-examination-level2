<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #0f172a;
      --bg2: #111827;
      --panel: #1e293b;
      --panel2: #243044;
      --text: #e5e7eb;
      --muted: #a7b0c0;
      --line: #334155;
      --accent: #8fb3ff;
      --accent2: #c4b5fd;
      --good: #34d399;
      --good-bg: rgba(52, 211, 153, 0.13);
      --bad: #fb7185;
      --bad-bg: rgba(251, 113, 133, 0.13);
      --warn-bg: rgba(245, 158, 11, 0.12);
      --warn-line: rgba(245, 158, 11, 0.25);
      --shadow: 0 18px 45px rgba(0,0,0,.28);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(139,92,246,.16), transparent 34rem),
        linear-gradient(180deg, #0b1020 0%, var(--bg) 48%, #0a0f1f 100%);
      line-height: 1.7;
    }
    button { font: inherit; }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 18px 14px 40px; }
    .hero {
      border: 1px solid rgba(148,163,184,.25);
      background: linear-gradient(135deg, rgba(30,41,59,.92), rgba(15,23,42,.94));
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
    }
    .label {
      display: inline-flex; align-items: center; gap: 8px;
      color: #c7d2fe; font-size: 13px; font-weight: 800; letter-spacing: .06em;
    }
    h1 { margin: 7px 0 8px; font-size: clamp(24px, 6vw, 42px); line-height: 1.2; letter-spacing: -.03em; }
    .lead { color: var(--muted); margin: 0; font-size: 15px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
    .stat { background: rgba(15,23,42,.65); border: 1px solid rgba(148,163,184,.18); border-radius: 16px; padding: 12px; }
    .stat small { display: block; color: var(--muted); font-weight: 700; font-size: 12px; }
    .stat b { display: block; font-size: 20px; margin-top: 2px; }

    .progressOuter { margin: 16px 0; height: 13px; padding: 3px; border-radius: 999px; background: rgba(30,41,59,.95); border: 1px solid rgba(148,163,184,.20); }
    .progressInner { height: 100%; border-radius: 999px; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .3s ease; }

    .grid { display: grid; grid-template-columns: 1fr 330px; gap: 16px; align-items: start; }
    .card, .side, .result {
      border: 1px solid rgba(148,163,184,.22);
      background: rgba(30,41,59,.92);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .card { padding: 20px; }
    .side { padding: 18px; position: sticky; top: 12px; }
    .topline { display: flex; justify-content: space-between; gap: 10px; align-items: center; border-bottom: 1px solid var(--line); padding-bottom: 14px; }
    .pill { display: inline-flex; align-items: center; gap: 7px; padding: 7px 11px; border-radius: 999px; font-size: 13px; font-weight: 800; }
    .pill.primary { background: rgba(143,179,255,.15); color: #dbeafe; border: 1px solid rgba(143,179,255,.22); }
    .pill.category { background: rgba(196,181,253,.12); color: #ede9fe; border: 1px solid rgba(196,181,253,.20); }
    .question { font-size: clamp(18px, 4.6vw, 25px); font-weight: 900; line-height: 1.55; margin: 20px 0 16px; }
    .options { display: grid; gap: 10px; }
    .option {
      width: 100%; text-align: left; color: var(--text);
      background: rgba(15,23,42,.48);
      border: 1px solid rgba(148,163,184,.22);
      border-radius: 17px;
      padding: 13px 13px;
      display: flex; gap: 11px; align-items: flex-start;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .option:hover { transform: translateY(-1px); border-color: rgba(143,179,255,.55); background: rgba(30,41,59,.82); }
    .option:disabled { cursor: default; transform: none; }
    .option.selected { border-color: var(--accent); background: rgba(59,130,246,.16); }
    .option.correct { border-color: rgba(52,211,153,.75); background: var(--good-bg); }
    .option.wrong { border-color: rgba(251,113,133,.75); background: var(--bad-bg); }
    .num {
      flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%;
      display: grid; place-items: center; background: rgba(148,163,184,.15); color: #dbeafe; font-weight: 900;
    }
    .optionText { flex: 1; }
    .mark { flex: 0 0 auto; font-weight: 900; font-size: 21px; }
    .mark.ok { color: var(--good); }
    .mark.ng { color: var(--bad); }
    .actions { margin-top: 16px; display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }
    .btn {
      border: 0; border-radius: 15px; padding: 12px 17px; font-weight: 900; cursor: pointer;
      color: #08111f; background: linear-gradient(90deg, var(--accent), var(--accent2));
      box-shadow: 0 8px 22px rgba(59,130,246,.18);
    }
    .btn.secondary { background: rgba(148,163,184,.14); color: var(--text); border: 1px solid rgba(148,163,184,.25); box-shadow: none; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .side h2 { font-size: 18px; margin: 0 0 10px; }
    .explainBox { border-radius: 16px; padding: 13px; background: rgba(15,23,42,.50); border: 1px solid rgba(148,163,184,.20); color: #cbd5e1; font-size: 14px; }
    .explainBox.good { background: var(--good-bg); border-color: rgba(52,211,153,.35); }
    .explainBox.bad { background: var(--bad-bg); border-color: rgba(251,113,133,.35); }
    .explainBox p { margin: 6px 0; }
    .miniTitle { color: var(--muted); font-weight: 900; font-size: 12px; margin-top: 10px; }
    .review { margin-top: 14px; padding: 12px; border-radius: 16px; background: rgba(15,23,42,.50); border: 1px solid rgba(148,163,184,.18); }
    .review b { color: #dbeafe; }

    .result { padding: 22px; }
    .scoreBig { font-size: clamp(34px, 11vw, 64px); font-weight: 950; line-height: 1; margin: 12px 0; }
    .note { margin-top: 18px; border-radius: 18px; border: 1px solid var(--warn-line); background: var(--warn-bg); padding: 14px; color: #fde68a; }
    .history { display: grid; gap: 10px; margin-top: 18px; }
    .historyItem { padding: 13px; border-radius: 16px; background: rgba(15,23,42,.50); border: 1px solid rgba(148,163,184,.18); }
    .historyItem.good { border-color: rgba(52,211,153,.35); }
    .historyItem.bad { border-color: rgba(251,113,133,.35); }
    .hidden { display: none !important; }

    @media (max-width: 860px) {
      .wrap { padding: 12px 10px 28px; }
      .hero { padding: 18px; border-radius: 22px; }
      .stats { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .side { position: static; }
      .card { padding: 16px; }
      .topline { align-items: flex-start; flex-direction: column; }
      .option { padding: 12px; }
      .actions { justify-content: stretch; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="label">🌙 医療経営士2級対策</div>
      <h1>2026年度診療報酬改定<br>改定率実践問題</h1>
      <p class="lead">診療報酬本体、賃上げ、物価対応、食費・光熱水費、薬価等、過去改定率の推移を、実際の数値の取り違えに注意しながら確認します。</p>
      <div class="stats">
        <div class="stat"><small>出題形式</small><b>五者択一</b></div>
        <div class="stat"><small>出題方法</small><b>カテゴリ別ランダム</b></div>
        <div class="stat"><small>問題数</small><b><span id="totalLabel">11</span>問</b></div>
      </div>
    </header>

    <div class="progressOuter"><div id="progress" class="progressInner"></div></div>

    <section id="quizScreen" class="grid">
      <main class="card" id="questionTop">
        <div class="topline">
          <span class="pill primary" id="countPill">問題 1 / 11</span>
          <span class="pill category" id="categoryPill">カテゴリ</span>
        </div>
        <div class="question" id="questionText"></div>
        <div class="options" id="options"></div>
        <div class="actions">
          <button class="btn" id="answerBtn" disabled>回答</button>
          <button class="btn" id="nextBtn" style="display:none;">次の問題へ</button>
        </div>
      </main>

      <aside class="side">
        <h2>解説</h2>
        <div id="explain" class="explainBox">選択肢を1つ選び、「回答」を押すと正誤判定と解説が表示されます。</div>
        <div class="review">
          <div class="miniTitle">現在の得点</div>
          <b id="scoreLabel">0点</b>
          <div class="miniTitle">進捗</div>
          <b id="progressLabel">1 / 11</b>
        </div>
      </aside>
    </section>

    <section id="resultScreen" class="result hidden">
      <div class="label">🏆 結果</div>
      <div class="scoreBig" id="resultScore">0 / 11</div>
      <p id="resultMessage" class="lead"></p>
      <div class="note">
        試験対策では、「本体はプラス、薬価等はマイナス」という大枠に加えて、2026年度は賃上げ・物価対応により本体改定率が大きい点を押さえると整理しやすいです。
      </div>
      <div class="actions" style="justify-content:flex-start;">
        <button class="btn" id="restartBtn">問題を変えてもう一度解く</button>
      </div>
      <div class="history" id="history"></div>
    </section>
  </div>

    function shuffleArray(array) {
      const copied = array.slice();
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = copied[i];
        copied[i] = copied[j];
        copied[j] = tmp;
      }
      return copied;
    }

    function buildQuiz() {
      const picked = questionPools.map(function(pool) {
        const q = shuffleArray(pool.questions)[0];
        const opts = shuffleArray(q.options).map(function(o) { return Object.assign({}, o); });
        return Object.assign({}, q, { category: pool.category, options: opts });
      });
      return shuffleArray(picked);
    }

    let quizSet = [];
    let currentIndex = 0;
    let selected = null;
    let answered = false;
    let score = 0;
    let history = [];

    const el = {
      quizScreen: document.getElementById('quizScreen'),
      resultScreen: document.getElementById('resultScreen'),
      totalLabel: document.getElementById('totalLabel'),
      progress: document.getElementById('progress'),
      countPill: document.getElementById('countPill'),
      categoryPill: document.getElementById('categoryPill'),
      questionText: document.getElementById('questionText'),
      options: document.getElementById('options'),
      answerBtn: document.getElementById('answerBtn'),
      nextBtn: document.getElementById('nextBtn'),
      explain: document.getElementById('explain'),
      scoreLabel: document.getElementById('scoreLabel'),
      progressLabel: document.getElementById('progressLabel'),
      resultScore: document.getElementById('resultScore'),
      resultMessage: document.getElementById('resultMessage'),
      restartBtn: document.getElementById('restartBtn'),
      history: document.getElementById('history'),
      questionTop: document.getElementById('questionTop')
    };

    function startQuiz() {
      quizSet = buildQuiz();
      currentIndex = 0;
      selected = null;
      answered = false;
      score = 0;
      history = [];
      el.totalLabel.textContent = quizSet.length;
      el.quizScreen.classList.remove('hidden');
      el.resultScreen.classList.add('hidden');
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderQuestion() {
      const q = quizSet[currentIndex];
      selected = null;
      answered = false;
      el.countPill.textContent = '問題 ' + (currentIndex + 1) + ' / ' + quizSet.length;
      el.categoryPill.textContent = q.category;
      el.questionText.textContent = q.question;
      el.options.innerHTML = '';
      el.answerBtn.disabled = true;
      el.answerBtn.style.display = '';
      el.nextBtn.style.display = 'none';
      el.explain.className = 'explainBox';
      el.explain.textContent = '選択肢を1つ選び、「回答」を押すと正誤判定と解説が表示されます。';
      el.scoreLabel.textContent = score + '点';
      el.progressLabel.textContent = (currentIndex + 1) + ' / ' + quizSet.length;
      el.progress.style.width = (((currentIndex + 1) / quizSet.length) * 100) + '%';

      q.options.forEach(function(option, index) {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.type = 'button';
        btn.innerHTML = '<span class="num">' + (index + 1) + '</span><span class="optionText"></span><span class="mark"></span>';
        btn.querySelector('.optionText').textContent = option.text;
        btn.addEventListener('click', function() {
          if (answered) return;
          selected = index;
          Array.from(el.options.children).forEach(function(child) { child.classList.remove('selected'); });
          btn.classList.add('selected');
          el.answerBtn.disabled = false;
        });
        el.options.appendChild(btn);
      });
    }

    function submitAnswer() {
      if (selected === null || answered) return;
      const q = quizSet[currentIndex];
      const selectedOption = q.options[selected];
      const correctIndex = q.options.findIndex(function(o) { return o.correct; });
      const correctOption = q.options[correctIndex];
      answered = true;
      if (selectedOption.correct) score++;

      Array.from(el.options.children).forEach(function(btn, index) {
        btn.disabled = true;
        const option = q.options[index];
        const mark = btn.querySelector('.mark');
        if (option.correct) {
          btn.classList.add('correct');
          mark.textContent = '○';
          mark.classList.add('ok');
        } else if (index === selected) {
          btn.classList.add('wrong');
          mark.textContent = '×';
          mark.classList.add('ng');
        }
      });

      el.explain.className = 'explainBox ' + (selectedOption.correct ? 'good' : 'bad');
      el.explain.innerHTML =
        '<p><b>' + (selectedOption.correct ? '正解です！' : '不正解です') + '</b></p>' +
        '<p class="miniTitle">選択した回答</p>' +
        '<p></p>' +
        (!selectedOption.correct ? '<p class="miniTitle">正答</p><p></p>' : '') +
        '<p class="miniTitle">解説</p><p></p>';
      const ps = el.explain.querySelectorAll('p');
      ps[2].textContent = selectedOption.text;
      if (selectedOption.correct) {
        ps[4].textContent = selectedOption.feedback;
      } else {
        ps[4].textContent = correctOption.text;
        ps[6].textContent = selectedOption.feedback;
      }

      history.push({
        category: q.category,
        question: q.question,
        selected: selectedOption.text,
        correct: correctOption.text,
        ok: selectedOption.correct,
        feedback: selectedOption.feedback
      });

      el.scoreLabel.textContent = score + '点';
      el.answerBtn.style.display = 'none';
      el.nextBtn.style.display = '';
      el.nextBtn.textContent = currentIndex === quizSet.length - 1 ? '結果を見る' : '次の問題へ';
    }

    function nextQuestion() {
      if (currentIndex === quizSet.length - 1) {
        showResult();
        return;
      }
      currentIndex++;
      renderQuestion();
      document.getElementById('questionTop').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showResult() {
      el.quizScreen.classList.add('hidden');
      el.resultScreen.classList.remove('hidden');
      el.progress.style.width = '100%';
      el.resultScore.textContent = score + ' / ' + quizSet.length;
      const rate = Math.round((score / quizSet.length) * 100);
      el.resultMessage.textContent = '正答率 ' + rate + '％。カテゴリ別の取り違えを確認して、もう一度ランダム出題で復習できます。';
      el.history.innerHTML = '';
      history.forEach(function(item, idx) {
        const div = document.createElement('div');
        div.className = 'historyItem ' + (item.ok ? 'good' : 'bad');
        div.innerHTML = '<b>問' + (idx + 1) + '：' + item.category + '</b><br>' +
          '<span></span><br>' +
          '<small>' + (item.ok ? '○ 正解' : '× 不正解') + '</small>';
        div.querySelector('span').textContent = item.question;
        el.history.appendChild(div);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    el.answerBtn.addEventListener('click', submitAnswer);
    el.nextBtn.addEventListener('click', nextQuestion);
    el.restartBtn.addEventListener('click', startQuiz);
    startQuiz();
  </script>
