:grid;gap:10px}.option{border:1px solid var(--line);background:rgba(15,23,42,.78);border-radius:16px;padding:12px;cursor:pointer;display:flex;gap:10px;align-items:flex-start}.option:hover{background:#172033}.option.selected{border-color:#38bdf8;background:#082f49}.option.correct{background:var(--okbg);border-color:#22c55e;color:#dcfce7}.option.wrong{background:var(--badbg);border-color:#ef4444;color:#fee2e2}.option.missed{background:#143522;border-color:#16a34a;color:#dcfce7}.option input{margin-top:7px;accent-color:#38bdf8}.opttext{font-weight:750}.feedback{display:none;margin-top:14px;padding:13px 15px;border-radius:15px;border:1px solid var(--line);background:#0f172a}.feedback.show{display:block}.feedback.ok{background:var(--okbg);border-color:#22c55e}.feedback.bad{background:var(--badbg);border-color:#ef4444}.explain{margin-top:10px;padding:13px 15px;border-radius:15px;border:1px solid var(--line);background:rgba(15,23,42,.75)}.result{display:none;padding:20px;margin:18px 0}.result.show{display:block}.review{margin-top:12px;display:grid;gap:10px}.review div{border:1px solid var(--line);border-radius:14px;padding:11px 13px;background:rgba(15,23,42,.75)}footer{color:var(--muted);font-size:12px;padding:28px 18px;text-align:center}@media(max-width:720px){.status{grid-template-columns:repeat(2,minmax(0,1fr))}.card{padding:16px}body{font-size:15px}}

<body>
<header><div class="wrap"><h1>アンゾフの成長マトリックス実践問題</h1><p class="lead">医療・介護の具体例を通じて、市場浸透・市場開拓・製品開発・多角化の区別を確認する問題です。</p></div></header>
<main class="wrap">
<section class="panel">
<strong>学習できる内容</strong>
<p class="small">基本知識1問と、医療・介護の具体例を交えた4問を出題します。各カテゴリ3問ずつのプールから毎回1問をランダム出題し、選択肢の順番も毎回変わります。</p>
<div class="status"><div class="stat"><b id="total">5</b><span>出題数</span></div><div class="stat"><b id="answered">0</b><span>解答済み</span></div><div class="stat"><b id="correct">0</b><span>正解数</span></div><div class="stat"><b id="rate">0%</b><span>正答率</span></div></div>
<div class="bar"><div id="fill"></div></div><div class="actions"><button class="primary" onclick="restart()">問題をランダム再出題</button><button class="secondary" onclick="showResult()">現在の結果を見る</button></div>
</section>
<section id="quiz"></section>
<section id="result" class="result"><h2>結果</h2><p id="resultText"></p><p class="small" id="hint"></p><div id="review" class="review"></div><div class="actions"><button class="primary" onclick="restart()">再チャレンジする</button><button class="secondary" onclick="scrollQ()">問題へ戻る</button></div></section>
</main>
<footer>医療経営士2級対策用の自習クイズです。迷ったら「市場は既存か新規か」「サービスは既存か新規か」を先に確認してください。</footer>
<script>
const BANK = {"基本知識": [{"q": "アンゾフの成長マトリックスの4つの戦略として、最も適切な組み合わせはどれか。", "c": [["市場浸透戦略、市場開拓戦略、製品開発戦略、多角化戦略", true, "アンゾフの成長マトリックスは、既存・新規の市場と、既存・新規の製品・サービスの組み合わせで4つの戦略に整理します。"], ["コストリーダーシップ戦略、差別化戦略、集中戦略、市場浸透戦略", false, "コストリーダーシップ・差別化・集中はポーターの基本戦略です。アンゾフの4戦略ではありません。"], ["規模の経済、製品差別化、巨額の投資、政府の政策", false, "これはポーターの参入障壁に関係する項目です。アンゾフの成長マトリックスではありません。"], ["財務、顧客、業務プロセス、学習と成長", false, "これはBSCの4つの視点です。アンゾフの成長マトリックスではありません。"], ["強み、弱み、機会、脅威", false, "これはSWOT分析の4要素です。アンゾフの4戦略ではありません。"]], "e": "アンゾフの成長マトリックスは、市場を既存・新規、サービスを既存・新規に分け、市場浸透、市場開拓、製品開発、多角化の4戦略を整理するものです。"}, {"q": "アンゾフの成長マトリックスにおいて「既存市場×既存サービス」に該当する戦略はどれか。", "c": [["市場浸透戦略", true, "既存の市場に、既存のサービスをより浸透させる戦略です。"], ["市場開拓戦略", false, "市場開拓戦略は、新規市場×既存サービスです。"], ["製品開発戦略", false, "製品開発戦略は、既存市場×新規サービスです。"], ["多角化戦略", false, "多角化戦略は、新規市場×新規サービスです。"], ["集中戦略", false, "集中戦略はポーターの基本戦略に含まれるもので、アンゾフの4戦略ではありません。"]], "e": "既存市場×既存サービスは市場浸透戦略です。医療では、今の地域で既存の診療機能をより多く利用してもらう活動が該当します。"}, {"q": "アンゾフの成長マトリックスにおいて「新規市場×新規サービス」に該当する戦略はどれか。", "c": [["多角化戦略", true, "新しい市場に、新しいサービスを提供するため、多角化戦略です。"], ["市場浸透戦略", false, "市場浸透戦略は、既存市場×既存サービスです。"], ["市場開拓戦略", false, "市場開拓戦略は、新規市場×既存サービスです。"], ["製品開発戦略", false, "製品開発戦略は、既存市場×新規サービスです。"], ["差別化戦略", false, "差別化戦略はポーターの基本戦略であり、アンゾフの4戦略ではありません。"]], "e": "多角化は4戦略の中で最もリスクが高くなりやすい戦略です。医療・介護では、新しい地域や対象に、これまで行っていないサービスを展開する場合が該当します。"}], "市場浸透戦略": [{"q": "地域の既存患者・紹介元に対し、現在の内科・整形外科の診療機能をより利用してもらうため、診療所訪問や広報を強化して紹介入院を増やすことにした。この戦略として最も適切なものはどれか。", "c": [["市場浸透戦略", true, "既存の医療圏・紹介元に、既存の診療機能をより利用してもらうため、市場浸透戦略です。"], ["市場開拓戦略", false, "市場開拓戦略は、新しい地域や新しい患者層に、既存サービスを広げる場合です。設問では既存の地域・紹介元が対象です。"], ["製品開発戦略", false, "製品開発戦略は、既存市場に新しいサービスを提供する場合です。設問では現在の診療機能を活用しています。"], ["多角化戦略", false, "多角化戦略は、新規市場×新規サービスです。設問では市場もサービスも既存です。"], ["非市場戦略", false, "行政・制度・住民・メディアなどへの働きかけが中心ではなく、既存市場での利用増を狙う戦略です。"]], "e": "市場浸透戦略は、今の地域・今の患者層・今の紹介元に、現在のサービスをもっと利用してもらう戦略です。"}, {"q": "既存のデイサービス事業所が、現在の利用者に対して利用曜日の追加や入浴サービスの利用を提案し、稼働率を高めようとしている。この戦略として最も適切なものはどれか。", "c": [["市場浸透戦略", true, "既存の利用者に、既存のデイサービスをより多く利用してもらう活動であるため、市場浸透戦略です。"], ["市場開拓戦略", false, "新しい地域や新しい利用者層に広げているわけではありません。"], ["製品開発戦略", false, "新しいサービスを開発しているのではなく、既存サービスの利用を増やしています。"], ["多角化戦略", false, "新規市場×新規サービスではありません。"], ["責任会計", false, "責任会計は管理会計上の責任センターに関する考え方で、成長戦略の分類ではありません。"]], "e": "介護でも、既存利用者の利用頻度を高める、既存ケアマネからの紹介を増やす、稼働率を上げるといった活動は市場浸透戦略として整理できます。"}, {"q": "既存の健診センターが、これまで利用している地域住民に対して再受診勧奨を強化し、精密検査や継続受診につなげることにした。この戦略として最も適切なものはどれか。", "c": [["市場浸透戦略", true, "既存の地域住民に対し、既存の健診・検査機能の利用を高める活動であるため、市場浸透戦略です。"], ["市場開拓戦略", false, "新しい地域や新しい顧客層へ広げる活動ではありません。"], ["製品開発戦略", false, "新しい健診メニューや新しい医療サービスを作っているわけではありません。"], ["多角化戦略", false, "新規市場×新規サービスではありません。"], ["PEST分析", false, "PEST分析は外部環境分析であり、設問の成長戦略分類ではありません。"]], "e": "既存の患者・利用者・住民に、既存サービスの利用頻度や継続率を高める場合は市場浸透と考えます。"}], "市場開拓戦略": [{"q": "病院が現在行っている健診サービスを、地域住民向けだけでなく、これまで取引のなかった近隣企業の職域健診に広げることにした。この戦略として最も適切なものはどれか。", "c": [["市場開拓戦略", true, "健診という既存サービスを、近隣企業という新しい市場に広げるため、市場開拓戦略です。"], ["市場浸透戦略", false, "市場浸透は既存市場×既存サービスです。設問では新しい顧客層に広げています。"], ["製品開発戦略", false, "製品開発は既存市場×新規サービスです。設問では健診サービス自体は既存です。"], ["多角化戦略", false, "多角化は新規市場×新規サービスです。設問ではサービスは既存です。"], ["BSC", false, "BSCは4視点で戦略を指標化する仕組みで、アンゾフの戦略分類ではありません。"]], "e": "市場開拓戦略は、既存サービスを新しい地域・新しい対象・新しい患者層へ広げる戦略です。"}, {"q": "訪問介護事業所が、現在提供している訪問介護サービスを、これまで対応していなかった隣接市町村にも展開することにした。この戦略として最も適切なものはどれか。", "c": [["市場開拓戦略", true, "訪問介護という既存サービスを、隣接市町村という新しい市場に展開するため、市場開拓戦略です。"], ["市場浸透戦略", false, "市場浸透は、現在の市場で既存サービスの利用を高める戦略です。設問では対象地域が広がっています。"], ["製品開発戦略", false, "新しいサービスを既存市場に提供するわけではありません。"], ["多角化戦略", false, "サービスは既存の訪問介護であり、新規サービスではありません。"], ["ABC分析", false, "ABC分析は重点管理対象を分類する手法で、成長戦略の分類ではありません。"]], "e": "既存の介護サービスを、隣接地域や新しいケアマネ事業所、未対応の利用者層に広げる場合は市場開拓戦略です。"}, {"q": "リハビリ機能を持つ病院が、現在の外来リハビリを、これまで接点の少なかった地域の介護施設入所者にも提供できるよう連携先を広げた。この戦略として最も適切なものはどれか。", "c": [["市場開拓戦略", true, "既存のリハビリ機能を、これまで接点の少なかった介護施設入所者という新しい対象に広げているため、市場開拓戦略です。"], ["市場浸透戦略", false, "既存の対象に利用頻度を高める活動ではなく、新しい対象に広げています。"], ["製品開発戦略", false, "リハビリ機能自体は既存であり、新しいサービスを開発しているわけではありません。"], ["多角化戦略", false, "新規市場ではありますが、サービスは既存のリハビリ機能です。"], ["差額原価収益分析", false, "これは意思決定による収益・費用の変化を見る分析で、アンゾフの分類ではありません。"]], "e": "市場開拓では、サービスは変えずに、提供先の地域・顧客層・患者層を広げる点を見ます。"}], "製品開発戦略": [{"q": "既存の糖尿病患者に対し、従来の外来診療に加えてフットケア外来と栄養指導プログラムを新設した。この戦略として最も適切なものはどれか。", "c": [["製品開発戦略", true, "既存患者に対して新しい外来・指導プログラムを提供するため、製品開発戦略です。医療では新規サービス開発と考えます。"], ["市場浸透戦略", false, "市場浸透は既存市場×既存サービスです。設問では新しいサービスを追加しています。"], ["市場開拓戦略", false, "新しい地域や新しい患者層へ広げているわけではありません。"], ["多角化戦略", false, "市場は既存患者であり、新規市場ではありません。"], ["ファイブフォース分析", false, "ファイブフォースは業界構造分析であり、アンゾフの成長戦略分類ではありません。"]], "e": "製品開発戦略は、既存の患者・利用者・市場に対して、新しいサービスを提供する戦略です。"}, {"q": "既存のデイサービス利用者に対し、新たに認知症予防プログラムと口腔機能向上プログラムを追加した。この戦略として最も適切なものはどれか。", "c": [["製品開発戦略", true, "既存利用者に新しい介護予防・機能向上プログラムを提供するため、製品開発戦略です。"], ["市場浸透戦略", false, "既存サービスの利用頻度を増やすだけではなく、新しいプログラムを追加しています。"], ["市場開拓戦略", false, "新しい地域や新しい利用者層へ広げているわけではありません。"], ["多角化戦略", false, "新規市場ではなく既存利用者を対象にしています。"], ["SWOT分析", false, "SWOT分析は内部環境・外部環境の整理であり、アンゾフの分類ではありません。"]], "e": "介護サービスでも、既存利用者に新しいプログラムやサービスを追加する場合は製品開発戦略として整理できます。"}, {"q": "地域の既存患者向けに、病院がオンライン診療とオンライン服薬指導連携を開始した。この戦略として最も適切なものはどれか。", "c": [["製品開発戦略", true, "既存患者に対して新しい提供方法・新しいサービスを導入しているため、製品開発戦略です。"], ["市場浸透戦略", false, "既存サービスの利用増だけではなく、新しいサービス・提供方法を追加しています。"], ["市場開拓戦略", false, "新しい患者層や地域に広げる点よりも、既存患者への新サービス提供が中心です。"], ["多角化戦略", false, "市場は既存患者であり、新規市場ではありません。"], ["責任会計", false, "責任会計は管理会計の制度で、成長戦略の分類ではありません。"]], "e": "医療DXやオンライン診療も、既存患者への新しいサービスとして導入する場合は製品開発戦略に分類できます。"}], "多角化戦略": [{"q": "外来・入院中心の医療法人が、これまで事業展開していなかった地域で高齢者住宅事業を新たに始めることにした。この戦略として最も適切なものはどれか。", "c": [["多角化戦略", true, "新しい地域に、新しい高齢者住宅事業を展開するため、新規市場×新規サービスの多角化戦略です。"], ["市場浸透戦略", false, "既存市場×既存サービスの利用を増やす戦略ではありません。"], ["市場開拓戦略", false, "新規市場ではありますが、サービスも新規であるため、市場開拓より多角化が適切です。"], ["製品開発戦略", false, "新規サービスではありますが、対象市場も新しいため、製品開発ではなく多角化です。"], ["NPS", false, "NPSは顧客ロイヤルティ指標であり、アンゾフの戦略分類ではありません。"]], "e": "多角化戦略は、新しい市場に新しいサービスを提供する戦略で、4類型の中でリスクが高くなりやすいものです。"}, {"q": "介護施設を運営する法人が、未展開の地域で企業向けの介護離職防止コンサルティング事業を開始した。この戦略として最も適切なものはどれか。", "c": [["多角化戦略", true, "未展開地域という新規市場に、企業向けコンサルティングという新規サービスを提供しているため、多角化戦略です。"], ["市場浸透戦略", false, "現在の利用者に既存サービスをより利用してもらう活動ではありません。"], ["市場開拓戦略", false, "市場は新しいですが、サービスも新しいため、市場開拓ではなく多角化です。"], ["製品開発戦略", false, "新サービスではありますが、市場も新しいため、製品開発ではなく多角化です。"], ["PM理論", false, "PM理論はリーダーシップ機能の分類であり、アンゾフの成長戦略ではありません。"]], "e": "新しい対象に新しい事業を始める場合は多角化です。医療・介護では、人材、許認可、制度理解、投資負担が大きくなる点に注意します。"}, {"q": "病院グループが、これまで接点の少なかった若年層を対象に、地域外で健康増進フィットネス事業を開始した。この戦略として最も適切なものはどれか。", "c": [["多角化戦略", true, "若年層・地域外という新しい市場に、フィットネスという新しいサービスを提供するため、多角化戦略です。"], ["市場浸透戦略", false, "現在の患者や地域に既存サービスをより利用してもらう活動ではありません。"], ["市場開拓戦略", false, "新規市場ではありますが、サービスも新規であるため、市場開拓ではなく多角化です。"], ["製品開発戦略", false, "新規サービスではありますが、既存患者向けではなく新規市場を対象にしています。"], ["PEST分析", false, "PEST分析は外部環境分析であり、アンゾフの戦略分類ではありません。"]], "e": "多角化は、医療・介護の周辺分野に進出する場合にも使える考え方です。ただし、単に新サービスというだけでなく、市場も新しいかを確認します。"}]};
const PER_ROUND=5;let qs=[],idx=0,answered=0,correct=0,records=[];
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function sh(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function make(raw,cat){let cs=sh(raw.c).map(x=>({text:x[0],correct:x[1],reason:x[2]}));return {cat,q:raw.q,exp:raw.e,choices:cs,answered:false,selected:null,correctIndex:cs.findIndex(c=>c.correct)}}
function sample(){let out=[];for(const cat of sh(Object.keys(BANK))){out.push(make(sh(BANK[cat])[0],cat));if(out.length>=PER_ROUND)break}return sh(out)}
function restart(){qs=sample();idx=0;answered=0;correct=0;records=[];document.getElementById("result").classList.remove("show");render();window.scrollTo({top:0,behavior:"smooth"})}
function render(){let q=qs[idx];let opts=q.choices.map((c,i)=>{let cls="option";if(q.selected===i&&!q.answered)cls+=" selected";if(q.answered&&c.correct)cls+=q.selected===i?" correct":" missed";if(q.answered&&q.selected===i&&!c.correct)cls+=" wrong";return `<label class="${cls}" onclick="selectChoice(${i})"><input type="radio" name="choice" ${q.selected===i?"checked":""} ${q.answered?"disabled":""}><span class="opttext">${i+1}. ${esc(c.text)}</span></label>`}).join("");let fb=q.answered?feedback(q):"";document.getElementById("quiz").innerHTML=`<article class="card" id="qtop"><div class="qhead"><span class="qnum">問${idx+1} / ${qs.length}</span><span class="tag">${esc(q.cat)}</span><span class="diff">${q.cat==="基本知識"?"基本":"具体例"}</span></div><div class="question">${esc(q.q)}</div><div class="options">${opts}</div><div class="actions"><button class="primary" onclick="submit()" ${q.answered?"disabled":""}>回答</button><button class="secondary" onclick="prev()" ${idx===0?"disabled":""}>前の問題へ</button><button class="secondary" onclick="next()" ${idx===qs.length-1?"disabled":""}>次の問題へ</button></div>${fb}</article>`;status()}
function feedback(q){let s=q.choices[q.selected],good=s.correct,ans=q.choices[q.correctIndex];return `<div class="feedback show ${good?"ok":"bad"}"><strong>${good?"正解です。":"不正解です。"} 正解：${q.correctIndex+1}. ${esc(ans.text)}</strong><br>${good?esc(s.reason):"選択した答えが誤りである理由："+esc(s.reason)}<div class="explain"><strong>解説：</strong>${esc(q.exp)}</div></div>`}
function selectChoice(i){let q=qs[idx];if(q.answered)return;q.selected=i;render()}
function submit(){let q=qs[idx];if(q.answered)return;if(q.selected===null){alert("選択肢を1つ選んでから「回答」を押してください。");return}q.answered=true;answered++;if(q.choices[q.selected].correct)correct++;records[idx]={correct:q.choices[q.selected].correct,cat:q.cat,selected:q.choices[q.selected].text,answer:q.choices[q.correctIndex].text};render();if(answered===qs.length)showResult()}
function prev(){if(idx>0){idx--;render();scrollQ()}}
function next(){if(idx<qs.length-1){idx++;render();scrollQ()}}
function status(){document.getElementById("total").textContent=qs.length;document.getElementById("answered").textContent=answered;document.getElementById("correct").textContent=correct;let r=answered?Math.round(correct/answered*100):0;document.getElementById("rate").textContent=r+"%";document.getElementById("fill").style.width=(answered/qs.length*100)+"%"}
function showResult(){let r=answered?Math.round(correct/answered*100):0;document.getElementById("resultText").innerHTML=`<strong>${answered}問解答 / ${qs.length}問中 ${correct}問正解（正答率 ${r}%）</strong>`;document.getElementById("hint").textContent=r>=90?"かなり定着しています。":r>=70?"良いペースです。市場とサービスの既存・新規を確認しましょう。":"まずは、既存市場・新規市場、既存サービス・新規サービスの2軸で整理しましょう。";let wrong=records.map((x,i)=>x&&!x.correct?`<div><strong>問${i+1}（${esc(x.cat)}）</strong><br>選択：${esc(x.selected)}<br>正解：${esc(x.answer)}</div>`:"").join("");document.getElementById("review").innerHTML=wrong||(answered?'<div>誤答はありません。</div>':'');document.getElementById("result").classList.add("show");document.getElementById("result").scrollIntoView({behavior:"smooth",block:"start"})}
function scrollQ(){let e=document.getElementById("qtop");if(e)e.scrollIntoView({behavior:"smooth",block:"start"})}
restart();
</script>
