<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>りゅうチャンネル復習問題</title>
<style>
:root {
  --bg:#0d1420;
  --bg2:#111b2b;
  --card:#162235;
  --card2:#1b2a42;
  --text:#e7eefb;
  --muted:#a9b6cc;
  --line:#2c3b55;
  --accent:#8fc7c3;
  --accent2:#d8b46a;
  --ok:#7bd88f;
  --bad:#ff8b8b;
  --shadow:0 16px 45px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  background:radial-gradient(circle at top left,#172943 0,#0d1420 46%,#080c13 100%);
  color:var(--text);
  line-height:1.75;
  -webkit-text-size-adjust:100%;
}
header{
  padding:26px 16px 14px;
}
.wrap{max-width:880px;margin:0 auto}
.hero{
  background:linear-gradient(135deg,rgba(143,199,195,.13),rgba(216,180,106,.08));
  border:1px solid rgba(143,199,195,.22);
  border-radius:24px;
  padding:20px;
  box-shadow:var(--shadow);
}
h1{font-size:clamp(1.35rem,5vw,2.15rem);line-height:1.35;margin:0 0 10px}
.sub{color:var(--muted);font-size:.95rem;margin:0}
main{padding:12px 16px 32px}
.panel{
  background:rgba(22,34,53,.96);
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px;
  box-shadow:var(--shadow);
}
.progress-area{margin-bottom:14px}
.progress-meta{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:.88rem;margin-bottom:8px}
.progress{height:10px;border-radius:999px;background:#0a111c;overflow:hidden;border:1px solid #263650}
.progress > span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .25s ease}
.category{
  color:var(--accent);
  font-size:.86rem;
  font-weight:700;
  letter-spacing:.02em;
  margin:4px 0 8px;
}
.qtext{font-size:1.05rem;font-weight:700;white-space:pre-wrap;margin:0 0 16px}
.choices{display:grid;gap:10px;margin:12px 0}
.choice{
  width:100%;
  display:block;
  text-align:left;
  padding:13px 14px;
  border:1px solid var(--line);
  border-radius:16px;
  background:rgba(12,19,31,.72);
  color:var(--text);
  cursor:pointer;
  transition:transform .08s ease,border-color .15s ease,background .15s ease;
}
.choice:active{transform:scale(.99)}
.choice.selected{border-color:var(--accent);background:rgba(143,199,195,.12)}
.choice.correct{border-color:rgba(123,216,143,.7);background:rgba(123,216,143,.12)}
.choice.wrong{border-color:rgba(255,139,139,.75);background:rgba(255,139,139,.12)}
.choice-text{display:block;font-size:.96rem;line-height:1.65}
.choice-no{font-weight:900;color:var(--accent2);margin-right:.45em;white-space:nowrap}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button:not(.choice){
  appearance:none;
  border:0;
  border-radius:14px;
  padding:12px 16px;
  font-weight:800;
  color:#081019;
  background:var(--accent);
  cursor:pointer;
  font-size:1rem;
}
button.secondary{background:#263650;color:var(--text);border:1px solid var(--line)}
button.gold{background:var(--accent2)}
button:disabled{opacity:.45;cursor:not-allowed}
.feedback{
  margin-top:16px;
  border-radius:18px;
  border:1px solid var(--line);
  background:rgba(9,14,23,.75);
  padding:14px;
  display:none;
}
.feedback.show{display:block}
.result-title{font-size:1.05rem;font-weight:900;margin:0 0 6px}
.result-title.ok{color:var(--ok)}
.result-title.bad{color:var(--bad)}
.explain{color:#d5deef;margin:.4rem 0 0;white-space:pre-wrap}
.small{font-size:.88rem;color:var(--muted)}
.final{text-align:center;padding:24px 10px}
.final .score{font-size:2.4rem;font-weight:900;color:var(--accent2);margin:8px 0}
.source-note{margin-top:16px;color:var(--muted);font-size:.78rem}
.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#0b1220;border:1px solid #2b3b55;border-radius:6px;padding:1px 6px;color:#dfe8f8}
@media (max-width:520px){
  header{padding-top:16px}
  .hero,.panel{border-radius:18px;padding:15px}
  .choice{padding:12px 11px}
  button:not(.choice){width:100%;padding:13px 14px}
  .actions{gap:8px}
}
</style>
</head>
<body>
<header>
  <div class="wrap hero">
    <h1>りゅうチャンネル復習問題</h1>
    <p class="sub">りゅうチャンネルの11論点から、各論点5問のプールを作成。毎回、各論点から1問ずつランダムに出題します。</p>
  </div>
</header>
<main>
  <div class="wrap">
    <section id="quiz" class="panel" aria-live="polite"></section>
  </div>
</main>
<script>
const CATEGORIES = [{"id":"basic","title":"01 基本データ：改定率・賃上げ・食費","note":"令和8年度診療報酬改定の本体改定率、薬価等、賃上げ目標、食費・光熱水費の数字を確認する。","pool":[{"prompt":"令和8年度診療報酬改定の改定率等について、最も適切なものはどれか。","choices":[{"text":"診療報酬本体は＋3.09％、薬価等は▲0.87％であり、本体は令和8年度・令和9年度の2年度平均として示されている。","correct":true,"feedback":"本体＋3.09％、薬価等▲0.87％の組み合わせが正しい。"},{"text":"診療報酬本体は＋3.09％、薬価等は＋0.87％であり、薬価等もプラス改定となった。","correct":false,"feedback":"薬価等はプラスではなく▲0.87％。"},{"text":"診療報酬本体は＋2.41％であり、令和8年度・令和9年度の2年度平均が＋3.77％である。","correct":false,"feedback":"令和8年度が＋2.41％、令和9年度が＋3.77％で、2年度平均が＋3.09％。"},{"text":"診療報酬本体は＋3.09％、薬価は▲0.86％、材料価格は＋0.01％で、薬価等合計は▲0.85％である。","correct":false,"feedback":"材料価格は▲0.01％、薬価等合計は▲0.87％。"},{"text":"診療報酬本体は＋1.70％であり、この数値が改定全体の本体改定率として扱われる。","correct":false,"feedback":"＋1.70％は賃上げ分であり、本体改定率は＋3.09％。"}],"explanation":"令和8年度改定では、診療報酬本体は2年度平均で＋3.09％、薬価等合計は▲0.87％である。薬価等の内訳は薬価▲0.86％、材料価格▲0.01％。"},{"prompt":"令和8年度診療報酬改定の本体改定率の内訳について、正しい組み合わせはどれか。\n\nア 賃上げ分は＋1.70％である。\nイ 物価対応分は＋0.76％である。\nウ 食費・光熱水費分は＋0.09％である。\nエ 後発医薬品への置換え等による効率化は＋0.15％である。\nオ 各科改定率は、医科＋0.28％、歯科＋0.31％、調剤＋0.08％である。","choices":[{"text":"ア・イ・ウ・オ","correct":true,"feedback":"効率化はプラスではなく▲0.15％なので、エは除く。"},{"text":"ア・イ・エ・オ","correct":false,"feedback":"エは▲0.15％の効率化であり、符号が逆。"},{"text":"ア・ウ・エ・オ","correct":false,"feedback":"イは正しいが、エは誤り。"},{"text":"イ・ウ・エ・オ","correct":false,"feedback":"アは正しく、エは誤り。"},{"text":"ア・イ・ウ・エ","correct":false,"feedback":"エは誤りで、オは正しい。"}],"explanation":"本体改定率の内訳として、賃上げ分＋1.70％、物価対応分＋0.76％、食費・光熱水費分＋0.09％が示された。効率化は▲0.15％。各科改定率は医科＋0.28％、歯科＋0.31％、調剤＋0.08％。"},{"prompt":"入院時の食費・光熱水費の基準額引上げについて、最も適切なものはどれか。","choices":[{"text":"食費は原則40円/食、光熱水費は原則60円/日引き上げられる。指定難病患者等の光熱水費は据え置きとされる。","correct":true,"feedback":"食費＋40円/食、光熱水費＋60円/日が正しい。"},{"text":"食費は原則60円/食、光熱水費は原則40円/日引き上げられる。指定難病患者等も同額引上げとなる。","correct":false,"feedback":"食費と光熱水費の数字が逆。指定難病患者等の光熱水費は据え置き。"},{"text":"食費は低所得者も含め一律40円/食引き上げられ、光熱水費は入院患者全体で据え置かれる。","correct":false,"feedback":"低所得者は所得区分等に応じ20〜30円/食、光熱水費は原則60円/日引上げ。"},{"text":"食費・光熱水費分は本体改定率に含まれず、薬価等の改定率に含めて整理されている。","correct":false,"feedback":"食費・光熱水費分＋0.09％は診療報酬本体の内訳として示されている。"},{"text":"食費は令和9年度から段階的に引き上げ、令和8年度は光熱水費のみ引き上げる。","correct":false,"feedback":"令和8年度改定で食費・光熱水費の基準額引上げが示されている。"}],"explanation":"入院時の食費は原則40円/食、光熱水費は原則60円/日引上げ。指定難病患者等の光熱水費は据え置きである。"},{"prompt":"令和8年度改定の基本的な見方として、最も適切なものはどれか。","choices":[{"text":"物価・賃金上昇、人材確保、2040年頃を見据えた医療提供体制の持続可能性が重視されている。","correct":true,"feedback":"今回改定の基本認識に沿った整理。"},{"text":"薬価等が大幅に引き上げられたため、診療報酬本体はマイナス改定とされた。","correct":false,"feedback":"診療報酬本体はプラス改定、薬価等はマイナス改定。"},{"text":"今回の中心は外来患者の自己負担抑制であり、賃上げや物価対応は改定率から除外された。","correct":false,"feedback":"賃上げ分・物価対応分は本体改定率の主要な内訳。"},{"text":"令和8年度は診療報酬本体も薬価等も同じ方向のプラス改定であり、医療機関の収益増に一本化された。","correct":false,"feedback":"薬価等は▲0.87％。本体と薬価等の方向は異なる。"},{"text":"令和8年度改定は単年度改定であり、令和9年度に関する段階的対応は設定されていない。","correct":false,"feedback":"本体改定率は令和8・9年度の2年度平均で示され、賃上げ・物価対応にも段階設計がある。"}],"explanation":"令和8年度改定は、物価・賃金上昇、人材確保、2040年頃を見据えた持続可能な提供体制が大きな背景にある。"},{"prompt":"賃上げ目標と改定率の関係について、最も適切なものはどれか。","choices":[{"text":"医療機関等の対象職員は令和8・9年度に各＋3.2％、看護補助者・事務職員は各＋5.7％のベースアップ実現を支援する。","correct":true,"feedback":"賃上げ目標の数字として正しい。"},{"text":"賃上げ分＋1.70％は、看護補助者・事務職員のベースアップ目標そのものである。","correct":false,"feedback":"＋1.70％は診療報酬本体の内訳。賃上げ目標は対象職員＋3.2％、看護補助者・事務職員＋5.7％。"},{"text":"対象職員のベースアップ目標は令和8年度＋5.7％、令和9年度＋3.2％と年度により異なる。","correct":false,"feedback":"対象職員は各年＋3.2％、看護補助者・事務職員は各年＋5.7％。"},{"text":"看護補助者・事務職員はベースアップ評価料の対象から外れたため、賃上げ目標は設定されていない。","correct":false,"feedback":"看護補助者・事務職員は特に＋5.7％の目標が示されている。"},{"text":"賃上げ目標は薬価等の▲0.87％に含めて整理されるため、診療報酬本体の内訳とは別である。","correct":false,"feedback":"賃上げ分は診療報酬本体の内訳として＋1.70％が示されている。"}],"explanation":"対象職員はR8・R9各＋3.2％、看護補助者・事務職員は各＋5.7％。この賃上げを支える内訳として賃上げ分＋1.70％が示された。"}]},{"id":"wage_price","title":"02 賃上げ・物価：ベースアップ評価料と物価対応料","note":"ベースアップ評価料の対象拡大、夜勤手当への充当、物価対応料の新設を確認する。","pool":[{"prompt":"令和8年度改定におけるベースアップ評価料と物価対応料について、最も適切なものはどれか。","choices":[{"text":"ベースアップ評価料は前回改定からの評価を見直し・拡大し、物価対応料は新設された。","correct":true,"feedback":"「ベースアップ評価料は新設」としない点が重要。"},{"text":"ベースアップ評価料と物価対応料はいずれも令和8年度に初めて新設された。","correct":false,"feedback":"ベースアップ評価料は令和6年度改定から存在し、令和8年度は見直し・拡大。"},{"text":"物価対応料は令和6年度改定で創設済みであり、令和8年度は算定対象から外来を除外した。","correct":false,"feedback":"物価対応料は令和8年度改定で新設。外来・在宅、入院、歯科、調剤、訪問看護に設定。"},{"text":"ベースアップ評価料は廃止され、すべて初診料・再診料の引上げに一本化された。","correct":false,"feedback":"ベースアップ評価料は見直し・段階的評価として残る。"},{"text":"物価対応料は薬価等のマイナス改定を補正する薬局専用の評価である。","correct":false,"feedback":"物価対応料は物件費高騰への段階的対応で、医科・歯科・調剤・訪問看護に広く設定される。"}],"explanation":"ベースアップ評価料は『新設』ではなく見直し・対象拡大。物価対応料は令和8年度改定で新設され、令和9年度は令和8年度の2倍の設計となる。"},{"prompt":"ベースアップ評価料の対象職員について、正しい組み合わせはどれか。\n\nア 事務職員が対象に加わる。\nイ 40歳未満の医師・歯科医師・薬局薬剤師が対象に加わる。\nウ 経営者・役員は対象に含める。\nエ 業務委託により勤務する者は対象から除く。\nオ 対象は従来どおり主として医療に従事する職員に限られる。","choices":[{"text":"ア・イ・エ","correct":true,"feedback":"事務職員、40歳未満の医師等が加わり、経営者・役員や業務委託者は除く。"},{"text":"ア・イ・ウ","correct":false,"feedback":"経営者・役員は対象に含めない。"},{"text":"イ・ウ・エ","correct":false,"feedback":"ウは誤り。事務職員も対象に加わる。"},{"text":"ア・エ・オ","correct":false,"feedback":"オが誤り。対象は『当該保険医療機関に勤務する職員』へ広がる。"},{"text":"ウ・エ・オ","correct":false,"feedback":"ウとオが誤り。対象は拡大される。"}],"explanation":"令和8年度改定では対象が『当該保険医療機関に勤務する職員』へ拡大し、事務職員や40歳未満の医師・歯科医師・薬局薬剤師も対象となる。経営者・役員、業務委託者は除外される。"},{"prompt":"外来・在宅物価対応料の令和8年度・令和9年度の点数について、最も適切なものはどれか。","choices":[{"text":"初診時はR8が2点、R9が4点、再診時等はR8が2点、R9が4点、訪問診療時はR8が3点、R9が6点である。","correct":true,"feedback":"令和9年度は令和8年度の2倍の設計。"},{"text":"初診時はR8が3点、R9が6点、再診時等はR8が2点、R9が4点、訪問診療時はR8が2点、R9が4点である。","correct":false,"feedback":"訪問診療時が3点→6点、初診時と再診時等が2点→4点。"},{"text":"初診時・再診時等・訪問診療時はいずれもR8が2点、R9が4点である。","correct":false,"feedback":"訪問診療時はR8が3点、R9が6点。"},{"text":"外来・在宅物価対応料はR8のみの暫定措置で、R9の点数は設定されていない。","correct":false,"feedback":"R9はR8の2倍となる設計が示されている。"},{"text":"外来・在宅物価対応料は入院基本料に包括されるため、初診時・再診時等での算定区分は設けられていない。","correct":false,"feedback":"外来・在宅物価対応料として初診時、再診時等、訪問診療時の区分がある。"}],"explanation":"外来・在宅物価対応料は、初診時2→4点、再診時等2→4点、訪問診療時3→6点。入院物価対応料は入院料区分ごとに設定される。"},{"prompt":"ベースアップ評価料の使途について、最も適切なものはどれか。","choices":[{"text":"基本給等の引上げに加え、恒常的に夜間を含む交代制勤務をとる職場の夜勤手当の増額にも充当できる。","correct":true,"feedback":"夜勤手当の増額に充当可能となった点が重要。"},{"text":"基本給等への充当は認められず、賞与の一時金として職種を問わず配分する。","correct":false,"feedback":"ベースアップ評価料は基本給等の引上げを中心に扱う。"},{"text":"夜勤手当への充当は令和6年度改定から認められており、令和8年度では削除された。","correct":false,"feedback":"令和8年度改定より夜勤手当の増額にも用いることが可能となった。"},{"text":"賃上げ実績の報告対象に基本給等は含まれず、時間外手当のみを報告する。","correct":false,"feedback":"基本給等総額やベア等に連動する増加分が報告対象となる。"},{"text":"評価料収入は医療機器購入費や光熱水費の補填に充てることが制度上の主目的である。","correct":false,"feedback":"ベースアップ評価料は職員の賃金改善のための評価。物価高対応は物価対応料で整理される。"}],"explanation":"ベースアップ評価料は賃金改善に充てる評価で、令和8年度改定では夜勤手当の増額にも充当できるよう見直された。"},{"prompt":"令和8年度改定における入院料の見直し・減算規定について、最も適切なものはどれか。","choices":[{"text":"令和6・7年度に賃上げを実施している保険医療機関とそれ以外を区別する観点から、入院基本料等に減算規定が新設された。","correct":true,"feedback":"継続的賃上げの実施状況を反映する減算規定。"},{"text":"減算規定は外来・在宅ベースアップ評価料に限られ、入院基本料には設けられていない。","correct":false,"feedback":"入院基本料等に減算規定が新設された。"},{"text":"令和8年度から賃上げを行う医療機関は、入院料に関する評価を一切受けられない。","correct":false,"feedback":"令和8年度から賃上げを行う医療機関にも新水準のベースアップ評価料が設定される。"},{"text":"令和6年度以降のベースアップ評価料相当分は入院料から削除され、外来点数に移された。","correct":false,"feedback":"入院料には令和6年度以降のベースアップ評価料相当分などが反映される。"},{"text":"継続的な賃上げの有無にかかわらず、全ての医療機関に同じ入院基本料の減算が適用される。","correct":false,"feedback":"賃上げ実施状況等により減算対象が分かれる。"}],"explanation":"入院料は賃上げ対応を反映して見直される一方、令和6・7年度に賃上げを実施していない医療機関等には減算規定が設定される。"}]},{"id":"acute_ab","title":"03 急性期入院：急性期病院一般入院基本料A/B","note":"急性期機能を救急受入・全身麻酔手術などの実績で評価する新たな入院基本料を確認する。","pool":[{"prompt":"急性期病院A一般入院料の主な実績要件として、最も適切なものはどれか。","choices":[{"text":"救急搬送年2,000件以上、うち夜間搬送1割以上、かつ全身麻酔手術年1,200件以上である。","correct":true,"feedback":"2,000件と1,200件の数字の入れ替えに注意。"},{"text":"救急搬送年1,200件以上、うち夜間搬送1割以上、かつ全身麻酔手術年2,000件以上である。","correct":false,"feedback":"救急搬送2,000件、全身麻酔手術1,200件が正しい。"},{"text":"救急搬送年1,500件以上を満たせば、全身麻酔手術の件数にかかわらずA一般入院料を算定できる。","correct":false,"feedback":"救急搬送1,500件以上はBの実績要件の一つ。Aでは救急搬送2,000件と全麻手術1,200件等が必要。"},{"text":"全身麻酔手術年500件以上、救急搬送年500件以上を満たすことがA一般入院料の中心要件である。","correct":false,"feedback":"これはBの要件の一つ。Aはより高い実績が求められる。"},{"text":"人口20万人未満の二次医療圏で最大かつ救急搬送年1,000件以上であれば、A一般入院料の実績要件を満たす。","correct":false,"feedback":"これはBの実績要件の一つ。Aの要件ではない。"}],"explanation":"急性期病院A一般入院料は、救急搬送年2,000件以上、夜間搬送1割以上、全身麻酔手術年1,200件以上などを求める。数字の入れ替えが典型的な誤答。"},{"prompt":"急性期病院B一般入院料の実績要件について、最も適切なものはどれか。","choices":[{"text":"救急搬送年1,500件以上、または救急搬送年500件以上かつ全身麻酔手術年500件以上など、示された要件のいずれかを満たす。","correct":true,"feedback":"Bは複数の実績要件の『いずれか』である点が重要。"},{"text":"救急搬送年1,500件以上と、全身麻酔手術年1,200件以上の両方を満たすことが求められる。","correct":false,"feedback":"Bは『いずれか』。全麻1,200件はAの数字。"},{"text":"Bでは救急搬送件数が問われず、看護配置7対1を満たせば実績要件を満たす。","correct":false,"feedback":"Bも救急搬送件数等の実績要件がある。"},{"text":"Bの要件はAの要件と同一であり、点数だけが異なる。","correct":false,"feedback":"AとBは実績要件が異なる。"},{"text":"人口20万人未満の二次医療圏で最大の医療機関であっても、救急搬送年2,000件未満であればBの要件を満たさない。","correct":false,"feedback":"人口20万人未満の二次医療圏で最大かつ年1,000件以上はBの要件の一つ。"}],"explanation":"急性期病院B一般入院料は、救急搬送年1,500件以上、救急搬送500件＋全麻500件、人口20万人未満二次医療圏で最大かつ年1,000件以上、離島二次医療圏で搬送件数最大などのいずれかで整理される。"},{"prompt":"急性期病院一般入院基本料A/Bに関する共通施設基準・点数について、最も適切なものはどれか。","choices":[{"text":"共通施設基準として、データ提供加算の届出、DPC対象病院、地域包括医療病棟の届出なし等が示され、点数はAが1,930点、Bが1,643点である。","correct":true,"feedback":"共通施設基準と点数の組み合わせが正しい。"},{"text":"共通施設基準として地域包括医療病棟の届出が必要であり、点数はAが1,643点、Bが1,930点である。","correct":false,"feedback":"地域包括医療病棟の届出なし。点数はAが1,930点、Bが1,643点。"},{"text":"DPC対象病院であることはBのみの基準で、AではDPC参加の有無を問わない。","correct":false,"feedback":"DPC対象病院は共通施設基準。"},{"text":"データ提供加算の届出はAのみ必要で、Bでは救急搬送実績があれば不要である。","correct":false,"feedback":"データ提供加算の届出は共通施設基準。"},{"text":"点数はA・Bとも急性期一般入院料1と同じ1,874点に統一された。","correct":false,"feedback":"スライド上、急性期病院A一般入院料1,930点、B一般入院料1,643点。"}],"explanation":"A/Bは新設入院基本料で、共通施設基準としてデータ提供加算、DPC対象病院、地域包括医療病棟の届出なし等が示される。"},{"prompt":"急性期病院一般入院基本料A/Bの評価の考え方について、最も適切なものはどれか。","choices":[{"text":"病床数や看護配置だけでなく、地域で果たす急性期機能、特に救急受入・手術実績に着目する。","correct":true,"feedback":"新たな評価の趣旨に沿っている。"},{"text":"急性期病院一般入院基本料A/Bは、地域包括ケア病棟の在宅復帰率を中心に評価する。","correct":false,"feedback":"A/Bは急性期機能、救急受入・手術実績に着目する。"},{"text":"A/Bは療養病棟の医療区分要件を置き換えるために新設された。","correct":false,"feedback":"療養病棟ではなく、急性期・高度急性期入院医療の見直しに関する入院基本料。"},{"text":"A/Bの主な実績は外来患者数と紹介率であり、救急搬送や全身麻酔手術は問われない。","correct":false,"feedback":"救急搬送や全身麻酔手術が中心的な実績要件。"},{"text":"A/Bは包括期病床を有する病院に対して、高齢者の在宅復帰支援を評価する加算である。","correct":false,"feedback":"それは包括期充実体制加算等の方向性。A/Bは急性期入院基本料。"}],"explanation":"A/Bは、病床数・看護配置だけでなく、地域で果たす急性期機能を救急受入や手術実績で評価する点が特徴。"},{"prompt":"急性期病院一般入院基本料A/Bにおける夜間救急搬送の扱いについて、最も適切なものはどれか。","choices":[{"text":"夜間は22時から翌8時までを指し、搬送件数の1割以上が夜間であることが求められる。","correct":true,"feedback":"夜間の時間帯と1割以上を合わせて覚える。"},{"text":"夜間は18時から翌8時までを指し、搬送件数の2割以上が夜間であることが求められる。","correct":false,"feedback":"夜間は22時〜翌8時、割合は1割以上。"},{"text":"夜間搬送の割合はAのみで求められ、Bの各要件では一切問われない。","correct":false,"feedback":"スライドではBについても夜間22時〜翌8時の搬送1割以上が注記されている。"},{"text":"夜間搬送は救急搬送件数に含めず、全身麻酔手術件数に換算して評価する。","correct":false,"feedback":"救急搬送件数のうち夜間搬送が1割以上という扱い。"},{"text":"夜間搬送の割合は5割以上であり、救急搬送件数の多い病院に限定される。","correct":false,"feedback":"割合は1割以上。"}],"explanation":"夜間は22時〜翌8時。急性期病院A/Bの救急搬送実績では夜間搬送1割以上が重要な数字である。"}]},{"id":"multidisciplinary","title":"04 急性期入院：看護・多職種協働加算／急性期総合体制加算","note":"病棟で多職種が協働する体制と、急性期総合体制加算の統合関係を確認する。","pool":[{"prompt":"看護・多職種協働加算で想定される多職種として、最も適切な組み合わせはどれか。","choices":[{"text":"理学療法士、作業療法士、言語聴覚士、管理栄養士、臨床検査技師","correct":true,"feedback":"この5職種はそのまま問われやすい。"},{"text":"理学療法士、作業療法士、社会福祉士、診療放射線技師、薬剤師","correct":false,"feedback":"社会福祉士・診療放射線技師・薬剤師ではなく、ST・管理栄養士・臨床検査技師が含まれる。"},{"text":"医師、薬剤師、看護補助者、介護福祉士、臨床工学技士","correct":false,"feedback":"加算で示される多職種の組み合わせとは異なる。"},{"text":"管理栄養士、歯科衛生士、介護支援専門員、社会福祉士、臨床心理士","correct":false,"feedback":"管理栄養士は含まれるが、他はこの加算の5職種ではない。"},{"text":"言語聴覚士、臨床検査技師、医師事務作業補助者、看護補助者、救急救命士","correct":false,"feedback":"ST・臨床検査技師は含まれるが、他は対象の5職種ではない。"}],"explanation":"看護・多職種協働加算では、PT・OT・ST・管理栄養士・臨床検査技師が病棟で協働し、早期退院とADL維持・向上を支援する。"},{"prompt":"看護・多職種協働加算の配置に関する説明として、最も適切なものはどれか。","choices":[{"text":"看護職員と他職種を入院患者25人ごとに1以上配置し、配置数の7割以上を看護師とする。","correct":true,"feedback":"25対1と7割以上が重要。"},{"text":"看護職員と他職種を入院患者20人ごとに1以上配置し、配置数の5割以上を看護師とする。","correct":false,"feedback":"20対1ではなく25対1、5割ではなく7割以上。"},{"text":"看護職員とは別に、5職種それぞれを入院患者25人ごとに1名ずつ配置する。","correct":false,"feedback":"5職種をそれぞれ25対1で配置する趣旨ではない。"},{"text":"看護師の割合は問われず、配置数の7割以上をリハビリ専門職とする。","correct":false,"feedback":"配置数の7割以上は看護師。"},{"text":"傾斜配置は認められず、全病棟・全時間帯で同じ人数配置が求められる。","correct":false,"feedback":"スライドでは傾斜配置可とされる。"}],"explanation":"看護職員＋他職種を入院患者25人ごとに1以上配置し、配置数の7割以上は看護師とする。傾斜配置も可能。"},{"prompt":"看護・多職種協働加算の点数について、最も適切なものはどれか。","choices":[{"text":"加算1は277点、加算2は255点で、1日につき算定する。","correct":true,"feedback":"加算1 277点、加算2 255点。"},{"text":"加算1は255点、加算2は277点で、入院時に1回算定する。","correct":false,"feedback":"点数が逆で、1日につき算定。"},{"text":"加算1は720点、加算2は620点で、医師偏在対策として算定する。","correct":false,"feedback":"720点・620点は地域医療体制確保加算2/1の数字。"},{"text":"加算1は80点、加算2は40点で、入院から14日を限度に算定する。","correct":false,"feedback":"80点/14日は包括期充実体制加算の数字。"},{"text":"加算1・加算2はいずれも所定点数の100分の15を加算する。","correct":false,"feedback":"100分の15は外科医療確保特別加算の数字。"}],"explanation":"看護・多職種協働加算は、加算1が277点、加算2が255点。数字の混同に注意。"},{"prompt":"急性期総合体制加算について、最も適切なものはどれか。","choices":[{"text":"総合入院体制加算と急性期充実体制加算を統合し、総合性と手術等の集積性を持つ拠点病院を評価する。","correct":true,"feedback":"ページ16のひっかけにもある統合関係。"},{"text":"地域包括ケア病棟入院料と地域包括医療病棟入院料を統合し、包括期病床を評価する。","correct":false,"feedback":"急性期総合体制加算は総合入院体制加算＋急性期充実体制加算の統合。"},{"text":"看護・多職種協働加算と医師事務作業補助体制加算を統合し、AI活用を評価する。","correct":false,"feedback":"そのような統合ではない。"},{"text":"急性期総合体制加算は令和8年度に廃止され、急性期充実体制加算に一本化された。","correct":false,"feedback":"既存評価を改組し、急性期総合体制加算が新設された。"},{"text":"外科医療確保特別加算と地域医療体制確保加算を統合して、医師偏在対策を評価する。","correct":false,"feedback":"医師偏在対策の加算とは別。急性期総合体制加算は入院機能の総合性・集積性を評価。"}],"explanation":"急性期総合体制加算は、総合入院体制加算と急性期充実体制加算の統合として整理される。"},{"prompt":"急性期総合体制加算の区分等について、最も適切なものはどれか。","choices":[{"text":"加算1〜5に区分され、日数で逓減する。加算5は人口20万人未満地域の拠点向けに新設され、B一般入院料でも算定可能とされる。","correct":true,"feedback":"加算5とB一般入院料の関係がポイント。"},{"text":"加算1〜2に区分され、加算2は急性期病院A一般入院料でのみ算定可能である。","correct":false,"feedback":"加算1〜5に区分。加算5はB一般入院料でも算定可。"},{"text":"加算5は人口20万人以上地域の大学病院向け評価であり、B一般入院料では算定できない。","correct":false,"feedback":"加算5は人口20万人未満地域の拠点向け。B一般入院料でも算定可。"},{"text":"急性期総合体制加算は入院初日に限り1回算定し、日数による逓減はない。","correct":false,"feedback":"加算1〜5に区分され、日数で逓減する。"},{"text":"急性期総合体制加算の評価は、救急搬送件数を問わず、地域包括医療病棟の届出を前提とする。","correct":false,"feedback":"地域包括医療病棟の届出を前提とする加算ではない。"}],"explanation":"急性期総合体制加算は加算1〜5に区分され、日数で逓減。加算5は人口20万人未満地域の拠点向けに新設され、B一般入院料でも算定できる。"}]},{"id":"postacute_rehab","title":"05 包括期・慢性期：包括期充実体制加算／回復期リハ","note":"高齢者救急・在宅・介護施設の後方支援、回復期リハの質評価を確認する。","pool":[{"prompt":"包括期充実体制加算の対象となる医療機関像として、最も適切なものはどれか。","choices":[{"text":"許可病床数200床未満、人口の少ない地域では280床未満で、地域包括医療病棟または地域包括ケア病棟を有する医療機関である。","correct":true,"feedback":"200床未満、人口少地域280床未満がひっかけポイント。"},{"text":"許可病床数500床未満で、急性期病院A一般入院料を届け出ている医療機関である。","correct":false,"feedback":"500床未満ではなく200床未満等。地域包括医療病棟または地域包括ケア病棟を有する医療機関。"},{"text":"許可病床数400床以上で、特定機能病院入院基本料を届け出ている医療機関である。","correct":false,"feedback":"包括期充実体制加算は高齢者救急・在宅等の後方支援を担う中小病院の評価。"},{"text":"病床数にかかわらず、回復期リハビリテーション病棟入院料1を届け出ていれば算定できる。","correct":false,"feedback":"病床数や地域包括医療病棟／地域包括ケア病棟などの要件がある。"},{"text":"人口の少ない地域では病床数要件が厳格化され、200床未満から150床未満に引き下げられる。","correct":false,"feedback":"人口の少ない地域では280床未満。"}],"explanation":"包括期充実体制加算は、高齢者救急・在宅・介護施設の後方支援を担う中小病院を評価する。許可病床数200床未満、人口の少ない地域は280床未満がポイント。"},{"prompt":"包括期充実体制加算の点数・算定期間について、最も適切なものはどれか。","choices":[{"text":"80点/日で、入院から14日を限度として算定する。","correct":true,"feedback":"80点/日、14日限度。"},{"text":"40点/日で、入院から14日を限度として算定する。","correct":false,"feedback":"40点/日は身体的拘束最小化推進体制加算の数字。包括期充実体制加算は80点/日。"},{"text":"80点/日で、入院から30日を限度として算定する。","correct":false,"feedback":"期間は30日ではなく14日。"},{"text":"277点/日で、入院患者25人ごとに1以上の配置を要件とする。","correct":false,"feedback":"277点は看護・多職種協働加算1の数字。"},{"text":"所定点数の100分の15を、長時間・高難度手術に加算する。","correct":false,"feedback":"これは外科医療確保特別加算の内容。"}],"explanation":"包括期充実体制加算は80点/日、入院から14日を限度。数字の混同に注意。"},{"prompt":"包括期充実体制加算の後方支援実績等について、最も適切なものはどれか。","choices":[{"text":"自宅等からの緊急入院が直近3か月で15件以上等の後方支援実績が求められ、原則3施設以上の協力医療機関になることも要点である。","correct":true,"feedback":"3か月15件、3施設以上の数字を確認。"},{"text":"自宅等からの緊急入院が直近1か月で50件以上であれば、協力医療機関の要件は不要となる。","correct":false,"feedback":"スライドでは直近3か月で15件以上等、原則3施設以上の協力医療機関。"},{"text":"救急搬送年2,000件以上と全身麻酔手術年1,200件以上が後方支援実績の中心である。","correct":false,"feedback":"それは急性期病院A一般入院料の実績。"},{"text":"協力医療機関となる施設数は原則1施設で足り、緊急入院実績は問われない。","correct":false,"feedback":"原則3施設以上、緊急入院実績も重要。"},{"text":"後方支援実績は在宅患者の定期外来受診件数で評価され、入院実績は含まれない。","correct":false,"feedback":"自宅等からの緊急入院などの入院受入実績が評価される。"}],"explanation":"包括期充実体制加算は、地域包括医療病棟・地域包括ケア病棟が在宅・介護施設等の後方支援を担う実績を評価する。"},{"prompt":"回復期リハビリテーション病棟の見直しについて、最も適切なものはどれか。","choices":[{"text":"実績指数の基準を入院料2・4にも導入し、歩行・トイレ動作の自立をより高く評価する方向で見直された。","correct":true,"feedback":"従来は入院料1・3が中心だった点との比較が重要。"},{"text":"実績指数の基準は入院料1・3から削除され、入院料2・4のみで求められる。","correct":false,"feedback":"対象拡大であり、削除ではない。"},{"text":"日常生活機能評価の使用を義務化し、FIM測定は評価から除外された。","correct":false,"feedback":"スライドでは日常生活機能評価よりFIM測定が望ましいと整理される。"},{"text":"回復期リハビリテーション病棟では歩行・トイレ動作の評価を廃止し、在院日数のみを評価する。","correct":false,"feedback":"歩行・トイレ動作の自立をより高く評価する。"},{"text":"実績指数の基準は急性期病院A一般入院料の救急搬送件数で代替される。","correct":false,"feedback":"救急搬送件数は急性期病院一般入院基本料の論点。回リハはアウトカム評価。"}],"explanation":"回復期リハでは、質の高い取組やアウトカム評価が重視され、実績指数要件の対象拡大、歩行・トイレ動作の自立、FIM測定などがキーワードとなる。"},{"prompt":"回復期リハ強化体制加算の趣旨として、最も適切なものはどれか。","choices":[{"text":"退院前訪問、排尿自立支援など、質の高い取組を要件化・評価する。","correct":true,"feedback":"質の高い回復期リハの取組を評価する加算。"},{"text":"救急外来の24時間提供体制を評価し、院内トリアージ体制を必須とする。","correct":false,"feedback":"それは救急外来医学管理料の論点。"},{"text":"外科医の処遇改善を目的に、長時間・高難度手術の所定点数に15％を加算する。","correct":false,"feedback":"それは外科医療確保特別加算。"},{"text":"特定機能病院から紹介された患者を診療所が受け入れる初診を評価する。","correct":false,"feedback":"それは特定機能病院等紹介患者受入加算。"},{"text":"精神科外来と障害福祉サービスを一体的に提供する小規模医療機関を評価する。","correct":false,"feedback":"それは精神科地域密着多機能体制加算。"}],"explanation":"回復期リハ強化体制加算は、退院前訪問や排尿自立支援など、回復期リハの質を高める取組を評価する。"}]},{"id":"restraint","title":"06 入院共通：身体的拘束最小化・面会配慮","note":"身体的拘束を原則行わない組織風土、体制基準・実績基準による減算、面会配慮を確認する。","pool":[{"prompt":"身体的拘束に関する入院料通則の減算について、最も適切なものはどれか。","choices":[{"text":"体制基準を満たし、実績等基準を満たさない場合は20点減算である。","correct":true,"feedback":"実績基準だけ未充足は40点ではなく20点。"},{"text":"体制基準を満たし、実績等基準を満たさない場合は40点減算である。","correct":false,"feedback":"この場合は20点減算。40点は体制基準も実績等基準も満たさない場合。"},{"text":"体制基準を満たしていれば、実績等基準にかかわらず減算はない。","correct":false,"feedback":"実績等基準を満たさない場合は20点減算。"},{"text":"実績等基準を満たしていれば、体制基準にかかわらず減算はない。","correct":false,"feedback":"体制基準が未充足の場合は減算の対象となる。"},{"text":"体制基準と実績等基準の両方を満たさない場合でも、届出から1年間は減算されない。","correct":false,"feedback":"両方未充足では40点減算。届出から1年の経過措置は拘束実施日数割合の3％/5％の論点。"}],"explanation":"身体的拘束の入院料通則では、体制基準○・実績等基準×は20点減算、体制基準×・実績等基準×は40点減算。"},{"prompt":"身体的拘束最小化推進体制加算について、最も適切なものはどれか。","choices":[{"text":"療養病棟、障害者施設等、地域包括ケア病棟等を対象に、40点/日として新設された。","correct":true,"feedback":"40点/日が正しい。"},{"text":"急性期病院A一般入院料を対象に、80点/日として14日を限度に算定する。","correct":false,"feedback":"80点/日、14日限度は包括期充実体制加算。"},{"text":"地域包括医療病棟を対象に、277点/日として配置数の7割以上を看護師とする。","correct":false,"feedback":"277点や7割以上は看護・多職種協働加算の論点。"},{"text":"全ての入院料に共通して、入院初日に1回720点を算定する。","correct":false,"feedback":"720点は地域医療体制確保加算2の数字。身体的拘束最小化推進体制加算は40点/日。"},{"text":"身体的拘束を実施した患者に限り、個別の同意書がある場合に算定する評価である。","correct":false,"feedback":"組織的に身体的拘束の最小化に取り組む体制の評価。"}],"explanation":"身体的拘束最小化推進体制加算は40点/日。療養病棟・障害者施設等・地域包括ケア病棟等が対象として整理される。"},{"prompt":"身体的拘束最小化推進体制加算の拘束実施日数割合について、最も適切なものはどれか。","choices":[{"text":"拘束実施日数の割合は3％以下が基本で、届出から1年は5％以下とされる。","correct":true,"feedback":"3％、届出から1年は5％。"},{"text":"拘束実施日数の割合は15％以下が基本で、届出から1年は20％以下とされる。","correct":false,"feedback":"15％は入院料通則の実績基準の文脈で注意。加算では3％以下、届出から1年は5％以下。"},{"text":"拘束実施日数の割合は5％以下が基本で、届出から1年は3％以下とされる。","correct":false,"feedback":"基本が3％以下、届出から1年が5％以下。"},{"text":"拘束実施日数の割合は1割5分以下であれば、加算の施設基準を自動的に満たす。","correct":false,"feedback":"加算の主な割合は3％以下、届出から1年は5％以下。1割5分は実績基準で混同しやすい。"},{"text":"身体的拘束を行った患者が1人でもいれば、加算は算定できない。","correct":false,"feedback":"一定割合以下などの基準が設けられている。"}],"explanation":"身体的拘束最小化推進体制加算では、拘束実施日数の割合3％以下、届出から1年は5％以下がポイント。"},{"prompt":"面会に係る規定について、最も適切なものはどれか。","choices":[{"text":"感染対策等の正当な理由なく、家族等の面会を妨げない配慮が通則・入退院支援加算に規定された。","correct":true,"feedback":"身体拘束と合わせて面会配慮も確認。"},{"text":"感染対策の有無にかかわらず、すべての入院患者の面会を原則禁止することが通則に規定された。","correct":false,"feedback":"正当な理由なく面会を妨げない配慮が規定された。"},{"text":"面会に関する規定は外来診療料に限って新設され、入退院支援加算とは関係しない。","correct":false,"feedback":"通則・入退院支援加算に規定された。"},{"text":"面会配慮は身体的拘束の実績基準に含まれるため、別の規定としては扱われない。","correct":false,"feedback":"面会に係る規定として別に整理される。"},{"text":"家族等の面会配慮は努力義務ではなく、救急外来医学管理料の算定要件としてのみ扱われる。","correct":false,"feedback":"救急外来医学管理料ではなく、入院通則・入退院支援加算の論点。"}],"explanation":"面会に係る規定として、感染対策等の正当な理由なく家族等の面会を妨げない配慮が示された。"},{"prompt":"身体的拘束に関する体制基準・実績等基準について、正しい組み合わせはどれか。\n\nア 体制基準・実績等基準をともに満たす場合、減算はない。\nイ 体制基準を満たし、実績等基準を満たさない場合、20点減算である。\nウ 体制基準を満たさず、実績等基準も満たさない場合、40点減算である。\nエ 実績等基準の未充足は常に40点減算である。\nオ 実績基準として拘束の実施割合1割5分以下等が示される。","choices":[{"text":"ア・イ・ウ・オ","correct":true,"feedback":"エが誤り。実績だけ未充足は20点減算。"},{"text":"ア・イ・エ・オ","correct":false,"feedback":"エが誤り。実績等基準のみ未充足は20点減算。"},{"text":"ア・ウ・エ・オ","correct":false,"feedback":"イが正しく、エが誤り。"},{"text":"イ・ウ・エ・オ","correct":false,"feedback":"アも正しく、エが誤り。"},{"text":"ア・イ・ウ・エ","correct":false,"feedback":"エが誤りで、オは正しい。"}],"explanation":"体制・実績ともに充足なら減算なし。体制○・実績×は20点減算。体制×・実績×は40点減算。実績基準の1割5分以下も確認する。"}]},{"id":"ict_ai","title":"07 業務効率化：ICT看護配置・生成AI医師事務","note":"ICT活用による看護配置基準の柔軟化、生成AIによる医師事務作業補助体制加算の算入を確認する。","pool":[{"prompt":"ICTの組織的活用による看護配置の柔軟化で対象となるICTの3領域として、最も適切なものはどれか。","choices":[{"text":"見守り、記録、医療従事者間の情報共有","correct":true,"feedback":"ページ16のひっかけにもある3領域。"},{"text":"受付、会計、診療報酬請求","correct":false,"feedback":"医事業務ではなく、看護業務の見守り・記録・情報共有。"},{"text":"検査予約、画像読影、処方監査","correct":false,"feedback":"対象3領域は見守り・記録・医療従事者間の情報共有。"},{"text":"地域連携、退院調整、広報活動","correct":false,"feedback":"これらではなく看護業務効率化に直結する3領域。"},{"text":"電子処方箋、オンライン資格確認、遠隔服薬指導","correct":false,"feedback":"医療DX関連論点と混同しない。ここでは看護配置の柔軟化のICT。"}],"explanation":"ICT活用による看護配置柔軟化の3領域は、見守り、記録、医療従事者間の情報共有。"},{"prompt":"ICTの組織的活用による看護配置の柔軟化について、最も適切なものはどれか。","choices":[{"text":"看護要員の配置基準を1割以内の範囲で柔軟化できる。","correct":true,"feedback":"柔軟化は1割以内。"},{"text":"看護要員の配置基準を2割以内の範囲で柔軟化できる。","correct":false,"feedback":"1割以内が正しい。"},{"text":"ICTを導入した場合、看護配置基準はすべて免除される。","correct":false,"feedback":"免除ではなく1割以内の柔軟化。"},{"text":"柔軟化は地域包括ケア病棟に限られ、急性期一般入院料では対象外である。","correct":false,"feedback":"急性期一般入院料1〜6、急性期病院一般A/Bなども対象として示される。"},{"text":"対象ICTは生成AIによる医療文書作成補助システムに限られる。","correct":false,"feedback":"看護配置柔軟化のICTは見守り・記録・医療従事者間の情報共有。生成AI文書作成は医師事務の論点。"}],"explanation":"ICTを組織的に活用し看護業務を効率化できる場合、看護要員配置基準を1割以内で柔軟化できる。"},{"prompt":"生成AI等を活用する場合の医師事務作業補助体制加算における配置人数算入について、最も適切なものはどれか。","choices":[{"text":"生成AIによる医療文書作成補助システムのみを活用する場合は1.2人、これに加え音声入力・RPA・患者向け説明動画のいずれかを広く活用する場合は1.3人として算入できる。","correct":true,"feedback":"①のみ1.2倍、①＋②③④の活用で1.3倍。"},{"text":"生成AIによる医療文書作成補助システムのみで1.3人、音声入力やRPAを併用すると1.2人として算入する。","correct":false,"feedback":"逆。①のみ1.2人、①＋他のICT活用で1.3人。"},{"text":"生成AIを導入した場合は一律1.5人として算入し、活用範囲による区分はない。","correct":false,"feedback":"1.2人/1.3人の区分がある。"},{"text":"生成AI活用は点数の増点を伴うが、配置人数の算入には反映されない。","correct":false,"feedback":"医師事務作業補助者1人を割増で配置人数に算入できる点がポイント。"},{"text":"患者向け説明動画を10種類以上用意すれば、生成AIによる医療文書作成補助システムがなくても1.3人として算入できる。","correct":false,"feedback":"生成AIによる医療文書作成補助システムが必須。"}],"explanation":"医師事務作業補助では、生成AI文書作成補助システムが必須。①のみで1.2人、①に加え②音声入力、③RPA、④10種類以上の患者向け説明動画のいずれかを広く活用すると1.3人。"},{"prompt":"医師事務作業補助体制加算における対象ICTの組み合わせとして、最も適切なものはどれか。","choices":[{"text":"生成AIによる医療文書作成補助システム、医療文書用の音声入力システム、定型入力を自動化するRPA、10種類以上の患者向け説明動画","correct":true,"feedback":"対象ICTの4項目が正しい。"},{"text":"病室カメラ、ベッドセンサー、看護記録音声入力、ハンズフリー通話機器","correct":false,"feedback":"これは看護配置柔軟化のICTに近い内容。医師事務では生成AI文書、音声入力、RPA、説明動画。"},{"text":"オンライン資格確認、電子処方箋、電子カルテ情報共有サービス、マイナ保険証利用率管理","correct":false,"feedback":"医療DX関連評価と混同しない。"},{"text":"遠隔画像診断、AI読影、手術支援ロボット、電子同意書システム","correct":false,"feedback":"対象ICTの組み合わせとは異なる。"},{"text":"電子カルテの導入、医事会計システム、オーダリングシステム、地域連携システム","correct":false,"feedback":"病院情報システム一般の分類であり、今回の医師事務の1.2/1.3倍算入のICTではない。"}],"explanation":"医師事務作業補助体制加算での対象ICTは、生成AI文書作成補助、医療文書用音声入力、RPA、10種類以上の患者向け説明動画。"},{"prompt":"生成AI等の活用による算入に必要な追加的要件として、最も適切なものはどれか。","choices":[{"text":"3省2ガイドラインへの準拠、AI事業者ガイドラインの遵守、全補助者への研修等が求められる。","correct":true,"feedback":"ICTを置くだけではなく、ガイドライン準拠や研修が要点。"},{"text":"患者向け説明動画を1種類以上作成すれば、ガイドラインや研修は不要となる。","correct":false,"feedback":"説明動画は10種類以上が対象ICTの一つであり、ガイドライン準拠・研修等も必要。"},{"text":"医師事務作業補助者の経験年数が3年以上であれば、ICTの種類は問われない。","correct":false,"feedback":"ICTの種類と活用範囲が定められる。"},{"text":"医療文書用の音声入力システムを導入すれば、生成AI文書作成補助システムは不要となる。","correct":false,"feedback":"生成AIによる医療文書作成補助システムが必須。"},{"text":"ICTの活用は医師事務作業補助者の配置人数に反映されず、看護配置基準の柔軟化に限って評価される。","correct":false,"feedback":"生成AI等の活用は医師事務作業補助者1人を1.2人または1.3人として算入する評価。"}],"explanation":"医師事務の生成AI活用は、単なる導入ではなく、3省2ガイドライン準拠、AI事業者ガイドライン遵守、補助者への研修等も重要。"}]},{"id":"nutrition","title":"08 栄養管理：特別食加算と嚥下調整食","note":"特別食加算に追加された嚥下調整食の要件、食事箋、ミールラウンド、管理栄養士を確認する。","pool":[{"prompt":"令和8年度改定における特別食加算の見直しについて、最も適切なものはどれか。","choices":[{"text":"特別食加算の対象に、摂食・嚥下機能が低下した患者への嚥下調整食が追加された。","correct":true,"feedback":"嚥下調整食の追加が新設論点。"},{"text":"特別食加算から治療食が除外され、嚥下調整食に一本化された。","correct":false,"feedback":"嚥下調整食が従来の治療食に並ぶ区分として追加された。"},{"text":"嚥下調整食は介護報酬上の評価に限られ、診療報酬の特別食加算では評価されない。","correct":false,"feedback":"診療報酬の特別食加算の対象に追加。"},{"text":"嚥下調整食は外来栄養食事指導料の評価であり、入院時食事療養とは関係しない。","correct":false,"feedback":"入院時の食事療養に係る見直し。"},{"text":"嚥下調整食は薬剤耐性対策の一環として追加され、食形態や栄養量は要件とされない。","correct":false,"feedback":"安全性と食欲を促す食感、栄養量や盛付け等が重要。"}],"explanation":"令和8年度改定では、特別食加算の対象に嚥下調整食が追加された。安全性と食欲、見た目・味・香りなどが重視される。"},{"prompt":"嚥下調整食に関する主な算定要件として、最も適切なものはどれか。","choices":[{"text":"摂食機能または嚥下機能が低下した患者に対して、医師の食事箋に基づき提供する。","correct":true,"feedback":"食事箋はキーワード。"},{"text":"患者の希望があれば、医師の食事箋がなくても特別食加算として算定できる。","correct":false,"feedback":"医師の食事箋に基づく提供が必要。"},{"text":"嚥下調整食は管理栄養士ではなく、看護師の単独判断で食形態を決定する。","correct":false,"feedback":"医師の食事箋に基づき、管理栄養士等を含む体制が重要。"},{"text":"嚥下調整食は味や香りよりも形状の均一化を優先し、常食と同等の盛付けは要件としない。","correct":false,"feedback":"常食と同等の盛付け、味、香り、温度、栄養量への配慮が求められる。"},{"text":"嚥下調整食は食欲への配慮が不要で、摂食量が少ない場合でも変更を検討しない。","correct":false,"feedback":"食欲を促す食感やミールラウンドによる見直しが重要。"}],"explanation":"嚥下調整食は、摂食・嚥下機能が低下した患者に対し、医師の食事箋に基づき提供される。"},{"prompt":"嚥下調整食の内容に関する要件として、最も適切なものはどれか。","choices":[{"text":"安全性と食欲を促す食感を両立し、常食と同等の盛付け、味や香り、適切な温度、栄養量に配慮する。","correct":true,"feedback":"安全性と食欲の両立がポイント。"},{"text":"誤嚥防止を優先するため、味や香り、盛付けは評価対象から外される。","correct":false,"feedback":"味・香り・盛付けも要件として配慮される。"},{"text":"摂食量にかかわらず、ミキサー食を全患者に一律提供することが求められる。","correct":false,"feedback":"患者の機能に応じた食形態と適切な栄養量が必要。"},{"text":"嚥下調整食は栄養量よりも形状分類だけで評価される。","correct":false,"feedback":"栄養量にも配慮する。"},{"text":"常食と同等の盛付けは窒息リスクを高めるため、施設基準上は避けるべきとされる。","correct":false,"feedback":"常食と同等の盛付け等に配慮することが求められる。"}],"explanation":"嚥下調整食は、単に飲み込みやすいだけでなく、安全性と食欲を促す食感、見た目、味、香り、温度、栄養量への配慮が求められる。"},{"prompt":"嚥下調整食に関する多職種の取組について、最も適切なものはどれか。","choices":[{"text":"定期的に多職種でミールラウンドを行い、常食が適している場合は速やかに変更する。","correct":true,"feedback":"ミールラウンドと常食への変更が重要。"},{"text":"嚥下調整食は一度開始したら退院まで継続し、常食への変更は行わない。","correct":false,"feedback":"常食が適していれば速やかに変更する。"},{"text":"ミールラウンドは医師のみで行い、管理栄養士やリハ職は関与しない。","correct":false,"feedback":"多職種で実施する。"},{"text":"ミールラウンドは嚥下調整食の算定とは関係せず、患者満足度調査に限って実施する。","correct":false,"feedback":"嚥下調整食の質管理として多職種ミールラウンドが重要。"},{"text":"常食が適しているかどうかは診療報酬上評価されず、食形態の見直しは施設裁量に限られる。","correct":false,"feedback":"常食が適している場合の速やかな変更が要件として示される。"}],"explanation":"嚥下調整食では、定期的な多職種ミールラウンドを行い、常食が適していれば速やかに変更することが重要。"},{"prompt":"嚥下調整食に関する施設基準として、最も適切なものはどれか。","choices":[{"text":"検食が毎日行われ、定期的に多職種の試食会・カンファレンスを行い、責任者は所定の実習を伴う研修を修了した管理栄養士とされる。","correct":true,"feedback":"責任者は研修修了管理栄養士。"},{"text":"責任者は医師事務作業補助者とし、生成AIによる献立作成を行えば多職種カンファレンスは不要となる。","correct":false,"feedback":"責任者は所定研修を修了した管理栄養士。"},{"text":"検食は月1回以上で足り、試食会は患者の希望があった場合に限る。","correct":false,"feedback":"検食は毎日、定期的な多職種の試食会・カンファレンスが求められる。"},{"text":"管理栄養士の配置は問われず、食事箋を発行した医師が施設基準上の責任者となる。","correct":false,"feedback":"責任者は所定研修を修了した管理栄養士。"},{"text":"嚥下調整食の施設基準は、院内トリアージ実施体制加算の届出で代替できる。","correct":false,"feedback":"救急医療の届出では代替できない。"}],"explanation":"嚥下調整食では、毎日の検食、定期的な多職種試食会・カンファレンス、実習を伴う研修を修了した管理栄養士が責任者となることがポイント。"}]},{"id":"doctor_maldistribution","title":"09 医師偏在対策：地域医療体制確保加算2／外科医療確保特別加算","note":"地域の医療確保、若手が減る診療科、外科医の処遇改善に関する数字を確認する。","pool":[{"prompt":"地域医療体制確保加算の点数について、最も適切なものはどれか。","choices":[{"text":"加算1は620点、加算2は720点である。","correct":true,"feedback":"ページ16のひっかけ。加算2が720点。"},{"text":"加算1は720点、加算2は620点である。","correct":false,"feedback":"逆。加算1が620点、加算2が720点。"},{"text":"加算1は80点、加算2は40点である。","correct":false,"feedback":"80点は包括期充実体制加算、40点は身体的拘束最小化推進体制加算。"},{"text":"加算1は277点、加算2は255点である。","correct":false,"feedback":"それは看護・多職種協働加算。"},{"text":"加算1・2とも所定点数の100分の15として評価される。","correct":false,"feedback":"100分の15は外科医療確保特別加算。"}],"explanation":"地域医療体制確保加算では、加算1が620点、加算2が720点。加算2が令和8年度に新設された論点として狙われやすい。"},{"prompt":"地域医療体制確保加算における時間外・休日労働上限の見直しについて、最も適切なものはどれか。","choices":[{"text":"加算1の時間外・休日労働上限は、R8で1,635時間以下、R9で1,560時間以下とされる。","correct":true,"feedback":"B水準より短い数字として押さえる。"},{"text":"加算1の時間外・休日労働上限は、R8・R9とも1,860時間以下で据え置かれる。","correct":false,"feedback":"R8 1,635時間以下、R9 1,560時間以下。"},{"text":"加算1の時間外・休日労働上限は、R8で960時間以下、R9で720時間以下とされる。","correct":false,"feedback":"960時間はA水準の年間上限として混同しやすい。加算1の数字は1,635/1,560。"},{"text":"加算1では時間外・休日労働上限は問われず、救急搬送件数のみで評価する。","correct":false,"feedback":"勤務環境・処遇改善の観点から時間外・休日労働上限が重要。"},{"text":"R8は1,560時間以下、R9は1,635時間以下となり、段階的に緩和される。","correct":false,"feedback":"R8 1,635、R9 1,560で段階的に短縮。"}],"explanation":"地域医療体制確保加算1の時間外・休日労働上限はR8で1,635時間以下、R9で1,560時間以下。医師の働き方改革と関連する。"},{"prompt":"地域医療体制確保加算2の対象診療科に関する説明として、最も適切なものはどれか。","choices":[{"text":"消化器外科、心臓血管外科、小児外科、循環器内科等から3つ以内を特定診療科とする。","correct":true,"feedback":"『4つから3つ以内』という形で問われやすい。"},{"text":"消化器外科、心臓血管外科、小児外科、循環器内科等の全てを必ず特定診療科とする。","correct":false,"feedback":"3つ以内を特定診療科とする。"},{"text":"内科、皮膚科、眼科、精神科から5つ以上を特定診療科とする。","correct":false,"feedback":"スライドで示される診療科と数が異なる。"},{"text":"特定診療科は病院が任意に1つ選べば足り、診療科の候補は示されていない。","correct":false,"feedback":"消化器外科等から3つ以内という整理。"},{"text":"特定診療科は外科系に限定されず、事務職員の人員不足がある部署を含めて設定する。","correct":false,"feedback":"若手医師が減る特定診療科の勤務環境・処遇改善の評価。"}],"explanation":"地域医療体制確保加算2は、若手医師が減少し体制確保が必要な診療科を対象とする。消化器外科・心臓血管外科・小児外科・循環器内科等から3つ以内を特定診療科とする点が重要。"},{"prompt":"外科医療確保特別加算について、最も適切なものはどれか。","choices":[{"text":"長時間・高難度手術の体制整備と外科医の処遇改善を評価し、加算額は当該手術の所定点数の100分の15である。","correct":true,"feedback":"100分の15がひっかけポイント。"},{"text":"地域医療体制確保加算2と同じく720点を入院初日に算定する。","correct":false,"feedback":"外科医療確保特別加算は所定点数の100分の15。"},{"text":"短時間手術の件数を評価し、全ての手術に一律15点を加算する。","correct":false,"feedback":"長時間・高難度手術の体制整備を評価し、所定点数の15％。"},{"text":"外科医の処遇改善と関係せず、手術室の物価高のみを補填する加算である。","correct":false,"feedback":"外科医の勤務環境や処遇改善が趣旨に含まれる。"},{"text":"救急搬送年2,000件以上を満たす場合、全身麻酔手術の件数にかかわらず算定できる。","correct":false,"feedback":"救急搬送2,000件は急性期病院Aの数字。外科加算では長時間・高難度手術200例以上等が重要。"}],"explanation":"外科医療確保特別加算は、長時間・高難度手術の実施体制と外科医の処遇改善を評価し、当該手術の所定点数の100分の15を加算する。"},{"prompt":"外科医療確保特別加算の実績・届出に関する説明として、最も適切なものはどれか。","choices":[{"text":"長時間かつ高難度な手術を合わせて年間200例以上実施し、特定機能病院入院基本料または急性期総合体制加算の届出が要点となる。","correct":true,"feedback":"年間200例以上と届出の組み合わせ。"},{"text":"高難度手術は年間20例以上で足り、地域包括ケア病棟入院料の届出が必要となる。","correct":false,"feedback":"年間200例以上。届出は特定機能病院入院基本料または急性期総合体制加算。"},{"text":"手術件数は問われず、外科医の時間外労働が月100時間を超えた場合に自動算定する。","correct":false,"feedback":"長時間・高難度手術年間200例以上等が要点。"},{"text":"ロボット支援手術が年間200例以上であれば、外科医療確保特別加算の要件を満たす。","correct":false,"feedback":"ロボット支援手術年間200例以上は内視鏡手術用支援機器加算の数字。"},{"text":"DPC対象病院であれば、高難度手術の実績にかかわらず算定できる。","correct":false,"feedback":"DPC参加だけでなく、長時間・高難度手術年間200例以上などの要件がある。"}],"explanation":"外科医療確保特別加算は、長時間かつ高難度な手術を年間200例以上実施し、特定機能病院入院基本料または急性期総合体制加算の届出が要点。"}]},{"id":"outpatient_er","title":"10 外来機能分化・救急医療：紹介患者受入加算／救急外来","note":"大病院からの紹介患者受入、救急外来24時間体制、下り搬送の受入評価を確認する。","pool":[{"prompt":"特定機能病院等紹介患者受入加算について、最も適切なものはどれか。","choices":[{"text":"大病院等から紹介された患者の初診を、診療所または許可病床数200床未満の病院が受け入れた場合を評価する。","correct":true,"feedback":"算定する側は診療所または200床未満病院。"},{"text":"特定機能病院が診療所から紹介された患者を初診した場合に算定する。","correct":false,"feedback":"算定する側は診療所または200床未満病院。大病院等からの紹介患者を受け入れる評価。"},{"text":"許可病床数400床以上の病院が、自院の外来患者を地域の診療所へ逆紹介した場合に算定する。","correct":false,"feedback":"逆紹介そのものではなく、紹介を受けた診療所・中小病院側の初診を評価。"},{"text":"地域包括ケア病棟に緊急入院した患者を評価する加算である。","correct":false,"feedback":"外来の機能分化を進めるための初診評価。"},{"text":"救急患者の下り搬送先が入院させた場合に算定する。","correct":false,"feedback":"それは救急患者連携搬送料2の論点。"}],"explanation":"特定機能病院等紹介患者受入加算は、外来機能分化のため、大病院等から紹介された患者を診療所・200床未満病院が初診で受け入れる場合を評価する。"},{"prompt":"特定機能病院等紹介患者受入加算における紹介元の対象として、正しい組み合わせはどれか。\n\nア 特定機能病院\nイ 地域医療支援病院（一般病床200床未満を除く）\nウ 紹介受診重点医療機関（一般病床200床未満を除く）\nエ 許可病床400床以上の病院（一般病床200床以上）\nオ すべての有床診療所","choices":[{"text":"ア・イ・ウ・エ","correct":true,"feedback":"紹介元はこの4類型。"},{"text":"ア・イ・ウ・オ","correct":false,"feedback":"オは対象4類型ではない。エが正しい。"},{"text":"ア・イ・エ・オ","correct":false,"feedback":"ウが正しく、オは誤り。"},{"text":"イ・ウ・エ・オ","correct":false,"feedback":"アも対象で、オは誤り。"},{"text":"ア・ウ・エ・オ","correct":false,"feedback":"イも対象で、オは誤り。"}],"explanation":"紹介元となる対象は、特定機能病院、地域医療支援病院、紹介受診重点医療機関、許可病床400床以上の病院の4つ。一般病床数の条件に注意。"},{"prompt":"救急外来医学管理料について、最も適切なものはどれか。","choices":[{"text":"夜間休日救急搬送医学管理料を見直し、救急外来を24時間提供できる体制を評価する。","correct":true,"feedback":"24時間体制の評価がポイント。"},{"text":"地域包括ケア病棟の在宅復帰率を評価するため、救急搬送の受入実績を除外して算定する。","correct":false,"feedback":"救急外来を24時間提供できる体制の評価。"},{"text":"院内トリアージ実施体制加算は廃止され、救急外来医学管理料に包括された。","correct":false,"feedback":"院内トリアージ実施体制加算も新設として整理される。"},{"text":"救急外来医学管理料は、平日日中の予約外来患者を対象とする加算である。","correct":false,"feedback":"救急外来を24時間提供できる体制の評価。"},{"text":"救急外来医学管理料は、救急搬送医学管理料1の800点を廃止し、外来・在宅物価対応料に置き換える。","correct":false,"feedback":"救急外来医学管理料は救急医療の評価であり、物価対応料とは別。"}],"explanation":"救急外来医学管理料は、夜間休日救急搬送医学管理料を見直し、24時間救急外来を提供できる体制を評価する新設評価。院内トリアージ実施体制加算も関連して押さえる。"},{"prompt":"救急患者連携搬送料の見直しについて、最も適切なものはどれか。","choices":[{"text":"救急患者連携搬送料2が新設され、搬送先、すなわち下り搬送先が入院させた場合にも算定できる。","correct":true,"feedback":"受入側評価が新設された点が重要。"},{"text":"救急患者連携搬送料は搬送元のみが算定し、搬送先の評価は削除された。","correct":false,"feedback":"搬送先の受入側評価が新設。"},{"text":"民間救急等を活用した搬送は評価対象から外れ、自院の救急車による搬送だけを評価する。","correct":false,"feedback":"民間救急等、自院救急車以外の活用も評価対象。"},{"text":"医師等が同乗し30分超搬送する場合の長時間加算は、救急外来医学管理料に限って算定する。","correct":false,"feedback":"救急患者連携搬送料の見直しで長時間加算700点が示される。"},{"text":"下り搬送は地域包括医療病棟に限って認められ、急性期病院からの搬送は対象外である。","correct":false,"feedback":"適切な転院搬送と受入を推進する趣旨で、搬送先の入院受入が評価される。"}],"explanation":"救急患者連携搬送料では、民間救急等の活用、下り搬送先が入院させた場合の救急患者連携搬送料2、30分超搬送の長時間加算700点がポイント。"},{"prompt":"外来機能分化・救急医療に関する点数等について、最も適切なものはどれか。","choices":[{"text":"特定機能病院等紹介患者受入加算は60点、救急搬送医学管理料1は800点、30分超搬送の長時間加算は700点である。","correct":true,"feedback":"数字の対応関係を確認。"},{"text":"特定機能病院等紹介患者受入加算は700点、救急搬送医学管理料1は60点、長時間加算は800点である。","correct":false,"feedback":"数字が入れ替わっている。紹介患者受入加算60点、救急搬送医学管理料1 800点、長時間加算700点。"},{"text":"特定機能病院等紹介患者受入加算は80点/日、救急搬送医学管理料1は14日を限度として算定する。","correct":false,"feedback":"80点/日・14日限度は包括期充実体制加算。"},{"text":"救急外来緊急検査対応加算1は15点であり、外科医療確保特別加算と同じ率で算定する。","correct":false,"feedback":"救急外来緊急検査対応加算1は300点として示される。15％は外科加算。"},{"text":"院内トリアージ実施体制加算は、特定機能病院等紹介患者受入加算の紹介元4類型の一つである。","correct":false,"feedback":"院内トリアージ実施体制加算は救急外来の体制評価。紹介元4類型ではない。"}],"explanation":"外来機能分化では紹介患者受入加算60点、救急医療では救急搬送医学管理料1 800点、長時間加算700点など、単独数字の混同に注意。"}]},{"id":"priority_pharmacy","title":"11 重点分野・調剤：小児周産期・精神・医療DX・薬局","note":"小児周産期、精神医療、医療DX、ロボット支援手術、調剤報酬の新設・廃止を確認する。","pool":[{"prompt":"小児・周産期分野の見直しについて、最も適切なものはどれか。","choices":[{"text":"産科管理加算は、院内助産、助産師外来、産後ケア事業等と連携した体制を評価する。","correct":true,"feedback":"産科管理加算の趣旨として正しい。"},{"text":"産科管理加算は、ロボット支援手術が年間200例以上の場合に算定する。","correct":false,"feedback":"ロボット支援手術年間200例以上は内視鏡手術用支援機器加算。"},{"text":"難病外来指導管理料2は、小児科での小児難病診療に限って評価する。","correct":false,"feedback":"小児科以外での成人移行期医療を評価。"},{"text":"産科管理加算は、救急患者の下り搬送先が入院させた場合の評価である。","correct":false,"feedback":"それは救急患者連携搬送料2の論点。"},{"text":"難病外来指導管理料2は、調剤薬局での残薬調整を評価する。","correct":false,"feedback":"難病外来指導管理料2は小児科以外での成人移行期医療の評価。"}],"explanation":"小児・周産期では、産科管理加算と難病外来指導管理料2がポイント。産科管理加算は院内助産・助産師外来・産後ケア事業等との連携体制を評価する。"},{"prompt":"精神医療に関する令和8年度改定の新設評価として、最も適切な組み合わせはどれか。","choices":[{"text":"急性期病院精神病棟入院料、精神科地域密着多機能体制加算","correct":true,"feedback":"精神医療の新設評価として整理される。"},{"text":"精神科地域包括ケア病棟入院料、精神科救急搬送料2","correct":false,"feedback":"精神科地域包括ケア病棟入院料は令和6年度新設の文脈に注意。令和8年度の新設としては急性期病院精神病棟入院料等。"},{"text":"身体的拘束最小化推進体制加算、外科医療確保特別加算","correct":false,"feedback":"身体拘束と外科医療であり、精神医療の新設評価の組み合わせではない。"},{"text":"在宅患者訪問薬剤管理指導料、かかりつけ薬剤師フォローアップ加算","correct":false,"feedback":"調剤・薬局の論点。"},{"text":"電子的診療情報連携体制整備加算、遠隔電子処方箋活用加算","correct":false,"feedback":"医療DXの論点。精神医療の組み合わせではない。"}],"explanation":"精神医療では、急性期病院精神病棟入院料、精神科地域密着多機能体制加算が新設評価として示される。後者は外来と障害福祉サービスを一体的に提供する取組を評価する。"},{"prompt":"医療DX・オンライン診療に関する見直しについて、最も適切なものはどれか。","choices":[{"text":"電子的診療情報連携体制整備加算が新設され、遠隔電子処方箋活用加算10点、D to P with Nでの訪問看護の同時実施が示された。","correct":true,"feedback":"医療DX関連評価の改組と新設項目。"},{"text":"医療DX推進体制整備加算はそのまま継続され、電子的診療情報連携体制整備加算は廃止された。","correct":false,"feedback":"電子的診療情報連携体制整備加算は医療DX関連評価を改組して新設。"},{"text":"遠隔電子処方箋活用加算は100点で、入院患者の光熱水費を補填する評価である。","correct":false,"feedback":"遠隔電子処方箋活用加算は10点。光熱水費とは別。"},{"text":"D to P with Nでは訪問看護の同時実施は認められず、医師単独でオンライン診療を行う場合に限る。","correct":false,"feedback":"D to P with Nでの訪問看護の同時実施が可能に。"},{"text":"電子的診療情報連携体制整備加算は、地域支援体制加算と後発医薬品調剤体制加算を統合した薬局の加算である。","correct":false,"feedback":"その統合は地域支援・医薬品供給対応体制加算の論点。"}],"explanation":"医療DXでは、電子的診療情報連携体制整備加算、遠隔電子処方箋活用加算10点、D to P with Nでの訪問看護同時実施がポイント。"},{"prompt":"内視鏡手術用支援機器加算について、最も適切なものはどれか。","choices":[{"text":"ロボット支援手術が年間200例以上の場合の評価として新設された。","correct":true,"feedback":"ロボット支援手術200例以上。"},{"text":"長時間・高難度手術を年間200例以上行う場合に、所定点数の100分の15を加算する評価である。","correct":false,"feedback":"それは外科医療確保特別加算。ロボット支援手術の加算とは別。"},{"text":"救急搬送年2,000件以上と全身麻酔手術年1,200件以上を満たす場合の評価である。","correct":false,"feedback":"それは急性期病院A一般入院料の数字。"},{"text":"ロボット支援手術が年間20例以上の場合に、外来での遠隔電子処方箋を評価する。","correct":false,"feedback":"年間200例以上。電子処方箋とは別。"},{"text":"内視鏡手術用支援機器加算は、調剤薬局における薬剤師の同時訪問を評価する。","correct":false,"feedback":"ロボット支援手術の評価。"}],"explanation":"内視鏡手術用支援機器加算は、ロボット支援手術が年間200例以上の場合の評価。外科医療確保特別加算の高難度手術200例・15％と混同しやすい。"},{"prompt":"調剤報酬に関する令和8年度改定の説明として、最も適切なものはどれか。","choices":[{"text":"調剤ベースアップ評価料・調剤物価対応料が新設され、地域支援・医薬品供給対応体制加算は地域支援体制加算と後発医薬品調剤体制加算の統合として整理される。","correct":true,"feedback":"調剤はベースアップ評価料も物価対応料も新設として押さえる。"},{"text":"後発医薬品調剤体制加算は拡充され、地域支援体制加算との統合は行われない。","correct":false,"feedback":"地域支援・医薬品供給対応体制加算として統合され、後発医薬品調剤体制加算は撤廃と整理される。"},{"text":"かかりつけ薬剤師指導料・包括管理料は存続し、かかりつけ薬剤師フォローアップ加算は廃止された。","correct":false,"feedback":"指導料・包括管理料は廃止、フォローアップ加算等へ。"},{"text":"在宅訪問薬剤管理指導の間隔は週1回から中6日以上へ厳格化された。","correct":false,"feedback":"中6日以上から週1回へ見直し。"},{"text":"残薬対策の新設加算はなく、夜間休日の調剤は選定療養化の対象外とされた。","correct":false,"feedback":"調剤時残薬調整加算・薬学的有害事象等防止加算が新設され、夜間休日の調剤の選定療養化も示される。"}],"explanation":"調剤では、調剤ベースアップ評価料・調剤物価対応料、地域支援・医薬品供給対応体制加算、かかりつけ薬剤師フォローアップ加算、残薬対策、訪問薬剤管理医師同時指導料等がポイント。"}]}];
let quiz = [];
let current = 0;
let score = 0;
let answered = false;
let selectedIndex = null;

function shuffle(array) {
  const a = array.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickOne(array) { return array[Math.floor(Math.random() * array.length)]; }
function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}
function prepareQuiz() {
  quiz = CATEGORIES.map(cat => {
    const q = JSON.parse(JSON.stringify(pickOne(cat.pool)));
    q.categoryTitle = cat.title;
    q.categoryNote = cat.note;
    q.choices = shuffle(q.choices);
    return q;
  });
  current = 0;
  score = 0;
  answered = false;
  selectedIndex = null;
  renderQuestion();
}
function renderQuestion() {
  const root = document.getElementById('quiz');
  const q = quiz[current];
  const pct = Math.round((current / quiz.length) * 100);
  const choicesHtml = q.choices.map((ch, idx) => `
    <button type="button" class="choice" id="choice-${idx}" onclick="selectChoice(${idx})" aria-pressed="false">
      <span class="choice-text"><span class="choice-no">${idx+1}.</span>${escapeHTML(ch.text)}</span>
    </button>
  `).join('');
  root.innerHTML = `
    <div class="progress-area">
      <div class="progress-meta"><span>問題 ${current+1} / ${quiz.length}</span><span>現在 ${score} 点</span></div>
      <div class="progress"><span style="width:${pct}%"></span></div>
    </div>
    <p class="category">${escapeHTML(q.categoryTitle)}</p>
    <p class="small">${escapeHTML(q.categoryNote)}</p>
    <p class="qtext">${escapeHTML(q.prompt)}</p>
    <div class="choices">${choicesHtml}</div>
    <div class="actions">
      <button id="answerBtn" onclick="checkAnswer()" disabled>回答</button>
      <button class="secondary" onclick="prepareQuiz()">別の11問でやり直す</button>
    </div>
    <div id="feedback" class="feedback"></div>
    <p class="source-note">出典メモ：りゅうチャンネル資料・厚生労働省概要版をもとに作成。最終的な算定要件は告示・通知・疑義解釈で確認してください。</p>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}
function selectChoice(idx) {
  if (answered) return;
  selectedIndex = idx;
  document.querySelectorAll('.choice').forEach(el => { el.classList.remove('selected'); el.setAttribute('aria-pressed','false'); });
  const selected = document.getElementById('choice-'+idx);
  selected.classList.add('selected');
  selected.setAttribute('aria-pressed','true');
  document.getElementById('answerBtn').disabled = false;
}
function checkAnswer() {
  if (selectedIndex === null || answered) return;
  answered = true;
  const q = quiz[current];
  const chosen = q.choices[selectedIndex];
  const correctIndex = q.choices.findIndex(c => c.correct);
  const isCorrect = chosen.correct;
  if (isCorrect) score++;
  document.querySelectorAll('.choice').forEach(btn => btn.setAttribute('aria-disabled','true'));
  document.getElementById('choice-'+correctIndex).classList.add('correct');
  if (!isCorrect) document.getElementById('choice-'+selectedIndex).classList.add('wrong');
  const fb = document.getElementById('feedback');
  const specific = chosen.feedback ? `<p class="explain"><strong>選んだ選択肢：</strong>${escapeHTML(chosen.feedback)}</p>` : '';
  fb.innerHTML = `
    <p class="result-title ${isCorrect ? 'ok' : 'bad'}">${isCorrect ? '正解です' : '不正解です'}</p>
    ${specific}
    <p class="explain"><strong>解説：</strong>${escapeHTML(q.explanation)}</p>
    <div class="actions"><button class="gold" onclick="nextQuestion()">${current+1 === quiz.length ? '結果を見る' : '次の問題へ'}</button></div>
  `;
  fb.classList.add('show');
  document.getElementById('answerBtn').disabled = true;
}
function nextQuestion() {
  if (current + 1 >= quiz.length) return renderFinal();
  current++;
  answered = false;
  selectedIndex = null;
  renderQuestion();
}
function renderFinal() {
  const root = document.getElementById('quiz');
  const pct = Math.round((score / quiz.length) * 100);
  let msg = 'まずはひっかけ数字をもう一周しましょう。';
  if (pct >= 90) msg = 'かなり仕上がっています。細かい数字の入れ替えに注意しましょう。';
  else if (pct >= 70) msg = '合格ラインに近い理解です。間違えた論点を重点的に確認しましょう。';
  else if (pct >= 50) msg = '主要論点は見えています。A/B、身体拘束、ICT/AIの数字を固めましょう。';
  root.innerHTML = `
    <div class="final">
      <p class="category">結果</p>
      <h2>おつかれさまでした</h2>
      <div class="score">${score} / ${quiz.length}</div>
      <p>${escapeHTML(msg)}</p>
      <div class="actions" style="justify-content:center">
        <button onclick="prepareQuiz()">別の11問で再挑戦</button>
      </div>
    </div>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}
prepareQuiz();
</script>
</body>
</html>
