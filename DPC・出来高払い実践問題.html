<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DPC・出来高払い実践問題</title>
  <style>
    :root {
      --bg:#101820; --panel:#172331; --panel2:#1d2b3a; --text:#e8edf2;
      --muted:#aab6c2; --line:#314355; --accent:#8fb3d9; --gold:#c8a96a;
      --ok:#77c593; --okbg:#173826; --ng:#e08a8a; --ngbg:#3b1f24;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
      line-height:1.7;
      background:radial-gradient(circle at top left,rgba(143,179,217,.16),transparent 34rem),linear-gradient(180deg,#0d141b,var(--bg));
    }
    .wrap { width:min(920px,100%); margin:0 auto; padding:16px 12px 40px; }
    header,.card,.result {
      background:rgba(23,35,49,.96); border:1px solid var(--line); border-radius:18px;
      padding:18px; box-shadow:0 12px 28px rgba(0,0,0,.32);
    }
    header { margin-bottom:12px; }
    .sub { color:var(--gold); font-weight:800; font-size:.86rem; margin:0 0 4px; }
    h1 { font-size:clamp(1.35rem,5vw,2rem); margin:0 0 8px; line-height:1.35; }
    .desc,.hint,.meta,.foot { color:var(--muted); }
    .desc { margin:0; font-size:.95rem; }
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0; }
    .stat { background:rgba(29,43,58,.92); border:1px solid var(--line); border-radius:14px; padding:10px 12px; }
    .stat small { display:block; color:var(--muted); font-size:.78rem; }
    .stat b { display:block; font-size:1.1rem; }
    .meta { display:flex; justify-content:space-between; gap:10px; font-size:.86rem; margin-bottom:10px; }
    .pill { color:var(--accent); border:1px solid var(--line); background:var(--panel2); border-radius:999px; padding:2px 10px; font-weight:800; }
    h2 { font-size:clamp(1.05rem,4vw,1.32rem); margin:0 0 6px; white-space:pre-line; line-height:1.65; }
    .hint { margin:0 0 12px; font-size:.92rem; }
    .choices { display:grid; gap:10px; }
    .choice {
      width:100%; border:1px solid var(--line); background:#111b25; color:var(--text);
      border-radius:14px; padding:12px; text-align:left; font-size:1rem; line-height:1.65;
      white-space:pre-line; cursor:pointer;
    }
    .choice:hover { border-color:#526a82; }
    .choice.selected { background:#213247; border-color:var(--accent); }
    .choice.correct { background:var(--okbg); border-color:var(--ok); }
    .choice.wrong { background:var(--ngbg); border-color:var(--ng); }
    .actions { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
    .action {
      border:1px solid var(--line); border-radius:12px; padding:10px 16px;
      font-weight:800; font-size:.98rem; cursor:pointer;
    }
    #answerBtn { background:var(--accent); color:#08111a; border-color:var(--accent); }
    #nextBtn,#retryBtn { background:#243446; color:var(--text); }
    button:disabled { opacity:.42; cursor:not-allowed; }
    .explain {
      display:none; margin-top:14px; padding:13px; border-radius:14px;
      border:1px solid var(--line); background:#111b25;
    }
    .explain.show { display:block; }
    .explain h3 { margin:0 0 8px; font-size:1.08rem; }
    .ok { color:var(--ok); } .ng { color:var(--ng); }
    .explain p { margin:8px 0 0; white-space:pre-line; }
    .explain b { color:var(--gold); }
    .result { display:none; }
    .result.show { display:block; }
    .resultItem { border:1px solid var(--line); border-radius:12px; padding:10px; background:#111b25; margin-top:8px; }
    .foot { text-align:center; font-size:.82rem; margin-top:14px; }
    @media(max-width:520px) {
      .wrap { padding:12px 10px 32px; }
      header,.card,.result { padding:15px; border-radius:16px; }
      .stats { grid-template-columns:1fr; }
      .choice { font-size:.96rem; }
      .actions .action { flex:1; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="top">
    <header>
      <p class="sub">医療経営士2級 専門分野</p>
      <h1>DPC・出来高払い実践問題</h1>
      <p class="desc">DPC/PDPS、包括評価と出来高評価、DPCコード、入院期間、医療機関別係数、機能評価係数Ⅰ・Ⅱ、DPC参加基準を確認します。12カテゴリから各1問をランダム出題します。</p>
    </header>

    <div class="stats">
      <div class="stat"><small>進捗</small><b id="progress">1 / 12</b></div>
      <div class="stat"><small>正答数</small><b id="score">0 / 0</b></div>
    </div>

    <main class="card" id="quizBox">
      <div class="meta"><span class="pill" id="qNo">第1問</span><span id="cat">カテゴリ</span></div>
      <h2 id="prompt"></h2>
      <p class="hint" id="hint"></p>
      <div class="choices" id="choices"></div>
      <div class="actions">
        <button class="action" id="answerBtn">回答</button>
        <button class="action" id="nextBtn" disabled>次へ</button>
      </div>
      <section class="explain" id="explain"></section>
    </main>

    <section class="result" id="resultBox">
      <h2>結果</h2>
      <p id="finalScore"></p>
      <p>間違えたカテゴリは、包括・出来高、機能評価係数Ⅰ・Ⅱ、旧制度の係数名、DPC参加基準を重点的に復習してください。</p>
      <button class="action" id="retryBtn">再チャレンジ</button>
      <div id="resultList"></div>
    </section>

    <p class="foot">夜間学習向けの暗めの配色です。GitHub Pagesにそのままアップロードできます。</p>
  </div>

  <script>
    const questionPool = [
  {

          { text: "日本のDPC/PDPSは、米国のDRG/PPSと同じく、1入院当たり定額払い方式として整理される。", correct: false, explanation: "米国のDRG/PPSは1件当たり定額払い、日本のDPC/PDPSは1日当たり定額報酬算定制度として整理される。" },

      {

    let quiz = [], index = 0, selected = [], answered = false, score = 0, results = [];
    const $ = (id) => document.getElementById(id);

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function sameSet(a, b) {
      if (a.length !== b.length) return false;
      const s = new Set(a);
      return b.every((x) => s.has(x));
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#039;").replaceAll("\n", "<br>");
    }

    function makeQuiz() {
      return shuffle(questionPool.map((cat) => {
        const q = cat.questions[Math.floor(Math.random() * cat.questions.length)];
        return { ...q, category: cat.category, choices: shuffle(q.choices) };
      }));
    }

    function current() { return quiz[index]; }
    function correctIndexes(q) { return q.choices.map((c, i) => c.correct ? i : null).filter((v) => v !== null); }

    function render() {
      const q = current();
      $("progress").textContent = `${index + 1} / ${quiz.length}`;
      $("score").textContent = `${score} / ${results.length}`;
      $("qNo").textContent = `第${index + 1}問`;
      $("cat").textContent = q.category;
      $("prompt").textContent = q.prompt;
      $("hint").textContent = q.requiredCount > 1 ? `正しい選択肢を${q.requiredCount}つ選んでください。` : "正しい選択肢を1つ選んでください。";
      $("choices").innerHTML = "";

      q.choices.forEach((c, i) => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = `${String.fromCharCode(65 + i)}. ${c.text}`;
        btn.onclick = () => choose(i);
        $("choices").appendChild(btn);
      });

      $("answerBtn").disabled = true;
      $("nextBtn").disabled = true;
      $("nextBtn").textContent = "次へ";
      $("explain").className = "explain";
      $("explain").innerHTML = "";
      selected = [];
      answered = false;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function choose(i) {
      if (answered) return;
      const q = current();
      if (!q.multi || q.requiredCount === 1) {
        selected = [i];
      } else if (selected.includes(i)) {
        selected = selected.filter((x) => x !== i);
      } else if (selected.length < q.requiredCount) {
        selected.push(i);
      }
      updateChoices();
      $("answerBtn").disabled = selected.length !== q.requiredCount;
    }

    function updateChoices() {
      document.querySelectorAll(".choice").forEach((btn, i) => {
        btn.classList.toggle("selected", selected.includes(i));
      });
    }

    function answer() {
      if (answered) return;
      const q = current();
      if (selected.length !== q.requiredCount) return;

      answered = true;
      const ok = sameSet(selected, correctIndexes(q));
      if (ok) score++;
      results.push({ category: q.category, ok });

      document.querySelectorAll(".choice").forEach((btn, i) => {
        if (q.choices[i].correct) btn.classList.add("correct");
        if (selected.includes(i) && !q.choices[i].correct) btn.classList.add("wrong");
      });

      const selectedExps = selected.map((i) => `<p><b>選択肢の確認：</b>${escapeHtml(q.choices[i].explanation)}</p>`).join("");
      $("explain").className = "explain show";
      $("explain").innerHTML = `<h3 class="${ok ? "ok" : "ng"}">${ok ? "正解です。" : "不正解です。"}</h3>${selectedExps}<p><b>解説：</b>${escapeHtml(q.explanation)}</p>`;

      $("answerBtn").disabled = true;
      $("nextBtn").disabled = false;
      $("nextBtn").textContent = index + 1 >= quiz.length ? "結果へ" : "次へ";
      $("score").textContent = `${score} / ${results.length}`;
    }

    function next() {
      if (!answered) return;
      if (index + 1 >= quiz.length) showResult();
      else { index++; render(); }
    }

    function showResult() {
      $("quizBox").style.display = "none";
      $("resultBox").className = "result show";
      $("finalScore").innerHTML = `正答数：<b>${score}</b> / ${quiz.length}`;
      $("resultList").innerHTML = results.map((r, i) => `<div class="resultItem">第${i + 1}問：${escapeHtml(r.category)}　<b class="${r.ok ? "ok" : "ng"}">${r.ok ? "正解" : "不正解"}</b></div>`).join("");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function retry() {
      quiz = makeQuiz();
      index = 0; selected = []; answered = false; score = 0; results = [];
      $("quizBox").style.display = "";
      $("resultBox").className = "result";
      render();
    }

    $("answerBtn").onclick = answer;
    $("nextBtn").onclick = next;
    $("retryBtn").onclick = retry;
    retry();
  </script>
